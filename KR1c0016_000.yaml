body:
  text: 慈湖詩傳詩類提要臣等謹案慈湖詩傳二十卷宋楊簡撰簡有慈湖易傳已著録是書原本二十卷焦竑國史經籍志及黃虞稷千頃堂書目尚載其名而朱彝尊經義考注曰已佚今海內藏書咸集祕府而是書之目闕焉則彝尊所説為可信蓋竑之所録皆據史志所載類多虛列虞稷徵刻書目亦多未見原書固不足盡據耳今從永樂大典所載裒輯成編仍勒為二十卷又從慈湖遺書內補録自序一篇總論四條而以攻愧集所載樓鑰與簡論詩解書一通附于卷首其他論辨若干條各附本解之下以資考證至其總論列國雅頌之篇永樂大典此卷適缺無從採録其公劉以下詩十六篇則永樂大典不載其傳豈亦如吕祖謙之讀詩記獨闕公劉以下諸篇抑在明初即已殘缺耶是書大要本孔子無邪之旨反覆發明而據後漢書之説以小序為出自衛宏不足深信篇中所論如謂左傳不可據謂爾雅亦多誤謂陸德明多好異音謂鄭康成不善屬文甚至自序之中以大學之釋淇澳為多牽合而詆子夏為小人儒蓋簡之學出陸九淵故髙明之過至於放言自恣無所畏避其他箋釋文義如以聊樂我貟之員為姓以六駁為赤駁之訛以天子葵之之葵有向日之義間有附會穿鑿然其于一名一物一字一句必斟酌去取旁徵逺引曲暢其説其考核六書則自説文爾雅釋文以及史傳之音注無不悉搜其訂正訓詁則自齊魯毛韓以下以至方言雜説無不博引可謂折衷同異自成一家之言非其所作易傳以禪詁經者比也昔吳棫作詩補音十卷又别為韻補五卷韻補明人有刻本其書採托詩騷以下及歐陽修蘇軾蘇轍之作頗為雜濫補音久佚惟此書所引尚存十之六七然往往以漢魏以下之韻牽合古音其病與韻補相等朱子語類謂才老補音亦有推不去者蓋即指此類顧炎武亦嘗作韻補正一書以糾其失考古音者固未可全以為準焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀慈湖詩傳自序孔子曰小子何莫學夫詩詩可以興可以觀可以羣可以怨邇之事父逺之事君多識于鳥獸草木之名又曰興于詩立于禮成于樂又曰詩三百一言以蔽之曰思無邪又謂伯魚曰女為周南召南矣乎人而不為周南召南其猶正牆面而立也與又曰誦詩三百授之以政不逹使于四方不能專對雖多亦奚以為易詩書禮樂春秋其文則六其道則一故曰吾道一以貫之又曰志之所至詩亦至焉詩之所至禮亦至焉禮之所至樂亦至焉樂之所至樂亦至焉樂之所至哀亦至焉嗚呼至哉至道在心奚必逺求人心自善自正自無邪自廣大自神明自無所不通孔子曰心之精神是謂聖孟子曰仁人心也變化云為興觀羣怨孰非是心孰非是正人心本正起而為意而後昏不起不昏直而逹之則關雎求淑女以事君子本心也鵲巢昏禮天地之大義本心也柏舟憂鬱而不失其本心也鄘柏舟之矢死靡它本心也由是心而品節焉禮也其和樂樂也得失吉凶易也是非春秋也逹之于政事書也逮夫動乎意而昏昏而困困而學學者取三百篇中之詩而歌之詠之其本有之善心亦未始不興起也善心雖興而不自知不自信者多矣舍平常而求深逺舍我所自有而求諸彼學者苟自信其本有而學禮焉則經禮三百曲禮三千皆我所自有而不可亂也是謂立至于緝熙純一粹然和樂不勉而中無為而成雖學有三者之序而心無三者之異知吾心所自有之六經則無所不一無所不通有所感興而曲折萬變可也有所觀于萬物不可勝窮之形色可也相與羣居相親相愛相臨相治可也為哀為樂為喜為怒為怨可也邇事父可也逺事君可也授之以政可也使于四方可也無所不通無所不一是謂不面牆有所不通有所不一則阻則隔道無二道正無二正獨曰周南召南者自其首篇言之亦其不雜者毛公之學自謂本諸子夏而孔子曰女為君子儒無為小人儒蓋謂子夏又曾子數子夏曰吾與女事夫子於洙泗之間退而老於西河之上使西河之人疑女於夫子爾罪一也喪爾親使民未有聞焉爾罪二也喪爾子喪爾明爾罪三也夫子夏之胸中若是其學可以弗問而知而況於子夏初未嘗有章句徒傳其説轉而至於毛乎齊魯詩今亡韓有其説韓與毛亦有善者今問取焉總論孔子曰詩三百一言以蔽之曰思無邪此無邪之心人皆有之而不自知起不知其所自用不知其所以終不知其所歸此思與天地同變化此思與日月同運行故孔子曰夫孝天之經地之義又曰禮本于太一分而為天地轉而為隂陽變而為四時列而為鬼神又曰哀樂相生正明目而視之不可得而見也傾耳而聽之不可得而聞也一旨也今所謂毛詩序者是奚知此旨求諸詩而無説故委曲遷就意度穿鑿殊可歎笑孔子曰關雎樂而不淫哀而不傷此言關雎之音也非言關雎之詩也為序者不得其説而謂關雎樂得淑女以配君子憂在進賢不淫其色哀窈窕思賢才而無傷善之心今取關雎之詩讀之殊無哀窈窕無傷善之心之意樛木之逮下意指君子而序言后妃桃夭言昏姻之正序者必推本諸后妃之不妒忌鵲巢之詩初無國君積行纍功之意而序言國君積行纍功甚者至于何彼襛矣之詩初無車服不繫其夫下王后一等猶執婦道以成肅雍之德之情而序推而詳言之蓋為序者不知孔子所刪之旨亡矣毛氏之學自言子夏所傳而史氏亦言衛宏作序自子夏不得其門而入而況毛萇衛宏之徒歟詩之有序如日月之有雲如鑑之有塵學者愈面牆矣觀詩者既釋訓詁即詠歌之自足以興起良心雖不省其何世何人所作而已剖破正面之牆矣文王陟降在帝左右只是天人一理上天之載無聲無臭儀刑文王天即文王也不識不知順帝之則文王即天也其進退升降之間一而已矣穆穆文王於緝熙敬止文王不大聲以色故曰穆穆緝者緝理于思為細微之間熙有理順之義進德之實非思也非為也惟可以言敬敬非思為也惟可以言止止非思為也寂然不動感而遂通而不屬于思為所謂不識不知者此也安汝止者此也文王之所謂緝熙者緝熙此也惟不動乎意不屬乎思為故聲音不大形色亦不大而見為穆穆也子曰詩三百一言以蔽之曰思無邪學者往往疑三百篇當有深義聖人所謂無邪者必非常情所謂無邪是不然聖言坦夷無勞穿鑿無邪者無邪而已矣正而已矣無越乎常情所云也但未明乎本心者不知此不信此知此信此則易直子諒之心油然而生生則惡可已惡可已則不知手之舞之足之蹈之有正而無邪有善而無惡有誠慤而無詐偽有純而無雜有一而無二三復周南召南必不面牆以興以觀以羣以怨無非正用不勞勉強不假操持油然自知所至皆妙人知徐行後長之心即堯舜之心則知之矣知乍見孺子將入井皆有怵惕惻隱之心即仁者之心則知之矣此心人所自有故三百篇或出于賤夫婦人所為聖人取焉取其良心之所發也至于千百載之下取而誦之猶足以興起也故曰興於詩按序文一萹總論三萹俱從慈湖遺書補録附録樓鑰答楊簡論詩解書蒙示教詩解近始讀竟荷開發鄙陋至多感歎擊服之餘恨未得一遂請益于門下若夫發明無邪之思一貫之旨天人同心大道至平古説難盡信雖載之左傳者亦不可據爾雅亦多誤大學所引亦有牽合詩序多失經意釋文多好異音詩人諷詠或有過于事實制度名數不盡合于禮典先王皆在商世難拘以周禮文王以服事殷不應作禮樂如此類未易概舉皆前輩之所未發者尢用服膺然惟尊意每不自以為足而欲人之言某亦不能自己欲效所見試陳其甚明者正欲反覆辨論以歸至當非恃相與之厚非愛此書之深不及此也按此書從樓鑰攻愧集採録
