body:
  text: 慈湖詩傳卷一宋楊簡撰周南關關雎鳩在河之洲窈窕淑女君子好逑參差荇菜左右流之窈窕淑女寤寐求之求之不得寤寐思服悠哉悠哉輾轉反側參差荇菜左右采之窈窕淑女琴瑟友之參差荇菜左右芼之窈窕淑女鐘鼓樂之是詩后妃思得貞靜之淑女以事君子求之之切至於寤寐不忘猗與至哉此誠確無偽之心不忌不妒之心即道心即天地之心鬼神之心百聖之心雎鳩關關貞靜之音居河洲尤見貞靜氣象淑女之貞靜窈窕似之逑求也窈窕淑令之女君子之所好求好求夫貞靜之女非好夫淫麗之色此無邪之心民勞之詩曰惠此中國以為民逑謂副民之所求或曰好仇仇匹也義亦通貞靜之女君子之所好尤為賢后妃之所好蓋求淑女以事君子后妃之職也故后妃思念淑女之德如雎鳩之貞靜又思亦君子之所好又思采荇供祭之時參差在水淑女相與左右比肩共取於流水之中寤寐思求淑女不可得至於寤寐思服於心悠哉悠哉輾轉反側誠切如是詎有毫髮忌妒之意介其間乎思以琴瑟友之又思以鐘鼓樂之油然純誠之心兹非道心歟兹非即天地之心與兹非即天地之變化歟兹豈不知道者所能測識其萬分之一為周南召南者必心通乎此而後為不靣牆學者靣牆比比而是雖明告之不省也故曰百姓日用而不知孔子以思無邪一言蔽三百篇思無邪之言世之所知思無邪之實世所未知如其未知但誦詠二南之詩自然道心興起不知手之舞之足之蹈之孔疏引金縢云公乃為詩以貽王名之曰鴟梟遂謂篇名皆作者所自名然詩人或有感動斐然而作忽然而忘他日采詩者取之則其名未必本有他人加之亦未可知也孔子不作詩序旨在於詩無序可也關雎一詩而齊魯韓毛異義毛以為美齊魯韓咸以為刺歐陽氏曰關雎齊魯韓三家皆以為康王政衰之詩前漢杜欽傳曰佩玉晏鳴關雎歎之瓚曰此魯詩也後漢明帝詔曰昔應門失守關雎刺世注薛君韓詩章句曰人君退朝后妃御見有度應門擊柝鼓人上堂今內傾於色故詠關雎説淑女以刺時然周公之時康王猶未立毛詩序曰關雎樂得淑女以配君子憂在進賢不淫其色其義是也而又曰哀窈窕無傷善之心則差失詩旨本詩初無此情乃不悟孔子關雎樂而不淫哀而不傷之言乃言其音不言其詩致此差誤毛詩傳曰寤覺寐寢也鄉飲酒禮鄉射禮燕禮皆用周南關雎葛覃卷耳召南鵲巢采蘩采蘋則關雎非刺詩甚明矧其辭旨情狀亦甚著平心靜誦久當自明推世考德則關雎太姒之詩也非太姒作則武王周公述太姒之情狀而為之若太姒本無此情武王周公自以意為之則偽辭也何以風動天下而毛詩序不明言太姒何也自邶而下情狀不白者猶或強為之辭奚獨於二南而不然深念夫二南用於鄉樂用於邦國周公必以經意又孔子屢以啓伯魚啓門人又屢言關雎門弟子宜有所問而此通言后妃之德餘篇略同當是孔子之所誨告不欲明言所作之人以支離人心欲後世誦詠三百篇之詩知皆正辭正情足以感發人所自有之正心若於本詩之外贅曰某國某人之所作又序其所以然之故則誦詩者首見其國又見其人又見其故至於本詩將詩人不知所以然油然動於中發諸聲音自中自正渾渾融融無所不通之妙如雲翳日如塵積鑑矣而况於置諸首而謂之序邪故孔子不作序按少牢饋食禮言某妃則大夫妻亦稱妃凡民曰妃耦則士庶之妻通稱妃后妃之德蓋天下之通義也故鄉樂用之門弟子審知其旨毛公自言其學自子夏今周南多通言后妃召南亦泛言夫人大夫妻罕指其人豈亦果有所自猶有聖人之微意邪若其置諸篇端又名曰序則大乖矣自邶以下多指其人又乖矣至於曲推其意穿鑿其説如於關雎言哀窈窕無傷善之心詩中即無此情於殷其靁言勸以義詩中亦無此情於摽有梅言男女得以及時詩中何但無此情正言其不及時此類奚可殫舉東漢書謂衛宏作毛詩序夫不聞子夏為書而毛公始有傳衛宏又成其義而謂之序蓋子夏親近聖人無敢支離毛公衛宏益差益遠使聖人大旨沉沒於雲氣塵埃之中吁其甚矣其有情文疑阻惟可作訓詁於後毛詩傳曰芼擇也其義未安禮云芼羮謂以菜為羮也又云芼之以蘋藻謂菜用蘋藻也然則芼之為菜也思得淑女左右共助以荇為菜謂熟之和之成為菜也補音云芼多讀如邈未詳簡觀古用韻亦不拘拘反切况芼音之轉如邈歟補音云思服蒲北切一作匐又作犕士冠禮三加祝皆服與德叶秦泰山刻石賔服與修飭叶碣石刻石咸服與滅息叶詩一十有六無用今房六切一讀者簡竊意方言所至不同匐作蒲北切則可服作蒲北切則未安安知服非扶北切即與今房六切同母今讀當亦有所自特微訛爾補音云右采此禮切荀卿賦篇此夫文而不采者與簡然易知而致有禮者與杜篤論都賦采與已叶郭璞客傲采與裏叶陸雲贈顧尚書采與水叶瑟友羽軌切朋也史記龜策傳與之為友叶民衆咸喜易林坎之乾孝友與興起叶楚辭九章長友與有理叶漢天馬歌友與里叶崔駰逹旨友與已叶按采有此苟切友有云九切宜從兩讀例而詩用友韻凡十有一無作云九切者今定從一讀補音專於叶韻而於芼樂亦莫能通簡按詩固不能皆叶然歌詩之時樂之餘音亦頗叶芼音若芼樂二音皆舌居中則尤叶葛之覃兮施于中谷維葉萋萋黃鳥于飛集于灌木其鳴喈喈葛之覃兮施于中谷維葉莫莫是刈是濩為絺為綌服之無斁言告師氏言告言歸薄汙我私薄浣我衣害浣害否歸寧父母補音於喈喈引尚書大傳載樂曰舟張辟雍鶬鶬相從八風回回鳯凰喈喈太元樂首鐘鼓喈喈管絃嚌嚌或承之衰徐幹齊都賦喈喈與所竒叶陸雲贈鄭虔季喈喈與芳池叶説文以皆得聲漢蜀人趙賔好小數以為氣無箕子箕子者萬物方荄兹也顔師古曰荄音皆古荄與箕音同無斁弋灼切枚叔七發無斁與諾叶與石叶石常約切殷臣奇布賦無斁與濯叶禮記作射古射亦弋灼切婦人樂為絺綌尊敬師傅服浣濯念父母猗歟至哉此又道心即天地之心即鬼神之心即百聖之心道不離於日用惟無邪而已矣毛詩傳曰覃延也其義未安覃本義深也葛葉大而蔓小故墜焉而深下俗謂墜下曰覃徒紺切而廣韻集韻無此音釋文徒南切方音不同不可知也而謂延也則未安蕩曰覃及鬼方謂深及鬼方深逺義通大田覃耜耜端有宛然中深之狀實覃實訏后稷之聲深廣也故水中深曰潭加水以别其字先儒徒因葛推義釋覃曰延然施即延也無乃重復乎爾雅謂覃延也爾雅固多差且如謂誥誓謹也愷悌發也憯曾也振古也此其差之甚者鄭康成雖好述古猶不能盡從然則爾雅不可盡信説文曰長味也蓋本延義從鹵以􅫇鹵鹹省不思五味何獨鹹潤下作鹹海深故鹹鹹有深下義􅫇即厚字有深厚之義故集韻云楚人名深曰潭按樓鑰云覃爾雅釋言流覃也覃延也郭注皆謂蔓延相被及説文長味也以鹵以􅫇鹵鹹省詩曰實覃實訏徒含切又篆文覃者潭説文從水覃聲集韻一説楚人名深曰潭潭字在六書中為形聲如江河之從水而工與可止取其聲而無義潭從水覃亦取其聲非有義也潭有深義今之言潭潭是也覃無深義葛之蔓延故施于中谷亦未為重復也覃耜之音剡疑是方言集韻以為利耜此以詩傳釋文為據如八月剝棗剝音普卜反荆公以為養老者剝棗之皮而進之後行田野見羣兒相呼朴棗方知釋文之有自來此二覃字更宜考之又按鑰集所載此條宛然中深之狀下尚有故曰覃耜毛傳殆未親見耜徒見易有剡木為耜之義故以覃為利後儒求其説而不獲又轉音為剡又轉字為耜今正其字義平聲如字八句今本無之當是從樓説刪定按何人斯我心易也韓詩作施于以知施音異其來久矣故釋文云以豉反灌木叢木爾雅云木族生為灌莫莫闊大之貌毛傳曰中谷谷中也濩煮之也精曰絺粗曰綌斁厭也爾雅釋詁云射厭也郭注云詩曰服之無斁疏云斁射音義同毛傳曰私燕服也害何也即曷也書曰時日害喪治亂謂之亂治擾謂之擾故治汙謂之汙疏云鄭以衣為公衣浣謂濯之耳言其功淺也以公對私為深淺蘇氏曰言辭也春秋傳曰言歸于好薄猶略也於師氏之前有肅敬之心欲略汙浣頗有不敢之意故薄也毛詩序曰葛覃后妃之本也后妃在父母家則志在於女功之事躬儉節用服浣濯之衣尊敬師傅則可以歸安父母化天下以婦道也夫人善心即道心婦人志於女功躬節儉服浣濯念父母而歸寧方是心油然而興互見錯出無非神用何本何末而為詩序者判本末而裂之且曰則可以是詩初無是情不省詩情贅立已意使天下後世平夷純正質直之心鑿而穿之支而離之釆釆卷耳不盈頃筐嗟我懷人置彼周行陟彼崔嵬我馬虺隤我姑酌彼金罍維以不永懷陟彼高岡我馬玄黃我姑酌彼兕觥維以不永傷陟彼砠矣我馬瘏矣我僕痡矣云何吁矣行如字京語頗與筐叶觥吉橫反補音姑黃切按原本姑誤如説文觥以黃得聲俗從光劉楨魯都賦觥與觴叶鄭氏引詩皆作觥痡音鋪補音永懷胡隈切釋名懷回也張衡東京賦允懷與來摧叶漢房中歌懷與歸叶劉向九歎懷與頽叶左氏傳聲伯之歌曰懷與瑰歸叶揚子雲酒針懷與危叶毛詩傳曰卷耳苓耳也頃筐畚屬易盈之器也今俗謂頃為空謂覆而空之也故俗謂筐筥之極小者為空蓋以器小而難於取傾而出之可也以是得名歟集韻引説文畚屬蒲器也或曰作音本音瓶鄭箋云器之易盈而不盈者憂思深也廣雅云枲耳亦云胡枲江東或呼常枲或曰苓耳形似鼠耳叢生如盤陸璣疏云按原本脫此四字今補白華細莖蔓生可煮為茹滑而少味四月中生子如婦人耳璫吕氏曰周行周道也大東詩曰佻佻公子行彼周行行亦道也朱氏曰詩有三周行此及大東皆道路鹿鳴乃道義鹿鳴之詩曰人之好我示我周行示我以周家所行爾七月遵彼微行謂桑下徑也小辨行有死人行道路也則周行為周通之路益明然自春秋傳襄十五年引此詩曰嗟我懷人置彼周行能官人也王及公侯伯子男甸采衛大夫各居其列所謂周行也此左氏釋詩誤爾而毛詩傳不詳考遂因其誤謂周之列位左氏差誤亦多周世釋詩之誤者亦多不可盡信為毛詩序者因是又差其旨而曰又當輔佐君子求賢審官以婦人而干人主之職豈不大亂書曰牝雞之晨惟家之索卷耳之詩君夫人勞使人之歸也殊無輔君子求賢審官之情觀是詩宛然有君夫人憂閔賢臣勞役於道路酌金罍以勞其歸之情狀而諸儒終不敢謂實有其事不敢明言雖鄭康成詳於考禮亦不敢正言而曲其説蓋以聘禮使還無夫人饗按國語魯公父文伯之母以好禮聞固嘗饗其宗老師亥曰男女之饗是當時有男女相享之禮記云大饗廢夫人之禮是其未廢也本有夫人饗禮方周之初斯禮未廢故見諸詩與使臣之還君既饗勞之夫人又賞勞之於是序言使臣之勞役夫人憂閔之情夫人采采卷耳而不盈傾筐以其憂思使臣之賢而今置諸通道而逺役惟賢故使之惟賢故懷之君臣同體君夫人又同體故古者夫人有是禮亦有是情有情斯有禮禮無偽夫人思使臣升陟崔嵬之髙謂踰山之道也馬亦勞苦而虺隤矣言我馬者親之如一家也姑且也我姑酌金罍之酒以勞之喜其既歸既見既勞不復永永憂懷矣今俗語有且喜之辭有且辦具少飲食以勞享之辭皆喜其逺歸之情狀毛詩傳曰置置也陟升也人君黃金罍疏云韓詩説天子罍以玉諸侯大夫皆以金士以梓毛詩説金罍酒器也諸臣之所酢人君以黃金飾尊大一石金飾龜目蓋刻為雲雷之象周禮司尊彞云皆有罍諸臣之所酢爾雅云山脊曰岡毛詩傳曰元馬病則黃兕觥角爵也爾雅云兕似牛郭注云一角青色韓詩説觥五升毛詩説觥大七升疏云禮器曰宗廟之祭貴者獻以爵賤者獻以散尊者舉觶卑者舉角特牲二爵二觚四觶一角一散不言觥之所用禮圖云觥大七升以兕角為之地官閭胥掌其比觥撻罰之事春官小胥職亦云觥其不敬者桑扈絲衣皆云兕觥其觩明為罰而不犯然七月卒章躋彼公堂稱彼兕觥萬壽無疆與此卷耳詩皆無為罰之意得非周公作禮始定禮器以七升之觥為罰爵與抑角爵之異稱與爾雅云土戴石為砠郭注云土山上有石者而毛詩傳曰石山戴土曰砠差矣毛傳曰瘏病也痡亦病也云何者謂説何言則可蓋閔之甚也卒於長吁無言以繼之猗歟至歟此憂閔其使臣之心非正心與正心非道心與即關雎葛覃之心葛覃卷耳當亦太姒之詩然觀詩者正不必推求其人三百篇中或誦或歌皆足以興起人之道心此孔子刪詩之大旨而人知此信此者亦寡南有樛木葛藟纍之樂只君子福履綏之南有樛木葛藟荒之樂只君子福履將之南有樛木葛藟縈之樂只君子福履成之毛詩序差誤既多既甚理難盡信今觀是詩殊無后妃之狀惟言君子爾毛詩傳亦未嘗言后妃亦未嘗言不妒忌獨為序者始立其説曰后妃不妒忌鄭箋又從而和之故諸儒從其後而不可告語矣學者觀書奚可雷同不復考察至是益信東漢書謂衛宏作毛詩序果明驗矣與毛公傳異而又差謬太甚是詩當曰君子逮下也毛傳曰木下曲曰樛按今鄭箋本木誤作木綏安也縈旋也爾雅釋木云下曲曰枓釋者引是詩樛木為證蓋枓樛音義同陸璣云藟一名巨苽似燕薁亦延蔓葉似艾白色其子赤亦可食酢而不美作是詩者偶見樛木在其南故取以為喻不必逺言南土也鄭箋云木枝以下垂之故故葛也藟也按原夲脫下故字今校補得纍而蔓之簡謂此喻君子禮賢下士故賢士之在下者由是而升大抵自賢滿假者多嚴厲虛懷下士者多樂易詩人於是贊其德曰樂哉君子又祝其福曰願君子常有福而安荒者蒙之遍也將者與之俱也願君子行履常與福俱也曰將順曰將迎皆與之俱也曰將持曰相將即次第皆與之俱也曰將軍者將軍衆而與之俱也能將其軍則其體大矣故主大義其轉音則子漾反只語音也止只之皆一音而記之者偶不同也只説文曰語已辭也嗚呼此逮下之心與夫詩人愛敬其君子贊之祝之之心皆道心而人往往多不信其為道者百姓日用而不知也螽斯羽詵詵兮宜爾子孫振振兮螽斯羽薨薨兮宜爾子孫繩繩兮螽斯羽揖揖兮宜爾子孫蟄蟄兮陸璣疏云今人謂蝗子為螽子兖州人謂之螣許慎云蝗螽也蔡雍云螽蝗也毛詩傳曰螽斯蚣蝑也疏曰此言螽斯也七月云斯螽文雖顛倒其實一也故釋蟲云蜤螽蚣蝑舍人曰今所謂舂黍也陸璣疏云幽州人謂之舂箕舂箕即舂黍蝗類也長而青長角長股股鳴者也或謂似蝗而小班黑以兩股相切作聲聞數十步按爾雅釋蟲蜤蟲蜙蝑釋曰周南作螽斯一名蜙䗥餘同詩疏然長而青長角長股作舂黍之狀作聲者乃間見不多舂黍殆非此螽斯也若蝗則多矣釋蟲土螽蠰溪者殆蝗邪蝗生子於土中釋曰土蟲一名虴蜢今俗曰䗘蜢者即蝗也色或青或毼能跳能飛若旱乾蝗作不勝其多害稼甚平時䗘蜢在田間亦多於他蟲若稍多亦害稼蓋盛而為災則曰蝗不為災則曰䗘蜢䗘蜢亦多能飛羽謂羽多然則螽斯謂是爾詵詵言其多薨薨言其盛飛作聲揖揖言其羽多相比密子孫多謂之宜子孫猶宜民宜人宜黍稷宜家振振肅敬振整也子孫多故曰振振音真者鄉音輕清與子孫長少次第循序或行或列如繩然蟄蟄盛而有聲也是詩以螽斯羽喻子孫衆多爾毛傳亦未嘗言后妃不妒忌惟序乃言不妒忌序所以必推原及於不妒忌者意謂止言子孫衆多則義味不深故推及之吁此正學者靣牆之見不悟道不離於平常故曰百姓日用而不知孔子以一言蔽詩曰思無邪而已初無髙奇幽深今子孫衆多如螽斯羽何邪之有振振繩繩何邪之有既無邪僻非道而何何必外求其義不妒忌雖為善而於螽斯之詩言之則為贅則為不知道於以驗衛宏之學又不逮毛公逺甚衛宏作序往往亦本毛義而又多置已意焉故益差桃之夭夭灼灼其華之子于歸宜其室家桃之夭夭有蕡其實之子于歸宜其家室桃之夭夭其葉蓁蓁之子于歸宜其家人桃生榮夭好其華灼灼女之顔色似之之子女子也婦人謂嫁曰歸其居室家甚宜不必分男有室女有家也蕡者實之貌有子之象也其葉蓁蓁庶事咸宜之象也宜其家人一家之人咸宜之也相安也此夫婦和樂之正情也非邪僻也歸妹天地之大義也説以動歸妹也妹少女也雖説而非邪正心也道心也為序者不逹是道必於詩外推及后妃所致又及不妒忌不妒忌誠善而於桃夭之詩言之則為贅則為不知道毛傳亦未嘗言后妃不妒忌所致於以益驗序果衛宏所作補音云其華芳無切郭璞云江東謂華為敷陸德明亦云古讀華如敷易曰枯楊生敷老婦得其士夫記曰不當華而華楚大夫屈原九歌瑶華與離居叶漢齋房樂章華與都叶揚子反騷重華與蒼梧叶光武曰仕宦當作執金吾娶妻當得隂麗華急就章芫華與藜蘆叶易林云桃夭少華季女宜家君子樂湑長利止居家公胡切左氏傳伯姬之占曰姪其從姑六年其逋逃歸其國而棄其家虞人之針曰武不可重用不恢於夏家獸臣司原敢告僕夫屈原楚辭厥家與封狐叶戰國䇿歌曰長鋏歸來乎食無魚又曰長鋏歸來乎無以為家揚子雲酒針家與乎協龜䇿傳漁者幾何家誰名為豫且或曰家本音姑為阿家家即姑也未詳按華有胡瓜切家有居牙切宜從有兩讀例而詩八用華韻七用家韻無叶此二音者今定從一讀且子余切肅肅罝椓之丁丁赳赳武夫公侯干城肅肅罝施于中逵赳赳武夫公侯好仇肅肅罝施于中林赳赳武夫公侯腹心毛傳曰肅肅敬也罝兔罟也丁丁椓杙聲也赳赳武貌爾雅云干扞也孫炎云干盾自蔽扞鄭箋云干也城也皆以禦難也爾雅云罟謂之罝李巡曰自作徑路張罝捕之也爾雅釋宫云樴謂之杙郭注云橛也是詩疏云此丁丁連椓之伐木傳亦云丁丁伐木聲爾雅釋宫云九逹謂之逵此逵山林中九逹之徑爾仇疑逑字之差關雎云君子好逑此言罝者之賢公侯之所好所逑也施謂張施其罟中逵逵中也中林林中也周德化之盛至於罝之武夫赳赳肅肅德容如此可以為公侯禦難衛民如干如城公侯之好逑所信任如腹如心則成人有德小子有造於是乎驗此乃大王王季文王積德於上大任大姒協德於中武王十亂輔德於後所致而序惟言后妃之化則偏矣毛傳未嘗言后妃之化獨序有是説則序為衛宏所作益明簡詠誦罝之詩不覺起敬起慕莊肅子諒之心油然而生不知所以始亦不知所以終道心融融此人心所同千古所同天地四時之所同鬼神之所同補音云好仇渠之切漢趙王之歌曰為王餓死兮誰者憐之吕氏絶理兮託天報仇史記龜䇿傳囚而辱之王難遣之江河必怒務求報仇采采芣苡薄言采之采采芣苡薄言有之采采芣苡薄言掇之采采芣苡薄言捋之采采芣苡薄言袺之采采芣苡薄言襭之人感於物而為言為音無非道者惟流而入於邪則昏則迷芣苡無邪之詩也無邪則無往而非道先儒不知道顧於坦夷無説之中外起意説必推及於后妃之和平和平則婦人樂有子雖非邪言實失本旨芣苡雖曰車前所治難産遂謂婦人采之此容或有之又安知芣苡無他治及他用乎殆不可必言婦人也薄猶略也言語助之辭也薄言有優悠不迫之意掇取之易也易曰患至掇也毛詩傳曰拾也即搯也以爪搯取之易也捋則一握所取多也爾雅釋器云執袵謂之袺扱袵謂之襭蓋扱袵而扱之於帶也汾沮洳言采其藚孔疏引陸璣疏云今澤蕮也其葉如車前草大其味亦相似徐州廣陵人食之據此則芣苡亦可食矣釋草云芣苡馬舄馬舄車前郭注云今車前草大葉長穗好生道邉江東呼為蝦蟆衣陸璣疏云車前一名當道今藥中車前子是也幽州人謂之牛舌草可鬻作茹按原本作誤作其大滑其子治婦人難産王肅引周書王會云芣苡如李出於西戎王基駁云王會所記雜物奇獸皆四夷逺國各賫土地異物以為貢贄非周南婦人所得采然周亦西戎之地二説不同當兩存之以俟後人然孔子所取是詩之大旨則不在是孔子所取取其無邪無邪即道道心庸常無可言者正不必於詩外求説且采采芣苡之時何説之可言掇捋袺襭之時何説之可言孔子曰豫欲無言正以明道無俟乎言易大傳曰百姓日用而不知孔子曰中庸之為德也其至矣乎民鮮久矣非謂民無此道也民日用此道而自不知故鮮德其實庸常日用皆道學者迷焉故必求説索意襭或作擷補音有羽軌切説文痏洧鮪皆以有得聲史記封禪頌有與祉叶龜策傳有與紀叶司馬相如敘傳有與始叶班固西都賦有與里叶傅毅洛都賦有與畤叶按采有此苟切有有云九切宜從兩讀例而詩十用有韻無作云九切者今定從一讀南有喬木不可休息漢有遊女不可求思漢之廣矣不可泳思江之永矣不可方思翹翹錯薪言刈其楚之子于歸言秣其馬漢之廣矣不可泳思江之永矣不可方思翹翹錯薪言刈其蔞之子于歸言秣其駒漢之廣矣不可泳思江之永矣不可方思此不敢犯禮之心即正心亦道心亦天地鬼神之心彼不知道者必以為粗近之心非精微之心吾則曰此即不勉而中不思而得之心孔子曰下學而上逹知我者其天乎知此者奚止千無一萬無一無惑乎為序者不足於此而推於文王也序曰漢廣德廣所及也文王之道被於南國美化行乎江漢之域無思犯禮求而不可得也是其為言非不善惟不明乎道不明乎是詩之道心而贅為説焉則亦足以亂人之道心故不可用知夫關雎太姒之詩而不言太姒惟曰后妃之德則漢廣不必推文王矣毛傳曰南方之木美喬上竦也思辭也疏云以上竦之故不可就而止息漢上有遊女以貞潔之故不可犯禮而求爾雅釋水云潛行為泳郭注云水底行也晏子春秋曰潛行逆流百步順流七里毛傳曰永長方泭爾雅釋言云舫泭也郭注云水中竺二稗筏孫炎云水中為桴筏也方言云泭謂之竺二稗竺二稗謂之筏爾雅釋引此漢廣不可方思以釋舫泭論語云乘桴浮於海注云編竹木大曰筏小曰桴是也舫方泭桴音義同釋言又云舫舟也郭注云並兩船釋水云大夫方舟然則舫方雖通用而有或舟或筏之不同江既湍急深險而又永長不可方筏喬木不可休息江漢不可方泳皆以喻女之貞潔不可遽然不以禮而求刈楚刈蔞以秣馬駒是退而以禮求之也遊或作遊錯雜也於雜薪之中而刈其楚楚者毛傳曰蔞草中之翹翹然疏引爾雅釋草購蔏蔞郭云蔏蔞蔞蒿也按原夲下蔞字脫生下田初出可啖江東用羮魚也陸璣疏云其葉似艾白色長數寸髙丈餘好生水邉正月根芽生旁莖正白生食之香而脆美其葉又可蒸為茹毛傳曰秣養也六尺以上曰馬五尺以上曰駒疏曰庾人云八尺以上為龍七尺以上為騋六尺以上為馬以次差之故知五尺以上也秣馬及駒將以親迎歟補音云泳于誑切郭璞江賦紫䓴熒曄以藂被緑苔鬖髿乎硎上帆蒙籠以蓋嶼萍實出而漂泳正用此讀方甫妄切爾雅舫泭也疏云水中為泭筏也漢廣不可方思舫方同馬滿補切秦琅琊刻石澤及牛馬索隱音姥漢書僕射莽何羅謀反孟康曰征和三年通合侯馬通今言莽明德皇后惡其先人有反易姓莽顔師古莽莫戶切案必易馬為莽者以馬與莽皆滿補切左氏傳辛廖之占曰震為土車從馬又童謡曰鴝鵒之羽公在外野往饋之馬屈原離騷經登閬風而紲馬與哀髙邱之無女叶韻九歌縶四馬與擊鳴鼓叶韻漢樂章靈之下若風馬左蒼龍右白虎野上與切其蔞一讀力俱切一讀力侯切其駒一讀居侯切易林蹇之豫曰川深難遊水為我憂多虛少實命鹿為駒遵彼汝墳伐其條枚未見君子惄如調飢遵彼汝墳伐其條肄既見君子不我遐棄魴魚赬尾王室如燬雖則如燬父母孔邇爾雅釋水云漢為潛江為沱汝為濆郭注引詩曰遵彼汝濆大水溢出别為小水之名然則毛詩作墳殆字誤與爾雅古書春秋元命苞云子夏問夫子作春秋不以初哉首基為始何則爾雅乃孔子以前之書當以爾雅為正爾雅他文雖有可疑而此汝濆辭旨重復明著而毛詩别無明證毛傳曰遵循也汝水名也枝曰條幹曰枚惄飢意也調朝也肄餘也斬而復生曰肄遐逺也赬赤也魚勞則尾赤燬火也孔甚邇近也揚子方言云悼惄悴憖傷也自關而東汝潁陳楚之間通語也汝謂之惄秦謂之悼云云又云憂也悵也婦人敬其夫曰君子夫逺役未歸其妻伐薪於汝濆之側思念其夫惄焉如朝飢勞心甚則氣虛如飢雖食難飽雖暫飽旋飢此勞心甚者之疾狀諸儒咸以調為朝蓋本朝字一訛而為輖再訛而為調與今當音朝釋文音周未安蓋因别本作輖輖亦無義不悟其訛也既見君子其夫婦既見則曰不我遐棄敘情相悅之辭也曰今不逺棄我矣君子勞苦顔色瘦病如魚勞尾赤所以然者紂在上王室如火燬暴亂不得寧也雖則如燬而父母甚近意恐其夫或憚其勞苦或怠或逃懼將得罪纍及父母也是詩憂念其君子之心憂纍及父母之心勉君子以正之心即道心序曰汝墳道化行也文王之化行乎汝墳之國婦人能閔其君子猶勉之以正也是序雖足以見當時事情而首言道化於以知為序者不知是詩之道而外求麟之趾振振公子于嗟麟兮麟之定振振公姓于嗟麟兮麟之角振振公族于嗟麟兮按此篇永樂大典麟字趾字下皆遺
