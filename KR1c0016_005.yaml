body:
  text: 慈湖詩傳卷五宋楊簡著衛瞻彼淇奥綠竹猗猗有匪君子如切如磋如琢如磨瑟兮僩兮赫兮咺兮有匪君子終不可諼兮瞻彼淇奥綠竹青青有匪君子充耳琇瑩㑹弁如星瑟兮僴兮赫兮咺兮有匪君子終不可諼兮瞻彼淇奥綠竹如簀有匪君子如金如錫如圭如璧寛兮綽兮猗重較兮善戲謔兮不為虐兮奥於六反又烏報反猗於宜反補音烏何切東方朔七諫搴元芝兮列樹芋荷按原本脱此句橘柚萎枮兮苦李旖旎徐邈云旖旎詩作猗儺烏可乃可二切簡按王叔和脉訣云阿阿緩若春陽桞阿猗一通歟烏可切亦與磋叶僴遐板反爾雅作烜毛詩作咺諼况元反青如字琇音秀瑩音榮又音營㑹如字簀音責猗於綺反重直恭反較古岳反劉曰淇水之旁至今多美竹他竹弗迨也王氏曰考工記曰且其匪色必似鳴匪者文章之謂爾雅曰厓内為隩淇奥緑竹有潤澤文章之美君子之徳似之觀全篇可見大學曰如切如磋者道學也如琢如磨者自修也瑟兮僴兮者恂慄也赫兮咺兮者威儀也有斐君子終不可諼兮者道盛徳至善民之不能忘也爾雅盡載大學文大學之意謂切磋者師友之力歟至於琢磨則微矣惟自修而已他人不能力為也然其自改過用力亦有如切如磋之意雖師友切磋亦吾心受之非外也而大學太分裂曰此道學也此自修也此恂慄也此威儀也取吾一貫之心而截截然判裂之殊為害道子貢常引此詩如切如磋如琢如磨孔子是之其意盖謂切之又磋之琢之又磨之由粗至精也瑟其文理之宻歟毛傳謂僴寛大也赫烜光輝著見于外也諼詐也妄言也君子文徳著見如此終不可得而妄議也毛傳釋諼曰忘誤觀大學之文爾况大學爾雅亦未必以諼為忘毛傳直言諸侯以石語有未盡琇瑩皆從玉雖石雜究亦玉之類琇其色之蒼然瑩其光之明瑩歟鄭箋云㑹謂弁之縫中飾以玉皪皪而處狀似星也孔疏云弁師云王之皮弁㑹五采玉璂諸侯及孤卿大夫各以其等為之冬官考工記玉人之事圭天子用全上公用龍侯用瓉伯用將鄭司農云龍當謂尨尨謂雜色鄭元謂龍瓉將皆雜名色玉多則重石多則輕如簀排宻也吕和叔云古者車箱長四尺四寸三分前一後二横一木下去車床三尺三寸謂之式又於式上二尺二寸横一木謂之較以便適手慿倚䟽不載此説釋文云猗依也於綺反善戲謔非大善也愛其人無所不稱其善至於此也毛詩序曰淇奥美武公之徳也有文章又能聽其規諫以禮自防故能入相于周美而作是詩也史記衛釐侯卒太子共伯餘立為君共伯弟和有寵於釐侯多與之賂和以其賂賂士以襲攻共伯於墓上共伯入釐侯羡自殺衛人因葬之釐侯旁諡曰共伯而立和是為武公佐周平戎平王命為公武公在位五十五年卒又楚語左史倚相責申公子亹曰昔衛武公年數九十有五矣猶箴儆於國曰自卿以下至于師長士苟在朝者無謂我老髦而舍我必恭恪於朝朝夕以交戒我聞一二之言必誦志而納之以訓道我夫武公在位五十五年而卒則其即位之時已四十餘矣其兄共伯又長於武公而毛詩序曰衛世子共伯早死夫年四五十而死亦不可謂蚤死又共伯之妻守義不嫁作鄘柏舟之詩畧無禍難之意則序與史所載皆可疑審如史記所云則武公乃弑君之賊而大學釋其詩曰盛徳至善何也考槃在澗碩人之寛獨寐寤言永矢弗諼考槃在阿碩人之薖獨寐寤歌永矢弗過考槃在陸碩人之軸獨寐寤宿永矢弗告寛補音區權切韓愈閔已賦平寛與賢叶白居易詩王家庭院寛與天叶簡謂寛音輕清宜枯爰切殆今讀寛音之轉自與言叶亦不必枯爰切也與關雎芼樂叶君子偕老翟髢叶之類同薖苦禾反過音戈告音谷毛傳曰考成槃樂也山夾水曰澗曲陵曰阿爾雅曰髙平曰陸山夾水之處迫矣碩人居之自以為寛獨寐及寤而言曰永矢弗諼矣諠音喧諼者字訛也諠言也鄭箋釋諼曰忘盖誤從淇奥毛傳不知毛傳之已誤也薖韓詩作􅧷意者其草徑歟碩人常所往來經過歟當與永矢弗過同音凡制字皆有義軸旋轉之謂言其歩武回旋其中不復他往宿卧也歌自樂也離此而之彼曰過今世謂相往來曰相過賢者困窮之時有言不信於是退處之義甚明不復疑貳故决其辭矢其誓曰弗諼曰弗告亦弗過彼矣論語夫子矢之曰予所否者天厭之則知矢有誓意毛詩序曰考槃刺莊公也不能繼先公之業使賢者退而窮處序每失詩㫖於此又見此詩自决於退處豈有刺君之意君雖有過豈可以刺言碩人知時而退正也道也衛宏不知道故其作序率外求其説毛傳亦不言刺莊公以是益驗衛宏作毛詩序漢史可信宏雖多祖毛説而又以已意成之歟碩人其頎衣錦褧衣齊侯之子衛侯之妻東宫之妹郉侯之姨譚公維私手如柔荑膚如凝脂領如蝤蠐齒如瓠犀螓首蛾眉巧笑倩兮美目盼兮碩人敖敖説于農郊四牡有驕朱幩鑣鑣翟茀以朝大夫夙退無使君勞河水洋洋北流活活施罛濊濊鱣鮪發發葭菼揭揭庶姜孽孽庶士有朅盼補音匹見切按詩與論語作盻毛與釋文作盼説文盼從目分孫愐匹莧切又盻恨視也从目兮聲孫愐止有胡計切一音毛氏所注許慎所引陸徳明所釋皆作盼而不作盻以是知變而為盻者殆未逺也又有從目從丂從目從丏皆眠見切按盼盻眄韻補皆匹見切陸機髙祖功臣頌烈烈黥布眈眈其眄名冠彊楚鋒猶駭電袁宏三國名臣贊顧盻與變叶義皆當作盼而字乃用盻此類所見無慮數十乃無一作盻而其音皆與倩絢相叶盖不用考矣簡按説文引美目盼兮匹莧切活如字罛音孤濊呼活反發補末反菼他覽反揭居列反毛傳曰頎長貌鄭箋云褧襌也襌音丹衣錦尚之以襌衣為其文之太著夫人翟衣而嫁今衣錦者在塗之所服也説文曰褧檾也檾枲屬中庸曰詩曰衣錦尚絅惡其文之著也春秋左傳曰衛莊公娶於齊東宫得臣之妹曰莊姜美而無子衛人所為賦碩人也爾雅釋親曰女子謂姊妹之夫為私荑新生白而柔毛傳曰領頸也蝤蠐蝎也爾雅釋蟲云蟦蠐螬蝤蠐蝎孫炎曰蠐螬謂之蟦蠐關東謂之蝤蠐梁益之間謂之蝎爾雅又曰蝎蛣􅔒孫炎曰蝎木蟲也爾雅又曰蝎桑蠧孔䟽云以在木中白而長故以比頸爾雅邢昺䟽云蝎之在糞土中者名蟦蠐又名蠐螬其在木中者謂之蝤蠐謂之蝎爾雅釋草云瓠棲瓣郭曰瓠中瓣也詩曰齒如瓠棲毛傳曰螓首顙廣而方鄭箋云螓謂蜻蜻也爾雅釋蟲云蚻蜻蜻某氏觧此云鳴蚻蚻者也方言云其大者謂之蝒馬其小者謂之麥蚻有文者謂之螓爾雅又云蝒馬蜩爾雅注䟽及方言並不言馬蚻如蟬而青或毼夜鳴蚻蚻謂之夜蟬顙廣而方所謂蚻蜻蜻蝒馬麥蚻者豈異名而或大小耶蠶蛾其眉甚美而著即蠶蛹所變者爾雅云蛾羅論語子夏問曰巧笑倩兮美目盼兮素以為絢兮言其以質素生文不假外物為飾也豈此闕文耶抑他詩偶同耶毛傳曰敖敖長貌既已舍于農郊農田之間非城邑於是休舍從容徐歩自適有若遊敖之狀歟毛傳曰幩飾也人君以朱纒鑣扇汗且以為飾鑣鑣盛貎翟翟車也夫人以翟羽飾車茀蔽也釋文曰鑣銜外鐵也一名扇汗又排沬孔䟽云婦人乘車不露見車之前後設障以自隠蔽謂之茀因以翟羽為之飾巾車注引此詩翟茀盖厭翟也厭於渉反厭翟次其羽使相迫也朱曰國人樂得以為莊公之配故謂大夫朝于君者宜早退無使君勞於政事而不得與夫人相親也毛傳曰罛魚罟鱣鯉也鮪鮥也案爾雅釋魚首鯉鱣故毛傳因以為一魚而郭璞註云鯉今赤鯉鱣大魚似鱏而短鼻口在頷下體有邪行甲無鱗肉黄大者長二三丈今江東呼為黄魚然則郭璞以為二魚審訂若是陸璣亦云二魚出江海三月中從河下頭來上鱣身形似龍鋭頭口在頷下背腹皆有甲縱廣四五尺今於盟津東石磧上釣取之大者千餘斤鮪形似鱣而青黑大者不過七八尺大者名王鮪小者名鮛鮪發發韓詩作鱍鱍按孽孽韓詩作䡾䡾韓詩傳云桀健也伯兮云邦之桀兮則桀亦有俊傑之義毛詩作有朅殆訛也爾雅釋草云葭蘆菼薍郭注云蘆葦也薍似葦而小陸璣云薍或謂之荻鄭箋云庶姜謂姪娣送者宜使大夫而此云庶士者庶士從大夫而來言其多者毛傳曰揭揭長也孽孽言姪娣之多也毛詩序曰碩人閔莊姜也莊公惑於嬖妾使驕上僭莊姜賢而不答終以無子國人閔而憂之毛詩序固多謬誤詳觀是詩惟見齊姜始歸於衛其聲燄儀物之盛國人説之故叙詠其事至曰大夫夙退無使君勞則尤其以衛君新有嘉禮欲其與夫人相親之情殊非其後追書其辭氣畧不見其有憂閔之意左氏所言亦因言其無子爾未必謂碩人之詩以閔莊姜無子而作也此亦猶何彼襛矣叙言昏姻儀物之盛平正無他衛宏不逹平正無邪之道其作序率多贅辭曲為之説氓之蚩蚩抱布貿絲匪來貿絲來即我謀送子渉淇至于頓丘匪我愆期子無良媒將子無怒秋以為期乘彼垝垣以望復關不見復關泣涕漣漣既見復關載笑載言爾卜爾筮體無咎言以爾車來以我賄遷桑之未落其葉沃若于嗟鳩兮無食桑葚于嗟女兮無與士眈士之眈兮猶可説也女之眈兮不可説也桑之落矣其黄而隕自我徂爾三歳食貧淇水湯湯漸車帷裳女也不爽士貳其行士也㒺極二三其徳三歳為婦靡室勞矣夙興夜寐靡有朝矣言既遂矣至于暴矣兄弟不知咥其笑矣靜言思之躬自悼矣及爾偕老老使我怨淇則有岸隰則有泮總角之宴言笑晏晏信誓旦旦不思其反反是不思亦已焉哉絲息之反蚩尺之反貿莫豆反謀音眉邱補音祛竒切左氏傳史蘇之言為雷為火為嬴敗姬不利行師敗于宗邱齊謡曰大冠若箕修劍拄頥攻狄不能下壘枯邱楚辭九章邱與時叶易林履之遯邱與時叶將七羊反垝俱毁反關補音圭元切横木持門也易林師之兊關與泉叶大過之師關與寃叶劉歆遂初賦喬關與翩翩叶盧湛覽古詩關與賢叶郭璞客傲關與絃叶劉禹錫佛衣銘關與遷叶葚音甚耽補音都森反揚子雲兖州牧箴牧野之禽豈能復耽張翰雜詩耽與金叶陸雲贈鄭䖍季耽與金叶隕于貧切集韻墜也應瑒正情賦隕與鳴叶湯音傷漸子廉反行補音户郎反簡謂古初宜一音後世欲别其詳故有去聲亦可户浪切亦叶咥許意反又尺二反泮音判補音以哉叶思韻毛傳曰氓民也蚩蚩者泛然而來左顧右盼將有所擇而誘心未有所主之狀也時女未見誘情未交親故謂之民至於已見誘而情親故稱之曰子往往男約女奔後女愧恥而止男復至以為問故女曰匪我愆期子無良媒故我心愧而止庶幾子無怒秋以為期又言我登垝垣以望復關復關子所居也垝垣垣之髙危者初望不見泣涕漣漣後見復關載笑載言明已心在於子情深如此爾其卜乎或筮乎若占體無咎則以爾車來以我賄遷我則往矣盖恥於自往欲其以車來迎將幾也庶幾也既有期約於初矣而此猶以卜筮為言者慮男怒而不肯也况昏禮有卜筮因以為言此似正婚而無媒遽誘而交親亦滛泆矣沃若喻色盛情盛之時鳩食桑葚過則醉桑落黄隕喻色衰情衰眈樂也説解説也今俗説亦以女淫為大醜按樓鑰云毛傳云女與士耽則傷禮義鄭箋云士有百行可以功過相補至於婦人無外事維以貞信為節然功過相補則士可耽也每疑其害教近得一説無與士眈已是自悔而反正之言盖其初抱布貿絲來即我謀後又以車來則非女之奔之也其言曰始者以士之眈兮故我今日猶可説也若是女之眈兮則我不可説矣如此則得詩之意不比鄭氏之説之害教也毛傳曰帷裳婦人之車也爽差也朱曰淇水漸其車之帷裳言見棄而歸也罔極言士放蕩無畔岸也貳其行言與其始不同是為二又不止於二而已又至於三焉言其變改之多朱曰靡不也三歳為婦盡心竭力不以室家之勞為勞止曰三歳初為婦之三歳其勞勤如此其後稍舒緩故止言三歳詩曰總角之宴又曰老使我怨則知非三歳而遂棄夙興者鷄鳴而起夜寐言未至於夜未嘗寐以惰者常有晝寢也朝則明矣言鷄鳴夙興未嘗至於明旦而起言語助也既至于今矣乃至于以暴見加矣兄弟特不知爾知則咥其笑矣靜而思之惟自傷悼而已已初謂及爾偕老也至老又使我怨泮水土之際也淇則有岸隰則有泮皆有涯際可度士心有他婦不得士心不復可親茫然莫知所止故前又曰罔極方總角相從宴樂言笑和宴相與誓約不止於一日申誓堅約重複不已不思其反背也不料其至是也此反背誠是未嘗思慮及之今亦無如之何矣亦已焉哉已止也今俗語休休之謂也毛詩序曰氓刺時也宣公之時禮義消亡淫風大行男女無别遂相奔誘華落色衰復相背棄或乃困而自悔喪其妃耦故序其事以風焉美反正刺淫泆也陳曰見棄而悔乃人情之常何美之有吕伯恭取陳説而載之記異哉諸儒之為論也序辭差謬多矣獨此序庶幾焉而陳又從而不可之道之不明也我知之矣皆諸儒之故也春秋雖誅魯桓之大逆而亦書其告于廟之合于禮易曰其吉則困而反則也正氓詩悔過反正可美之道也聖經明道之書也深知夫人心即道故曰道心意動情遷始失其道一能反正即復道心人雖至於大惡特其昏爾其本心之善未始磨滅諸儒不自信已之心故亦不信人之心有能信此心之即道悟百姓日用之機則三百篇平正無邪之妙昭如日月矣籊籊竹竿以釣于淇豈不爾思逺莫致之泉源在左淇水在右女子有行逺父母兄弟淇水在右泉源在左巧笑之瑳佩玉之儺淇水滺滺檜楫松舟駕言出遊以寫我憂按此篇永樂大典缺卷芄蘭之支童子佩觿雖則佩觿能不我知容兮遂兮垂帶萃兮芄蘭之葉童子佩韘雖則佩韘能不我狎容兮遂兮垂帶萃兮按狎字萃字從韓詩韘失葉反甲韓詩作狎毛詩作甲甲補音吉協反按原本吉誤古楚辭山鬼篇犀甲與接叶揚子雲太元賦首甲與裂叶然則狎宜音協爾雅釋草云雚芄蘭郭云蔓生然則柔弱有童稚之狀案内則男女未冠笄者佩容臭惟成人佩觿今童子而佩觿毛傳曰觿所以解結成人之佩也人君治成人之事雖童子而佩觿早成其德雖則佩觿能不我知此為戲語以譏也不能知人此反謂能今世戲語以為譏多有此類能不我狎亦同不親羣臣反謂之能亦戲語以譏也容兮自矜自莊之貌遂兮自用自為之貌此㓜君自尊大自用不知人不親羣臣宛然可見垂帶萃兮按此萃字本韓詩因言容貌佩服而及此亦言徒有儀服其中無德也帶聚而長故曰萃帶不一矧有佩焉益可以言萃韘玦也能射則佩韘孔䟽云禮及詩言决拾車攻傳曰决鉤弦也著右手巨指毛詩狎作甲爾雅云甲狎也豈作爾雅此篇者不見狎本耶抑本毛傳耶毛詩序曰刺恵公也驕而無禮大夫刺之春秋左傳曰初惠公之即位也少爾雅釋草曰雚一名芄蘭郭璞注云蔓生斷之有白汁可啖陸璣云一名蘿摩幽州人謂之雀瓢本草又名女青又白環然女青終非白環二物相似誰謂河廣一葦杭之誰謂宋逺跂予望之誰謂河廣曽不容刀誰謂宋逺曽不崇朝毛詩序曰宋襄公母歸於衛思而不止故作是詩也詩箋云宋桓公夫人衛文公之妹生襄公而出襄公即位夫人思宋義不可往故作詩然文公之時衛已遷國河南無河可渡此曰河廣豈濟水東南流而又北入海者亦稱河耶史記文公之子成公時晉從南河渡服䖍曰南河濟南之東南流河也豈春秋時河已東南決耶一葦無杭河之理思往之切甚言其河之非廣也曽不容刀之意亦然毛傳曰杭渡也鄭箋曰予我也誰謂宋逺我跂則可望見者箋云小船曰刀劉熙釋名云三百斛曰刀毛傳皆以崇為終未安朝者一日之上故朝崇義亦猶是上日謂不待崇朝之久而已可到亦甚言宋非逺也孔疏云所以義不得往者以夫人為先君所出其子承父之重母出與廟絶不可以私反故義不得也吕曰説苑曰宋襄公為太子請於桓公曰請使目夷立公曰何故對曰臣之舅在衛愛臣若終立則不可以往味此詩推其母子之心盖不相逺所載似可信也不曰欲見母而曰欲見舅者恐傷其父之意也杭即古航字亦猶刀後世加舟作舠伯兮朅兮邦之桀兮伯也執殳為王前驅自伯之東首如飛蓬豈無膏沐誰適為容其雨其雨杲杲出日願言思伯甘心首疾焉得諼草言樹之背願言思伯使我心痗按此篇永樂大典缺卷有狐綏綏在彼淇梁心之憂矣之子無裳有狐綏綏在彼淇厲心之憂矣之子無帶有狐綏綏在彼淇側心之憂矣之子無服帶補音丁計切史記平準書根帶劉伯莊音葉釋名帶蔕也著於衣如物之繫蔕也楚辭九歌荷衣兮蕙帶與逝與際叶漢封爵之誓曰使黄河如帶泰山如厲國以永存爰及苗裔易林歸妹之訟帶與戾叶杜篤論都賦衿帶與滯叶陸雲贈鄭䖍季帶與乂叶服扶北切是時婦人閔其君子久役貧無以為衣也而諸儒紛紜意度牽合而無據毛傳謂綏綏匹行貎之子無室家者宏本毛說而為序曰男女失時喪其妃耦鄭同毛説朱又謂綏綏獨行求匹之貎凡是皆因夫齊南山之詩曰雄狐綏綏魯道有蕩齊子有歸以齊襄與文姜淫故意此詩有狐綏綏亦有為匹之意而不知他無所據周易凡言狐皆取狐疑為義則詩取喻於狐亦狐疑爾齊㐮之似雄狐者言雄則知有雌焉言狐則以見心愧于中又欲縱不能止愧赧發於氣貎有遲疑綏綏之狀此有狐不曰雄則無淫匹之意久勞役所其心思家而不在役故有二心而惰如狐疑不决之狀亦有遲疑綏綏之貎且氓之詩其未見誘則曰氓爾及既見誘而情親始曰子豈有情未親而遽稱子者一人失言後學咸從而不可改毛傳至以無裳無服為喻穿鑿太甚衛序至於失時喪耦之不可合良可發笑失時非喪耦喪耦非失時矧序傳差誤備述其前後服役於淇水之上故曰在彼淇梁淇厲淇側石絶水曰梁説文厲作砅水中有石可履亦危矣故曰厲投我以木𤓰報之以瓊琚匪報也永以為好也投我以木桃報之以瓊瑶匪報也永以為好也投我以木李報之以瓊玖匪報也永以為好也𤓰補音攻乎切説文孤罛呱觚皆以𤓰得聲左氏傳衛侯夢人之譟曰登昆吾之虚綿綿生之𤓰余為渾良夫呌天無辜易林漸之辭曰窮老獨居莫為種瓜急就章逺志續斷参土𤓰亭歴桔梗龜骨枯簡案豳七月七月食𤓰八月斷壺玖補音舉里切説文玖石之次玉黒色者讀若芑詳觀木瓜之詩所謂木瓜木桃木李與夫瓊琚瑶玖皆為喻爾非實有是物也而孔叢子言孔子讀詩曰吾於木𤓰見苞苴之禮行未必果聖人之言也孔叢子所載亦有乖戾不可信者不止於木瓜也是詩薄來厚往之意至厚也永以為好至忠也無非道者正不必究見何人薄來何人薄往也衛宏作序推考衛國事狀他無似此者惟齊桓封衛衛人必厚報之情故謂此衛人欲厚報齊之詩然不思衛人亦何敢為此辭齊施莫大之惠於衛奚可比木𤓰木桃木李衛人雖思所以報齊而衛方能國微弱甚矣豈能致厚報過齊桓之所施矧曰匪報也永以為好也乃已報之辭非欲報之辭安知非齊桓使公子無虧戍漕之時或城楚邱遺衛車馬器服之時齊人所作之詩衛人得之或衛人歌之故屬之衛耶又安知非士大夫報施之詩耶
