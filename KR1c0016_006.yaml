body:
  text: 慈湖詩傳卷六宋楊簡撰王彼黍離離彼稷之苖行邁靡靡中心搖搖知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉彼黍離離彼稷之穗行邁靡靡中心如醉知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉彼黍離離彼稷之實行邁靡靡中心如噎知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉穗音遂噎説文以一得聲曲禮曰稷曰明粢郭璞云今江東人呼粟為粢逺望茫茫似黍離離又似稷苗穗故曰彼黍離離耶彼稷之苖也行邁見之為之靡靡遲遲中心搖搖憂傷莫能去李曰呼天而訴曰致此者何人哉含蓄其辭不欲指斥其人也毛詩序云黍離閔宗周也周大夫行役至於宗周過故宗廟宫室盡為禾黍閔周室之顛覆倣徨不忍去而作是也君子于役不知其期曷至哉雞棲于塒日之夕矣羊牛下來君子于役如之何勿思君子于役不日不月曷其有佸雞棲于桀日之夕矣羊牛下括君子于役苟無飢渴毛傳曰鑿牆而棲曰塒爾雅釋宫云雞棲于杙為桀鑿垣而棲為塒郭云今寒鄉穿墻棲雞皆見詩杙橛也雞猶歸棲羊牛猶下來君子于役而不歸佸會也括者羊牛歸宿之所必有檢括防間朱曰君子行役之久不可計以日月而又不知其何時可以來會也徒念君子終無歸期至是末如之何惟曰君子苟無飢渴亦庶幾爾毛詩序曰君子于役刺平王也君子行役無期度大夫思其危難以風焉君不可以言刺而况于王乎是詩婦人思念其君子而已初無刺王之意衛宏不知道不知婦念其君子之心非邪僻之心即道心故外推其説殊為害道又何以知其非婦人作而必曰大夫作耶君子陽陽左執簧右招我由房其樂只且君子陶陶左執翿右招我由敖其樂只且是詩君子遭亂相與隱遁仕於伶官苟祿逃責君子之所憂者懼其失道而已今既逃責可以無愧故樂也陽陽陶陶皆樂之貌孔疏云簧者笙管之中金薄鐷也郭璞云大笙十九簧小笙十三簧月令仲夏調竽笙篪簧則簧似别器孔疏謂三器皆有簧非别器也鹿鳴云吹笙鼓簧言吹笙則鼓簧是簧之所用本施於笙笙師掌教吹竽笙塤籥簫篪籧管而不言簧鄭司農云竽三十六簧鄭志云路寢房中可用男子毛傳曰翿纛也翳也鄭箋云翳舞者所持謂羽舞也右手招我俱在樂官也招之者豈慮其未知而失期耶抑以其新進故𨗳之耶敖者謂舞位毛詩序曰君子陽陽閔周也君子遭亂相招為祿仕全身逺害而已本詩初無閔周之意乃衛宏自起意説相招為祿仕亦在平時亦非此詩之情章句儒不知道率好穿鑿不知日用平常之即道故曲推外説揚之水不流束薪彼其之子不與我戍申懷哉懷哉曷月豫還歸哉揚之水不流束楚彼其之子不與我戍甫懷哉懷哉曷月豫還歸哉揚之水不流束蒲彼其之子不與我戍許懷哉懷哉曷月豫還歸哉其如字或作記者方音轉訛也激揚其水勢力甚弱雖束薪不能流令之不行者似之彼其之子不與戍申彼子乃令之不至不往戍者也今俗亦有此等語與猶為也其令侯國往戍而不從故使畿民而民怨歟抑令更戍者不從也歟久戍者怨歟抑久戍者思歸而怨因以譏王政之不均亦有令之不從不與我同戍申甫許歟束薪易於流行而今不能流之則其令非強大者以薪蒲為説懷哉懷哉曷月豫還歸哉思歸心也楚亦薪之異名漢廣云翹翹錯薪言刈其楚毛傳云蒲草也鄭箋云蒲蒲柳孔疏云陸璣疏云蒲柳有兩種皮正青者曰小楊其一種皮紅者曰大楊皆可以為箭幹故春秋傳曰董澤之蒲可勝既乎今又以為箕罐之楊也尚書有吕刑之篇禮記引之皆作甫刑孔安國云吕侯後為甫侯周語云祚四嶽為侯伯賜姓曰薑氏曰有吕又曰申吕雖衰齊許猶在是申與甫許同為薑姓平王母家申國所戍唯應戍申不戍甫許也言甫許者以其同出四嶽俱為薑姓既重章以變文因借甫許以言申其實不戍甫許也六國時秦趙皆伯益之後同為嬴姓史記漢書多謂秦為趙亦此類也簡思毛詩序曰揚之水刺平王也不撫其民而逺屯戍于母家周人怨思焉言刺非申在今鄧州南陽縣吕在今蔡州新蔡縣許在今潁昌府為許昌郡即唐許州中谷有蓷暵其乾矣有女仳離慨其嘆矣慨其嘆矣遇人之艱難矣中谷有蓷暵其修矣有女仳離條其嘯矣條其嘯矣遇人之不淑矣中谷有蓷暵其濕矣有女仳離啜其泣矣啜其泣矣何嗟及矣補音修式竹切釋名臘脯又名修縮也莊子翛然而往翛然而來亦式竹切釋文一作蓨嘯息六切集韻吹氣若歌説文嘯從口肅聲又云籕文嘯從欠爾雅釋草云萑蓷郭云茺蔚也李曰臭穢草也妻為夫所棄故以臭穢之草自況不見親於夫也陸璣疏云舊説及魏博士周元明皆云菴閭是也韓詩及三蒼説悉云益母本草荒蔚一名益母劉歆曰蓷臭穢即荒蔚也谷中多水蓷生其中宜水之草也今遇旱暵則乾矣其修茂者暵燥矣初濕者今暵矣宜水之草今遇暵乾其失所之狀可覩矣曰遇人之艱難則知飢饉然有貧困不因飢饉者又曰不淑則知士德之薄豈有君子困窮而棄其妻乎毛詩序曰中谷有蓷閔周也夫婦日以衰薄凶年飢饉室家相棄爾毛傳曰仳别也説文云嘯吹聲也條者其嘯音之長而似條歟啜者淚流下入口也詩中初無閔周之情衛宏贅辭也惡不淑正也憂苦非邪也宏不逹無邪平正之道故多贅説有爰爰雉離于羅我生之初尚無為我生之後逢此百罹尚寐無吪有爰爰雉離于罦我生之初尚無造我生之後逢此百憂尚寐無覺有爰爰雉離于罿我生之初尚無庸我生之後逢此百凶尚寐無聰毛傳曰爰爰緩意鳥網為羅有小人之狀雉文明比君子按樓鑰云雉非為其文明也羅之設所以取鳥獸狡如小人爰爰緩行不至觸冒雉性耿介多罹其中世亂罔密小人多幸免而君子多陷于罪言文明則意差小人得志而暇逸而君子罹禍患離麗也附麗于羅網其罹禍患似之君子以雉自比我生之初尚無所為言無事及我生之後逢此憂離禍患之多願寐無吪寐而作訛謬之音則必寤矣欲無吪者欲無寤也寤則又憂苦矣無覺無聰其意同聰聞寐中有所聞則覺矣爾雅釋器云繴謂之罿罿罬也罬謂之罦罦覆車也郭注云今之翻車也有兩轅中施罥以捕鳥孫炎曰覆車網可以掩者也一物五名庸用也猶為也造也是詩憂苦無聊雖有隱怨無敢著明是詩無邪孰非道心毛詩序曰爰閔周也桓王失信諸侯背叛敗節容有此事序多誤亦不可深信然孔子取此詩之道心雖無此序亦可而序文贅反足以亂道心綿綿葛藟在河之滸終逺兄弟謂他人父謂他人父亦莫我顧綿綿葛藟在河之涘終遠兄弟謂他人母謂他人母亦莫我有綿綿葛藟在河之漘終逺兄弟謂他人昆謂他人昆亦莫我聞葛與藟釋見樛木綿綿蔓延不絶也葛與藟在河之滸綿綿不絶今也人而不如之故以況也人誰無過覬其終改今終不改終棄逺其兄弟反謂他人為父而親之亦莫我顧言其略不相顧言其甚也尚不相顧何望其相親毛詩序曰葛藟王族刺平王也周室道衰棄其九族焉釋文作刺桓王曰本亦作刺平王案詩譜是平王詩皇甫士安以為桓王之詩崔靈恩集注本亦作桓王桓平不必深辨其譏逺兄弟則明矣譏邪非邪雖怨而正道也觀揚之水序言平王不撫其民而逺屯戍于母家與此詩亦相應爾雅釋水云滸水崖釋邱云涘為崖夷上灑下不漘岸上滸郭璞曰灑深也不發聲灑即洗字為水所洗故深歟或㵼之音而訛歟俗謂峻下曰瀉不殆衍字釋親云晜兄也晜即昆字稱他人為母稱他人為兄而不親我何止於不親我如無我焉故曰亦莫我有不相聞不相報知故曰亦莫我聞凡百尚不相聞而况於厚禮乎彼采葛兮一日不見如三月兮彼采蕭兮一日不見如三秋兮彼采艾兮一日不見如三歲兮蕭補音踈鳩切按原本此六字脫楚辭九歌蕭與憂叶又九嘆蕭與愁叶艾補音魚刈切按原本此三字脫説文以乂得聲尚書乂用三德從作乂又時㿩若漢書皆作艾無作牛蓋切者熟觀采葛之詩朋友相好有如此者人情相愛相念之篤誠有此相好相念非邪非僻非道而何毛衛不知平正無邪之即道遂曲推其義以為懼讒既不知何世何人則意之而已意之而曲推穿鑿以為懼讒言之入亦可笑矣爾雅釋草云蕭荻李巡曰荻一名蕭陸璣云今人所謂荻蒿者是也或云牛尾蒿似白蒿白葉莖粗科生多者數十莖可作燭有香氣故祭祀以脂爇之為香許慎以為艾蒿非也按釋草云以下原本缺今從正義補入大車檻檻毳衣如菼豈不爾思畏子不敢大車啍啍毳衣如璊豈不爾思畏子不奔榖則異室死則同穴謂豫不信有如皎日穴補音户橘切説文鴪以穴得聲淮南子水居窟穴人民有室按原本脫此二句三略主任舊齒萬事乃理主聘若穴士乃得實易林乾之咸曰三人求橘反得丹穴需之觀曰河水孔穴壞敗我室震之蹇曰蟻封户穴天雨將集孔融詩猿穴與不密叶春官司服子男之服自毳冕而下卿大夫之服自元冕而下大夫出封畿內諸侯則加一等服子男之服或子男入仕王朝毳衣者乘車以出決男女之訟淫者雖畏而止息而情終不忘他日相遇相語有此詩人述而為之詩所以譏笑也故人傳而盛行官得而采之故曰詩無邪言大車檻檻毳衣如菼則當時決訟事狀著矣菼蘆初生毳服內之青色如之璊玉赤色毳服內之赤色如之毳衣繢裳繡有五色焉子謂毳衣而決訟者榖善也今俗謂無病故曰安善故此詩謂生曰榖他日男女忽遇而陳情曰豈不爾思畏子而不敢詩人敷暢其辭故又曰啍啍又曰如璊又曰不奔陳情之切有曰生則異室不得而合矣死必同穴以葬若謂豫言未必信有如皎日所以誓也夫人欲方熾故有此退而休止心自知非何敢形於詩言聞于外故人得而歌之為笑也周衰淫風雖流行而公論終難磨滅以人性善終不磨滅也是詩情狀非陳古毛傳亦不曰陳古獨衛宏序曰陳古刺今大夫不能聽男女之訟治古無淫俗安有同穴之誓衛序非毛傳曰檻檻車行聲也啍啍重遲丘中有麻彼留子嗟彼留子嗟將其來施施丘中有麥彼留子國彼留子國將其來食丘中有李彼留之子彼留之子貽我佩玖嗟補音遭哥切按此三字原本脫邉讓章華賦嗟與波叶阮籍詠懷詩嗟與河叶郭璞江賦嗟與阿叶陸機詩亦然施詩戈切按此三字原本脫楚辭天問安施與伊何叶漢髙祖戚夫人歌施與何叶麥音默國補音越逼切按此三字原本脫博古圖周南宫鼎光相南國周穆公鼎南國東國皆作或説文或邦也孫愐于逼切徐鍇曰俗作古獲切玖補音舉里切説文正引此詩而讀如芑毛傳曰留大夫氏子嗟字也子國子嗟父鄭箋云子嗟放逐言子國著其世賢施施自適之貌言子嗟將自適于邱園之中矣將來食邱中之麥矣食其李矣初去朝未至邱中故曰將其來詩人留子之親故故貽我佩玖而别也維親故熟知留子邱園有麻麥李古人亦有以一字字者如顔淵冉有曰嗟曰國其字歟毛傳謂子嗟子國則句不文後世未有以嗟類為字然古者名字子賤子騫仲突仲忽則嗟亦其類爾顔回字淵又字子淵則留子或果字子嗟子國是詩蓋惜留子之賢而見退黜念之也衛宏序曰莊王不明賢人放逐鄭緇衣之宜兮敝豫又改為兮適子之館兮還豫授子之粲兮緇衣之好兮敝豫又改造兮適子之館兮還豫授子之粲兮緇衣之席兮敝豫又改作兮適子之館兮還豫授子之粲兮按此篇永樂大典缺卷將仲子兮無踰我里無折我樹把豈敢愛之畏我父母仲可懷也父母之言亦可畏也將仲子兮無踰我牆無折我樹桑豈敢愛之畏我諸兄仲可懷也諸兄之言亦可畏也將仲子兮無踰我園無折我樹檀豈敢愛之畏人之多言仲可懷也人之多言亦可畏也檀補音徒沿切按此三字原本脫易林臨之蹇手詘不便不能伐檀便毗連切張衡南都賦楈丫栟櫚柍柘檍檀結根聳本垂條嬋媛按南都賦以下原本脫將請也請音輕清而髙者也故立此字以寄音今方言有之毛詩序曰將仲子刺莊公也弟叔失道而公弗制祭仲諫而公弗聽小不忍以致大亂焉而詩無刺意是詩莊公所為也誠有不忍殺其弟之意祭仲諫曰臣請除之故是詩曰無折我樹把無折我樹桑無折我樹檀我云者親愛之真情也曰豈敢愛之其情實愛也今人實愛而曰不敢愛者每有是言曰畏父母畏諸兄畏人之多言此畏忌之心非慢易之心也夫不忍殺其弟之心畏忌之心此即道心而序以為刺近世蘇氏亦推及他日隱微未著之情與夫其後欲殺其弟之心而盡掩是詩之善不可人心本善本正人心即道故曰道心因物有遷意動而昏始亂始雜然其本心之正亦間見互出於日用云為之間三百篇多此類天下是非二途而已矣是者是道非者非道魯桓大惡春秋書其至于廟之合禮氓詩悔過孔子取其反正之心聖人無私善無私怒平心是非皆以明道不以是掩非不以非掩是檀木之美而堅者懷思念也祭仲之言誠有利害然有可思念者叔于田巷無居人豈無居人不如叔也洵美且仁叔于狩巷無飲酒豈無飲酒不如叔也洵美且好叔適野巷無服馬豈無服馬不如叔也洵美且武狩補音始九切左氏天王狩于河陽榖梁作守班固答賔戲孔終篇于西狩顔師古音守道之不明久矣自孔門惟三月不違仁月至日至者知之雖有子路子夏子張子遊猶不知之而况於後世乎蓋道至易至簡至近至平常故曰中庸庸常也人心即道故曰道心人心本體自善自正自無所不通日用無非道者顧人自不省自不信爾故夫日用庸平人皆不知其為道叔于田之詩愛叔美叔人之善心也道心也無邪僻之思也孔子取此取此道心也毛詩序乃皆曰刺莊公大失本旨矣大叔于田詩中曷嘗有不義之意惟不知是詩平正無邪之即道心故外求其説以厥後叔段之惡掩前時京人愛叔之善殊為害道豈無居人不如叔美且仁則雖謂之無人可也言其不足道也無飲酒無服馬意同鄭箋云洵信也疏引釋詁詢信也為證箋云服馬猶乘馬也易曰服牛乘馬毛詩序曰叔于田刺莊公也叔處于京繕甲治兵以出于田國人説而歸之叔于田乘乘馬執轡如組兩驂如舞叔在藪火烈具舉袒裼暴虎獻于公所將叔無狃戒其傷女叔于田乘乘黃兩服上襄兩驂雁行叔在藪火烈具揚叔善射忌又良御忌抑磬控忌抑縱送忌叔于田乘乘鴇兩服齊首兩驂如手叔在藪火烈具阜叔馬慢忌叔發罕忌抑釋掤忌抑鬯弓忌以有兩叔于田故于萹目加大字以别之釋文云或作大叔于田者誤袒本文作袒忌並如字下同弓補音姑宏切公羊傳書黑弓左氏榖梁傳皆作黑肱儀禮侯道五十弓弓二寸以為侯中注云今文改弓為肱左氏傳引古詩曰翹翹車乘招我以弓豈不欲往畏我友朋楚辭九歌弓與懲叶枚乘七發弓與潯叶乘馬四馬也兩服兩驂共為四馬乘駕乘馬而田狩執持其轡如織組織組者總紕於此成文於彼御者執轡於此而馬騁於彼似之兩服馬居轅間軛下無舒縱之狀惟兩驂居轅外有舒縱之狀故曰如舞毛傳曰烈列具俱也鄭箋云列人持火俱舉毛傳曰袒裼肉袒也暴虎空手以搏之箋云獻于公所進之君也京人見叔袒裼暴虎曰請叔無狃狎切戒其恐傷女也愛叔之言也毛傳曰乘馬四馬皆黃驪白雜毛曰鴇爾雅郭注云今之烏驄疏云毛色黑白而復有雜毛相錯者名鴇今謂之烏驄兩服中央夾轅二馬襄亦有上義堯典襄陵言水上邱陵也馬以髙者為美以最良馬為兩服又兩首昂舉故曰上襄兩驂在旁與兩服相次序微斜故曰鴈行忌者語助之音以字寄音而釋文音記者方音不同爾今惟當隨所書而讀之叔善射其御又良罄盡也或盡力控止其馬或縱馬而騁若送去然皆言善御之狀兩驂在左右如手阜盛也慢遲也罕希也馬慢矢發希抑叔釋掤以覆矢矣抑叔執鬯以韜弓矣韜吐刀切春秋左傳云公徒執氷而踞字與掤異音同氷犢丸蓋即箭筒其蓋可以取飲鬯弓謂弛弓而納之鬯中毛詩序曰大叔于田刺莊公也叔多才而好勇不義而得衆也此序之非釋見前叔于田清人在彭駟介旁旁二矛重英河上乎翺翔清人在消駟介麃麃二矛重喬河上乎逍遙清人在軸駟介陶陶左旋右抽中軍作好英補音於良切説文以央得聲出車詩釋文央央本作英英同於良切荀卿賦篇世英與強叶離騷經落英與何傷叶九歌英與央叶馮衍賦英與洋叶張衡賦流英與朝陽叶古英雄之英英華之英皆為此讀觀是詩雖不知髙克與文公事情之詳而其慢易不正可刺可惡足以消人慢易之心起人敬正之心毛傳曰清邑也彭衛之河上鄭之郊也消與軸皆河上地名也介甲也矛有英飾鄭箋云清者髙克所帥衆之邑也二矛酋矛夷矛也考工記廬人酋矛常有四尺夷矛三尋鄭注云八尺曰尋倍尋曰常此箋必曰異矛者以長短故得言重英歟孔疏謂酋矛有二備折壞則惟可言雙英耳不可言重喬髙也車建二矛長短故重纍而髙歟箋云左左人謂御者右車右也中軍謂將也髙克之為將久不得歸使其御者習旋車車右抽刃自居中央為軍之容好而已兵車之法將居鼓下故御者在左毛鄭皆曰容好則好上聲而陸德明呼報反非陶陶音搖則翶翔逍遙之意而陸徒報反亦未安詩中叶韻亦不若是太拘或平或側無定毛詩序曰清人刺文公髙克好利而不顧其君文公惡而欲逺之不能使髙克將兵而禦狄于境陳其師旅翶翔河上久而不召衆散而歸髙克奔陳公子素惡髙克進之不以禮文公退之不以道危國亡師之本故作是詩也羔裘如濡洵直且侯彼其之子舍命不渝羔裘豹飾孔武有力彼其之子邦之司直羔裘晏兮三英粲兮彼其之子邦之彥兮侯補音洪姑切史記斬盧胡王漢書作侯左氏傳童謡曰鸜鵒跦跦公在乾侯徴褰與襦易林師之井曰苑子妙才戮辱傷膚然後相國封為應侯張衡西京賦侯與拘叶揚雄解嘲侯與驅叶董仲舒敘傳侯與車叶柳宗元弔萇𢎞辭侯與圖叶其如字又音記春秋左氏傳曰彼已之子邦之司直是詩乃親見在位之賢者愛之敬之故頌其善也而毛詩敘曰言古之君子以風其朝焉鄭自莊公以來固非有道之朝朝多小人而是詩乃親見非言古也次篇遵大路言君子去之安如非美此君子之賢也耶大夫羔裘如濡光澤之至也洵信也傳曰侯君也韓詩傳曰侯美也蓋公侯伯子男皆美稱侯必有訓不可得而知大槩美稱也亦猶易直子諒子亦稱其善爾舍沈書者反棄舍也見危授命而不變也渝變也毛詩傳曰豹飾緣以豹皮也孔甚也言甚武有力出則執干戈而衛社稷也晏和柔也以羔羊之皮為裘以柔為貴古者素絲以英裘此曰三英者所見三縫也皮之大者左右袖一縫而已并中前縫為三縫皮之小者左右袖各二縫并中前縫為五縫故羔羊詩言五紽五緎五總皆謂縫中之英飾也彥士之美稱遵大路兮摻執子之袪兮無我惡兮不寁故也遵大路兮摻執子之手兮無我魗兮不寁好也遵循也摻攬也祛袖也寁速也魗猶惡也好善也美也遵大路以追留君子攬執其袪無惡我我欲君子遲遲其行不速故也不速則善也愛之而欲其遲留也毛詩序曰莊公失道君子去之國人思望焉何止于思望而已直挽而遲留之也女曰雞鳴士曰昧旦子興視夜明星有爛將翶將翔弋鳧與鴈弋言加之與子宜之宜言飲酒與子偕老琴瑟在御莫不靜好知子之來之雜佩以贈之知子之順之雜佩以問之知子之好之雜佩以報之加補音一讀居之切三略柔有所設剛有所施弱有所用強有所加兼此四者而制其宜楚辭天問加與虧叶揚雄長楊賦加與夷叶一讀居何切楚辭九懷加與和叶七諫加與何叶張衡西京賦加與過叶魏明帝桐詩加與柯叶女曰雞鳴矣士曰昧爽矣女曰子興視夜如何其及士興視則明星爛然以有星明故窗牖微明似昧旦夫婦相警夙興也士又曰吾將翶焉翔焉弋射鳧鴈言語助也加之中也史記曰以弱弓微繳加諸鳬鴈之上宜之為言美而稱也夫婦同其樂也宜飲酒以所加鳧鴈荐也與子偕老夫婦相好故言及此有琴焉瑟焉惟其所御莫不靜好夫婦和樂不淫於色故覺間靜知子之所招來者其以雜佩贈之乎知子之所順協者其以雜佩問之乎知子之所愛好者其以雜佩報之乎夫婦同心好賢樂善如此毛詩序曰陳古義以刺今不説德而好色也鄭自莊公以來固無道鄭多淫風故謂此詩陳古然詎可謂舉鄭國之人皆不説德而好色詩言翶翔弋鳧鴈蓋賢者隱處野外之詩也詳觀詩辭殊非陳古之情毛傳曰雜佩者珩璜琚瑀衝牙之類説文云珩佩上玉也璜半璧也琚珮玉名也瑀玖石次玉也玉藻云佩玉有衝牙鄭注云居中央以前後觸也玉府鄭注引詩傳曰佩玉上有蔥珩下有雙璜衝牙蠙蛛以納其間玉藻云大夫佩水蒼玉世子佩瑜玉士佩瓀玫玉有女同車佩玉瓊琚邱中有麻貽我佩玖有女同車顔如舜華將翶將翔佩玉瓊琚彼美孟薑洵美且都有女同車顔如舜英將翶將翔佩玉將將彼美孟薑德音不忘是詩深言孟薑之善而亦不言同車者之不善婉而彰愛而忠追考時事則太子忽嘗有功于齊齊侯請妻之忽曰齊大非吾耦也遂辭之國人惜其失大國之助故作是詩而毛詩序謂國人刺之則過矣又謂見逐而後刺之益非此詩之情熟觀此詩則知之又曰忽以國人而名君大逆也又纍篇言刺忽嗚呼痛哉惟孔子作春秋奉天道而筆削且孔子非鄭臣故可書鄭忽今此序曰鄭人刺忽則悖亂天常不可以訓毛傳曰親迎同車也舜木槿也子忽辭齊而他娶雖美然彼孟薑尤美且有賢德之音惜其失大國之助隱然在中都猶好也見書禹謨臯陶謨山有扶蘇隰有荷華不見子都乃見狂且山有橋松隰有遊龍不見子充乃見狡童山宜有扶蘇隰宜有荷華國宜有賢俊今不見賢俊乃見不肖子都喻賢俊狂且喻不肖毛詩序曰刺忽也所美非美然詩人方含隱不敢指切其君而序曰刺忽大悖也毛傳曰扶蘇扶胥小木也爾雅釋草云荷芙蕖紅蘢古其大者蘬郭注云俗呼紅草為蘢鼓語轉耳陸璣云一名馬蓼葉大而赤白色生水澤中髙丈餘爾雅疏引此詩遊龍為證張橫渠曰遊龍葒草也其枝樛曲著土處生根如龍也釋文云橋本亦作喬董云子都世之美好者也子充不見于書疑亦以美著也毛傳謂狡童昭公也斷斷乎無此義狡童猶狂且狂狡謂在朝之小人若以喻君則悖逆甚矣蘀兮蘀兮風其吹女叔兮伯兮倡豫和女蘀兮蘀兮風其漂女叔兮伯兮倡豫要女按此篇永樂大典缺卷樓鑰集載其解云此詩凡言女皆指君也女者愛之之辭鑰論云民勞王欲玉女是用大諫此意尤明又卷阿俾爾彌爾性之類不惟是愛君如古稱我為朕未至如秦以來分别之嚴也彼狡童兮不與我言兮維子之故使我不能餐兮彼狡童兮不與我食兮維子之故使我不能息兮餐補音逡緣切按原本以上三字脫今補古詩周公下白屋吐哺不及餐一沐三握髮後世稱聖賢摯虞思遊賦餐與乾叶韓愈秋懷詩餐與前叶諸儒咸謂狡童指昭公無乃大不道乎詈其君矣雖河南程氏猶同之蓋根本于毛傳與序之失遂不復思而從其悖也此狡童謂狂臣擅命之小人也故不親君子不與君子言不與君子食謂疏逺之不與廪祿也子謂鄭君也君子不忘君憂其禍即至故不能餐不能安息也毛詩序曰刺忽也不能與賢人圖事權臣擅命也然則強臣擅權則不與賢者祿食者權臣非昭公也沒君子愛君之善誣君子以詈君之大罪奚可奚可公子翬謂隱公曰百姓安子諸侯説子山有樞子之衣裳宛邱子之湯兮子皆指君子惠思我褰裳涉溱子不我思豈無他人狂童之狂也且子惠思我褰裳涉洧子不我思豈無他士狂童之狂也且子謂鄭君也鄭君逺賢而近小人賢者退處而心不忘君故作褰裳之詩曰子惠思我我則褰裳涉溱而來子不我思豈無他人言君固自有他人為之任用此語深譏焉而婉者也卒直言曰狂童之狂也且疾所任用乃狂妄小人爾諸儒未觀詩而先觀毛詩序與傳反以序傳病詩曲推強釋良可笑不思序傳之繆誤甚著甚多是序曰褰裳思見正也狂童恣行國人思大國正已也詩中安有此情腐儒苦思或至迂僻亦猶左氏曰豫凶事歟子之丰兮俟我乎巷兮悔豫不送兮子之昌兮俟我乎堂兮悔豫不將兮衣錦褧衣裳錦褧裳叔兮伯兮駕豫與行裳錦褧裳衣錦褧衣叔兮伯兮駕豫與歸巷補音胡貢切離騷經啓九辨與九歌兮夏康虞以自縱不顧難以圖後兮五子用失乎家巷毛詩序曰昏姻之道缺陽倡而陰不和男行而女不隨觀詩意誠有之然今悔矣悔過之心聖人取焉而序總曰刺亂也則差矣此悔而作詩求復諧者也丰豐滿也巷門外也男親迎而女不從男不得已而退猶俟於門外也猶覬女之或從也今女悔縱未從而姑送之猶未至於深絶也昌盛也將猶送也先言巷後言堂更韻也鄭箋云褧禪蓋以襌縠為之中衣裳用錦而上加襌縠焉中庸曰衣錦尚褧惡其文之著也古者衣裳中錦外絅風俗率如此故雖衰世猶未變絅褧音義同女悔而告長上叔伯曰今車駕而迎豫則與之行矣衣裳錦褧言衣裳已具飭今車駕而迎豫則與之歸矣婦人謂嫁曰歸東門之墠茹藘在阪其室則邇其人甚逺東門之栗有踐家室豈不爾思子不我即東門之平墠又有茹藘之草在其阪阪又有栗木焉踐行也行道之旁有家室焉其家室中之人女之所慕者而其不我即故有甚逺之嘆是詩女則淫矣而士則正毛詩序槩曰刺亂其半差矣毛傳曰東門城東門也墠除地町町者茹藘茅搜也爾雅釋草云茹藘茅搜郭注云今之蒨也可以染絳坂大坡不平風雨淒淒雞鳴喈喈既見君子云胡不夷風雨蕭肅雞鳴膠膠既見君子云胡不瘳風雨如晦雞鳴不已既見君子云胡不喜是詩美君子不改其度也鄭有君子雖居亂世不從世俗所移國人喜之也而毛詩序曰思君子也詩曰既見非思胡何也夷平也亂世賢者多憂既見君子喜而失其憂故夷平也青青子襟悠悠我心縱我不往子寧不嗣音青青子佩悠悠我思縱我不往子寧不來挑兮逹兮在城闕兮一日不見如三月兮因久不見之學子乃挑逹于城闕之間於是追恨曰我一日不見如三月之久思如此之切而彼乃若是耶毛詩序曰刺學校廢也亂世則學校不修焉毛傳青襟青領也學子之所服鄭箋云學子而俱在學校之中已留彼去故隨而思之爾禮父母在衣純以青嗣續也女曽不傳聲問我責其忘已爾雅釋器云衣皆謂之襟郭注云交領方言云襟謂之交釋器又云襟謂之袸郭注云衣小帶疏引士昏禮施襟結帨為證此襟非襟毛傳謂領者取方言之交取爾雅之襟然襟非領乃袂也古謂之袵亦謂之襟衣所以交於前者以有袵也衣身前不交續以左右二袵而後交方言襟謂之交謂此也領亦因是而交而襟非領毛傳郭注皆誤襟有二義一曰襟一曰帶然襟狹似帶故因名歟毛傳曰佩佩玉也士瓀珉而青組綬程曰挑輕躍逹放恣鄭箋云廢學業但好登髙見於城闕闕者謂於城之闕處置門其兩旁城土髙而稍濶可以登而望逺揚之水不流東楚終鮮兄弟維豫與女無信人之言人實迋女揚之水不流束薪終鮮兄弟維豫二人無信人之言人實不信激揚之水不能流一束之楚微弱令不行也雖有兄弟心則相殘亦可言鮮兄弟爭國羣臣公族咸有二心維豫與女二人而已無信人之言人實誑女迋誑也納忠至矣此忠愛其君之詩也毛詩序謂忽已死亡而作是詩詩辭非死亡後之辭也出其東門有女如雲雖則如雲匪我思存縞衣綦巾聊樂我員出其闉闍有女如荼雖則如荼匪我思且縞衣茹藘聊可與娛出其東門有女如雲之盛雖則如雲之盛而我心不在焉我自有員姓者吾妻也春秋有鄖國亦作鄖漢中有鄖闕按樓鑰云此説未然毛鄭不解貟字疏言樂我之心耳云員古今字助句辭也唐貟半千齊州人其先本彭城劉氏十世祖凝之事宋為起部郎及齊受禪奔元魏以忠烈自比伍員因改姓員古無此姓也况此詩解內云陸德明以爾雅云徂往也牽合上章思存改且作徂甚無謂也且語助也於義自通何必牽強又改字以此知貟亦語助耳縞衣綦巾我自樂之如荼亦言其盛多吾妻縞衣茹蘆為飾雖芳麗不如東門之女而亦聊可與娛鄭多淫新棄舊有夫婦相與不替不以外色動心聖人之所取也而毛詩序曰閔亂也公子五爭兵革不息男女相棄民人思保其室家焉詩中殊無此情顧命綦辨鄭云綦赤黑色是詩毛傳曰綦蒼艾色闉曲城也闍城臺爾雅釋宫云闍謂之臺茹藘蒨草染色為飾鄭箋云闍讀當如彼都人士之都陸德明以爾雅云徂存也牽合上章思存故改且作徂甚無謂也陸好異多有此病且語助也於義自通何必牽強又改字况舊音子徐反今從舊音野有蔓草零露漙兮有美一人清揚婉兮邂逅相遇適我願兮野有蔓草零露瀼瀼有美一人婉如清揚邂逅相遇與子偕臧漙本亦作團顔師古糾繆正俗云鄭詩零露兮古本有水傍作專亦有單字者後人輒為團字吕氏字林雨下作專訓云露貌音上兖切孔子遭程子於塗傾蓋而語終日甚相親顧謂子路取束帛以贈先生子路違命有間顧謂子路子路如初孔子曰詩不云乎有美一人清揚婉兮邂逅相遇適我願兮今程子天下賢士也於斯不贈則終身不能見也小子行之毛詩序乃曰男女思不期而會審如序言則孔子豈敢以謂程子斷斷乎無是理蔓生之草露零其上零落也溥者露貌蓋當時所見相遇之樂視景物皆樂故即所見以發詩詠之端凡詩言美人皆稱其賢方言云目黸瞳之子曰盱或謂之揚其以瞳子多揚動故名歟心相契合也鄭雖亂先王之澤猶未泯在野豈無賢者溱與洧方渙渙兮士與女方秉蕑兮女曰觀乎士曰既且且往觀乎洧之外洵訏且樂維士與女伊其相謔贈之以勺藥溱與洧瀏其清矣士與女殷其盈矣女曰觀乎士曰既且且往觀乎洧之外洵訏且樂維士與女伊其將謔贈之以勺藥毛詩序曰溱洧刺亂也毛傳云溱洧兩水名蕑蘭也訏大也衆殷也鄭箋云既已也洵信也將大也易曰風行水上渙水則渙散女曰往觀乎士曰既觀矣且語助語之止辭女又曰如此則往觀乎洧之外往觀不載女曰者意明省文也謂洧外信甚寬大甚可樂也士與女於是乎相謔其終贈之以勺藥伊猶彼也相謔毛無傳鄭箋謂行夫婦之事殆未必然然士與女相戲謔如此已大亂矣故詩人刺之毛傳謂勺藥香草陸璣云今藥草勺藥無香氣毛傳亦多誤豈未見勺藥而意之耶今藥草勺藥其華甚美殆即此爾而無香氣將謔謂戲謔之甚也語淫穢也或疑是詩不正遂曲為之説不思士曰女曰詩人之辭也敘其事所以著其惡也刺之也非士女相謔者自作是詩也
