body:
  text: 慈湖詩傳卷七宋楊簡撰齊雞既鳴矣朝既盈矣匪雞則鳴蒼蠅之聲東方明矣朝既昌矣匪東方則明月出之光蟲飛薨薨甘與子同夢會且歸矣無庶予子憎補音明謨郎切荀卿書昭昭乎其智之明與詳叶為天下明與忘叶契元王生昭明與商叶又引古詩如雪霜之將將日月之光明楚辭夜皎兮既明與桑叶步列星而極明與方叶秦東觀刻石原道至明與陽叶㑹稽刻石追首高明與莊叶漢房中歌承帝之明與彊叶唐虞之元首明哉與股肱良哉庶事康哉為韻周易其辨明也與長叶不足與有明也與剛叶徐邈楚辭釋音明音亡白虎通清明風者清芒也正月詩視天夢夢沈重讀揚雄甘泉賦夢與繩叶太元遇首幽遇神及師夢雞既鳴矣朝既盈矣乃曰匪雞則鳴乃蒼蠅之聲爾妄言以却雞鳴之告蒼蠅有聲則晏有甚於雞鳴時矣荒淫妄言以却告者東方明矣士大夫之詣朝者已昌盛矣乃曰匪東方明乃月出之光爾荒淫之狀益著蟲飛薨薨日出矣猶曰甘與子同夢是詩兩言子皆謂婦人君子偕老子之不淑子之清揚皆謂夫人也又曰彼來朝之士大夫行且歸矣會者相將之意歸則無久伺之勞庶不憎惡予與子也前言朝既盈朝既昌則士大夫來朝既久其意已明故此言會且歸者其指來朝之士大夫明矣荒淫至於此極毛詩序歸之哀公容或有之但曰思賢妃也故陳賢妃貞女夙夜警戒相成之道則差矣諸儒不知序之不足盡信率以序解詩其有阻礙必至於委曲穿鑿牽合子之還兮遭我乎峱之閒兮並驅從兩肩兮揖我謂我儇兮子之茂兮遭我乎峱之道兮並驅從兩牡兮揖我謂我好兮子之昌兮遭我乎峱之陽兮並驅從兩狼兮揖我謂我臧兮還音旋閒補音居賢切漢書李廣傳自以大黄射其裨將服䖍曰黄有弩也晉灼曰黄肩即黄間也司馬相如上林賦赤瑕駁犖雜臿其間鼂采琬琰和氏出焉班固西都賦裛以藻綉絡以綸連隨侯明月錯落其間張衝南都賦間與顛叶曹植瑟瑟歌間與阡叶韓愈孟東野失子詩間與賢叶簡觀今京語間之餘音亦有肩音儇許全反毛詩傳謂還便捷之貌未安還囘旋也忽遭我於峱山之間於是子與我並驅從逐兩肩其初相遭未揖及並驅從肩乃揖我謂我儇兮儇駿捷之稱也茂昌皆謂盛也言氣貌之盛美之之辭也好美也臧善也猶好也毛傳曰獸三歲曰肩爾雅釋獸云狼牡貛牝狼舎人曰狼牡名貛牝名狼毛詩序曰還刺荒也哀公好田獵從禽獸而無厭國人化之遂成風俗習於田獵謂之賢閑於馳逐謂之好焉漢地理志引此齊詩曰子之營兮遭我虖嶩之間兮顔師古注云齊國風營詩之辭也毛詩作還韓詩作營之徃也嶩山名也字或作峱亦作音皆乃髙反言往適營邱而相逢于嶩山也董氏曰考于地記嶩峱皆山名在齊之郊故諸書或異崔靈恩集注還茂昌三者皆地名也然平觀文勢則毛詩謂還茂昌為貌是也孔疏曰士大夫聚說田事以為戲樂而荒廢政事故刺之俟我於著乎而充耳以素乎而尚之以瓊華乎而俟我於庭乎而充耳以青乎而尚之以瓊瑩乎而俟我於堂乎而充耳以黄乎而尚之以瓊英乎而漢地理志言齊地風俗引齊詩曰俟我於著乎而此亦舒緩之體也藝文志謂齊詩咸非其本義魯最為近之然則班固謂為舒緩之體者魯詩之說也去二家而取魯其考之亦詳矣今毛詩止一家之說況多謬誤奚可盡從又況毛傳猶未明言刺不親迎至衞宏作毛詩序始明言刺時不親迎亦不言何世則臆說也考本詩三章三言俟我殊非陳古之情衞宏蓋意雞鳴還東方之日皆荒淫之詩而是詩次於其間當亦非美故曲推其說夫詩之不可以次言也明矣清人鄭文公之詩而次昭公之詩之上況齊俗近於魯孔子曰齊一變至於魯則齊之禮儀亦美矣雖當衰亂風俗豈盡變而為惡無一事一為之善乎況是詩亦特美其禮儀而已三百篇蓋多平正無他雖無深㫖而聖人取焉正以庸常平夷之即道也諸儒不知道故穿鑿而無說其害道甚矣俟待也爾雅釋宫云門屏之間謂之宁而毛傳曰門屏之間曰著孔疏謂著與宁音義同鄭康成謂以素充耳所以懸瑱者或名為紞亦有理但謂人君五色臣三色織之未必然初無典據惟以此詩曲推其說且以素為先見鑿甚矣士冠禮元端元裳黄裳雜裳可也而康成妄析其義曰上士元裳中士黄裳下士雜裳於以驗康成不善屬文不達文理是詩充耳以素以青以黄安知非元裳黄裳雜裳之謂乎皆可也康成云瓊華者謂懸紞之末所謂瑱也考工記玉人云天子用金則公侯以下皆玉石雜說文曰瓊赤玉也玉石之雜而赤者爾瓊華其色之盛者歟瓊瑩其色之瑩者歟瓊英其精英歟尚者著之於紞端歟是詩禮儀其親迎歟鄭風言俟我乎堂亦謂親迎也東方之日兮彼姝者子在我室兮在我室兮履我即兮東方之月兮彼姝者子在我闥兮在我闥兮履我發兮東方之日兮日始出之時也彼姝美之女子忽在我之室兮再言在我室兮者駭之而情深也履者以足躡我猶陳平躡漢王其意即通無俟乎言也履我使即之為淫也即就也此肆焉無所忌者也東方之月兮月始出之時也彼姝者子忽在我之闥兮闥門也履我使發足而與之俱往也既入夜又不入我室此則或有所忌者此與桑中溱洧同作詩以刺淫奔也或在朝或在夜或在室或在闥刺彼故其事不一也然履我即兮未必果即之也履我發兮未必果發也毛詩序曰東方之日刺衰也君臣失道男女淫奔不能以禮化也夫不刺淫奔而刺國之衰是長淫奔者之惡也本詩惟刺淫奔而序旁推其說衞宏不知道其作序率類此東方未明顚倒衣裳顚之倒之自公召之東方未晞顚倒裳衣倒之顚之自公令之折柳樊圃狂夫瞿瞿不能辰夜不夙則莫顚補音典因切司馬相如上林賦長嘯哀鳴翩翻互經天矯枝格偃蹇杪顚漢童謡黄雀巢其顚與人叶易林賁之豐曰採薪得麟大命隕顚噬嗑之未濟顚與民叶揚雄元后誄顚與盈叶倒都老反觀是詩知公未明而召羣臣臣急趨之故顚倒衣裳日未出而東方先明晞者又其微明未晞則益早矣公如此勤於政者然失時失節乃輕躁狂妄如折栁樊圃焉栁質柔細而以為圃之藩籬何益於事無足為禁也又如狂夫瞿瞿然瞿瞿驚視之狀狂者驚視急於為又何益於事哉晨夜謂早夜也不能晨夜言全不識早夜若非太早而夙則太遲而莫矣大抵狂躁輕妄之人忽急忽緩忽早忽夜皆不可測毛詩序曰東方未明刺無節也朝廷興居無節號令不時挈壺氏不能掌其職焉公號令失時則夜未終必令報夜終遂使挈壺氏失職刻漏錯亂南山崔崔雄狐綏綏魯道有蕩齊子由歸既曰歸止曷又懐止葛屨五兩冠緌雙止魯道有蕩齊子庸止既曰庸止曷又從止蓺麻如之何衡從其畝取妻如之何必告父母既曰告止曷又鞠止析薪如之何匪斧不克取妻如之何匪媒不得既曰得止曷又極止補音雙疎工切按原本三字脫孔臧格虎賦耳目䘮精值網而衝局然自縳或隻或雙史記龜筴傳禍與福因刑與徳雙揚雄河東賦雙與東叶後漢語殿中無雙丁孝公五經無雙許叔重天下無雙江夏黄童荀氏八龍慈明無雙任文公智無雙緌如誰反從音縱畝一讀滿罪切古作畮說文以每得聲宋玉高唐賦畝與止叶楚辭畝與芷叶張衡東京賦畝與已叶一讀滿補切易林歸妹之坤畝與暑叶班固西都賦畝與矩叶韓愈元和聖徳詩畝與祖叶栁宗元招海賈文畝與覩舞叶詳觀南山之詩其刺襄公鳥獸之行亦著矣南山崔崔有人君尊嚴之象言雄知其對雌狐之為獸多疑周易凡言狐皆取疑象襄公為鳥獸行與文姜淫慾已縱而不能止心愧沮而若疑又齊襄雖由魯道而歸身則在塗心則在魯愧慾雜錯發諸精神見諸步武有遲疑綏緩之狀故曰綏綏衛風有狐亦有疑貳之意有蕩者因道路平蕩以寓譏魯蕩然無制之意首章不言齊襄往而唯言襄公歸者明初往襄公之惡未成未明及歸則成矣明矣故止言其歸詩人於是致其譏曰既曰歸齊矣曷又懷之也謂其又懷文姜也葛屨至賤之物也五兩當是文姜與其姪娣或從者共五人也冠緌居首之物所尊所貴者也今也與葛屨雙止非類而並處以尊而混卑則鳥獸之行又著矣據此則所亂又不止於文姜矣庸常也齊侯既常在魯道路之中為淫矣曷又極其縱放也從即縱字縱放之狀不可得而知據此可以想而知矣非謂常在魯道為可也言其縱之甚也首章曷又懷止其意同蓺種也蓺麻如之何衡從其畝以喻取妻如之何必告父母衡横縱直無别義既曰告止謂文姜初嫁既告於廟矣曷又鞠止窮之不已也鞠之為言言鳥獸行而微其辭者也匪媒不得亦兼明淫亂之匪媒既曰得止曷又極止言魯桓既得文姜矣齊侯曷又極之不已也極猶鞠也毛傳謂齊子謂文姜既於是詩文㫖難通而載驅齊子發夕齊子豈弟尤難通齊人之詩言齊子發夕謂襄公則明苟謂文姜則文姜自魯發夕齊人何由知之謂男子豈弟則宜謂婦人則難至於敝笱所言齊子則謂魯桓不能制文姜齊侯來淫而歸惟言歸者亦結證其惡齊人不敢預料其君於惡也詩稱君曰子固多齊君至是其體益輕故曰子亦為之隱也毛詩序曰南山刺襄公也鳥獸之行淫乎其妹大夫遇是惡作詩而去之無田甫田維莠驕驕無思逺人勞心忉忉無田甫田維莠桀桀無思逺人勞心怛怛婉兮孌兮總角丱兮未幾見兮突而弁兮爾雅釋詁云甫大也孔疏曰人治田無得田此大田若大田過度力不充給田必蕪穢維有莠草驕驕然無思逺人徒勞心忉忉爾逺人諸侯也遠人不難致此有徳則彼至矣曰無思逺人則其君之無徳徒勞可見矣如田大田徒勞無獲驕縱也桀桀出也維莠驕縱桀出則良苗不興不實矣婉孌言少年貌美毛傳謂總角聚兩髦也孔疏謂兩角丱然未及幾次見之而突然已冠弁矣此末章雖平言無譏而其含䕶不敢言而卒已之意可見毛詩序曰甫田大夫刺襄公也無禮義而求大功不修徳而求諸侯志大心勞所以求者非其道也盧令令其人美且仁盧重環其人美且鬈盧重鋂其人美且偲環補音胡㳙切按原本五字脱馬融廣成頌環與園叶曹植美女篇環與翩翩叶何晏景福殿賦環與源叶顔延年北湖應詔詩環與天叶鬈音權董曰韓詩作盧泠泠說文引詩作獜毛詩序曰盧令刺荒也襄公好田獵畢弋而不修民事百姓苦之故陳古以風焉毛傳曰盧田犬令令纓環聲言人君能有美徳盡其仁愛百姓欣而奉之愛而樂之順時遊田與百姓共其樂同其獲故百姓聞而說之其聲令令然攷序及傳皆謂陳古而本詩辭情不然曰其人其辭指今非陳古也苟陳古則宜每章稱仁稱徳而次章曰鬈末章曰偲又三章皆曰美殊非陳古之意蓋序傳以襄公之詩不應有美故曲推其說以為陳古以風不知詩不可以次序觀不可以執一觀以鄭叔段之惡而兩叔于田之詩京人未嘗不說之以鄭清人文公之詩而次於莊公詩中盧令未必果襄公之詩果襄公之詩則叔于田之類也襄公雖無道而不聞其暴民故田而民悅之歟民悅其君正也道也不然則齊有士大夫之賢者民悅其田也亦正也道也百姓日用此道而不知故不明已之道心又不知人之道心而況於六經之大㫖乎毛傳曰重環子母環也鋂一環貫二也鬈好貌偲才也釋鬈曰好未安鬈其須之卷曲歟敝笱在梁其魚魴鰥齊子歸止其從如雲敝笱在梁其魚魴鱮齊子歸止其從如雨敝笱在梁其魚唯唯齊子歸止其從如水鰥補音姑倫切楚辭天問舜閔在家按原夲脫舜閃二字又何以鰥堯不姚告二女何親毛詩序曰敝笱刺文姜也齊人惡魯桓公微弱不能防閑文姜使致淫亂為二國患焉此非魯桓時詩也何以明之魯桓公娶齊僖公之女文姜魯桓十四年齊僖卒十五年魯桓雖嘗與齊襄㑹盟而文姜不行至十八年魯桓始與文姜如齊申繻諫焉齊襄於是通文姜魯桓謫文姜姜以告夏四月齊人殺魯桓夫齊人未殺魯桓之前齊襄與文姜為淫之迹未至於若是詩所述肆行而無忌也是詩其魯莊二年姜氏會齊襄於禚四年姜氏享齊襄于祝邱已後之詩歟是詩齊人譏襄公并譏魯莊微弱及文姜也笱者捕魚之器敝敗之笱在於魚梁鰥大魚魴亦中魚喻魯莊㣲弱不能以禮防閑其母止齊襄之來致齊襄疾驅於通道大都與文姜淫不已也惟言齊襄之歸不言齊襄之往者齊人不敢預臆其君於惡及成惡而歸始形於言其意與南山同亦含隱矣魴雖非甚大之魚因鰥連文意在鰥也鰥魚之大見孔叢子衛人得鰥魚其大盈車鱮亦非甚小之魚欲易韻又鱮至不美之魚語曰網魚得鱮不如啗茹亦喻齊襄與文姜之惡也其從者如雲言其盛如雨言其多如水言其疾驅也既見魯之無制又見齊襄之肆惡無忌也釋魚云魴魾郭璞云江東呼魴魚為鯿一名魾邢疏云陸璣云魴今伊洛濟潁魴魚也廣而薄肥恬而少力細鱗遼東梁水魴特肥而厚尤姜於中國魴其鄉語曰居就糧梁水魴載驅薄薄簟茀朱鞹魯道有蕩齊子發夕四驪濟濟垂轡濔濔魯道有蕩齊子豈弟汶水湯湯行人彭彭魯道有蕩齊子翺翔汶水滔滔行人儦儦魯道有蕩齊子遊敖夕補音祥龠切淮南子施之無窮而無所朝夕舒之彌於六合卷之不盈一握李興諸葛亮表閭之文仁智所處能無規廓日居月諸時隕其夕郭璞江賦域之以盤巖豁之以洞壑疏之以沱汜鼓之以朝夕陶潜自祭文故人淒其相悲同祖行於今夕羞以嘉蔬薦以清酌陸雲夏府君誄瞻彼日月嵗聿云夕寒暑窮化四辰交錯薄薄車行之聲也爾雅釋器云輿革前謂之鞎後謂之茀竹前謂之禦後謂之蔽郭注云茀以韋靶後户禦以簟衣軾蔽以簟衣後户毛傳曰簟方文席也車之蔽曰茀諸侯之路車有朱革之質而羽飾魯道平蕩亦寓蕩然無制之譏齊君夕而發車趨魯道焉夕而發者亦有愧于中不敢朝發與孫炎曰驪黒也爾雅釋畜云騋牝驪牡是詩孔疏云駟馬皆鐵驪之色垂轡徐行之狀也豈弟樂易從容之貌雖刺譏其辭婉矣其辭雖婉其譏實深彭彭盛貌儦儦衆貌翺翔遊遨垂轡皆從容候待文姜及濡留不肯旋反之狀毛詩序曰載驅齊人刺襄公也疾驅於通道大都與文姜淫播其惡於萬民焉猗嗟昌兮頎而長兮抑若揚兮美目揚兮巧趨蹌兮射則臧兮猗嗟名兮美目清兮儀既成兮終日射侯不出正兮展我甥兮猗嗟孌兮清揚婉兮舞則選兮射則貫兮四矢反兮以禦亂兮毛詩序曰猗嗟刺魯莊公也齊人傷魯莊公有威儀技藝然而不能以禮防閑其母失子之道人以為齊侯之子焉猗嗟嘆辭此嘆辭有美有傷昌容色之盛也孔子言文王之狀頎然而長抑繼辭也上言昌言長此又言揚故曰抑詩人言貌多言揚曰子之清揚曰清揚婉兮方言云目黸瞳之子盱或謂之揚蓋目之精神全在黸瞳言人之美多在精神故多言揚此言若何之揚兮眞美目之揚也趨蹌之巧趨步之有儀也禮曰士蹌蹌射則甚善也臧善也朱曰名猶稱也言其威儀枝藝之可名也朱意謂人稱譽其威儀技藝之美有名譽也美目清明也儀既成兮言威儀習熟成就也侯即今之垜正即帖即鵠梓人為侯廣與崇方參分其廣而鵠居一焉射人之職王五正諸侯三正孤卿大夫二正士亦二正毛詩傳曰二尺曰正外孫曰甥鄭箋云姊妹之子曰甥蓋據爾雅釋親而云魯莊公乃齊襄公時當曰姊妹之子爾雅曰展誠也孌好貌言目之美也非勁者也選者鄭謂於倫䓁㝡上也貫者矢正中鵠貫而穿之也四矢乘矢也射禮必乘矢者鄭箋云象其能禦四方之亂反者射終而反其矢也射所以禦亂今魯莊射不出正而不能禦閨門之亂譏而婉其辭也毛詩序謂人以為齊侯之子焉贅矣失孔子之㫖魏糾糾葛屨可以履霜摻摻女手可以縫裳要之襋之好人服之好人提提宛然左辟佩其象揥維是褊心是以為刺補音服鼻墨切按原本三字脫易林困之中孚曰絲紵布帛人所衣服摻摻女手紡績繕織士冠禮云令月吉日始加元服棄爾㓜志順爾成徳秦泰山刻石皇帝臨位作制明法臣下修飾廿有六年初并天下㒺不賔服三句一韻按士冠禮以下從韻補補入毛傳曰夏葛屨冬皮屨葛屨非所以履霜鄭箋云葛屨賤皮屨貴魏俗至冬猶謂葛屨可以履霜利其賤也毛傳曰摻摻猶纎纎也婦人三月廟見然後執婦功按士昬禮舅姑殁乃有廟見之禮舅姑存則婦人三月然後祭行謂助祭也鄭箋云言女手者未三月未成為婦裳男子之下服賤又未可使縫魏俗使未三月婦縫裳者利其事也毛傳曰要䙅也襋領也好人即摻摻女手之人美好也要之縫䙅也襋之縫領也使好人服其勞爾雅云提提安也凡辟當左左為卑右為尊宛婉娩柔順之容也以象骨搔首名曰揥毛詩序曰葛屨刺褊也魏地陿隘其民機巧趨利其君儉嗇褊急而無徳以將之夫本詩刺魏俗也刺魏俗之褊心也而序必推及其君以園有桃觀之其君誠褊嗇陋甚而葛屨之詩辭情不及其君衞宏不知道率為贅辭徒惑後學彼汾沮洳言采其莫彼其之子美無度美無度殊異乎公路彼汾一方言采其桑彼其之子美如英美如英殊異乎公行彼汾一曲言采其藚彼其之子美如玉美如玉殊異乎公族王肅孫毓皆以為大夫采菜鄭康成亦如之箋云其采莫之事則非公路之禮也毛傳曰路車也公行從公之行也公族公屬不釋殊異之義以其言大夫文義甚明無俟於釋乎集註序曰其君子儉以能勤釋文亦以此本為正惟他本毛詩序則曰其君儉以能勤苟以為君采則何為不以他官為比而獨以公路公行公族為比乎毛傳曰汾水也沮洳其漸洳者莫菜也藚水蕮孔疏云沮洳潤濕之處陸璣疏云莫莖大如箸赤節節一葉似栁葉厚而長有毛刺今人繅以取繭緒其味酢而滑始生可以為羮又可以生食五方通謂之酸迷冀州人謂之乾絳河汾之間謂之莫言語助也鄭謂無度不可尺寸言美之至也美則無度矣但殊異乎公路凡為公路者不如是也豈有掌路車之官而采莫菜於汾水之沮洳乎是詩惟譏公路公行公族而不及他官者大抵上無禮教則公族多不學文近君習君之儉陋寖至於采茹采桑不知其不可也英如舜英之英美如華也孔疏謂公路與下公行一也引春秋左傳宣二年晉事為證亦不甚明以後晉證古魏豈能盡同況毛傳三釋甚明鄭箋謂公路主君之軞車庶子為之晉趙盾為軞車之族是也其箋未必當服䖍云軞車戎車之倅是詩公路正掌公之路車非掌從公之行也爾雅藚牛脣郭注引詩傳曰水蕮也如續斷寸寸有節陸璣以為今澤蕮郭氏所不取鄭箋云公族主君同姓毛詩序曰汾沮洳刺儉也其君儉以能勤刺不得禮也韓詩三章皆作彼已之子其已音近韓毛記音不同已音近釋見崧髙園有桃其實之殽心之憂矣我歌且謠不知我者謂我士也驕彼人是哉子曰何其心之憂矣其誰知之其誰知之蓋亦勿思園有棘其實之食心之憂矣聊以行國不知我者謂我士也㒺極彼人是哉子曰何其心之憂矣其誰知之其誰知之蓋亦勿思殽者肉之有骨者也今儉而以桃實為殽過於儉矣儉美徳也而過焉至於此甚知不得其道也知失其條理而至是也得其條理者雖不過儉而財用自豐失其條理者雖殽桃食棘而財用益匱孟子曰無政事則財用不足故殽桃食棘國人以為善而智者以為憂憂其無政事而末流至於危亂也憂鬱而發於歌謠歌音長謠音短不知我者謂我士君子也而驕謂我不樂君之至儉為驕也彼人是哉謂君所為是也子姑言之其說為何也其音如字其義自通他書作何居者亦當音如字其義亦通其與居蓋記音不同陸徳明音基未安詩人於是曰我心憂矣其誰知之重言知之者誠寡也女蓋亦不思爾知此理者自古以來罕其人也汾沮洳之是非人猶易知園有桃之是非雖本自昭然而士大夫之有知者寡矣行於國中亦以舒憂罔極謂責人無已也謂論治無有窮已無有畔岸也彼無智者觀智者率如是毛傳曰棘棗也廣韻曰小棗今所在有之小而圓毛詩序曰園有桃刺時也大夫憂其君國小而迫而儉以嗇不能用其民而無徳教日以侵削故作是詩也衛宏此序奚足以知此詩使宏居魏朝亦安能有所為哉亦拱手以受侵削而已矣其言妄繆惟可發笑魏君儉陋若是奚止不能用其民而已哉凡政事皆失矣忽云徳教瞢不知類此序既不足以發明詩情徒為謬贅而諸儒率宗之何也陟彼岵兮瞻望父兮父曰嗟予子行役夙夜無已上愼旃哉猶來無止陟彼屺兮瞻望母兮母曰嗟予季行役夙夜無寐上愼旃哉猶來無棄陟彼岡兮瞻望兄兮兄曰嗟予弟行役夙夜必偕上愼旃哉猶來無死母補音滿罪切易林泰之否曰陟屺望母役事未已淮南子以天為父以地為母隂陽為經四時為紀蔡邕崔夫人誄昔在敬姜陪臣之母勞謙紡績仲尼是紀偕苟起切按淮南子以下原本脫去四十四字楚辭九辯四時遞來而卒歲兮陰陽不可與儷偕按原本儷誤作儼白日晼晚其將入兮明月銷鑠而减毁太元親首次三失其體也次四賔主偕也餘見豐年詩爾雅釋山云多草木岵無草木屺而是詩毛傳曰無草木岵有草木屺孔䟽云當是傳冩誤也毛傳曰旃之也季少子也行役者登岵山望父之在所思父臨行謂已曰嗟予子行役早夜無有已時閔之也又戒已曰上愼之哉今俗亦曰上役上畨上陣卒曰獨當來歸不至永止于彼而不反也無止即無死之㣲辭也無寐閔其不得寐也無棄我亦祝其無死之㣲辭也必偕戒之必與衆偕慮其以後期獲罪也無死謂其毋過于勇而必死也毛詩序曰陟岵孝子行役思念父母也國迫而數侵削役乎大國皆詩外之贅辭也不知父母兄弟之至情乃天下之大道故為是贅也十畝之間兮桑者閑閑兮行與子還兮十畝之外兮桑者泄泄兮行與子逝兮閑補音何甄切按原本三字脱揚雄太僕箴閑與愆叶曹植瑟瑟歌閑與然叶簡觀今京語率如此盖今京語之餘音如軒而補音遂何甄則又過之矣還本亦作旋李翱答進士王載言書作旋釋文間間亦作閑字本亦作閒閒暇也惟有閒故寛暇後世以中間之間與閒暇之閒渾殽故假借防閑之閑以寄其音實非古字采桑者雖閒暇然采者多故曰閒閒只十畝之間桑者之多若是故道途中謀居相宅者相謂曰行與子逥還兮泄泄猶沓沓也亦多也行與子逝往兮言此處迫隘不可謀居而他往毛詩序曰十畝之間刺時也言其國削小民無所居焉若曰國以無道致侵削則可刺惟曰國削小民無所居則不可刺矣況詩中本無刺國之意衞宏不知道是詩無他亦無邪詠而歌之必不感人邪僻之情莫非道者宏不逹是故外推贅説坎坎伐檀兮寘之河之干兮河水清且漣猗不稼不穡胡取禾三百廛兮不狩不獵胡瞻爾庭有縣貆兮彼君子兮不素餐兮坎坎伐輻兮寘之河之側兮河水清且直猗不稼不穡胡取禾三百億兮不狩不獵胡瞻爾庭有縣特兮彼君子兮不素食兮坎坎伐輪兮寘之河之漘兮河水清且淪猗不稼不穡胡取禾三百囷兮不狩不獵胡瞻爾庭有縣鶉兮彼君子兮不素飧兮餐補音郤正釋譏時獻一䇿偶進一言釋彼官責慰此素餐輻説文以畐得聲許慎凡輻皆讀如偪荀子引逸詩涓涓流水不壅不塞轂既破碎乃大其輻事已敗矣乃重太息易林蹇之中孚曰登山伐輻虎在我側簡案廣韻畐芒迪反簡疑輻芳逼切爾庶與今讀不異母檀木材之堅美者君子之美材似之有美如此而寘之河干是不用之也毛傳曰坎坎伐檀聲寘置也干厓也風行水成文曰漣伐檀以俟世用若俟河水清漣孔䟽云河水性濁清則難待襄公八年左傳云俟河之清人壽幾何易緯云王者太平嘉瑞之將出則河水先清毛傳曰種之曰稼斂之曰穡貆獸名爾雅釋獸云貈子貆字林云貈似狐善睡其子名貆郭云其雌者名􅭗今江東呼貉為􅧯􅧯字林云􅧯貍類謂之􅤘廣雅云􅤘貁也然則皆貈之通名而其間㣲有不同歟遂人云夫一㕓田百畝孟子曰下士與庶人在官者同禄禄足以代耕也中士倍下士上士倍中士大夫倍上士小國之卿二大夫禄其税十一則十夫之税始當一夫之獲下士禄一夫中士禄二夫上士禄四夫大夫禄八夫魏小國卿禄十六夫止當得百六十㕓之禾税今取三百㕓為三百夫其貪冒之狀著矣毛詩序曰伐檀刺貪也在位貪鄙無功而受禄君子不得仕進爾孔疏云曽孫之稼非唯種之也湯誓云舍我穡事非唯斂之也以稼穡相對皆先稼而後穡故知種之曰稼斂之曰穡若散則相通釋文云冬獵為狩又云火田為狩鄭箋云宵田曰獵釋文云宵田為獠郭注云管子曰獠獵畢弋今江東亦呼獵為獠或曰即今夜獵載鑪照也孔疏云經云不狩不獵則狩與獵别故以獵為宵田此對文耳散則獵通于晝夜狩兼於四時若周禮大田獵王制云佐車止則百姓田獵不必皆宵田也素即今俚語所謂白即毛傳所謂空之義也毛傳曰輻檀輻也直直波也萬萬曰億獸三歲曰特鄭箋云十萬曰億三百億禾秉之數孔疏云萬萬曰億今數然也傳以時事言之故今九章算術皆以萬萬為億箋以詩書古人之言故以古數言之知古億十萬者以田方百里於數為九百萬畝而王制云方百里為田九十億畝是億為十萬也楚語云百姓千品萬官億醜皆以數相十是億十萬也秉把也聘禮注云秉謂刈禾盈把是也毛傳曰檀可以為輪漘厓也小風水文轉如輪所以釋淪也毛傳曰圓者為囷匠人注云囷圓倉爾雅釋鳥云鷯鶉其雄鵲牝庫郭云鶉䳺屬今曰䳺鶉爾雅疏云䳺即上云駕鴾母田鼠所化者鶉舊説云蝦蟇所化者也毛傳曰熟食曰飧秋官掌客云公飧五牢侯伯飧四牢子男飧三牢卿飧二牢大夫飧一牢士飧少牢説文云飧水澆飯也宣六年公羊傳曰晉靈公使勇士將殺趙盾入其門則無人焉上其堂則無人焉俯而窺之方食魚飧孔疏云從夕食言人旦則食飯夕則食飧鄭箋云飧讀如魚飧之飧鄭志答張逸云禮飧饔大多非可素不得與不素飧相配故易之也毛傳熟食即魚飧鄭徒為異鄭亦有誤不止于是毛傳即非言飧盛禮飧牽乃生牢毛曰熟食正得夕食本義所謂飧盛禮亦以充夕食爾飧饔魚飧初無二義碩鼠碩鼠無食我黍三歲貫女莫我肯顧逝將去女適彼樂土樂土樂土爰得我所碩鼠碩鼠無食我麥三歲貫女莫我肯德逝將去女適彼樂國樂國樂國爰得我直碩鼠碩鼠無食我苖三歲貫女莫我肯勞逝將去女適彼樂郊樂郊樂郊誰之永號是詩言去之而適樂土則怨君可知也言碩鼠無食我黍則君貪而重斂之狀可覩也碩大也大鼠謂君也貫慣也重斂盖三歲矣民積怨曰三歲重斂而民輙從之致其習慣而不已又莫肯顧念我於是斷棄曰誓將去女適彼樂土逝誓字之訛歟適樂土則得所矣德者施德於我也莫肯施德於我也適樂國而得其直則居是國為不得其直矣益以明重歛之非理勞者閔其勞而勞之又莫肯勞我也誓將去女而適樂郊誰復永號於女之土乎永長也不勝其苦而長號也毛詩序曰碩鼠刺重斂也國人刺其君重斂蠶食於民不脩其政貪而若大鼠也據此末章則勞當如字有音去聲者乃後世欲别其義故特轉為去聲其實古不轉音一字自有二義文勢自明
