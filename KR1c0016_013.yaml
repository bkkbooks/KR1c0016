body:
  text: 慈湖詩傳卷十三宋楊簡撰小雅三旻天疾威敷于下土謀猶回遹何日斯沮謀臧不從不臧覆用我視謀猶亦孔之卭潝潝訿訿亦孔之哀謀之其臧則具是違謀之不臧則具是依我視謀猶伊于胡底我龜既厭不我告猶謀夫孔多是用不集發言盈庭誰敢執其咎如匪行邁謀是用不得于道哀哉為猶匪先民是程匪大猶是經維邇言是聽維邇言是爭如彼築室于道謀是用不潰于成國雖靡止或聖或否民雖靡膴或哲或謀或肅或艾如彼泉流無淪胥以敗不敢暴虎不敢馮河人知其一莫知其他戰戰兢兢如臨深淵如履薄冰按此篇永樂大典缺卷據樓鑰集載所解云此固膚近柔懦之士所執常渝然而人知其一莫知其他不知聖智所及當大有為亦無所懾但聖智雖不懾亦無慢易忽略而亦戰戰兢兢鑰論曰范氏曰人皆知虎不可暴河不可馮而不知小人之不可不畏臨深履薄懼之甚也此説似勝不必委曲宛彼鳴鳩翰飛戾天我心憂傷念昔先人明發不寐有懷二人人之齊聖飲酒溫克彼昏不知一醉日富各敬爾儀天命不又中原有菽庶民采之螟蛉有子蜾螺負之教誨爾子式榖似之題彼脊令載飛載鳴我日斯邁而月斯征夙興夜寐無忝爾所生交交桑扈率場啄粟哀我填寡宜犴宜獄握粟出卜自何能榖溫溫恭人如集于木惴惴小心如臨于谷戰戰兢兢如履薄冰富補音所引唯易林坤之萃福優重職樂且日富而遂音逼下文又夷益切唯曰叶韻别無證未安富或有二音或易林字訛不可知也負補音禮記天子負斧依注負之言倍也史記正義負命毁俗庶士負祿皆讀如倍填毛詩作填韓詩作疹音軫犴韓詩作犴毛詩作岸毛傳曰宛小貌陸氏草木疏曰鳴鳩斑鳩也毛傳曰鳴鳩鶻雕戾至也蘇曰翰羽也爾雅釋鳥云鶌鳩鶻鵃疏曰春秋左傳杜注云鶻鳩鶻鵃也舍人曰鶌鳩一名鶻鵃今之斑鳩孫炎曰鶻鳩一名鳴鳩月令云鳴鳩拂其羽郭云似山鵲而小短尾青黑色多聲按舊説及廣雅皆云斑鳩殆非也斑鳩稍大聲鶌鳩鶻鵃者俗謂之婆餅焦形小如雀青黑色多聲若鵲巢之鳩亦名鴝鵒其聲鴶鵃斑鳩之音如布榖音渾濁斑鳩有二種一種惟頸項斑一種并羽皆斑二種皆止而後鳴鶻鵃亦止而鳴惟鴝鵒多飛而鳴又身小應宛彼及翰飛之義則此詩鳴鳩謂鴝鵒也餘釋見鵲巢夫以宛然之鳴鳩其翰飛尚能戾天豈王者而反不如之詩人之心憂傷傷時王之怠荒故念昔先人謂先王即下文有懷二人其文王武王歟憂傷懷念不寐至於明發將旦而天發明也毛傳曰齊正克勝也齊聖飲酒溫和不肆縱能勝酒不為酒所困彼昏昏不知一醉則日益甚而不止故詩人戒之曰各敬爾儀以君臣俱荒醉故言各天命一去將不復至故曰不又欲其知懼也毛傳曰中原原中也菽藿螟蛉桑蟲也蜾螺蒲盧也負持也爾雅釋蟲與毛傳同郭璞云蒲盧即細腰蜂俗呼蠮螉也俗謂螟蛉為桑蟃亦曰娀女邢昺釋曰説文云細腰土蜂也天地之性細腰純雄無子陸璣云螟蛉者桑上小青蟲也似步屈其色青而細小或在草萊上蜾螺土蟲也似蜂而小腰取桑蟲負之於木空中七日而化為其子揚子法言云螟蛉之子殪而逢蜾螺祝之曰類我類我久則肖之孔疏曰菽大豆故禮記稱啜菽飲水葉謂之藿公食禮云鉶羮牛用藿此經傳箋明采取其葉故言藿也蓋以菽實有主庶民不得而采惟其葉則非所愛故庶民皆得采之此喻天命無常有德者皆可得之王作民父母故民有子喻王肅亦云螟蛉有子蜾螺得以負而去鄭箋云式用榖善也今有教誨女之萬民用善道者亦似蒲盧言將得而子也天命之去就率因民心之去就故又取螟蛉蜾螺之喻明我雖有民若不能自撫則彼有德能撫之者民心從彼戴彼矣書曰元后作民父母故古語多以民為子題本字訛而為題視也故毛傳鄭箋云題視也脊令既飛且鳴勤動不止我當日邁月征早興遲寐勤勞政治無忝辱所生蓋以時王昏醉而主諷諫也桑扈名竊脂食肉之鳥也郭璞云俗呼青雀觜曲喜盜脂膏食之因以名淮南子曰馬不食脂桑扈不食粟蘇黃門古史序云聖人之不為不善如騶虞之不殺竊脂之不榖交交謂交錯而飛行歟率循也樓尚書云此章言遭誣陷而無告者桑扈食肉而謂其率場啄粟可謂是非顛倒矣惟其填寡宜乎陷於犴獄也釋文云鄉亭之繫曰犴朝廷曰獄説文作宜犴宜獄此事甚易見試握粟以卜之謂握粟以試桑扈彼何嘗能食榖乎按樓鑰集引此解云鳥今不得食而率場啄粟喻食肉富貴者今猶失所用乏而觀于疹病孤寡貧弱之徒宜其尤甚於入犴獄也又云民勞苦握粟出卜問何自而能榖善耶鑰論云此章言貴賤皆同前輩大率如此説意既不屬亦覺其言泮渙桑扈竊脂爾雅釋鳥自有兩義非名竊脂也其曰夏鳸竊元秋鳸竊藍冬鳸竊黃桑鳸竊脂棘鳸竊丹者竊皆訓淺注竊脂青色然其云竊脂謂其色淺白也其前又别有兩句云桑扈竊脂鷯剖葦注云食肉好盜脂膏蘇黃門古史序有云聖人之不為不善如騶虞之不殺竊脂之不榖小宛正謂此竊盜脂膏之義此章蓋言遭誣陷而無告者桑扈食肉而謂其率場啄粟可謂是非顛倒矣惟其填寡宜乎陷于岸獄也此事甚易見試握粟以卜之謂握粟以試桑扈彼何嘗能食穀乎言是非在目前分明如此而上不能察若以為卜筮之卜則益差矣今本與所引小異當是從樓説刪定簡謂填長也正直之士多孤立寡特思古溫溫恭人如集于木不敢放肆惟恐墜失惴惴小心如臨于谷谷深者也戰戰兢兢如履薄冰恐懼謹戒如此則必不荒飲亂政矣毛詩序謂是詩刺幽王也鄭云刺厲王辨彼鸒斯歸飛提提民莫不榖我獨于罹何辜于天我罪伊何心之憂矣云如之何踧踧周道鞠為茂草我心憂傷惄焉如搗假寐永歎維憂用老心之憂矣疢如疾首維桑與梓必恭敬止靡瞻匪父靡依匪母不屬于毛不離于裏天之生我我辰安在菀彼柳斯鳴蜩嘒嘒有漼者淵􅍉葦淠淠譬彼舟流不知所屆心之憂矣不遑假寐鹿斯之奔維足伎伎雉之朝雊尚求其雌譬彼壞木疾用無枝心之憂矣寧莫之知相彼投兔尚或先之行有死人尚或墐之君子秉心維其忍之心之憂矣涕既隕之君子信讒如或酬之君子不惠不舒究之伐木掎矣析薪杝矣舍彼有罪豫之他矣莫高匪山莫浚匪泉君子無易由言耳屬于垣無逝我梁無發我笱我躬不閲遑恤我後踧徒歷反者非當子六反惄乃歷反搗補音當口切今言傾倒之倒猶謂之斗古之遺音也梓補音引張衡南都賦梓與里叶潘尼贈陸機詩梓與紀叶然則宜漿理切而補音漿禮切未安補音母滿罪切荀卿賦篇簪以為父管以為母既以縫表又以縫裏辭或擬此屬音燭在補音易林坤之訟在與起叶鼎之暌在與禮叶大過之頤在與喜叶晉之蹇在與紀叶楚辭離騷在與理叶天問在與子叶又在與趾死止叶然則音薺而補音此禮切未安失母矣先蘇薦反補音思晉切先後也楚辭九歌鏃蔽日兮敵若雲矢交墜兮士爭先招魂鄭衛妖玩來雜陳激楚之結獨秀先韓愈祭兄文奈何於今又棄而先生不偕居疾藥不親古先平則斯人切去則思晉切墐音覲豫音與他音他毛傳曰辨樂也鸒卑居卑居雅烏也提提羣貌孔疏云此鳥名鸒而云斯者語辭猶蓼彼蕭斯菀彼柳斯然爾雅釋鳥云鸒斯鵯鶋揚子雲劉孝標皆曰鸒斯郭璞云雅烏也小而多羣腹下白江東呼為鵯烏音匹小爾雅云小而腹下白不反哺者謂之雅烏説文字林皆云楚烏毛傳曰幽王取申女生太子宜咎又説褒姒生子伯服立以為后而放宜咎將殺之簡博詢野人云烏頸腹白者亦反哺暮而羣歸不勝其多羡鸒得所傷已見放逐而不得歸又不獲侍養不得如鸒之反哺歟榖善也今俗語云平善安樂于語助罹罹憂禍也呼天曰我何辜乎我罪為何而遭放逐也心之憂矣云如之何云言也不敢言父母之過今俗云説甚莫得甚莫即如何孟子曰小辨之怨親親也小辨親之過大者也親之過大而不怨是愈疏也而毛詩序曰太子之傅作焉審如序云則傅述太子之情也踧踧周道鞠為茂草蓋太子放逐所由之道見荒蕪而益感傷也接武謂之踧足相次也亦猶叔次伯之義也周之盛時德政所及諸侯朝覲者多商旅出於其途者多人物蕃庶道途往來稠密如接武而行踧踧然故道途蕩蕩草不植焉今上無德政諸侯不朝民罹憂苦往來稀寡故鞠為茂草鞠養也訛而為鞫歟惄者憂鬱不伸之意方言甚詳惄有不伸之義憂之甚有如搗衣之狀假寐者閉目休視聊以寧神實非真寐假寐之中忽焉長歎王氏曰憂之之深未老而老也劉曰因憂驟老疢者病時作熱憂甚者心火失所故復作浮熱心火上炎攻頭故首亦不寧如有疾也朱曰桑梓以遺子孫給蠶食具器用者也毛傳曰父母之所樹已尚不敢不恭敬况父母之身乎無瞻而不在父也無依而不在母也父尊言瞻母親言依離麗也譬之外不屬于毛內不屬于裏無所容身言放逐情苦毛傳曰辰時也鄭箋謂六物之吉凶孔疏曰昭七年左傳晉侯謂伯瑕曰何謂六物對曰歲時日月星辰是謂也服虔以為歲歲星之神也左行於地十二歲而一周時四時也日十日也月十二月也星二十八宿也辰十二辰也是為六物然今俗以人生之歲月日辰推吉凶有所謂五星及餘星亦多驗又不止於二十八宿曰我辰安在而罹凶至是乎毛傳曰蜩蟬也漼深貌淠淠衆也箋云柳木茂盛則多蟬淵深而旁生􅍉葦言大者之旁無所不容屆至也言今太子不為王所容而見放逐狀如舟之流行無制之者不知終所至也孔疏曰斯辭也箋云雊雉鳴也釋木云瘣木苻婁某氏曰詩云譬如瘣木疾用無枝苻婁尫傴內疾瘣磊故疾用無枝鹿之奔猶或伎立少休而我放逐在途不得少休也雉之朝雊尚求其雌而我獨不得有室家之樂也壞木內疾外枝枯落傷已放逐單獨如彼無枝之壞木我心憂如此寧無知之幽王當亦知之知之則何不見念耶詩情在此也王氏曰見迫逐而投人人宜利而取之也乃或先之使得逃避劉曰人哀其窮及驅者未至而先存之毛傳曰墐路冢也箋云行道也道中有死人尚有覆掩之成其墐者君子謂幽王也王之執心乃忍之乎彼本情不親者尚不忍之我父子至親而王忍之隕隊也箋云酬旅酬也如酬之者謂受而行之惠愛也孔疏云言幽王信褒姒之讒曾不思審得即用之如人以酒相酬得即飲之幽王不惠愛太子聞讒言不復舒徐究窮即信之掎牽一腳也説文偏引也今伐木或大則先去偏枝如將廢申后先放太子不必如毛傳改從倚義毛傳曰析薪者必隨其理亦非廣韻曰杝離也釋文敕氏反離析母子如薪杝而析之矣孔疏曰他謂他人也言舍有罪以上皆怨王之辭也既有怨言又懼轉而上聞於王將重獲罪故卒章有恐懼之意曰莫髙者非山乎人得而登之莫深者非泉乎人亦得而入之今此怨辭外人雖不得而知懼其終知也亦猶山雖髙人終得而登之泉雖深人終得而入之君子無敢易出其言他人之耳屬于垣今人謂之牆壁有耳即是意也非謂實有耳屬垣也謂室中之言他日人無不知之故取此喻也王氏曰無逝我梁無發我笱者太子放逐而其憂終不忘國我躬不閲遑恤我後者無如之何自決之辭悠悠昊天曰父母且無罪無辜亂如此憮昊天已威豫慎無罪昊天泰憮豫慎無辜亂之初生僭始既涵亂之又生君子信讒君子如怒亂庶遄沮君子如祉亂庶遄已君子屢盟亂是用長君子信盜亂是用暴盜言孔甘亂是用餤匪其止共維王之卭奕奕寢廟君子作之秩秩大猷聖人莫之他人有心豫忖度之躍躍毚遇犬獲之荏染柔木君子樹之往來行言心焉數之蛇蛇碩言出自口矣巧言如簧顔之厚矣彼何人斯居河之麋無拳無勇職為亂階既微且腫爾勇伊何為猶將多爾居徒幾何補音威畏同天威棐忱今作畏禮記引書德威惟畏今尚書作畏泰本作大長直張反補音盟謨郎切史記敘傳殺鮮放度周公為盟大任十子周以宗強又曰不背何盟桓公以昌易林解之益黃池要盟越國以昌恆之蠱盟與梁叶觀之泰盟與強叶餤音談蓋㷋字之訛階補音班固幽通賦懿前哲之純淑兮窮與逹其必濟哀孤矇之眇眇兮將圯絶而罔階顏師古曰濟合韻子齊切揚雄冀州牧針六國奮矯乃絶其維牧臣司冀敢告在階班固西都賦階與迷叶曹植應詔詩階與隈叶皇甫謐釋勸階與頽叶潘尼乘輿賦針階與恢叶階居奚切簡疑音荄且語助毛傳曰憮大也歐陽曰慎謹慎也呼天而訴曰悠悠昊天為我父母我無罪辜而使我遭此大亂也泰憮者太大也承上降亂降威之意也今人言語亦有如此者僭差也亂之初生其始差失之意既渾涵於其中猶向背未明喜怒未著及亂之又生則君子確信其讒矣此君子謂王凡君子如怒怒則足以止亂如喜喜亦足以止亂此泛言君子君子怒當其罪故沮亂喜則施福祉必當其功賢能進而小人退故亦已亂遄速也君子一怒一喜庶乎速止亂今也雖有所怒以怒不當罪而反怒其賢故亂不沮雖有所祉祉不當功而反及小人故亂不已詩情在是也怨而不露故云政亂言語不足以取信於人故屢盟屢盟適足以長亂讒人即盜賊之行也故徑言君子信盜是以亂益暴盜言甚甘深入王心亂是以益㷋熾餤者㷋之訛歟小人為亂如此靖共之德則無而徒為王窮極之禍耳卭者窮之音而字訛歟奕奕寢廟君子作之言此者有懼其將為墟之意秩秩大猷聖人莫之莫廣大也言此者明今無之也他人有心豫忖度之者王之心讒人之心萬民之心四方之心豫皆知之知民心必離四方必叛彼讒者如狡兔亦將遇犬而獲之禍且至矣毛傳曰毚兔狡兔也荏染柔意也賢者居衰亂之朝為羣小所陵壓賢者謹畏不敢與抗如柔木荏染王宜愛護使得樹立讒者之讒譖賢者必於往來行言微致其巧使人主不覺其譖故詩人言其情狀覬王心勿聽曰焉足數之也彼讒者蛇蛇舒徐必為大言碩大也大言無實也其巧如簧能使聽者喜小人雖口為讒而其中心之愧亦形見于顔色之厚矣詩人又啓王以察姦之狀箋云何人者斥讒人也賤而惡之故曰何人釋水云按原本三字脫水草交為湄蘇曰時有是人也拳者有威力人所畏服之謂即後世所謂攬權之意俗曰權柄曰權勢蓋古者以拳字寓此意後世轉用權字此章又數讒者無一可取之狀曰既無拳又無勇職足以為亂階而已職猶只也爾雅釋訓云既微且腫骭瘍為微腫足為腫郭璞曰骭腳脛也瘍瘡也曰微曰腫又指其可憎可笑之病此疾賤者多有之士大夫罕有戲侮之曰既微且腫矣縱爾有勇亦何足道爾之所謂謀猶又將多耶爾所居徒衆幾何言無幾寡弱歷數無一可取可笑可侮之狀蓋無非言其不足道獨王信之耳毛詩序曰巧言刺幽王也大夫傷於讒故作是詩大夫於王何得言刺彼何人斯其心孔艱胡逝我梁不入我門伊誰云從維暴之云二人從行誰為此禍胡逝我梁不入唁我始者不如今云不我可彼何人斯胡逝我陳我聞其聲不見其身不愧于人不畏于天彼何人斯其為飄風胡不自北胡不自南胡逝我梁祗攪我心爾之安行亦不遑舍爾之亟行遑脂爾車一者之來云何其盱爾還而入我心易也還而不入否難知也一者之來俾我祇也伯氏吹塤仲氏吹篪及爾如貫諒不我知出此三物以詛爾斯為鬼為蜮則不可得有靦面目視人罔極作此好歌以極反側舍補音商居切息也説文從邑舍聲又曰余語之舒也舍省聲公羊傳書君舍左氏榖梁傳皆作荼音舒自舒而孳又有傷遇切一音史記舍者日月所舍舍者舒氣也屈原離騷經余固知謇謇之為患兮忍而不能舍也指九天以為正兮夫惟靈修之故也東方朔七諫哀形骸之離解兮神罔兩而無舍惟椒蘭之不反兮魂迷惑而不知路司馬相如上林賦若此輩者數千百處嬉遊往來宫宿館舍揚之水詩序毛氏作屯戍韓氏作屯舍朱曰彼何人斯不欲斥其人而言也鄭箋云孔甚逝之也梁魚梁也孔疏曰其心孔艱甚難知也朱曰逝我梁則必過我門然而不入者其心有故矣既而詰其所從則暴公也夫以從暴公而不入我門則云云以構我禍也明矣毛詩序曰蘇公刺暴公也暴公為卿士而譖蘇公焉故蘇公作是詩而絶之詳觀是詩非刺暴公也刺其從暴公者也按樓鑰云此詩之序必有所傳詩不言蘇而序言之一詩中只有維暴之云一句不知果暴公否鄭氏以蘇暴皆畿內國名孔疏云蘇國在河內溫縣是東都之畿內也春秋為公者多是畿內諸侯遍檢書傳未聞畿外有暴公今暴公為卿士明畿內此説亦不定鄭漁仲曾辨此云周之畿內無所謂暴者更當考詩人於暴情疏非所怨也恐斯人與已情本甚親今乃與暴相從而譖已是深可憾者纍章情狀甚著毛傳亦未嘗有一語言蘇公刺暴公及序始云云漢史謂衛宏作毛詩序益驗甚矣學者觀書鹵莽千載通患前屢指宏非此詩既非刺暴公則作者亦未必果蘇公二人相從而行其一暴也其一則所謂彼何人斯者也王所聽信惟此二人二人之中必有一人先發譖我二人和同必相唱和此曰誰為我此禍蓋言其先發者也時已遭譴責故曰禍胡逝我魚梁而不入慰唁我乎殆斯人之為我此禍也斯人於我始者不如今始於我甚厚今則頓薄聞今謂我不可可猶是也云我非是也云我不合道理也大抵小人中心為姦利而其言未嘗不依傍正理即此云不我可之謂也釋宫云堂途謂之陳郭璞云堂下至門徑也彼何人斯胡為近逝我陳我既聞其音聲乃不見其身不見其身者不來見我故我不見其身也豈有近至於陳聞其聲而不入見我者乎其特示相疏外特致其侮也明矣夫其至相親愛者今乃至是縱爾不愧于人不畏于天乎其為飄風喻其過門之疾也胡不自我所居之北胡不自我所居之南乃必過我門之我魚梁而不入我門以見我祇攪我心蓋以平時過門必入見今則纍纍不入見况譖於王而加譴於我凡行有二平則安行有故則亟行謂爾安行耶亦不遑舍止而徑過我門而不入謂爾亟行耶而又遑脂爾車遑暇也於以驗斯人實譖我其心中有物故發見於外者情狀若此屢過我門不入見我中間嘗一來云何其目視之盱動不定也方言黸瞳之子曰盱或謂之揚蓋黸瞳之子每揚動故名然則盱者目睛多動也其心中不安故目睛亦不安而多動其愧心形見于盱倘爾還而入見我則我心漸釋而平易還而不入則否矣否者不然之辭不順之辭其心難知矣言其姦深昨者一來徒使我極其敬而已矣不敢通情也祇者敬之極毛傳曰土曰塤竹曰篪孔疏曰塤周禮小師職作塤古今字異爾注云塤六孔燒土為之郭璞曰大如鵝子鋭上平底小者如雞子六孔篪以竹為之長一尺四寸圍三寸一孔上出橫吹之小者尺二寸廣雅云八孔我與爾如伯氏吹塤仲氏吹篪音聲相應和貫串如索之貫情如兄弟伯仲爾豈誠不知我耶今乃相譖如不知我心者孔疏曰若實不譖則當出豕犬雞之三物以詛盟爾之此事毛傳曰君以豕臣以犬民以雞蜮短狐也反側不正直也孔疏云洪範五行傳云蜮如鱉三足生於南越南越婦人多淫故地多蜮淫女惑亂之氣所生也陸璣疏曰一名射影江淮水皆有之人在岸上影見水中投人影則殺之或曰含沙射人皮肌其瘡如疥為鬼為蜮其體隱藏則不可得見今汝則靦然於面目之間情狀甚著視人罔極謂目視情深無底也作此好歌以究極斯人反覆傾側之狀萋兮斐兮成是貝錦彼譖人者亦已大甚哆兮侈兮成是南箕彼譖人者誰適與謀緝緝翩翩謀欲譖人慎爾言也謂爾不信捷捷幡幡謀欲譖言豈不爾受既其女遷驕人好好勞人草草蒼天蒼天視彼驕人矜此勞人彼譖人者誰適與謀取彼譖人投畀豺虎豺虎不食投畀有北有北不受投畀有昊楊園之道猗于畝丘寺人孟子作為此詩凡百君子敬而聽之補音翩翩紕苓切漢書敘傳魏其翩翩好節慕聲晉載記京師歌涼州鴟苕寇賊消鴟苕翩翩愁殺人陸機大暮賦庭樹兮華落墓草兮根陳松柏兮鬱鬱飛鳥兮翩翩按原本四句脫幡補音芬邅切猶翩翩也孫綽天台山賦泯色空以合迹忽即有而得元釋二名之同出消一無于三幡按原本一無誤作無一恣語樂以終日等寂默于不言説文作蟠蟠叶韻亦當作此讀案字以番得聲者古皆與先為韻翻芬邅切張衡西京賦建戲車樹修旃侲僮逞材上下翩翻魏文寡婦賦水凝兮成冰雪落兮翻翻傷薄命兮寡獨內惆悵兮自憐蕃分愆切張衡南都賦固靈根于夏葉終三代而始蕃非純德之宏圖孰能揆而處旃傅元詩顒顒兆民蠢蠢戎羶率土充庭萬國奉蕃藩分愆切揚雄甘泉賦雷鬱律于巖窔兮電倐忽于牆藩鬼魅不能自逮兮半長塗而下顛晉陽后文濟濟南陽為屏為藩本枝菴藹四海蔭焉以至潘尼贈陸機詩今子徂東何以贈旃寸晷為寶豈無璵璠讀璠芬邅反左思魏都賦琴髙沉水而不濡時乘赤鯉而周旋師門使火以驗術故將去而林燔讀燔汾乾切曹植名都篇歸來燕平樂美酒斗十千膾鯉臇蝦魚炮鱉炙熊蹯讀蹯汾乾切陸雲寒蟬賦望北林以鸞飛集樛木而龍蟠彰信義于嚴時稟清誠乎自然讀蟠頻眠切此音今皆不復見矣毛傳曰萋斐文章相錯也貝錦錦文也陸璣云貝水介蟲其文彩之異甚衆鄭箋云喻讒人集作已過以成於罪猶女工之集采色以成錦文蘇曰哆侈皆張也陳曰南箕本非箕張大其口以成其名爾貝錦南箕皆曰成是者言我本無是實因萋斐張大以成之爾誰適與謀者非謂果有人與之謀人之常言訝人之巧計則曰誰與之謀而至此也緝緝者讒人細密縷績使人不覺其譖翩翩者或往或來片語翩然而過旁映譖惑使人不覺其讒皆謀欲譖人也雖然亦有患焉王氏曰不慎爾言則聽者有時而悟謂爾不信矣捷捷者讒言敏捷也幡幡者隨風翻覆巧譖順適人意反覆不定之狀如此按樓鑰云幡幡誠有反覆之意然謂之隨風翻覆則是今釋道所立之幡也恐古無此秦已有幡信之書未知幡信起於何時當考王豈不受然天下之理出乎爾者反乎爾爾譖言既行之後他人亦將譖汝將遷移其禍于女驕人讒人得志故好好勞人被讒者惟任勞苦之事草草亂擾之狀呼天曰願天視驕人之所為意欲天禍之矜此勞人覬蒙天之祐也彼譖人者誰適與謀此再言譖辭之巧也畀與也説文豺狼屬狗聲或作豺投拋擲而棄之也豺虎不食者甚言讒人之可惡雖豺虎食人猶惡之不食也毛傳曰北方寒涼而不毛昊昊天也既有北不受而無所歸則曰投畀于昊天乎惡之極無可奈何天下人情人事之極未嘗不歸之天毛傳曰楊園園名畝邱邱名釋邱云如畝畝邱其低平長狹如畝歟猗者倚字之訛歟抑依之音而字非歟楊園之道猗于畝邱寺人孟子之所居也寺人孟子所以敢公然自出其名者寺人親近於王雖被讒其禍未至於不可言歟周禮天官之屬寺人王之正內五人本詩無巷伯之字而名篇曰巷伯者釋宫云宫中巷謂之壼王肅曰今後宫稱永巷是宫內道名也伯長也主宫內道官之長主宫內者皆奄人巷伯是內小臣者以周禮無巷伯之官奄雖小臣為長主巷之伯唯內小臣耳蓋其官名內小臣時人以其職號之稱為巷伯也注疏皆云讒人譖寺人寺人又傷其將及巷伯故以名篇是説太迂曲陳氏曰巷伯寺人之長巷伯即寺人先儒所以不敢以寺人為巷伯者以周禮天官之屬奄官小臣為長寺人內豎皆其次者故不敢以為伯自古拘儒率有此蔽內小臣固奄官之長就寺人之中又自有寺人之長長者亦可稱伯又况伯者特長者之常稱亦不必拘其職之果長非長也寺人掌王正內而稱巷伯者何也得非寺人所常居者在巷聞召呼則入而聽命行事歟毛詩序曰巷伯刺幽王也寺人傷於讒故作是詩也孟子詩情惟惡讒者初無怨王之意而衛宏作序誣之曰刺幽王也小戴記孔子曰好賢如緇衣惡惡如巷伯則爵不瀆而民作願刑不試而民咸服習習谷風維風及雨將恐將懼維豫與女將安將樂女轉棄豫習習谷風維風及頽將恐將懼置豫于懷將安將樂棄豫如遺習習谷風維山崔嵬無草不死無木不萎忘我大德思我小怨補音豫演女切糾繆正俗讀如與谷風釋已見邶之谷風風與雨俱又習習而和人之相與和洽者似之是詩之情謂憂患將至將恐將懼則維豫與女其和洽如此至於將安將樂則汝心轉改而棄豫釋天云焚輪謂之頽諸儒謂暴風從上降下曰頽頽下也然俚俗以頽曰無頭風言其不知所自來多見野外忽然而興衮衮如輪衮塵上奮亦如焚此厲氣所發野人遇此或罵之非上而下也字從秃亦無頭之謂歟大抵詩本旨率於初章見之後章更韻或别起義是章言頽謂其見棄之時暴烈遽如此將恐將懼如置豫于懷中所謂進人若將加諸膝退人若將墜諸淵棄豫如人遺忘物不復加諸意矣維山崔嵬有巖險可畏之狀至於寒風暴烈無草不死無木不萎其中見棄加以暴烈之狀如之忘我大德思我小怨故至於此是詩正而無邪聖人取焉衛宏不明斯道必旁推其説曰刺幽王本詩初無刺王之意宏又曰天下俗薄朋友道絶焉此兩語雖與詩情不乖背然亦贅矣推言風俗亦本詩所無大抵不悟正心之即道故必至於旁推外取先儒多同此蔽蓼蓼者莪匪莪伊蒿哀哀父母生我劬勞蓼蓼者莪匪莪伊蔚哀哀父母生我勞瘁瓶之罄矣維罍之恥鮮民之生不如死之久矣無父何怙無母何恃出則銜恤入則靡至父兮生我母兮鞠我拊我畜我長我育我顧我復我出入腹我欲報之德昊天罔極南山烈烈飄風發發民莫不榖我獨何害南山律律飄風弗弗民莫不榖我獨不卒毛傳曰蓼蓼長大貌韓詩東山蒸在薪亦音六義亦同莪釋見菁菁者莪蒿釋見鹿鳴釋草蒿菣蔚牡菣菣去刃反陸璣云蔚牡蒿也郭璞曰無子者然則莪蒿蔚皆蒿而種不同覩莪之蓼蓼其茂匪莪則蒿以其相類見莪蒿生育長茂因感念父母之生育我也亦劬勞矣此父母已終追感以勞役不得終養故哀哀不已罄盡也王氏曰瓶譬則民也罍譬則君也瓶之罄則罍之恥民之窮則君之羞鮮寡也孤獨之謂也父母亡唯已獨存謂之鮮民人子哀痛有生不如死之心此自古孝子之同心故曰久矣無父何怙無母何恃怙猶恃也怙義尤大出則銜無窮之憂恤入則靡所反面而告至毛傳曰鞠養也鄭氏箋云生者本其氣也顧旋視也復反覆也腹懷抱也孔疏曰母懷妊以養我又拊循我爾雅云鞠生也抱之急亦有拘鞠義拊者愛之至以手輕擊拍之也畜者乳食之也淮南子曰玄田為畜今農人謂黑沙土田生禾特盛異於他田殆黑墳之義然則畜之所以得養義者此歟生養之至於長大父母長之也育亦養義而有積寖默養不覺之意愛我故顧視我復有又義謂每每顧我復亦有反復義匍匐能行稍逺則使之復出則囑之早復日夕則使歸復父母懷抱我以出懷抱我以入曰鞠曰畜曰育義略同析而釋之則如右子哀念父母言之不足而屢言之重復言之欲報父母之德如昊天廣大無極不可得而報也而况於不得終養而今亡矣乎南山烈烈而鳴飄風發發而至北風吹南山寒氣多暴烈或曰虐政如之然而末章律律弗弗則風少殺非烈風矣非喻虐政瓶罄罍恥已微寓其怨此孝子哀痛觸目感傷無非哀痛之辭南山烈烈飄風發發南山律律飄風弗弗皆哀痛之心聲也雖敘所聞覩而哀痛之情自形見于辭氣之間榖善也民之窮苦者多矣而猶曰莫不榖者彼父母存則猶為善也今俗以無禍患曰平善害曷也孟子引湯誓曰時日曷喪而尚書曰害喪則知害通為曷曷何也今俗云曷者甚也此言何我獨罹禍之甚也則知民皆罹困苦矣我獨不得卒養父母此所以為害也毛詩序曰蓼莪刺幽王也民人勞苦孝子不得終養爾本詩怨辭甚微而序曰刺王誣矣悖矣有饛簋飧有救棘七周道如砥其直如矢君子所履小人所視眷言顧之潸焉出涕小東大東杼柚其空糾糾葛屨可以履霜佻佻公子行彼周行既往既來使我心疚有冽氿泉無浸穫薪契契寤歎哀我憚人薪是穫薪尚可載也哀我憚人亦可息也東人之子職勞不來西人之子粲粲衣服舟人之子熊羆是裘私人之子百僚是試或以其酒不以其漿鞙鞙佩璲不以其長維天有漢監亦有光跂彼織女終日七襄雖則七襄不成報章睆彼牽牛不以服箱東有啓明西有長庚有救天畢載施之行維南有箕不可以簸揚維北有斗不可以挹酒漿維南有箕載翕其舌維北有斗西柄之揭熟觀是詩譏王政隳廢貴賤無章而不禮於諸侯之使使者之屬作是詩也而衛宏作毛詩序曰東國困於役而傷於財談大夫作是詩蓋宏考詩之未精也宏序蓋次章之意非其初意也飧者使者始至之禮有鼎飪焉以蓋蒙食曰饛簋有蓋黍稷之器救曲貌七所以載鼎實棘赤心也砥礪石也周道如砥之平如矢之直君子行飧飪之禮小人唯瞻視而已是謂貴賤有章乃天下平直之道今也不然諸侯之使者至王朝之禮缺焉故詩有東人之子職勞不來之譏職猶只也使者唯只勞役於往來而王朝勞來之禮缺也而又曰舟人之子熊羆是裘是小人反侈富僭禮君子反窮困不蒙見禮是不得其平也不得其直也是詩以使者不見禮而作因以譏王賦之重而曰大東小東杼柚其空周居西諸侯皆居東説文曰杼盛緯器也柚所以卷織者貢賦竭盛故曰共空侯國貧困至於以葛屨而履霜糾結為屨葛屨施於暑而可以履霜乎怨辭也其所深痛者則以使而不見禮故反顧周道為之潸然出涕毛傳曰眷反顧也言語助公子使者也佻佻行貌周行周道也釋見卷耳公子往來於道路勞苦使我心疚病是使者之屬憫公子也此以見使者之屬作是詩也釋水氿泉穴出穴出仄出也郭注云從旁出也毛傳同負薪其行勞矣泉又浸之則薪益重負行益勞故人憚之契契者憂思著心今俗語云心放不下契契如提持不下也不寐而寤歎哀我使人畏憚道途故曰憚人穫刈也薪是所穫之薪謂束而薪歟薪重尚可以車而載哀我憚人亦可息也怨不得而息也東諸侯之子則只勞役而不蒙勞來之禮西周之人則粲粲衣服侈富而雍容是不得其平直也舟人賤者而衣熊羆之裘私家之臣百僚備試言周之家臣試用寵愛異常而諸侯之使者獨不禮焉是不得其平直也私家而備百僚亦譏過禮而於使者之禮則不及是不得其平直也西人或當用漿而以酒不以漿其侈如此璲玉也鞙鞙然佩璲曾不以為長而結之有所事則結佩言其常優遊暇佚而東人則常勞役困窮又使至則禮物大缺黍稷稻粱之不充也維天有漢我監視之亦頗有光意謂周王之昏暗又不如漢也織女經星本不動因天運而有襄義襄上也書曰懷山襄陵謂洪水上及陵也又書曰思日贊贊襄哉思贊贊而上去也今俗機織上前謂織而上也日可十餘上今夙興跂望織女星至終日則天運歷七辰故詩人取喻七襄雖則終日七上而不成報贈文章之幣箋亦云自旦至暮歷七辰因謂七襄使者之還當有報幣毛傳曰睆明星貌何鼓謂之牽牛服牝服也箱大車之箱也考工記車人大車牝服二柯有三分柯之二孔疏云甫田乃求萬斯箱書傳曰長幾充箱是謂車內容物之處為箱釋天云何鼓謂之牽牛郭璞云今荆楚人呼牽牛星為擔鼓擔者荷也今毛傳作何鼓其以三星中大旁小居天河之中故曰何鼓歟星類鼗鼓擔持搖擊之二義俱通李巡曰何鼓牽牛皆二十八宿名也孫炎曰何鼓之旗十二星在牽牛北也如李巡孫炎之意則以牽牛何鼓為二星與爾雅異今天文家於何鼓之下别指牽牛與李孫同亦與爾雅異若據毛傳以睆為明星貌則何鼓明大所别指牽牛不甚明大易曰服牛乘馬服者有所事也載任之車牛挽之牽牛之星不以服箱譏饔餼車載之禮物缺也使者當有饔餼之禮甚盛今缺故也使者夙興唯覩東方啓明之星夕息唯覩西方長庚之星此外則缺然也釋天云明星謂之啓明啓通作啓毛傳曰日旦出謂明星為啓明日既入謂明星為長庚庚續也日入明星長在庚方在西之南毛傳曰畢所以掩兔也天上畢星救然而曲徒施之於星次行列之間而已無能掩禽為歸禽羞獻之禮於使者也星取畢弋之畢畢狀如義網施其上箕東方之宿也而曰南有箕者暑月箕星在南夜涼人所熟覩但見其在南故曰箕星以似箕得名不可以簸揚譏所致米莒於使者之禮缺也毛傳曰挹㪺也㪺音拘箕不簸揚而出顧若翕其舌而反之譏王朝惟賦斂諸侯而已歐陽曰斗西其柄反若有所挹取於東也譏意同上四月維夏六月徂暑先祖匪人胡寧忍豫秋日淒淒百卉具腓亂離瘼矣爰其適歸冬日烈烈飄風發發民莫不榖我獨何害山有嘉卉侯栗侯梅廢為殘賊莫知其尤相彼泉水載清載濁我日構禍曷云能榖滔滔江漢南國之紀盡瘁以仕寧莫我有匪鶉匪鳶翰飛戾天匪鱣匪鮪潛逃于淵山有蕨薇隰有把桋君子作歌維以告哀補音豫演汝切曹植文帝誄如何奄忽摧身后土俾我煢煢靡瞻靡顧嗟嗟皇穹胡寧忍豫濁補音厨玉切孺子之歌濁與足叶民歌灌夫曰潁水濁灌氏族劉向九歎濁與俗叶酈炎詩濁與祿叶成公綏嘯賦濁與木叶天補音鐵因切鱣張連反鮪于軌反淵補音一均切旱麓詩鳶飛戾天魚躍于淵愷悌君子遐不作人易林益之小畜曰鴻飛戾天避害于淵雖有鋒門不能危身班固東都賦恥纎靡而不服賤奇麗而不珍捐金于山沈珠于淵豳七月紀月用夏正者敘豳公時事當夏世也此四月六月秋淒淒冬烈烈亦言夏正者作歌之君子勞苦困極直發其情用人情言習用夏正者著之詩也大抵詩多出於常情之所習用故亦多言夏正周禮所謂正歲者亦夏正以人情習用之安有不可易者此詩謂自四月而夏至六月之終而暑往徂往也始終勞苦於炎暑之中先祖非人乎胡寧忍豫而不之祐也至於秋之月淒淒然草木俱痱病而漸黃落愁憂者覩景觸目無非愁憂爾雅釋草云卉草差誤矣爾雅差誤亦多此言百卉俱痱豈獨草病而木不病乎又曰山有嘉卉侯栗侯梅此謂栗與梅為嘉卉也卉者草木之總稱腓者痱之訛歟離離散也時人多離散瘼者疾病之廣莫也亂離疾苦如此於何適歸耶烈烈飄風之聲也亦猶蓼莪南山烈烈飄風發發亦謂烈烈為風聲榖善也民莫不平善我獨罹憂禍何其甚也害甚也詳釋見蓼莪爾雅云維侯也栗梅嘉卉也廢之如殘賊明惟殘賊之人乃當廢今我非殘賊而見廢言栗梅以自況不敢明言自伐託物以喻意惟廢棄故不在朝而逺役是謂不已于行雖得罪而莫知其過尤之為何明無罪而得罪也濁如構禍清如榖善安平相彼泉水猶清與濁雜我則日日構禍構結也純如憂禍曷云能榖更無榖善相間雜也滔滔江漢為南國之經紀意喻已逺役經紀南國之事滔滔有逺行勤勞不已之狀竭盡其力至於瘁病如此仕宦寧莫有我身鶉雕也鳶鷙鳥也匪鶉匪鳶使我得為鶉鳶則將翰飛而往戾天矣我匪鱣匪鮪使我得為鱣鮪則將潛逃于淵矣其畏禍無所逃遁之情如此山有蕨薇隰有把桋皆得安其所言我失所反不如之也作者自稱君子非君子不能作是詩也李曰雕似鷹而大其飛上薄雲漢爾雅曰鳶烏醜其飛也翔釋曰鳶鴟郭曰布翅翺翔鱣鮪釋見碩人把釋見四牡毛傳曰桋赤梀也釋木云桋赤梀白者梀郭璞注云赤梀樹葉細而歧鋭皮理錯戾好叢生山中中為車輞白梀葉員而歧為大木也衛宏作毛詩序以為大夫刺幽王也在位貪殘下國構禍怨亂並興焉宏此序雜然非情徒見言南國故曰下國構禍見言殘賊故曰貪殘其實辭旨不然
