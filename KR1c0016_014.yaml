body:
  text: 慈湖詩傳卷十四宋楊簡撰小雅四陟彼北山言采其把偕偕士子朝夕從事王事靡盬憂我父母溥天之下莫非王土率王之濵莫非王臣大夫不均我從事獨賢四牡彭彭王事傍傍嘉我未老鮮我方將旅力方剛經營四方或燕燕居息或盡瘁事國或息偃在牀或不已于行或不知叫號或慘慘劬勞或棲遲偃仰或王事鞅掌或湛樂飲酒或慘慘畏咎或出入風議或靡事不為補音賢下珍切劉向校列子録云字多錯誤以賢為形荀卿成相篇曷為賢明君臣上能尊主愛下民又曰堯讓賢以為民汜愛兼德施均賦篇或厚或薄帝不齊均桀紂以亂湯武以賢三略軍䜟羣吏朋黨各進所親招舉奸枉抑挫仁賢史記叙傳莊王之賢乃復國陳又曰子産之仁紹世稱賢漢書公孫叙傳既登爵位禄賜頤賢布衾蔬食用儉飾身何王叙傳哀平之䘏丁傅莽賢武嘉戚之乃喪厥身議魚羈切論也糾繆正俗或問曰今人讀議為宜得以通否答曰詩云或出入風議或靡事不為故知議有宜音東方朔七諫髙陽無故而委塵兮唐虞㸃灼而毁議誰使正其真是兮雖有八師而不可為崔駰逹㫖行有枉徑而我弗隨臧否在予唯世所議今釋氏亦有宜音李曰把枸把也左傳昭十三年我有囿生之把杜預注云世所謂枸把者行役于外采把而食偕偕士子則與士子偕行者不一也次章怨大夫之不均以大夫秉政役使士子不均也周官所謂卿者正大夫也然則作詩者士歟而衞宏作毛詩序曰大夫刺幽王宏攷詩鹵莽率類此靡盬解見四牡不獲侍養故憂父母孟子荀子左氏皆作普天之下吕曰古無濵字説文作瀕徐鉉謂俗作濵非也王氏曰取數多謂之賢禮記曰某賢於某若干與此同義孔叢子曰我從事獨賢勞事獨多也出小爾雅廣訓篇彭彭盛貌傍傍多貌言不獨一事又旁出故曰傍傍鮮善也將壯大也嘉我未老善我方壯大旅力方剛可以經營四方詩人之意謂雖嘉我使我而不均也怨其心不愛我也故具言不均之狀於下朱曰旅與膂同毛傳曰叫呼號召也吕曰深居安逸雖外之叫呼亦不知也棲謂安止遲謂遲久言其安止無為者久也偃卧則仰矣與息偃同重言者協韻故也左傳僖二十八年晉車七百乘韅靷鞅靽杜注云在背曰韅在胷曰靷在腹曰鞅在後曰靽此詩士子其職卑矣其鞅在掌方駕車馬故任此勞故世以煩勞為鞅掌按樓鑰曰毛氏曰鞅掌失容也孔氏曰鞅掌煩勞之狀只須用孔説今説頗迂韅靷鞅靽皆在馬之身維轡則在御者之手鞅既在馬腹如今之肚兠不應在人之手掌也議則有所辯難風者譏風也有所譏而不切之謂風亦從容和緩之狀無將大車祗自塵兮無思百憂祗自疷兮無將大車維塵冥冥無思百憂不出于熲無將大車維塵雝兮無思百憂祇自重兮疷音祈補音眉貧切劉氏七經小傳云博士讀疧為邸非也疷當為病也字誤爾桑柔詩􅢌武巾切一音昏集韻與珉同亦訓病字書民與氏多互用如緡與緍皆音民恐此詩本作􅢌讀如珉或疧亦自有珉音補音冥莫迥切集韻正引此詩晉樂志地郊饗神歌冥㝠與景叶至傅咸賦毛詩云無將大車維塵冥冥濟濟多士文王以寧又讀為平聲熲古迥反是詩譏不明而近小人雖憂無益也而衞宏作毛詩序曰大夫悔將小人非也使其果悔則明矣不止于熲則憂思為有益矣何以曰祇自塵自疷自重鄭氏箋云大車載任之車孔疏云其車駕牛酒誥曰肇牽車牛逺服賈是詩言無近小人近小人適以累已大車載任小人之事故以比小人車大則塵多祇只也祇只職一音而記者不同其義同自塵塵汙已也智之不明者雖深思百其憂適足自病其不明如故疷病也小人之不可近明者無疑焉不明者惑於小人之小善寸能惑而任之及其敗事誤已雖憂思至於百不出于熲之小明所見終不逺所行所任無以異於初謂之冥冥可也雝擁也塞也當作􅤶音雝豈古借音耶今京語謂擁為雝聲音輕清故也箋云重猶累也明明上天照臨下土我征徂西至于艽野二月初吉載離寒暑心之憂矣其毒大苦念彼共人涕零如雨豈不懐歸畏此罪罟昔我往矣日月方除曷云其還歲聿云莫念我獨兮我事孔庶心之憂矣憚我不暇念彼共人睠睠懐顧豈不懐歸畏此譴怒昔我往矣日月方奥曷云其還政事愈蹙歲聿去莫采蕭穫菽心之憂矣自詒伊戚念彼共人興言出宿豈不懐歸畏此反覆嗟爾君子無恒安處靖共爾位正直是與神之聽之式穀以女嗟爾君子無恒安息靖共爾位好是正直神之聽之介爾景福除音余莫音暮補音暇胡故切賈誼鵩賦閒暇與故叶張衡東京賦府庫與未暇叶七辯閒暇與束素叶奥子六反補音戚子六反左氏傳作蹙釋名戚蹙也説文蹙以戚得聲集韻戚蹙皆子六反太元親首孚于肉其志資戚明明上天照臨下土窮困者呼天謂天必照知我之憂勞蘇曰艽地名也毛傳曰艽野逺荒之地初吉朔日也鄭箋云征行徂往也鄭謂以二朔始行非也至于艽野之日適當二月初吉也此二月周二月建丑之月也大寒之月寒苦之極故首章言之其始行乃日月方奥之時非二月初吉自初往方暑至是大寒故曰載離寒暑離罹也先寒而後暑者便文也憂勞至甚故謂之毒且曰大苦共人謂周盛時在位恭敬之人我念之涕零如雨意謂使共人今在位為政則必相好必不使我至於此極今豈不念歸畏此罪罟罟網也言其網宻無所逃罪昔我往矣日月方余除者字之訛歟爾雅曰四月為余鄭箋此詩云四月為除除字義不可施於建已之月除其余乎萬物繁盛曰余昔往之時豈謂歲暮方還乎周禮兼用正歲正歲夏正也歲暮丑月之終乎以二月初吉至艽野二月丑月也則還之時云歲莫者丑月之終乎於正歲為歲莫矣此詩士大夫所作故言二月用周正至言歲莫則人言習熟故云歟念我一身獨兮而我所任之事則甚庶而衆心之憂矣憚而畏焉誠無小暇此心睠睠反顧昔之共人豈不懐歸皆追言在道未還之時奥煖也建巳之月時也昔往之時政事雖已蹙急猶未至於甚豈謂其還而政事愈蹙急乎况歲莫又有采蕭穫菽之勞心之憂矣念自詒伊戚也詒遺也蓋悔其仕於亂國而不能去乃自取此憂戚也念彼共人必不肯仕於亂國故興言出宿興起也言語助也於是勇作于中而决其去而出宿焉豈不懐歸舊廬畏成反覆既已去國而復焉反覆可笑可鄙亦且獲罪大抵優柔寡勇之人自有進退之念而亦能知其不可而終於决去於是嗟歎而告未能去之君子曰無如他恒安處而已勉之使去君子雖靖共爾位又必惟正直是與乃可今亂國非正直也爾勿謂我靖共於位亦足免咎咎未必免苟去亂國而親正直則神聽之更善於女式更也穀善也謂有善祥以貽女也末章申言之爾雅介景皆大也然介亦有助義景亦有明義毛詩序曰小明大夫悔仕於亂世也詩言采蕭穫菽殆士也曰出宿則去之矣不止於悔而已也鼓鐘將將淮水湯湯憂心且傷淑人君子懐允不忘鼓鐘喈喈淮水湝湝憂心且悲淑人君子其德不回鼓鐘伐鼛淮有三洲憂心且妯淑人君子其德不猶鼓鐘欽欽鼓瑟鼓琴笙磬同音以雅以南以籥不僭補音喈喈居奚切徐幹齊都賦磬管鏘鏘鐘鼓喈喈制度之曲非衆所奇湝湝戸皆反補音弦雞切後漢謠諧不諧在赤眉周澤傳時人語曰生世不諧作太常妻僭子心反聲輕清故有此平音孔疏曰鼓擊也王氏曰幽王鼓鐘于淮水之上為流連之樂久而忘反故人憂傷李曰言今我思古之善人君子念而信之未嘗忘也允信也毛傳曰回邪也鼛大鼓也吕曰淮有三洲作詩者賦其當時所見也周禮鼓人以鼛鼓鼓役事注云鼛鼓長丈二尺韗人云臯鼓長尋有四尺孔疏云鼛即臯也蘇曰水落而洲見也妯者其抽之音而字訛歟憂之切者如抽焉不猶不若是也蘇曰雅二雅南二南也樂先金奏次歌管象而夏籥序興然則籥居後歟不僭差不相奪倫也籥釋見簡兮爾雅釋樂大瑟謂之灑邢疏云郭云二十七弦未見所出禮圖舊云雅瑟長八尺一寸廣一尺八寸二十三弦其常用者十九弦其餘四弦謂之番番贏也頌瑟長七尺二寸廣一尺八寸二十五弦盡用之熊氏云瑟兩頭有孔其在底下者名越樂記云清廟之瑟朱弦而疏越釋樂云大琴謂之離郭注云或曰琴大者二十七弦未詳長短廣雅曰琴長三尺六寸六分五弦爾雅邢疏云文王武王加二弦為少宮少商釋樂云大磬謂之毊郭注云毊形似犂錧以玉石為之禮記云女媧之笙簧釋樂云大笙謂之巢小者謂之和郭注云列管匏中施簧管端大者十九簧小者十三簧鄉射記曰三笙一和而成聲毛詩序曰鼓鐘刺幽王也楚楚者茨言抽其棘自昔何為我蓺黍稷我黍與與我稷翼翼我倉既盈我庾維億以為酒食以享以祀以妥以侑以介景福濟濟蹌蹌絜爾牛羊以往烝嘗或剝或亨或肆或將祝祭于祊祀事孔明先祖是皇神保是饗孝孫有慶報以介福萬壽無疆執爨踖踖為俎孔碩或燔或炙君婦莫莫為豆孔庶為賔為客獻酬交錯禮儀卒度笑語卒獲神保是格報以介福萬壽攸酢我孔熯矣式禮莫愆工祝致告徂賚孝孫苾芬孝祀神嗜飲食卜爾百福如幾如式既齊既稷既匡既敕永錫爾極時萬時億禮儀既備鐘鼓既戒孝孫徂位工祝致告神具醉止皇尸載起鼓鐘送尸神保聿歸諸宰君婦廢徹不遲諸父兄弟備言燕私樂具入奏以綏後禄爾殽既將莫怨具慶既醉既飽小大稽首神嗜飲食使君壽考孔惠孔時維其盡之子子孫孫勿替引之祀補音周官以血祭社稷五祀又保郊祀于社鄭氏皆云故書祀作禩字書凡有異音者多以異得聲易林巽之蹇曰磝磽白石按原本訛作磝磝不生黍稷無以供祭靈祗乏祀祊補彭反補音蒲光切旁也説文􅤶从示彭聲門内祭詩祝祭于􅤶又曰􅤶或從方彭與旁同慶補音蕭該漢書音義慶音羌又曰今漢書亦有作羌者班固幽通賦慶未得其云已漢書作慶文選作羌周易乃終有慶與疆叶必有餘慶與殃叶中正有慶與光叶中有慶與剛叶大有慶與當叶亦與光叶往有慶與光叶亦與亡叶太元廷人不慶與裳叶于謙有慶與疆叶得不慶與明叶體不慶與疆叶韓愈劉統軍銘提將之符尸我一方配古公侯維德不爽我銘不忘後人之慶明謨郎切爽師莊切碩補音常約切太元斷首我心孔碩乃後有鑠炙補音陟畧切枚叔七發膾炙與錯字帛字席字叶帛僕各切席祥龠切格補音説文格从木各聲考古圖鐘鼎篆王格大廟字皆作各史記沮誹注格廢格明詔廢格沮事劉伯莊皆音各漢書太后議格顔師古音各善格五孟康音各凡格少用今各頟切一音者愆補音起巾切韓愈祭兄文愆與親墳恩原文叶原魚倫切柳宗元閔生賦愆與聞叶補音位力入切左思魏都賦量寸旬㳙吉日陟中壇即帝位江文通詩英俊著世功多士濟所位眷顧成綢繆廼與時髦匹曹植禹贊舜將崩殂告天禪位虞氏既没三年禮畢按原本四句脱王融太子文辯域展圖揚龜獻吉文物充階具僚在位周官建國之神位故書位作立鄭司農立讀為位古者立位同字古文春秋公即位為公即立鄭箋云茨蒺藜也蓋用爾雅釋草文郭璞注云布地蔓生細葉子有三角刺人朱曰抽謂其條抽發王氏曰今棘茨所生乃自昔我蓺黍稷之地毛傳曰露積曰庾甫田云曾孫之庾如坻如京周語云野有餘積其俗所謂囤歟四旁及上維結以藁而覆之惟不屋爾箋云十萬曰億毛傳曰妥安坐也侑勸也箋云介助也孔疏云迎尸使處神坐而食於是拜以安之是妥也為其嫌不飽祝以主人之辭勸之是侑也箋云冬祭曰烝秋祭曰嘗祭祀之禮各有其事有解剥其皮者有煮熟之者有肆其骨體於爼者有奉持而進之者釋宫云閍謂之門郭注引詩曰祝祭於祊禮器曰設祭于堂為祊乎外祭統曰詔祝於室而出於祊郊特牲曰直祭祝于主索祭祝于祊祭于祊尚曰求諸逺者與家語髙子臯曰周禮繹祭於祊祊在廟門之西而毛傳曰祊門内也不知何所據而鄭箋同之毛傳曰保安也皇者尊大之也孝孫尊大先祖之誠於是乎著神安是饗報以大福使孝孫萬壽無疆是為有慶此先祖嘏其孝孫之辭介有大義者以古者字畫大字與介字相似故通用歟劉曰孝孫謂天子也毛傳曰爨饔爨廩爨也燔取膟膋炙炙肉也箋云燔燔肉也炙肝炙也皆從獻之爼也君婦謂后也祭祀之禮后夫人主共籩豆孔疏云祭祀之禮饔爨以煮肉廩爨以煮米執爨竈之人踖踖敬慎邱曰為爼孔碩謂載牲體於爼甚大也孔疏云燔者火燒之名炙者逺火之稱毛傳曰莫莫清静敬至也孔疏云九嬪贊后薦徹豆籩是后主供籩豆此言為豆孔庶不言籩者爾雅云竹豆謂之籩亦豆也孔甚也庶衆也箋云始主人酌賔為獻賔既酌主人主人又自飲酌賔曰醻至旅而交錯以徧卒盡也古者於旅也語毛傳曰格來酢報也東西為交邪行為錯度法度也先祖嘏孝孫以萬壽所以報酢孝孫也説文曰熯乾貌蘇曰行禮既久筋力竭矣陳曰勞而乾竭蘇曰式禮莫愆敬之至也莫無也簡謂式更也雖熯乾勞竭更能於禮無愆毛傳曰善於其事曰工賚予也工祝致先祖所告之辭徃賚孝孫曰爾致孝於祀其物苾芬馨香神嗜爾之飲食已卜知爾百福如先祖所期如孝子孝孫所當得之式幾期也毛鄭皆曰期齊者五齊之齊稷者黍稷之稷言稷則黍舉矣稻粱亦從之矣協韻故止云稷既有齊既有黍稷又匡整又敕而敬正此即天下極至之道此心不改則極亦無失永錫爾極非以極與之也人心自善自中自正自順自清明自神自廣大即此孝祀之心是已即此匡整敬正之心是已不必求諸幽逺髙深而此已臻其極人能自信此心之即極勿動而改則何失之有何不永之有永錫之為言猶曰使之永保之云爾獲極則獲福是萬是億無不富矣祝傳致嘏辭當在旅醻交錯之先而至是乃言者前已言介福萬壽此又申言其詳箋云鐘鼓既戒戒諸在廟中者以祭禮畢孝孫往位堂下西面也毛傳曰致告告利成利成謂利養之禮已成也此工祝自致告於尸也而箋謂致孝孫之意告尸以利成則悖矣非孝孫所當言也具皆也於是尸皆醉矣於是載起箋云載則也神安然而歸保安也鄭謂歸於天非也鄭不知神所歸也然則神何歸也曰無往而非歸也知心則知神矣此心無體孔子猶曰莫知其鄉而康成曰歸天陋甚矣孔子曰孝弟之至通於神明光於四海無所不通又曰哀樂相生是故正明目而視之不可得而見也傾耳而聽之不可得而聞也又曰風雨霜露無非敎也庶物露生無非敎也學者悟何思何慮之心則不疾而速不行而至人皆具此神無死生之異無往來之殊矣箋云廢去也尸出而可徹諸宰徹去諸饌君婦籩豆而已不遲遲則慢矣箋謂以疾為敬則太甚特不可稽遲非謂欲疾也毛傳曰燕而盡其私恩箋云祭祀畢歸賔客之爼同姓則留與之燕所以尊賔客親骨肉也無有怨者而皆慶君是其歡也後禄者祭之後凡百不失其道則不失福箋云同姓之臣燕已醉飽皆再拜稽首曰神歆嗜君之飲食使君壽考此其慶辭惠順也又稱贊其君曰甚惠惠有慈義孔甚也孔時祭不失時也君則皆盡之願子子孫孫勿替廢而引長之引長不斷絶之謂毛詩序曰楚茨刺幽王也政煩賦重田萊多荒饑饉降喪民卒流亡祭祀不饗故君子思古焉然是詩辭氣頗不迫切疑非幽王時人心或平王時詩歟有黍離之意焉然關雎不言太姒此不必深辯信彼南山維禹甸之畇畇原隰曾孫田之我疆我理南東其畝上天同雲雨雪雰雰益之以霡霂既優既渥既霑既足生我百穀疆埸翼翼黍稷彧彧曾孫之穡以為酒食畀我尸賔壽考萬年中田有廬疆埸有瓜是剝是菹獻之皇祖曾孫壽考受天之祜祭以清酒從以騂牡享于祖考執其鸞刀以啟其毛取其血膋是烝是享苾苾芬芬祀事孔明先祖是皇報以介福萬壽無疆甸補音地鄰切邱甸也周官掌令邱乘田之政令按原本脫田字注云四邱為甸讀與維禹敶之之敶同古陳作敶劉劭瑞龍賦按原夲劭誤作昭有蜿之龍來遊郊甸應節合義象德效仁補音既渥烏谷切説文從水屋聲陸機漢祖功臣頌彤雲晝聚素靈夜哭金精仍頽朱光以渥左思呉都賦伊兹都之函宏傾神州而韞櫝仰南斗以斟酌兼二儀之優渥嵇康琴賦優渥與屬叶易林臨之明夷優渥與斛叶彧音郁補音於逼切盛貌説文作水流也從川或聲孫愐于逼切玉篇作彧𨽻變作彧别音於六切毛詩序謂君子思古之詩是也而謂刺幽王則未可知也亦安知非他王詩董曰南山終南山也鄭箋云信乎彼南山之野禹治而邱甸之六十四井為甸甸方八里居一成之中成方十里出兵車一乘論語曰禹盡力乎溝洫墾闢而勻之使平曰畇畇曲禮曰曾孫某侯某諸侯五廟而曰曾孫者雖元孫來孫以至於無窮皆稱曾孫曾重也武成曰惟有道曾孫周王發而毛傳謂曽孫為武王則似不可必矣王氏曰疆者為大界理者衡從其溝塗古者一畝三甽甽長終畝隨地勢之所宜而或南之或東之雲色同則下雪雨下也雪為豐年之兆毛傳曰小雨曰霡霂益之以霡霂俗以雨繼雪為善以日繼雪為未善詩意亦或以是歟而鄭箋謂春而益之以小雨潤澤則饒洽毛傳曰埸畔也兩畔有疆埸如羽翼然毛傳謂讓畔其説鑿矣彧彧茂盛貌種曰稼斂曰穡畀與也謂薦之尸與賔致孝有禮故尸嘏曾孫曰壽考萬年受天之祜箋云中田田中也農人作廬焉以便其田事於畔上種瓜毛傳曰剝瓜為菹也箋謂清為元酒未安此清酒固非三酒之清酒三酒最卑諸臣之所酢也此所謂清酒者雖五齊亦就中取其清者薦之商頌亦曰清酤必非三酒中之清酒毛傳曰用騂牡周尚赤也而周禮地官牧人云凡陽祀用騂牲隂祀用黝牲望祀各以其方之色也牲祭生必用牡故詩又曰廣牡犉牡白牡書曰元牡孔疏云鸞即鈴也謂刀環有鈴鄭箋云膋脂膏也郊特牲曰取膟膋燔燎冬祭曰烝烝盛也此以其盛者言也餘釋見楚茨倬彼甫田歲取十千我取其陳食我農人自古有年今適南畝或耘或耔黍稷薿薿攸介攸止烝我髦士以我齊明與我犧羊以社以方我田既臧農夫之慶琴瑟擊鼓以御田祖以祈甘雨以介我稷黍以穀我士女曾孫來止以其婦子饁彼南畝田畯至喜攘其左右嘗其㫖否禾易長畝終善且有曽孫不怒農夫克敏曾孫之稼如茨如梁曾孫之庾如坻如京乃求千斯倉乃求萬斯箱黍稷稻粱農夫之慶報以介福萬壽無疆有補音羽軌切敏補音母鄙切説文從文每聲漢書敘傳宣之四子淮陽聰敏舅氏籧篨幾陷大理按原本理字脱嵇康琴賦器冷絃調心閒手敏觸􅔊如志惟意所擬何晏景福殿賦其祐伊何宜爾孫子克明克哲克聰克敏子奬里切倬髙也言禾之茂而長也齊甫田毛傳曰甫大也古者六尺為步步百為畝以今二百四十步一畝推之則古百步之畝歲得禾百秉秉把也十畝千秉百畝十千秉一夫之田歟歲豐有餘積故猶得取其陳以食農人農人壯者則取新以養老歟不獨今有年自古有年諸儒咸以今適南畝為成王之時殊未安毛傳初不以為成王亦無思古之説自衞宏作序曰甫田刺幽王也君子傷今而思古焉康成惑於序説故以今為成王孔疏同之其實牽合文理不然殆平王之時歟平王末年春秋始作東遷之初禍難之餘宜恐尚遵周禮當有此詩宏序差謬多矣康成不知序乃宏作謂序作於毛公之先故尊信之又康成不善屬文故於此牽合今適南畝平王之時歟毛傳曰耘除草也耔雝本也介其届字之訛歟詩若是之類多届至也烝衆也周官自鄙師酇長里宰皆士也鄰長亦不命之士歟鄙師各掌其鄙之政令祭祀其祭也宜衆士在焉髦俊也衆髦士皆至而止也朱曰齊與粢同曲禮曰稷曰明粢此言齊明便文以協韻爾祭法曰共工氏之霸九州也其子曰后土按原本脫九州也其四字今校補能平九州故祀以為社昭公二十九年傳曰共工氏有子曰句龍為后土后土為社郊特牲曰八蜡以祀四方四方年不順成八蜡不通以謹民則也順成之方其蜡乃通所謂方者蜡祭歟毛傳曰田祖先嗇也鄭箋云御迎介助也設樂以迎祭先嗇周禮籥章凡國祈年于田祖龡豳雅擊土鼓以樂田畯爾雅釋言云畯農夫也孫炎曰農夫田官也穀者粒食之稱曾孫釋見信南山曾孫來止王視農事也王肅曰農夫務事使其婦子并饁饋也田畯於是至而喜攘郤其左右而嘗其所饁之㫖否毛傳曰易治也長畝竟畝也朱曰有猶多也終善且有又言其後秀實而所穫多也詩之所敘不止於一時并敘其終也孟子曰春省耕秋省斂曾孫省斂以其善有而不怒曾孫不怒由農夫克敏於事其有無水旱之灾以荒惰而所穫無幾者則王將怒之矣今不怒知農勤有年箋稼禾也有槀者茨屋蓋也毛傳曰梁車梁也京髙邱也孟子曰十二月輿梁成水上之横橋也稼之髙茂如梁庾釋見楚茨庾殆即今之囤不屋其髙如京稍低者坻鄭箋云坻水中之髙地本秦風蒹葭釋邱云絶髙謂之京箋云求千倉以處之萬車以載之箱者車中容物之處其言曾孫之稼蓋以王者兼統凡萬民之稼皆曾孫之稼也故末章曰黍稷稻粱農夫之慶言萬民也農以有年為慶此箱言萬倉言千者公賦也倉穟古道也穟能養粟其逺者則為粟益逺者則為米地官倉人惟言粟入殆舉其中而通上下歟黍稷稻粱備叙四者報以介福萬壽無疆者以社以方之嘏辭歟介大也孔疏云報我農夫以大大之福使之得萬年之壽無有疆境按少牢饋食禮嘏辭亦曰萬年今則萬年唯可施於天子自宰相以下不得稱矣古今異禮大田多稼既種既戒既備乃事以我覃耜俶載南畝播厥百榖既庭且碩曾孫是若既方既皁既堅既好不稂不莠去其螟螣及其蟊賊無害我田稺田祖有神秉畀炎火有弇淒淒興雨祈祈雨我公田遂及我私彼有不穫稺此有不斂穧彼有遺秉此有滯穗伊寡婦之利曾孫來止以其婦子饁彼南畝田畯至喜來方禋祀以其騂黑與其黍稷以享以祀以介景福覃音潭弇音奄毛詩作有渰萋萋吕氏春秋引詩曰有晻萋萋興雨祈祈雨我公田遂及我私注曰晻隂雲也熟觀此詩非刺詩而衞宏作毛詩序以為刺幽王非也宏謬誤良多奚止此是詩殆平王時詩歟類甫田次瞻彼洛矣宛然平王之詩也宏蓋拘于孟子詩亡然後春秋作歟春秋作于平王之末年餘釋見甫田大田者彌望平逺闊大大田多稼者言豐年大槩既種既戒以下乃從初次第敘之種者藏其種也戒者父老戒其子弟相與告戒農事也甚多曲折萬狀所戒亦不一其事無所不備覃者深也耜宛然有微深之狀故曰覃耜葛之覃兮葉大而蔓墜有深意實覃實訏后稷呱音深廣也覃及鬼方因深生廣義今俗謂墜下曰覃又謂善没者深入曰覃水之深曰潭加水以别其字簟文如水一方如潭故加竹去水而異其音歟毛傳殆未親見耜徒見易有剡木為耜之義故以覃為利後儒求其説而不獲靡然從之又轉音為剡又轉字䎦字義如此類因古傳注而浸訛者甚多今不得已正是字義平聲如字王曰俶始載事也堂下門内之地曰庭禾穟白實宻比平偃視之若平地而白庭似之故曰庭以田疇廣大成實故曰碩歟王心順焉故曰曾孫是若曾孫釋見信南山穀之狀似楞楞亦可以言方亦有楞方不著而渾然如皁實者皁實外皮無楞釋草云稂童粱郭璞曰似莠殆非也莠與良苗異類凡草之莠于田間者皆莠也其童苗非其所種弱不能實徒取地力當耘除者稂也謂其實良禾而童稺無所成也毛傳曰食根曰蟊食節曰賊釋蟲云食心螟食葉蟘食節賊食根蟊郭璞直以蟲食所在為名陸璣疏云螟似子方而頭不赤螣蝗也賊似桃李中蠧蟲赤頭身長而細耳或説云蟊螻蛄也犍為文學曰此四種皆蝗也實不同今或者又以所親見而言曰食苗心者白而稍長如蠧書食葉者其蟲以所出之糞包身為衣時露首食苗其食苗節之蟲似食心之蟲不白而微長殆一蟲也食根者螻蛄又禾將實初花時有蟲食焉似螢而微大人名之曰天所謂賊者豈是歟或多見食苗葉者䗘蜢蝗類也大抵未至于堅實則亦可以言稺蟲多投火而死農人謂田祖有神如神秉執害稼之蟲而畀付于炎火之中焚之也飛蟲赴炎䗘蜢為多彼無翼者固不能飛秉畀炎火謂䗘蜢蝗類爾韓詩作有弇淒淒吕氏春秋作有晻萋萋釋文云漢書作黤祈祈雲興貌世以雲興曰雨至則曰興雨亦可孟子曰詩云雨我公田遂及我私惟助為有公田由此觀之雖周亦助也孟子亦意之爾非確然之辭也孟子尚誤以禹排淮泗而注之江此云雖周亦助亦誤爾公田者間田敘次役民耕而藝之者民愛公上故有先公後私之語私私田也民所受之田也平王初年避難東遷恐懼勤政民心本善宜有此辭蝗畏雨此繼秉畀炎火之後其謂是歟蝗即䗘蜢盛而害稼甚則曰蝗蝗于稼將熟則為害又稼將實尚需一雨者不必謂洗蝗而云也稺禾不堅好故不穫而他日稍有實則寡婦取焉孔疏云彼處有不穫之稺禾此處有不收斂之穧束又彼處有遺餘之秉把此處有滯漏之禾穗此皆主不暇取維是寡婦之所利曾孫來止王省民之斂也農人務事使其婦子並饁歸南畝田官于是至而喜喜其多稼庭碩也來方禋祀者以社以方之方也謂順成之方其蜡乃通也牧人之職陽祀用騂牲隂祀用黝牲國語内史過曰精意以享禋也騂黑異祀祀不止于一也豐年烝畀祖妣以洽百禮享人鬼祭天神地祇四望以享以祀通言祭祀也以大景明之福神之所嘏也降福明著之謂景瞻彼洛矣維水泱泱君子至止福禄如茨韎韐有奭以作六師瞻彼洛矣維水泱泱君子至止鞞琫有珌君子萬年保其家室瞻彼洛矣維水泱泱君子至止福禄既同君子萬年保其家邦王氏曰洛水東都所在也毛傳以為洛宗周溉浸水者蓋以夏官職方氏河西曰雍州其浸謂洛故以為宗周鎬京之溉浸水孔安國云漆沮一名洛水然君子至止有平王遷洛之義以作六師有平王避難遷洛作六師脩禦備之意君子萬年保其家邦以新遷詩人祈祝之辭也是詩言大體溉浸小水不足以入詠衞宏因毛傳遂以為刺幽王殊未安也以關雎不言太姒則餘詩固不必辯其為何人何世之詩因毛衞差誤不得不辯福禄如茨草之繁盛既同謂朝野安平皆受福禄也王氏曰周官凡有兵事韋弁服先儒以為左傳所謂韎韋之跗注是也吕曰此詩所謂洛指東都也齊人名蒨為韎韐鄭箋云茅蒐韎韐聲也孔疏云奭然而赤毛傳曰鞞容刀鞞也琫上飾珌下飾也天子玉琫而珧珌諸侯璗琫而璆珌大夫鐐琫而鏐珌士珕琫而珕珌裳裳者華其葉湑兮我覯之子我心寫兮我心寫兮是以有譽處兮裳裳者華芸其黄矣我覯之子維其有章矣維其有章矣是以有慶矣裳裳者華或黄或白我覯之子乘其四駱乘其四駱六轡沃若左之左之君子宜之右之右之君子有之維其有之是以似之按此篇永樂大典缺卷
