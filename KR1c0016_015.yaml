body:
  text: 慈湖詩傳卷十五宋楊簡撰小雅五交交桑扈有鶯其羽君子樂胥受天之祜交交桑扈有鶯其領君子樂胥萬邦之屏之屏之翰百辟爲憲不戢不難受福不那兕觥其觩旨酒思柔彼交匪敖萬福來求毛詩序謂是詩刺幽王也亦未必然或規風平王歟詩辭無痛切之意不則幽王初年歟桑扈竊脂也詳釋見小宛交飛之多故曰交交毛傳曰鶯然有文章胥相也君子之相交雖盡其歡樂而禮文無缺如桑扈之有文故受天之祜毛傳曰領頸也更韻故更辭爾君子相交相樂而不失其禮故足以為萬邦之屏衞大抵得乎禮者其致利不一而足禮生于心心正則國正天下正不特萬邦賴之為屏而已又如翰然興起人心興起治道百辟咸取法焉憲法也然其本原生於王心之不放逸戢斂不放逸也難却不祥也凶惡之事將累已却之不受猶儺也難儺字同惟戢惟難故動靜云為無非道無非禮其受福多那多也不戢不難則受福不多此有所風也言受福不那其風平王情狀則著鄭箋云兕觥罰爵也古王者與羣臣燕飲上下無失禮其罰爵徒觩然陳設而已其飲旨酒思和柔不為傲也罰爵之設所以致其戒也彼君子相交相樂不以傲慢故萬福隨之我不求福而福自來求我矣是章規風之意明矣當時燕飲有傲者歟鴛鴦于飛畢之羅之君子萬年福祿宜之鴛鴦在梁戢其左翼君子萬年宜其遐福乘馬在廏摧之秣之君子萬年福祿艾之乘馬在廏秣之摧之君子萬年福祿綏之鴛鴦甚美而得賢材似之畢之羅之得賢也得賢則無所不利夀考福祿咸隨之矣在梁者不飛而止戢其左翼優游安止之態亦喻得賢也馬亦喻賢材在廏亦喻得賢摧之秣之喻養賢也艾耆老也綏安也得賢為輔德修政行民安氣和無所不宜詩人愛敬稱頌無所不極其至以魯僖公而頌之備極其美平王初遷恐懼亦有賢輔宜有此詩此詩辭氣無傷今思古之意而毛詩序以為思古之詩且云刺幽王殊未安有頍者弁實維伊何爾酒既旨爾殽既嘉豈伊異人兄弟匪他蔦與女蘿施于松柏未見君子憂心奕奕旣見君子庶幾說懌有頍者弁實維何期爾酒旣旨爾殽旣時豈伊異人兄弟具來蔦與女蘿施于松上未見君子憂心怲怲旣見君子庶幾有臧有頍者弁實維在首爾酒旣旨爾殽旣阜豈伊異人兄弟甥舅如彼雨雪先集維霰死喪無日無幾相見樂酒今夕君子維宴補音柏逋莫切楚辭九歌柏與若叶并作字叶易林鼎之泰柏與落字樂字叶蹇之訟柏與薄字樂字叶何劭遊仙詩柏字與落字叶奕弋灼反說懌弋灼切孫莫榮啟期贊榮心温雅旣夷按原本誤作怡旣懌濁以徐清寂然淡泊陸雲喜霽賦懌與作叶毛傳云頍弁貎弁皮弁也說文云頍舉頭也玉藻云天子皮弁以日視朝諸侯燕羣臣之禮諸侯朝服用之今毛傳謂王皮弁者謂王亦以朝服燕也孔疏云弁者冠之大名稱弁者多矣爵弁則士之祭服韋弁則服以即戎冠弁則服以從禽非常服也惟皮弁上下通服之周禮有韋弁無爵弁書與冠禮有爵弁無韋弁則知爵弁即韋弁歟毛傳曰蔦寄生也女蘿莵絲松蘿也釋草無蔦惟曰唐䝉女蘿女蘿莵絲郭注云别四名詩云爰采唐矣釋文云在草曰莵絲在木曰松蘿陸璣疏云蔦一名寄生葉似當盧子如覆盆子赤黑甜美莵絲蔓連草上生黄赤如金今合藥莵絲子是也非松蘿松蘿自蔓松上生枝正青與莵絲異頍然之弁服之在首者伊何而服之也所以燕兄弟甥舅也爾酒旣旨爾殽旣嘉其㣲情謂所少者惟愛敬爾今俚語曰非别人蓋親之之辭也此言非他人兄弟也謂同姓異姓之親也蔦與女蘿施于松柏喻同姓異姓之親皆依託於王王宜善撫之愛敬之彼其未見王也憂心奕奕怲炳憂王憂國今旣見君子庶幾悅懌庶幾有臧善也乃不臧善君子王也不悅不善謂傲慢無禮也何期何時也燕禮之時兄弟俱至豈宜有不悅不臧也如彼天將降雪則小霰先集國將喪亡其兆往往先著是時申侯已怒戎計已合王國破亡則兄弟甥舅亦從之亡矣故曰死喪無日相見亦無幾矣且樂酒今夕王維姑備宴儀而已安有親親之誠意哉無日猶云不乆也無多日也人憂慮無如之何則曰姑舎且飲酒其情與此同毛詩序謂是詩諸公刺幽王也暴戾無親不能宴樂同姓親睦九族孤危將亡故作是詩也是詩情狀非不宴樂而無禮詩言甥舅則不止於同姓而已康成注冠禮謂頍圍髪際結項中且引詩有頍者弁為証及箋毛詩則無是說豈悔禮注之未安歟康成自言先注禮後始見毛傳禮注有差謬而已行于世不可追改案禮皮弁有笄無缺項緇布冠有缺項無笄康成讀缺為頍然始見毛傳謂弁皮弁也故知無缺項禮注誤閒關車之舝兮思孌季女逝兮匪飢匪渴德音來括雖無好友式燕且喜依彼平林有集維鷮辰彼碩女令德來敎式燕且譽好爾無射雖無旨酒式飲庶幾雖無嘉殽式食庶幾雖無德與女式歌且舞陟彼高岡析其柞薪析其柞薪其葉湑兮鮮我覯爾我心寫兮高山仰止景行行止四牡騑騑六轡如琴覯爾新昏以慰我心仰補音五剛切說文作卬毛傳曰閒關設舝也孌美貎孌者德容之美毛詩序曰車舝刺幽王也襃姒嫉妒無道並進讒巧敗國德澤不加於民周人思得賢女以配君子故作是詩鄭箋云疾襃姒之惡思孌女有德者徃迎之以配幽王代襃姒也逝徃也季少也朱曰匪飢也匪渴也望其德音來㑹而心如飢渴耳毛傳曰括㑹也德音來㑹者孌女來配則正而不淫德音聞著思得賢女如飢如渴苟孌女來配雖無相好之友我更燕安且喜樂也式更也今方言多云更安樂言甚於常時人之常情於相好之友最樂今喜樂之至雖無好友亦燕且喜毛傳曰依茂木貎平林林之在平地者也鷮雉也釋鳥雉之屬不一鷂雉鷮雉鳪雉鷩雉不可勝數郭璞注鷮雉即鷮鷄也長尾走且鳴陸璣疏云鷮尾長肉甚美語曰四足之美有麃兩足之美有鷮麃似鹿而小鷮亦文采而肉最美有碩德之象碩大也大德之女也邱氏曰茂盛之林集者維鷮喻王宫之貴宜有碩女居之辰擇吉也思擇吉辰迎彼碩德之女或曰辰晨也謂昕時昏禮用昏昕取其隂陽之交天地之大義也今以昕辰徃迎碩女以令德而來敎告於王我則更燕安且將譽王好王無厭射也以女敎王雖非禮之常而幽王無道之甚詩人故思碩女以令德來敎也雖無旨酒式更飲焉以樂故再飲也雖非旨亦庶幾也雖無嘉殽以喜樂故更食焉雖非嘉亦庶幾也蓋其喜甚也常情當樂其人則施德惠以與之我雖無德以施於王而喜王不勝更歌且舞蓋其思得賢女來配以代襃姒如飢如渴之情深思切念若王納賢女去襃姒誠不勝其喜重言複辭至於是也女謂王也德如以德報之德高岡有王之象也幽王昏迷閉固不可告語詩人直欲如析薪析而啟之也大雅旱麓云瑟彼柞棫民所燎矣又曰瑟彼玉瓚則知瑟者堅膩之貎柞薪堅實之薪王閉固似之其葉湑兮湑者扶踈之狀以草釃酒謂之湑伐木云有酒湑我說文云湑莤酒也莤草也釃酒於草中散落則疎矣蓼蕭云零露湑兮露亦疎矣幽王閉塞如頑鐵堅石如柞薪堅固不可啟告今若如析柞薪析啟也其葉散離而疎不併蔽矣但我鮮見王爾覯見也使我多得見王我心將盡寫以告王今人患苦人之蔽塞曰安得彼心中玲瓏也玲瓏亦疎朗之意高山猶言高岡也亦喻王也王者天下所仰景明之行當行之襃姒當去碩女當納此事理甚著明也安得四牡騑騑六轡如琴迎碩女覯見爾之新昏以慰我心耶止猶之也音相近故記者不同意亦㣲異當從之營營靑蠅止于樊豈弟君子無信讒言營營靑蠅止于棘讒人罔極交亂四國營營靑蠅止于榛讒人罔極構我二人樊補音汾乾切左思贈妹詩樊與篇叶漢書昌邑王戾太子傳皆作藩古藩亦汾乾切崔駰司徒箴藩與愆叶晉陽后文藩與賢叶張華詩樊與篇叶按原本七字脫歐陽曰營營然徃來之飛聲毛傳曰樊藩也鄭箋云蠅之為蟲汙白使黒汙黒使白按原本四字脫喻佞人變亂善惡也言止于藩欲外之令逺物也豈樂也弟順也豈弟和順君子常稱棘榛更韻爾董氏曰營營說文作謍謍小聲也箋云極猶已也孔疏云君子謂今王毛詩序曰靑蠅大夫刺幽王也孔疏曰二人謂人君與見讒之人也構之不已至交亂四國先言四國明其罪之大也二人或謂皆見讒者構結也合也讒言不一其事亦不一聚合以成其罪賔之初筵左右秩秩籩豆有楚殽核維旅酒旣和旨飲酒孔偕鐘鼓旣設舉醻逸逸大侯旣抗弓矢斯張射夫旣同獻爾發功發彼有的以祈爾爵籥舞笙鼓樂旣和奏烝衎烈祖以洽百禮百禮旣至有壬有林錫爾純嘏子孫其湛其湛曰樂各奏爾能賔載手仇室人入又酌彼康爵以奏爾時賔之初筵溫溫其恭其未醉止威儀反反曰旣醉止威儀幡幡舎其坐遷屢舞僊僊其未醉止威儀抑抑曰旣醉止威儀怭怭是曰旣醉不知其秩賔旣醉止載號載呶亂我籩豆屢舞僛僛是曰旣醉不知其郵側弁之俄屢舞傞傞旣醉而出竝受其福醉而不出是謂伐德飲酒孔嘉維其令儀凡此飲酒或醉或否旣立之監或佐之史彼醉不臧不醉反恥式勿從謂無俾大怠匪言勿言匪由勿語由醉之言俾出童羖三爵不識矧敢多又設補音書實切閔鴻羽扇賦暑氣雲銷獻酬乃設停神静思且以永日妍羽詳迴清風盈室按原本六句脫醻即酬字抗補音居郎切舉也旣夕禮抗席抗衾一音剛張衡思元賦冀一年之三秀兮遒白露之為霜時亹亹而代謝兮疇可與乎比抗按四句從韻補補入的補音或與爵為韻古亦讀子藥切潘岳芙蓉賦丹輝拂紅飛鬚垂的斐披赩赫散渙熠爚郵補音云集韻一音垂衞地古字多假借或以郵為誰若曰不知其誰箋義假借為尤漢書凡尤皆作郵然韻不叶傞倉何反毛詩序曰賔之初筵衞武公刺時也幽王荒廢媟近小人飲酒無度天下化之君臣上下沈湎淫液武公既入而作是詩也左右秩秩意謂下文籩豆整楚殽核衆旅也謂有秩叙不亂也爾雅訓秩秩為智非殽雜也核謂桃梅有核之屬也餘雜物葅醢之屬甚多然魏風曰園有桃其實之殽則核亦可以言殽箋云和㫖調美也孔甚也衆賔之飲酒威儀齊一箋云鐘鼓于是言既設者將射改縣也鄭以天子宫縣四面皆縣將避射當改縣然禮無正文可攷惟鄉射禮未旅將射樂正命弟子贊工遷樂於下䟽云琴瑟猶遷之明鐘鼓之縣改之矣然大射諸侯之禮不言改縣何以知天子之禮必改縣鄭為意説孔因之况大射禮亦不遷瑟天下事理不可固執况他無改縣正文鄭禮學雖詳亦間有差誤改縣之說未可信也又况作詩異乎序禮鐘鼓當先設而于飲酒孔偕之次始言鐘鼓旣設者以此詩本意言飲酒故先言飲酒况言旣亦非始設舉醻徃來和樂逸逸在禮始酌之曰獻再酌之曰醻醻即酬也復其獻曰酢毛傳曰大侯君侯也抗舉也有燕射之禮箋云將祭而射謂之大射下章言烝衎烈祖其非祭歟鄭更毛傳燕射之說改為大射非也康成不善屬文屢屢而見是詩言因烝衎烈祖以洽百禮百禮旣至于是乎燕射詩言醉舞其為燕射甚明豈有將祭擇士大射而有舞僛僛傞傞者乎張侯乆矣其始不繫左下綱至將射乃繫左下綱梓人云張獸侯則王以息燕鄉射記云天子熊侯白質諸侯麋侯赤質大夫布侯畫以虎豹士布侯畫以鹿豕注云此所謂獸侯也燕射則張之案大射禮張三侯夏官射人云若王大射則以貍步張三侯是詩惟言大侯益以驗其言燕射孔疏云燕射之禮自天子至士皆一侯上下共射之箋云射夫衆射者也獻猶奏也旣比衆耦乃射各奏其發矢中的之功毛傳曰的質也孔疏云周禮鄭衆馬融注皆云十尺曰侯四尺曰鵠二尺曰正四寸曰質王肅亦云二尺曰正四寸曰質又引爾雅云射張皮謂之侯侯中謂之鵠鵠中謂之正正方二尺也正中謂之槷方六寸也槷則質也舊云方四寸今云方六寸爾雅說之明宜從之此肅意賈逵周禮注云四尺曰正正五重鵠居其内而方二尺射義引此詩云祈求也求中以辭爵也酒者所以養老所以養病求中以辭養也毛傳曰秉籥而舞與笙鼓相應烝盛也亦冬祭名衎樂也洽溥也猶備也因祭行禮品節又為詳矣有酢有嘏有交獻有旅酬有餕有歌有舞有八音有爵賞之施士禮有祀爨而况于天子之禮乎禮文廢滅不可備知總言百禮百禮旣至猶盡也而有任事之大夫士又有不任事之衆諸侯意謂祭訖不可不燕諸侯卿大夫士也故鄭謂壬為卿大夫爾雅謂林侯君也毛傳亦云林君也又云壬大也雖本爾雅然爾雅多差失未可盡信錫爾純嘏子孫其湛其湛曰樂者此言祭時先祖旣錫賚我以純一不雜之嘏使子孫皆湛樂所謂湛者即樂之謂也是殆天子祭禮中之嘏辭有子孫其湛之辭有此釋文也凡與祭執事之大夫士及餘不執事之衆諸侯多是吾先祖之子孫及異姓之親子孫先祖之錫嘏固欲徧及其子孫也固欲咸燕樂之也則祭罷豈容無燕因燕而射故各奏爾能載則也仇匹敵也王氏曰室人主黨也賔黨入射則手敵主黨入射則又手敵康安也酒可以安養衰病故飲不中之爵曰康爵蘇曰以奏爾時薦之以時物也反反者毎毎反顧其身也謹于禮幡幡揚動不謹重也舎其坐而遷屢舞僊僊飄輕之狀也抑抑卑恭也怭怭者抑抑之反也其心怭怭者容不和順不知其秩叙醉甚昏甚也毛傳號呼讙呶也僛僛舞不能自正也郵誰也不知其誰醉不知人也箋云側傾也俄者俄然而側也俄然忽然也傞傞則不止於僛斜而已幾於傾倒失足之狀也既醉而出則合乎禮合乎禮則賔主並受其福醉而不出則失禮是自伐其德也飲酒甚嘉維不失令儀則可不然則不可也董曰立之監以監之佐之史以書之古之慎禮如此監者司正之謂乎箋云彼醉則已不善復取未醉者恥之言此者疾之也式敬也此戒其勿從反恥之謂謂言也恥之必有其言也戒勿從其言無使至于大怠也非其所當言則勿言非禮事由乎已則勿語其有由醉之言妄亂之言則罰之俾出童羖羊必有角無童者箋云俾出無角之羖羊脅以無然之物使深戒也朱氏曰女飲至三爵已昏然無所識矣况敢又多飲乎丁寧以戒之也魚在在藻有頒其首王在在鎬豈樂飲酒魚在在藻有莘其尾王在在鎬飲酒樂豈魚在在藻依于其蒲王在在鎬有那其居魚何在在藻也藻水草也在藻得其所也韓詩云頒衆也詩意謂其首頒然不亂王與羣臣燕樂有禮不亂如之王何在在鎬京武王之所居也今王居焉得其所矣當豈樂飲酒豈樂和樂也非荒淫無度之樂也當如魚之和樂不亂如武王之豈樂也而今不然矣僛僛傞傞側弁之俄其亂甚矣有莘其尾魚尾如莘也細莘音辛一名細莘藥草也一根一葉相連此亦衆而不亂之物故以喻之蒲亦水草魚亦在藻又依蒲甚言其得所也王居武王之所居那有其居若此者乎甚言鎬京之美也其意憂王將失其所居矣其亡將不敢明言毛詩序云刺幽王也君子思古之武王焉言刺非詩人之本情又大悖采菽采菽筐之筥之君子來朝何錫予之雖無予之路車乘馬又何予之𤣥衮及黼觱沸檻泉言采其芹君子來朝言觀其旂其旂淠淠鸞聲嘒嘒載驂載駟君子所届赤芾在股邪幅在下彼交匪紓天子所予樂只君子天子命之樂只君子福祿申之維柞之枝其葉蓬蓬樂只君子殿天子之邦樂只君子萬福攸同平平左右亦是率從汎汎楊舟紼纚維之樂只君子天子葵之樂只君子福祿膍之優哉游哉亦是戾矣縭音离爾雅釋水作縭毛詩作纚毛傳曰菽所以芼大牢而待君子也羊則苦豕則薇箋云菽大豆也采其葉以為藿三牲牛羊豕芼以藿王饗賔客有牛俎乃用鉶羮故使采之孔疏云以鼎煑牛取其骨體置之於俎其汁則芼之以藿調以鹹酸乃盛之於鉶即公食記鉶芼是也以草菜地之毛故謂之芼地官牛人云凡賔客之事共其牢禮積膳之牛又云饗食賔射按原本二字脫共其膳羞之牛食亦有牛舉饗則食可知矣方曰筐圓曰筥毛傳曰君子謂諸侯也箋云賜諸侯以車馬言雖無予之尚以為薄毛傳曰元袞卷龍也白與黒謂之黼箋云元袞元衣而畫以卷龍也黼黼黻謂絺衣也周禮司服諸公之服自袞冕而下如王之服侯伯之服自鷩冕而下如公之服子男之服自毳冕而下如侯伯之服覲禮天子賜諸侯氏以車服鄭注云賜同姓以金路異姓以象路毛傳曰觱沸泉出貎釋水云濫泉正出正出涌出也李注水泉從下上出曰涌釋曰濫檻音義同毛傳曰檻泉正出言語助也箋云芹菜也可以為菹亦所用待君子也周禮芹菹孔疏云車馬鸞鈴之聲嘒嘒然釋文觱沸音必弗今俗語沸如字於檻泉之水中采其芹朱曰諸侯來朝則觀其旂聞其鸞聲又見其馬君子之至則有如上之儀物届至也箋云芾大古蔽膝之象也冕服謂之芾其他服謂之韠以韋為之其制上廣一尺下廣二尺其頸五寸肩革帶博二寸脛本曰股邪幅如今行縢也偪束其脛自足至膝故曰在下孔疏云易乾鑿度注云古者田魚而食因衣其皮先知蔽前後知蔽後後王易之以布帛而猶存蔽前者重古道不忘本是亦說芾之元由也毛傳曰諸侯赤芾紓緩也孔疏云桓二年左傳曰帶裳幅舄内則亦單云偪則此服名偪而已杜鄭皆云今之行縢然則邪纒於足謂之邪幅說文曰縢緘也名行縢者言行而緘束之彼諸侯之交於天子者非紓緩而怠也故為天子心之所予樂只言君之和樂也天子於是命之不止於命之又有福禄以申錫之以山川土田車服器物之類也毛傳曰蓬蓬盛貎殿鎮也孔疏曰軍行在後曰殿又鎮重之義枝葉足以芘根幹根幹如天子枝葉如諸侯為藩輔故天子之邦得以安鎮無虞萬福攸同者凡從君來朝者同被其福禄也不特其大臣雖其平平左右羣臣亦率從被其福言並䝉賚賜也爾雅釋水曰汎汎楊舟紼縭維之紼􅛢也縭緌也楊木之舟輕浮泛泛得大紼小縭以維之而後安定天子如楊舟諸侯如紼縭王畿賴侯國藩維而後安定葵心向日如天子心向諸侯先王親愛諸侯其心似之膍牛百葉也天子以福禄重重錫賚諸侯申之膍之謂錫賚重複也今王優哉游哉緩慢不復紹其禮亦違戾於先王矣其辭甚婉其憂甚深毛詩序曰刺幽王也侮慢諸侯諸侯來朝不能錫命以禮數徴㑹之而無信義君子見微而思古焉其禍著以微云騂騂角弓翩其反矣兄弟昏姻無胥遠矣爾之遠矣民胥然矣爾之敎矣民胥傚矣此令兄弟綽綽有裕不令兄弟交相為瘉民之無良相怨一方受爵不讓至于已斯亡老馬反為駒不顧其後如食宜饇如酌孔取毋敎猱升木如塗塗附君子有徽猷小人與屬雨雪瀌瀌見晛曰消莫肯下遺式居婁驕雨雪浮浮見晛曰流如蠻如髦我是用憂補音遠於圓切易林明夷之漸曰轉行軌軌行近不遠旦夕入門與君笑言韓愈閔已賦遠字與賢字年字難字言字叶然則逺字宜音園而補音於圓切失母矣按韓愈閔已賦已遠與漫漫叶漫補音音緜則遠字音淵故於元切也補音讓如陽切禮記左右攘辟注云攘古讓字古文尚書作攘六韜與陽光叶楚辭大招讓與張叶與王叶荀子成相篇讓與王叶急就章讓與莊叶此詩或用韻宜從此讀猱乃刀反屬音蜀讀者音近樹見晛聿消聿韓詩作聿毛詩作曰董呂皆同觪許慎作弲言用角低卬便也許義未盡其如牛羊角觩然歟弛弓則忽反矣兩弰雙反如羽疾飛故曰翩王之背棄親族如之胥相也兄弟婚姻民相傚皆然矣胥亦皆意蓋王敎之也王雖未嘗敎詔之而身行之民效之謂王敎之可也令善也令兄弟即今俗云好兄弟裕寛也和樂從容之意其不令者則交相病瘉病也相詬訾相傷害此泛言也雖泛言而意則譏王周偏處西北一方王者統臨天下而曰一方者王失德天下不歸心故詩人小之止言一方言周之民無良相怨相惡皆王所化也詩人灼見本末源流之所致其端甚微其流禍甚大姑舉受爵不讓一端言之受獻爵殊無遜讓之容此不敬之心其過似微而其末流致亡乃已當時蓋有其事亦假以明王之將亡也作詩者其父兄尊老者乎以老馬自況反為駒言其時反以幼穉相待不加禮敬以少陵長以卑陵尊吕曰彼慢老者獨能長少而不老乎所謂不顧其後也如若也食則甚宜者心好之而務饇飽酌則甚取而務多孔甚也且言後生輕侮貪饕之狀古又以如為而屢見大戴禮猱猴屬自能升木輕薄小人自好陵犯長上而王又敎以助戱侮其長老如泥塗又加其塗以附益之詩人于是思君子有徽猷徽猷善道也上有善道則小人咸服屬而自化不至如今俗習惡毛傳曰晛日氣也小人道長小人隂類如雨雪瀌瀌得陽和之氣即消化矣是時心莫肯為善棄其下之親族矧更居愚驕乎式更也詳釋見式微婁愚也惟愚故驕聖賢未嘗驕惡驕者故加愚字毛傳曰蠻南蠻也髦夷髦也孔疏云髦四夷之别名今上下胥然於親族無禮義仁恩如蠻夷矣我用是憂憂其無道必致禍亂也毛詩序曰角弓刺幽王也不親九族而好讒佞骨肉相怨而作是詩也有菀者柳不尚息焉上帝甚蹈無自暱焉俾予靖之後予極焉有菀者柳不尚愒焉上帝甚蹈無自瘵焉俾予靖之後予邁焉有鳥高飛亦傅于天彼人之心于何其臻曷予靖之居以凶矜按此篇永樂大典缺卷彼都人士狐裘黃黃其容不改出言有章行歸于周萬民所望彼都人士臺笠緇撮彼君子女綢直如髮我不見兮我心不說彼都人士充耳琇實彼君子女謂之尹吉我不見兮我心苑結彼都人士垂帶而厲彼君子女卷髪如蠆我不見兮言從之邁匪伊垂之帶則有餘匪伊卷之髪則有旟我不見兮云何盱矣鄭箋云城郭之域曰都吕曰都人士者即喪服傳所謂都邑之士所以别野人也陳曰周鎬京也毛傳謂周忠信也此雖本之春秋國語然非聖之言穿鑿曲取迂儒常態穆叔曰忠信為周左氏知其未安已削之矣楚子囊卒君子謂子囊忠忠民之望也詩曰行歸于周萬民所望忠也此義亦未白學者習說不可盡信皇皇者華之周周徧也此都人士之周西周也都士之行歸于周家所行之道謂合乎文武所行之道萬民之所仰望也箋云臺夫須也以臺皮為笠陸璣疏云舊說夫須莎草也可以為蓑笠毛傳曰緇撮緇布冠也孔疏曰撮言小撮持其髻而已吕曰君子女者貴人之女綢者以絲周之其卷髪之纚歟如而也屢見大戴禮以而為如古語也以音相近故記者或作如或作而也綢其髪而直也綢直而髪而猶其也亦古語也書害于而家凶于而國我今不見斯服矣傷禮服之亡習俗趨于薄故我心不說毛傳曰琇美石也王肅云以美石為瑱塞實其耳朱曰尹吉未詳箋云吉讀為姞尹氏姞氏周室婚姻之舊姓也言有禮法苑中草木繁積故言積曰苑積結不散憂之深也毛傳曰厲帶之垂者箋云而亦如也而厲如鞶厲也鞶必垂厲以為飾厲字當作裂蠆螫蟲也尾末揵然似婦人髪末曲卷然左傳桓二年鞶厲游纓昭其數也杜注云鞶紳帶也一名大帶厲大帶之垂者春秋紀裂繻或作履緰鄭或以厲履裂聲相近取裂之義歟鄭必以而為如殆不必也鄭不善屬文不解垂厲之文耳當從毛傳說文長尾為蠆卷髪如蠆以纚卷髪也我不見兮見則從之往矣邁往也言我心敬之歸之匪伊特垂之帶則有餘帶當有餘有餘則有垂者今不見垂帶是其時特不垂其帶俗尚新竒也昔君子女匪特卷之以髪有旟揚者故以纚卷之也毛傳曰旟揚也盱吁之音而字訛歟卷耳曰云何吁矣毛詩序曰都人士周人刺衣服無常也古者長民衣服不貳從容有常以齊其民則民德歸壹傷今不復見古人也終朝采綠不盈一匊予髪曲局薄言歸沐終朝采藍不盈一襜五日爲期六日不詹之子于狩言韔其弓之子于釣言綸之繩其釣維何維魴及鱮維魴及鱮薄言觀者鄭箋云緑王芻也爾雅釋草云菉王芻郭注云菉蓐今呼鴟脚莎楚辭曰薋菉葹以盈室王逸云終朝采綠箋云綠易得之菜終朝采之而不盈手憂思不專於事毛傳曰局卷也婦人夫不在則不容飾沐非爲容飾也乆不沐櫛太甚故薄沐也出而采綠曰予髪曲局矣歸而薄沐乎箋謂君子將歸故我沐康成不善屬文故曲推而文不然毛傳曰衣蔽前謂之襜箋云藍染草也朱曰五日去時之期也六日不詹過期而不見也詹與瞻同箋謂五日為五月之日六日為六月之日鄭意以六日不歸何遽憂思之甚故云云亦猶豳風曰一之日二之日謂十二月十二月然六日不詹非謂六日即憂思深也自六日不瞻以來至于今積思而憂深也後漢劉瑜上疏曰天地之性隂陽正紀隔絶其道則水旱為并詩云五日為期六日不詹怨曠作歌仲尼所録箋云之子謂君子也邱氏曰是子徃獵我則為之納弓于韔中徃釣我則為之緡繩于竿今遠行役役乆而不歸思其如此而不可得也孔疏謂言綸之繩與之作繩也得魚之盛頗有觀者故曰薄言觀者俗本觀作睹定本集注並作觀毛詩序曰幽王之時多怨曠者也芃芃黍苗陰雨膏之悠悠南行召伯勞之我任我輦我車我牛我行旣集蓋云歸哉我徒我御我師我旅我行旣集蓋云歸處肅肅謝功召伯營之烈烈征師召伯成之原隰旣平泉流旣清召伯有成王心則寧牛補音魚其切楚辭天問恒秉季德焉得夫朴牛何徃營班禄不但還來九章呂望屠于朝歌兮寗戚歌而飯牛不逢湯武與桓繆兮世孰云而知之招魂敦脄血拇逐人駓駓參目虎首其身若牛易林履之蠱曰齊景惑疑為孺子牛蠱之同人曰伯氏殺牛行悖天時咸之小畜曰許人買牛三夫爭之頥之遯曰豶豕童牛害傷不來來陵之切崧高之詩言宣王邑申伯于謝命召伯定申伯之宅登是南邦徹申伯土田有俶其城寢廟既成此詩言肅肅謝功召伯營之工役旣大故用師旅原隰旣平泉流旣清蓋用徹法治其土田而為之溝洫也芃芃黍苗隂雨膏之蓋南行之役徒所見因感召伯見勞之恩故即所見黍苗䝉隂雨之所膏潤以喻之鄭箋以任為負任未安遠行不可負任負任而遠行則太勞任者任之以事任輦以輦所當載任車以車所當載任牛以牛所當挽下文徒御師旅四類此輦車牛三物不必與下文齊同鄭豈拘于同下文耶我行旣集蓋云歸哉是詩蓋訖役將歸時所作歟徒行者御車者夏官司馬二千五百人為師五百人為旅成之者成其邑謝之功宣王欲邑申伯以報其功邑成則王心寧矣毛傳初未嘗言刺幽王而衞宏作序則曰刺幽王也不能膏潤天下卿士不能行召伯之職焉宏蓋拘于世次故强歸之幽王且淸人鄭文公時詩而置于莊公昭公詩之前詩經秦火口誦所傳難執世次况宏序謬誤良多不可盡信孔子所取大旨固不在其人與世而宏謬太甚不得不辯鄉師治其輦注云輦人挽行載任器也司馬法曰夏后氏謂輦曰余車殷曰胡奴車周曰輜輦隰桑有阿其葉有難旣見君子其樂如何隰桑有阿其葉有沃旣見君子云何不樂隰桑有阿其葉有幽旣見君子德音孔膠心乎愛矣遐不謂矣中心藏之何日忘之愛補音許既切說文從心旡聲徐鍇繫傳曰㤅者惠也古文尚書㤅古愛字集韻㤅許既切周易富家大吉順在位也王假有家交相愛也楚辭九章世溷濁莫吾知人心不可謂兮知死不可讓願勿愛兮明以告君子吾將以為類兮傅幹皇后箴巨猾是緣竊弄神器故禍不出所憎常出所愛袁宏三國名臣贊滄海横流玉石同碎達人兼善廢已存愛楊戱贊吳子遠車騎高勁惟其泛愛以弱制强不陷危墜皇甫謐釋勸若實可謂習外觀之暉未覩幽人髣髴也髴方末反見俗人之不容未喻聖王之兼愛也若字形則當如方言所載揚雄答劉歆書與說文古篆从㤅从夂其義與音昭然可見郭璞方言注用此字自是之後不復見矣隰桑之盛如此足以濟利生人以其可蠶也故人心喜見之故取以喻其喜見君子之心當是乆亂忽見君子故其樂甚也君子之徳音甚膠固不斷絶也吾心愛君子不謂相去遐遠而憚于徃見也大抵善類之愛其善類中心懐之常不忘也是詩殆以有君子在位遠方之士慕德而徃見之喜而作也而衞宏作序又謂刺幽王謂思見君子熟觀本詩曰旣見君子非思也此又宏拘於世次之故也是詩之作或宣王之初歟毛傳亦無刺意亦無思見意孔疏曰夏書傳曰下溼曰隰桑非能水之木而言其美者以桑宜在隰潤之所隰近畔無水宜桑毛傳曰沃柔也幽黒色也按孔疏曰以下原本缺今補入白華菅兮白茅束兮之子之遠俾我獨兮英英白雲露彼菅茅天步艱難之子不猶滮池北流浸彼稻田嘯歌傷懐念彼碩人樵彼桑薪卬烘于煁維彼碩人實勞我心鼓鐘于宫聲聞于外念子懆懆視我邁邁有鶖在梁有鶴在林維彼碩人實勞我心鴛鴦在梁戢其左翼之子無良二三其德有扁斯石履之卑兮之子之逺俾我疷兮按此篇永樂大典缺卷緜蠻黃鳥止于丘阿道之云遠我勞如何飲之食之敎之誨之命彼後車謂之載之緜蠻黃鳥止于丘隅豈敢憚行畏不能趨飲之食之敎之誨之命彼後車謂之載之緜蠻黃鳥止于丘側豈敢憚行畏不能極飲之食之敎之誨之命彼後車謂之載之是詩微臣感其所䝉飲食教載之大臣而作也而衞宏作毛詩序乃反之曰刺者蓋意周衰亂世必無若此仁惠之大臣故反之以為思古之詩而本詩情狀非思古也觀詩固不可執其世其間大臣豈無一人能憫徒行小臣之忠勞也此事雖甚微然道無大小其恤下之心感惠之心皆善心正心即道心也聖人取焉大學篇引緜蠻黄鳥止于邱隅子曰於止知其所止可以人而不如鳥乎繼引詩曰穆穆文王於緝熙敬止為人君止於仁為人臣止於敬為人子止於孝為人父止於慈大學一篇非聖人作道一而已此心常覺常明曰仁其散見於諸善不一其此心之見於恭曰敬見于事親曰孝見于惠下曰慈而大學裂而分之殊為害道毛傳又祖其說以釋是詩曰鳥止于阿人止於仁枝蔓轉涉失本詩之情遠矣行勞甚於是休止有如何之歎焉止邱阿即所見以喻已之休止而已非有深義孔子舉此詩以明别意觀詩者不可執以釋詩而况可又祖大學之言乎有大臣者憫其勞飲之食之從容之次又敎之誨之又命後車語令載之邱隅邱側特更韻爾豈敢憚於徒行恐不能疾行以趨以從大臣之車也畏恐也趨行疾也爾雅云極至也恐不能至今勞憊於道途者亦有此言幡幡瓠葉采之亨之君子有酒酌言甞之有兔斯首炮之燔之君子有酒酌言獻之有兔斯首燔之炙之君子有酒酌言酢之有兔斯首燔之炮之君子有酒酌言醻之燔音煩補音汾乾切曹大家蟬賦有翩翩之狡童運微黏而紛纒委厥體於膳夫歸炎炭而就燔左思魏都賦琴高沉水而不濡時乗赤鯉以周旋師門使火以騐術故將去而林燔曹植瑟瑟歌願為中林草秋隨野火燔灰㓕豈不痛顧與枝葉連陶潜遇火詩正夏風長急林室頓燒燔一宅無遺宇舫舟䕃門前毛詩序言不以微薄廢禮是也而曰大夫刺幽王上棄禮而不能行雖有牲牢􅛰餼不肯用故思古焉則不可必也雖至亂之世豈無一人一事之善而必曰古之人是絶㓕人之道心大不可也毛傳曰瓠葉庻人之菜也鄭箋云亨熟也熟瓠葉者以為飲酒之葅也王肅孫毓云唯一頭爾諸儒必曲取以為一非也三章者皆言首不及其餘瓠葉首雖至微薄而采之亨之炮之燔之炙之誠意所將甞酒而獻之酢之醻之誠敬彌著是謂道心人皆有是心而自不知其為道也故易曰百姓日用而不知攷之儀禮初獻次醻次酢酢者報所獻也獻至於再則謂之醻醻即酬字毛傳曰炮加火曰燔炕火曰炙此君子窮而在下者歟漸漸之石維其高矣山川悠遠維其勞矣武人東征不皇朝矣漸漸之石維其卒矣山川悠遠曷其沒矣武人東征不皇出矣有豕白蹢烝渉波矣月離于畢俾滂沱矣武人東征不皇他矣漸漸之石維其高矣東征之士所見或以為喻非繼曰山川悠遠維其勞矣其情狀承接上文别無義喻曰不皇朝矣不忘君之情也没盡也山川悠遠何得至于盡而止也此中途之情不皇出者不暇有他適也出適也豕涉波月離畢皆霖雨之先兆途行畏雨情見于此也是詩正矣無邪思也無邪道也孔子取焉而毛詩序曰下國刺幽王也戎狄叛之荆舒不至乃命將率東征役乆病于外是詩本無刺王之情而序誣之不明本詩之正情不明正情之即道故支離旁說徒亂後學况序文多意度妄謬不可盡信易曰離麗猶附也月離畢星則雨毛傳曰畢濁也鄭箋曰豕性能水按毛傳以下原夲脫今莭補苕之華芸其黃矣心之憂矣維其傷矣苕之華其葉青青知我如此不如無生牂羊墳首三星在羀人可以食鮮可以飽何草不黃何日不行何人不將經營四方何草不𤣥何人不矜哀我征夫獨爲匪民匪兕匪虎率彼曠野哀我征夫朝夕不暇有芃者狐率彼幽草有棧之車行彼周道按二篇永樂大典缺卷
