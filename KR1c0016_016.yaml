body:
  text: 慈湖詩傳卷十六宋楊簡撰大雅一文王在上於昭于天周雖舊邦其命維新有周不顯帝命不時文王陟降在帝左右亹亹文王令聞不已陳錫哉周侯文王孫子文王孫子本支百世凡周之士不顯亦世世之不顯厥猶翼翼思皇多士生此王國王國克生維周之楨濟濟多士文王以寧穆穆文王於緝熙敬止假哉天命有商孫子商之孫子其麗不億上帝既命侯于周服侯服于周天命靡常殷士膚敏祼將于京厥作祼將常服黼冔王之藎臣無念爾祖無念爾祖聿修厥德永言配命自求多福殷之未喪師克配上帝宜鑒于殷駿命不易命之不易無遏爾躬宣昭義問有虞殷自天上天之載無聲無臭儀刑文王萬邦作孚躬補音姑宏切説文躬從吕或從弓弓聲本如肱周易震不于其躬于其鄰又曰艮其限危熏心也艮其身止諸躬也按原本四句脫班固東都賦登靈臺考休徵俯仰乎乾坤參象乎聖躬又與稜字叶崔瑗祭和帝文元景寢曜雲物見徵馮相致妖遂當帝躬韓愈祭嫂文苟容躁進不顧其躬祿仕而還以為家榮天補音鐡因切文王與天一也於者嘆美之辭昭者光明不蔽之謂周雖舊邦其命維新者文王有天道紂失天道天人一也人心去紂故天命亦去紂而在文王矣有周不亦顯乎帝命不亦時乎適當其時也紂大惡文王盛德時適相值故帝命去紂而在文王不顯不時朱謂古語聲急而然詩人見文王之心即天之心文王之所為即上帝之所為如升陟于天在帝左右親承帝命降而行之于天下也亹亹不息也惟不動乎意故能不息也動乎意則有作必有息不動乎意故能無作亦無息舜之惟精惟一此也禹之安女止此也文王之不識不知此也文王之德不息故令聞不已爾雅云哉始也天於是始陳示錫命於周天不言不為人心歸周即天命在周也人心所以歸周者甚著則天之所以錫周者豈不亦著爾雅云侯維也侯文王孫子謂文王有聖子賢孫又足以繼承文王也謂文王又有子有孫也文王之孫子其本適為王其支庶為諸侯世世有德繼繼承承可以百世也不惟文王之孫子光顯凡周之士亦世世光顯以文王道之所成又擇其尤賢者而任之也詩人之辭始也以不亦顯為不顯其後流傳習熟則即以不顯為顯不復問上下文勢不顯亦世此之謂也世世之所以顯者以其猶之小心翼翼也猶猷也道也翼翼而敬無放逸故無所失道道即文王之道也其道大故曰皇皇大也思語助辭也他國賢士甚寡惟周賢士甚多如特生於國也説文楨剛木也上郡有楨林縣一曰築墻具題曰楨旁曰幹廣韻云女楨冬不凋木也樓尚書云女貞即今之冬青惟木之剛者可為楨幹多士為周之楨幹文王以生多士而寧文王不大聲以色故曰穆穆緝者緝理於思為細微之間熙有理順之義緝熙者進德精微之謂進德之實非思也非為也惟可以言敬敬非思為也惟可以言止止非思為也寂然不動感而遂通而不屬於為所謂不識不知者此也惟精惟一者此也安女止者此也文王之所緝熙者此也惟不動乎意不屬乎思為故熙順融釋如點雪之融於水微雲之散於太虛其緝熙於思為微細之間融釋於無思無為之妙如此豈不甚美而可嘆服哉故曰於惟其道心不識不知故聲音不大形色亦不大而見為穆穆假大也假哉嘆天命之大哉為絶句天命連下文是詩頗有參差不齊之語不可拘執天命有商之孫子其麗數不止於億盡命作諸侯于周六服之中既盡也服之為言服從也服事也毛傳謂麗數也曰億者每國之公族子孫甚衆也商之諸侯而今服于周見天命之無常武王擇殷士之可用者亦用之故膚敏之士助祼將于京師祼者祼鬱鬯所以將誠通之於神故曰祼將天官小宰凡祭祀贊祼將之事冔殷冠既歸周執禮而猶殷冠者當是武王初有天下制作未定故殷士尚得服殷之黼裳冔冠詩人見殷士黼冔祼將于京而傷之故以為言因以戒成王曰王之忠藎之臣得無念爾祖文王之德乎不敢指成王而曰藎臣實戒成王也念爾祖文王之德則無敢放逸則天命可以永保周士未遽至於祼將繼周者之京也無放逸則德修矣德修則天命在我矣可以永永配天之命多福非自外至自求之而已矣自求之者無他也無放逸也無動乎意也安女止也是數語者一也師衆也失衆心則人去之天亦去之方殷之未喪失衆心則與人同心與天同心是謂配天宜鑒于殷今殷失衆心而人去之天命去之于以知天之峻命不可容易再言命之不易者致意之深戒成王之切遏抑也毋遏抑爾躬至於卑下也放逸則卑下矣當昭德義之令問此非外飾而撰作之也問望由德義而宣昭無義問者中心之無義也動乎意而放逸則為無義矣有又也又當憂虞恐又如殷之降喪自天也欲知天心乎而人常患上天之載無聲無臭不可測度於是教之曰但法則文王則萬邦自孚信我之德矣載承載也上天之所承載者何所有也上帝雖有名而不可見無聲無臭而不可聞作是詩者灼知文王之即天故確然曰儀刑文王則得天道矣萬邦之心不計術而取也吾心不動乎意則無逸無逸則無私無私則與人心同矣與天道亦同矣天人形若有異道無異人心即道故曰道心不動乎意常虛常明何思何慮安女止是謂精一是謂帝則是則無聲無臭者此惟自省自則者知焉作是詩者其周公乎聖人之言也毛詩序惟曰受命作周也是何足以明是詩之大旨明明在下赫赫在上天難忱斯不易維王天位殷適使不挾四方摯仲氏任自彼殷商來嫁于周曰嬪于京乃及王季維德之行大任有身生此文王維此文王小心翼翼昭事上帝聿懷多福厥德不回以受方國天監在下有命既集文王初載天作之合在洽之陽在渭之涘文王嘉止大邦有子大邦有子俔天之妹文定厥祥親迎于渭造舟為梁不顯其光有命自天命此文王于周于京纘女維莘長子維行篤生武王保右命爾燮伐大商殷商之旅其會如林矢于牧野維豫侯興上帝臨女無二爾心牧野洋洋檀車煌煌駟騵彭彭維師尚父時維鷹揚亮彼武王肆伐大商會朝清明按亮字楊氏從韓詩身補音尸羊切荀卿成相篇天乙湯論舉當身讓卞隨舉牟光道古賢聖基必張易林蒙之垢曰足動目瞤喜未加身舉家蒙歡吉利無殃渙之兑曰昭公失常季氏悖狂遜齊處野喪其龎身蹇之兊曰機餌設張司暴子良范叔不廉凶害及身俔牽遍反俔韓詩作磬按原本四字脫亮韓詩作亮毛詩作諒或作涼明明在下天明照在下者之善惡也赫赫在上天明威之可畏也天難忱信為王者不易難也天既以紂為殷適嗣而位天位矣乃又使不得挾四方而有之然則天果難忱難恃也毛傳曰摯國任姓仲仲女也自彼殷商之國中來嫁于周朱曰自周而言則諸侯皆殷商也京周京也曰嬪于京其國史所書之辭乎是謂大任大任及王季皆維德之行事上帝之道不在乎他在乎善而已矣人性本善意動而遷斯喪厥善小心翼翼不動不遷是謂善事上帝懷藏也多福乃懷藏于文王小心之中不在求之於外也亦文王篇自求多福之意也進德亹亹不復回轉故四方師之文王遂受四方之歸也天監在下紂惡既盈維周世世修德至文王之德益盛則天命自然集于周載年也文王初生大姒作文王之配合在洽水陽毛傳曰洽水穀梁傳曰水北曰陽涘崖也朱曰嘉昏禮也前漢地理志馮翊有郃陽縣按原本三字脫洽水之陽渭水之涘莘國所在是為大邦子為大姒大姒盛德配天天使配文王文王為天子則王后非天妹乎俔者灼見也灼見大姒之為天妹也説文謂俔譬喻許慎不明天人之一致也何以喻為心疑而強為之説也字作人見曷為譬喻人心無私之心也大姒寤寐思求淑女以配君子此天地無私之心也無私即道心後學不知道不悟中庸之心即天道故自昏自蔽自棄而又疑大姒非天之妹文王行嘉禮於大姒止語助也納采問名納吉納徴請期皆嘉禮之吉事有祥者吉之初兆也天生大姒作文王配初祥既兆至于文王親迎于渭則其祥於是定矣造舟為梁孫炎云比舟為梁也杜預云河橋之謂也孔疏云繼大任之女事天命文王于周京纘繼女事維莘國爾實維長女行猶嫁也詩云女子有行篤實也實生武王保右武王命武王燮伐大商燮和也聖王之征伐豈得已哉奉天命平大亂誅君弔民歸馬放牛是謂燮和之伐非暴怒之伐旅衆也矢陳興起也孔疏云牧野紂南郊箋謂諸侯豫我也豫雖諸侯而興起自上帝觀武王則曰女帝臨護之又命之曰無二爾心恐其以紂衆如林之盛而疑懼也所謂天命帝命天帝不言即人之所言人心恐武王之疑二故謂上帝亦恐武王之疑二凡人事之所成即天命之所成車宜檀木毛傳曰煌煌明也駵馬白腹曰騵本爾雅釋畜文郭注云駵赤色黑鬛肆猶遂也有無所畏忌之意爾雅釋詁云亮介也左右亮也韓詩傳云相也毛傳曰佐也大公望為大師號曰尚父孫子兵法曰周之興也吕牙在殷齊世家曰吕尚國語王以二月癸亥夜陳未畢而雨以夷則之上宫畢之則雨止矣詩人喜其會戰之朝清明也故云毛詩傳曰大明文王有明德故天復命武王也此序既失詩旨又不足以明文王武王之德徒為蕪贅綿綿瓜瓞民之初生自土沮漆古公亶父陶復陶穴未有家室古公亶父來朝走馬率西水滸至于岐下爰及薑女聿來胥宇周原膴膴堇荼如飴爰始爰謀爰契我龜曰止曰時築室于茲乃慰乃止乃左乃右乃疆乃理乃宣乃畝自西徂東周爰執事乃召司空乃召司徒俾立室家其繩則直縮版以載作廟翼翼救之陾陾度之薨薨築之登登削屢馮馮百堵皆興鼛鼓弗勝乃立臯門臯門有伉乃立應門應門將將乃立冡土戎醜攸行肆不殄厥愠亦不隕厥問柞棫拔矣行道兑矣混夷駾矣維其喙矣虞芮質厥成文王蹶厥生豫曰有疏附豫曰有先後豫曰有奔奏豫曰有禦侮爾雅釋草云瓞瓝其紹瓞舍人曰瓞名瓝按原本誤作瓞小瓜也邢疏云紹先歲之瓜瓜蔓近本之瓜必小于先歲之大瓜以其小如瓝故謂之瓞周推本始繼繼承承如瓜蔓生綿延不絶初瓞雖小而後滋大生民篇以后稷為民詳觀是詩通上下皆曰民謂周之子孫與凡周之民歟孟子莊子吕氏春秋皆言太王亶父居豳狄人攻之事之以皮幣以犬馬以珠玉俱不得免乃屬其耆老而告之曰狄人之所欲者吾土地也吾聞君子不以其所以養人者害人遂去豳邑于岐山之下孟子作邠邠人曰仁人也不可失也從之者如歸市毛傳亦引此于是陶復陶穴未有家室又曰周京漆沮之間也按杜水出杜陽山東南流左會漆水徑岐山西為岐水而屈徑周城南歷周原下徐廣曰漆水出杜陽西岐山許慎亦曰漆水出岐山杜陽縣有漆溪謂之漆渠又西沮水出北地郡直路縣燋石山東南流屈而夾山西流又西南徑宜君川又得黃嶔水口乃東南徑祋祤縣夫宜君之南與今邠州接境邠即豳今邠州有古豳亭有枸邑城古鶉觚縣漢地理志右扶風郡有枸邑邑有豳鄉詩豳國公劉所都而鶉觚乃在北地郡則知扶風郡與北地郡接境今邠州西南接鳯翔府扶風郡界不過六十里本府之岐山又本府之東四十里則岐山與邠州益近岐山去沮水亦不逺則岐周之地有杜水沮水漆水明矣而鄭箋輒異毛傳而謂公劉遷豳居沮漆之地又謂陶復陶穴本其在豳時也箋義殊未安豈有自公劉居豳以來至于後古公亶父皆穴居而未有家室乎此斷斷乎無是理康成不善屬文每每見其箋注文理不順于是益驗然地理志扶風杜陽注二詩自杜沮漆齊詩作自杜言公劉避狄而來居杜與漆沮之地古書多差况非聖説此奚足信以本詩本文熟讀之文理甚明非言豳地言古公亶父初遷岐周之事也康成謂豳在岐山西北四百里亦然今考地理岐山邠南下甚逺孔疏謂禹貢之漆沮與詩之自土沮漆别又謂詩之沮水則未聞何地曰未聞者考之未詳歟謂禹貢之漆水異乎詩之漆水則誠有故也岐山所出之漆水在漆縣西唯與杜水合南至美陽縣而南流于渭初未嘗與沮水合也故孔疏云異禹貢導渭會于灃又東會于涇又東過􅃮沮入河者以沮水一名􅃮沮沮水入洛洛水入渭然則此二沮􅃮水俗謂之􅃮水又謂之沮水是水之入渭然則二􅃮沮水與前所言􅃮水出岐山與杜水合而入渭者又異矣大抵渭水之北涇水之東水名􅃮沮者三矣禹貢曰又東過􅃮沮不曰會而曰過者樓尚書云兩川相似而合曰會大川所過而小川隨之曰過小水入大水曰入􅃮沮小於渭古公之將遷岐必先相其地始至岐山陶土為穴而居未有家室來朝謂後朝之日儀禮所謂來辰者自明日以後凡後來之日皆謂之來也古公既相地至來朝遂與其妃薑女來胥相其所居宇居也孔疏云古公猶云先王先公也大王追號魯頌閟宫云實維大王居岐之陽實始翦商蓋以去豳居岐豳人從之如歸市四方悅其愛民而去國王業由此而始故詩序曰綿文王之興本由大王也孔疏引説文云陶瓦器竈也按原本有誤今改正蓋竈以陶去其土而為之故謂之陶説文云穴土屋也復地室也許氏淮南子注云復重窟也上古穴居野處古公時殷世古質雍州地髙尤宜穴居岐周西夷之地逺俗益近古故以穴居為常今俗猶謂取土而出之曰陶所謂陶復陶穴者陶之復陶之謂穴以居乎自爾雅訓釋猶多謬誤前儒訓釋亦難信釋水云滸水崖率循也胥相也今俗猶以觀視為相相字平聲得非字義本因相與觀視曰相而胥相同義乎箋云膴膴肥美釋文曰堇音謹廣雅云堇藋也今三輔之言猶然藋徒弔反説文云藋堇草也內則曰堇荁粉榆釋草云芨堇草郭注云即烏頭也音靳本草謂煎之則殺人然則生食之亦可乎荼釋見衛谷風堇荼甘如飴以地之肥美也莆田鄭氏曰飴餳也周禮春官菙氏掌共燋契以待卜事注契龜之鑿也箋云時是也卜從則曰可止居于是可作室家于此也宣開也今俗謂初作田曰開荒自豳遷岐必率循西之滸而至岐陽大王居岐之陽凡豳人自西而徂東從大王而遷岐陽者皆執事效勞周遍也皆也箋云繩者營其廣輪方制之正也既正則以索縮其築板上下相承而起司空掌營國邑司徒掌徒役之事翼翼者廟簷如羽翼也説文曰救盛土于器也毛傳曰救虆也劉熙云虆盛土籠也王氏曰度傳土也蘇氏曰削屢重復削治也陾陾取土于虆衆多之狀也薨薨傳土者衆多之聲也登登築土寖髙之謂也馮馮張氏曰削土聲箋云五版為堵李氏曰公羊傳五版為堵五堵為雉何休以為堵四十尺許慎五經異義戴禮及韓詩説八尺為版五版為堵版廣二尺積髙五版為一丈考工記匠人注云雉長三丈髙一丈左傳隱元年杜注云方丈曰堵三堵曰雉一雉之墻長三丈髙一丈毛傳曰鼛大鼓也長一丈二尺周禮曰以鼛鼓役事人聲之盛鼛鼓弗能勝也朱氏曰書天子有應門春秋魯有雉門禮記魯有庫門家語衛有庫門皆無云諸侯有臯應者則臯應為天子之門明矣意者大王之時未有制度作二門其名如此及周有天下遂尊以為天子之門而諸侯不得立也箋云諸侯之宫外門曰臯門朝門曰應門內有路門天子之宫加以庫雉箋義殊未安孔疏云襄十七年傳宋人稱臯門之晳遂謂諸侯有臯門而左傳乃曰澤門之晳非臯門杜注亦曰澤門非訛誤也然則疏謂臯門之晳者其心記之訛歟又案定二年雉門及兩觀災子家子謂兩觀為僣以觀者臺土之加髙者也于以知雉門非僣而康成謂天子加以庫雉何也康成殆以魯得用王禮故魯有雉庫以未見家語故不知衛有庫門明堂位曰庫門天子臯門雉門天子應門是魯無臯應特其制似之爾閌大也將將人出入之多也冢土社也禮國主社主也尊之曰冡土毛傳曰起大事動大衆按原本四字脫必先有事乎社戎大也醜衆也戎亦有兵義肆猶縱也縱其愠怒我者不殄絶謂昆夷數侵侮而亦不足以隕墜我之令問孟子答貉稽引此詩謂文王也觀此詩蓋序大王以來至于文王之事亦不止言文王樓尚書謂孟子斷章取義但取此詩以言文王又云憂心悄悄愠于羣小孔子也邶柏舟之詩孔子本無與及其久也我之植木拔拔其盛行道之人兌然而四國之人咸歸之國勢盛強昆夷畏其盛服其德故疾趨而來服維其喙者言其敬畏而形容之也謂疾趨維喙息而已不敢有他也孟子曰文王之事昆夷以大事小箋云柞櫟也棫白桵也陸璣疏云周秦人謂柞為櫟釋木云棫白桵注云桵小木叢生有刺實如耳璫紫赤可啖陸璣疏云三蒼説棫即柞也其材理全白無赤心者為白桵今人謂之白梂二説不同未知孰是易曰兑説也邱氏曰混夷當為昆字之誤也毛傳曰駾宇也説文曰駾馬疾行貌吕曰喙張喙而息也蘇曰虞在陕之平陸芮在同之馮翊平陸有間原焉則虞芮之所讓也毛傳曰虞芮之君相與爭田久而不平乃相謂曰西伯仁人也盍往質焉乃相與朝周入其境則耕者讓畔行者讓路入其邑男女異路班白不提挈入其朝士讓為大夫大夫讓為卿二國之君感而相謂曰我等小人不可以履君子之庭乃相讓以其所爭田為間田而退天下聞之而歸者四十餘國蹶者動之疾也生者虞芮之善心由中以生也孟子曰樂則生矣生則烏可已也虞芮之爭心忽變而為讓心何其疾也此實文王之德有以感發之故曰文王蹶厥生謂文王發動其善心也而文王退然而不敢當曰豫有疏附之臣爾豫有先後之臣爾豫有奔奏之臣爾豫有禦侮之臣爾謂皆羣臣之力爾此蓋當時有稱贊文王之德者故文有此讓辭歟疏者逺臣也附者近臣也行則在我之先者在我之後者皆輔佐我以正者雖奔奏小臣亦吉人善士禦侮雖無所先不得已而命將率以禦之其將率皆行文王之德意無暴無怒觀執訊連連攸馘安安之狀則文王禦侮之臣亦輔文王之德文王之臣無非聖賢文王此言亦非徒謙而空言也文王之謙讓若是益以見文王之盛德故詩著之芃芃棫朴薪之槱之濟濟辟王左右趣之濟濟辟王左右奉璋奉璋峩峩髦士攸宜淠彼涇舟蒸徒楫之周王于邁六師及之倬彼雲漢為章于天周王壽考遐不作人追琢其章金玉其相勉勉我王綱紀四方易剡木為楫漢書亡維楫有風波舟楫之危或言能度水不用舟楫皆此讀自文王大明綿而下皆成王時所作之詩故曰文王曰武王至于棫朴其武王時周人贊勉武王之詩歟毛詩序惟言文王能官人而不及武王殊未安文王能使成人有德小子有造何止于能官人而已其言辟王或通言文武至于周王于邁六師及之則惟言武王爾文王不可以言六師人材之盛如棫朴之薪左右皆髦俊之士槱積也聚積人材固由選擇而人才之盛亦道化作成之功至于武王往伐或巡守六師及之皆有德有造之人也盛矣哉觀文王伐崇攸馘安安有德之容則知文武之時作成人材之盛有至于此其曰趣之曰及之曰峩峩皆髦士攸宜之意狀有不可形容之妙如彼雲漢為章于天其變化之所及者廣矣今周王方壽考未艾豈不能作人于遐逺乎以紂積惡化亦廣故今有望于武王盡作成遐逺之人也武王聖學如追琢之章其性如金玉之質王其勉勉無怠綱者道德之本紀者禮樂刑政之詳本末具偹德之流行速于置郵而傳命無不有德有造矣毛傳曰追雕也相質也棫白桵也朴枹木也釋木云朴枹者郭注云朴屬叢生者為枹考工記云凡察車之道欲其朴屬而微至注云朴屬猶附著堅固貌也此言棫木朴附叢密芃芃然盛也趣趍辟君也淠舟行貌楫棹也蒸衆也邁往也倬髙也半圭曰璋箋云璋璋瓉也祭祀之禮王祼以圭瓉諸臣助之亞祼以璋瓉郊特牲云灌以圭璋祭統云君執圭璋祼尸大宗伯執璋瓉亞祼王肅云羣臣行禮之所奉顧命曰大保秉璋以酢王肅説為安爾雅云峩峩祭也爾雅義多差謬奉璋可以言助祭峩峩者璋之狀其髙峻巍峩非祭也又考工記玉人云大璋中璋九寸邊璋七寸按原本四字脫射四寸厚寸黃金勺有繅天子以巡守宗祝以前馬其宗人與祝奉此三璋于天子車馬之前歟又云琢圭璋八寸以俯聘牙璋中璋七寸射二寸厚寸以起軍旅以治兵守又云璋邸射索功以祀山川以致稍餼然則王左右奉璋亦不特于祭見之靜觀是詩所謂于邁六師及之其追記武王伐紂之事歟抑記武王巡守薄震之師歟辭氣舒徐和緩殆言巡守時邁之事爾抑總言之歟瞻彼旱麓榛楛濟濟豈弟君子干祿豈弟瑟彼玉瓚黃流在中豈弟君子福祿攸降鳶飛戾天魚躍于淵豈弟君子遐不作人清酒既載騂牡既備以享以祀以介景福瑟彼柞棫民所燎矣豈弟君子神所勞矣莫莫葛藟施于條枚豈弟君子求福不回毛傳曰旱山名也麓山足也干求也玉瓉圭瓉也黃金所以飾流鬯也箋云黃流秬鬯也榛栗屬簡兮山有榛陸璣云楛其形似荆而赤莖似蓍上黨人織以為斗筥箱器又屈以為叉榛楛濟濟福祿之盛似之于是稱贊君子所以求福祿者以豈弟而已豈弟之道何道也豈和樂也弟孫順也君子之和樂孫順初無意説也融融怡怡是謂道心舜所謂精一執中者此也禹所謂安女止者此也孔子所謂孝弟之至通于神明光于四海無所不通者此也詩云自求多福此之謂也君子之求之也其諸異乎人之求之歟瑟堅膩貌考工記玉人之事祼圭尺有二寸按原本脫尺字有瓉以祀宗廟按原本脫宗字此詩箋云圭瓉之狀以圭為柄黃金為勺青金為外朱中央矣殷王帝乙之時王季為西伯以功德受此賜毛傳言金飾鄭言其詳蓋據玉人大璋中璋邊璋之制云黃金勺青金外朱中鼻寸衡按原本衡訛作衛四寸有繅故意圭瓉之制亦同詳觀玉人本文祼圭瓉與三璋黃金勺之文隔絶甚多文理未見其同毛鄭説俱未安孔疏謂秬黑黍一秠二米釀為酒以鬱金之草和之使之芬香鬱金色黃如金酒在器流動故謂之黃流以璋制考之則祼圭之瓉如勺歟其勺用瓉玉故圭勺名瓉歟孔叢子子思曰吾聞之子夏曰殷王帝乙之時王季以九命作伯于西受圭瓉秬鬯之賜孔疏謂鄭不見孔叢之書其言帝乙之時或當别有所據是章言受圭瓉秬鬯之賜為福祿唯君子豈弟福祿所以降也攸所也謂福祿因豈弟而降也説文云鳶鷙鳥鳶飛戾天魚躍于淵喻豈弟之德所以感動人心而興起之也孟子曰聖人先得我心之所同然爾孔子所以能綏之斯來動之斯和者所同者自然相感應也文王之所以蹶動虞芮之君善心由中以生者其機同也其機無他其道無出豈弟而已是心甚神是心甚平無所不通無所不感豈弟君子不能作人于遐逺乎言無所不作成也成人有德小子有造不獨文王有之自太王王季同此心也同此豈弟也故亦同此化成也清酒非止謂三酒自五齊皆酒也雖齊亦就中取其清者用之至于三酒則卑矣商頌烈祖亦曰既載清酤非謂在下之登酒也箋云載在樽中也騂牡赤色之牡是章言祭而獲福介大也景明也其福明著而大也無德者雖祭不獲福此介景福由豈弟以致之也瑟柞棫堅膩甚美民取為薪以燎有濟乎民矣君子有濟世之功似之君子豈弟濟世神所勞矣故降福祿如榛楛葛藟施于條枚有福祿滋蔓之象豈弟之君子求福有進而無退回者旋轉也退之謂也是求不以思慮是進不以思為豈弟不已即求福不回之謂也非果有心于求之也干祿求福詩人歌詠之辭也孟子曰説詩者不以辭害志以意逆志是為得之毛詩序曰旱麓受祖也失本詩大旨矣本詩專發明豈弟道化之妙而序惟言受祖不知道也豈弟君子太王王季文王武王之所同也思齊大任文王之母思媚周薑京室之婦大姒嗣徽音則百斯男惠于宗公神罔時怨神罔時恫刑于寡妻至于兄弟以御于家邦雍雍在宫肅肅在廟不顯亦臨無射亦保肆戎疾不殄烈假不瑕不聞亦式不諫亦入肆成人有德小子有造古之人無斁譽髦斯士男補音尼心切釋名男任也典任事也白虎通男者任也任功業也易林屯之離曰隂化為女陽化為男治道得通君臣相承曹植宜男花頌草號宜男既曄且貞朱曰思語辭也至哉太任之思齊乎大任之神氣定靜如齊非太任堅持強取此定靜也人心本定本靜動於意則失之太任不動乎意故常靜也愛媚其姑周薑能順事也後武王有天下周地為京師故詩人尊稱太任為京室之婦文王之妃太姒又繼嗣太任徽美之德音徽音猶令聞也名聞不虛得由實德而生故不妒忌敘進衆妾致生男之多詩人美其不妒忌之志極其美而言之謂亦可以致百男也觀關雎寤寐求淑女以配君子至於寤寐思服悠哉悠哉輾轉反側太姒盛德至是不妒忌不足以言之故詩人稱之曰則百斯男孔疏引定四年左傳曰武王之母弟八人是通武王與伯邑考為十子也史記管蔡世家云武王同母兄弟十人母曰太姒文王之正妃也其長子曰伯邑考次曰武王次曰管叔鮮次曰周公旦次曰蔡叔度次曰曹叔振鐸次曰郕叔武次曰霍叔處次曰康叔封次曰聃叔季載皇甫謐云文王取太姒生伯邑考武王發次管叔鮮次蔡叔度次郕叔武次霍叔處次周公旦次曹叔振鐸次康叔封次聃叔季載杜預不言曹叔振鐸而有毛叔聃淵明言曹叔而注云有毛叔圉其名與史記皆同其次則異毋則百斯男詩人意欲言其衆妾生男之多也惠順也孔疏云宗公是宗廟先公毛傳曰恫痛也時是也追王止於太王自公叔祖類而上曰先公盛稱婦德故及於承祭祀順惠宗廟神無怨恫晉語胥臣雖謂文王詢于八虞咨于二虢度于閎夭謀于南宫諏于蔡原訪于辛尹重之以周召畢榮為惠宗公然先儒釋詩未必皆得且叔孫豹誤釋皇皇者華以忠信為周又以懷和為周又以懷和為每懷左氏以為未安而削之然則雖古書亦難盡信夷考思齊之詩上下文理謂太姒惠順宗廟先公毛傳亦曰宗神國君自稱曰寡人則稱其妻宜曰寡妻蓋王侯自稱孤寡不榖謙辭也刑法也此曰寡妻殆文王嘗自稱寡妻法度儀刑之善故載之詩歟宫中之事唯文王知之詳歟是詩推本文王上有聖母下有聖妃雖大姒自有盛德亦文王盛德感應至于兄弟以御子家邦道化由中而逹于外詩人於是備贊文王盛德謂在宫則雍雍在廟則肅肅雖居不顯之地亦若有臨之者雖人心悅我無厭射亦兢兢保守無怠吕曰戎疾大患難也羑里之囚是也昆夷玁狁之難則其餘也殄絶也無也縱大患難不無而文王之功烈光大而無瑕玷假大也心無所動自敬自善故雖室中屋漏人所不聞知之地亦敬如式在車致敬則式他人諫而後入於善文王雖不因規諫亦入於善肆有甚盛廣肆之意又言文王道化廣大成人則有德小子則有造造者造之既興起其善心又左右之輔翼之使之入於善是謂造亦謂之作人古之人猶曰昔之人無逸曰昔之人謂老成人成德已久惟亹亹無厭斁斯士者總言成人小子及古老之人皆文王作成使之有譽為髦俊也毛詩序曰思齊文王所以聖也蓋文王之所以聖由上有太任之母下有太姒之妃故也衛宏不知道故有斯言人心本善善非自外至書曰惟民生厚因物有遷人心即道故曰道心動乎意始失之所謂作人亦作其所固有爾非能強其所無也學者知道不信已心之即道故謂文王之聖亦由外助縱有佐助亦不過助文王本心之善而輔成治化爾衛序之言殊為害道使文王如舜不幸其母嚚豈失其聖乎皇矣上帝臨下有赫監觀四方求民之莫維此二國其政不獲維彼四國爰究爰度上帝耆之憎其式廓乃眷西顧此維與宅作之屏之其災其翳修之平之其灌其栵啓之辟之其柳其椐攘之剔之其檿其柘帝遷明德串夷載路天立厥配受命既固帝省其山柞棫斯拔松柏斯兑帝作邦作對自大伯王季維此王季因心則友則友其兄則篤其慶載錫之光受祿無喪奄有四方維此王季帝度其心貊其德音其德克明克明克類克長克君王此大邦克順克比比于文王其德靡悔既受帝祉施于孫子帝謂文王無然畔援無然歆羡誕先登于岸密人不恭敢距大邦侵阮徂共王赫斯怒爰整其旅以按徂旅以篤周祜以對于天下依其在京侵自阮疆陟我髙岡無矢我陵我陵我阿無飲我泉我泉我池度其鮮原居岐之陽在渭之將萬邦之方下民之王帝謂文王豫懷明德不大聲以色不長夏以革不識不知順帝之則帝謂文王詢爾仇方同爾兄弟以爾鉤援與爾臨衝以伐崇墉臨衝間間崇墉言言執訊連連攸馘安安是類是禡是致是附四方以無侮臨衝茀茀崇墉仡仡是伐是肆是絶是忽四方以無拂補音赫黑各切淮南子汙壑穽陷之中髙誘注云壑讀如赫赫明明之赫荀勗大會行禮歌明明天子臨下有赫四表宅心惠浹蠻貊柔逺能邇孔淑不逆來格祈祈邦家是若禡補音滿補切野祭也説文以馬得聲馬本音姥晉鼓吹曲師執提工執鼓坐作從節有序盛矣允文允武搜田表禡赫者明威之謂莫者其莫之音而字訛歟瘼病也不然則民心之所不可者歟莫不可也二國其謂密與崇歟是詩惟言按密伐崇獲得也得其政不得謂失道也二國不道上帝于是究度四方諸國可以使征伐之者然上帝不遽伐之又久待之尚覬其或改也耆老也猶久也及其久也二國之惡終不悛反更張廓不少衰止式更也上帝憎惡之乃眷顧西國西周也上帝無常心以百姓之心為心民惡之則帝惡之民歸之則帝歸之文王未遽伐二國久待之即上帝之耆之此指西周也維與西周安宅焉于是作治西周之宅而又屏障之作者作治其田爾雅釋地云田一歲曰災釋木云立死椔斃者翳郭注引詩其椔其翳周禮夏官掌固司險五塗徑畛凃道路之上樹之林以為阻固林木密比蔽翳修理之平正之人為之所作即丄帝之所作也毛傳曰木立死曰災自斃為翳豈爾雅有别本歟抑傳者意之歟國家作治庶務不必專言治其木况爾雅亦多差誤今詩本文曰災當從釋地田一歲曰災立國治田蓋其先務林木之盛有灌木之從生焉有栵木之比列焉釋木曰灌木叢木又曰栵栭郭注云栭樹似槲樕而庳小子如細栗可食江東呼為栭栗內則云芝栭菱椇程曰行生曰栵啓之辟之謂芟除釋木云柳河柳郭注云今河旁赤莖小楊釋木云椐匱郭注云腫節可以為杖釋木曰檿山桑桑柘惟可攘剔不可除伐矣以其可以蠶也凡此土田道凃林木屏翳修治就敘則西周之居宅安矣周世世有德其德昭明人心歸往至于所患之昆夷亦畏力懷德恭順歸往往來載路遷往也串夷往服即上帝之所以向往也人心之往即帝命之往天立厥配大王得大薑王季得大任文王得大姒益助周德周受天命于是益固鄭箋云串夷即昆夷西戎國名爾雅釋詁云妃媲也某氏曰詩云天立厥配帝省西周之山柞棫拔然而長松柏兊然而悅陶淵明曰木欣欣以向榮易曰兊説也林木之盛其國富饒斧斤有時其國有政其邦固矣人道之所至即天命之所作有王季又有大伯為對大伯能讓故王季得傳文王既有王季又有文王為對既有文王又有武王周公自之為言後有繼矣因心則友者友愛其本心之所固有非自外而至非勉強而為后稷公劉大王天命漸歸周矣至王季復有德心犮其兄則天命之祥慶于是益篤厚矣天命之慶非無故而自篤也王季之德心有以篤之也帝于是錫之以光輝周家之德益著令聞益廣國勢益強有光輝焉周家之所有即天之所錫受祿者享國也世襲不絶是謂無喪遂至于奄有四方備言慶祥之篤厚左傳昭二十八年晉成􅡈曰詩曰唯此文王帝度其心莫其德音其德克明克明克類克長克君王此大國克順克比比于文王其德靡悔既受帝祉施于孫子心能制義曰度德正應和曰莫照臨四方曰明勤施無私曰類教誨不倦曰長賞慶刑威曰君慈和遍服曰順擇善而從之曰比經緯天地曰文九德不愆作事無悔故襲天祿子孫賴之先儒以已意解釋古訓豈能一一皆中後世以左傳古書也一切信之不敢有改而本詩帝度其心豈成􅡈之謂哉帝揆度王季之度爾而成􅡈又誤言文王豈所傳之誤也耶按王肅注及韓詩亦皆作文王審觀本詩上下文勢當從此本維王季帝度其心成􅡈言維此文王非莫者廣莫溥大之謂明者無蔽類者倫類不亂咸有其理惟克明故克類長猶君也析而言之則于親族言長于臣民言君克盡其道則能君矣克能也王季而言王此大邦者追王之後作此詩故云也順者順事殷王順事長老敬順臣民有順無悖比者親比鄰國臣民親比宗族王季之德衆善咸備比于文王亦併比無異于王季無有愆失無可悔之事是謂靡悔成􅡈所釋未盡其義樂記作克順克俾傳之差也比當毗至反而陸德明必里反者陸從樂記陸多好異失理既受帝之福祉又延及于孫子文王小心卑恭當紂大難見囚羑里惟有覬援于他人之心如溺者求援于畔維慕古聖羡治世初不敢有自為之心然是也帝謂文王無是畔援歆羡誕先登于岸勸文王自奮自濟無小心卑恭太過也文王即古聖大抵聖人不自以為聖上帝豈實有言諭文王哉太公之所啓告武王周公之所贊助閎夭太顛諸臣之所輔弼勉文王自奮自濟濟海內塗炭之苦無卑恭小心而已人事即天道人言即天言密人不恭敢拒違我周大邦之命既侵阮又徂往共國將侵之文王為西伯密拒命侵小文王于是從衆聖羣賢之請一怒而安民衆聖賢之言即上帝之言文王赫怒即上帝之怒爰整師旅以按止徂共之旅孟子引此詩作遏莒二者必有一誤若孟子徂莒為是則上亦當言侵阮徂莒共莒二字近似故訛救衛小國足厚周福篤厚也祜福也足以答天下望救于周之心矣對答也密人初依近周京先侵阮疆升陟我髙岡無矢射我陵此我之陵也此我之阿也無飲我泉此我之泉我之池也此皆止遏之辭文王未欲遽誅伐之姑止遏之故三軍之士從文王之旨亦姑止遏之文王之怒非私怒非生于忿之怒乃迫于義不得已之怒密之事情可以以師臨之諭之而止文王無過怒也密服則止釋山云小山别大山曰鮮郭注云不相連釋地云廣平曰原文王于遏密之後度其鮮原亦居岐山之陽在渭水相將稍近之地而遷邑焉孔氏疏云周書稱文王在程作程寐程典按原本三字脫皇甫謐云文王徙宅于程蓋謂此也箋嫌此即是豐故云後竟徙都于豐知此非豐者以此居岐山之陽豐在岐之東南三百里耳萬邦之方者雖居一方而萬邦之所歸也下民之王也帝謂文王豫懷爾之明德爾卑恭小心聲音顔色殊不大肆不以國勢滋長夏大而變革其心如無所知如無所識常靜常敬常止常一是謂順帝之則三才無二道道在人心人心即道故曰道心是心無形是心無我虛明無際天地無間惟動乎意流乎邪故失之故與天地睽隔不動乎意則融融渾渾即帝則也如水鑑未嘗有知識也而自能鑑物如日月未嘗有知識也而自能照物文王之赫怒即是心也文王之遏密伐崇即是心也即舜之精一也即禹之安女止也帝謂文王詢問爾之仇方詢其事狀情理若不可不伐則同爾兄弟之國以爾鉤引攻城之具與夫臨車衝車以伐崇國之城崇侯虎導紂為惡虐囚文王于羑里文王非伐已仇乃伐天下之所仇非告語之所及故伐之凡可以在上臨下之具皆臨也凡可以從旁衝擊之具皆衝也間間間暇不急遽之狀文王不得已而攻崇城猶或覬崇侯之忽悔而改也人性本善因物有遷其本善終不磨滅聖人心量如天地故三軍之士行文王之德意其狀間間毛傳謂言言髙大也安知非墉之崇人有順迎王師之言不一乎毛傳亦多差謂此間間為動搖亦非箋謂言言將壞貌訊言也執所生得者而言問之連連而至不絶也此順德者故不殺而執至也如崇侯惡黨凶徒則殺而馘之釋詁曰馘獲也不服者殺而獻其左耳曰馘于內曰類于野曰禡其未致者猶招致之使附不忍驟伐寬徐如此而四方無敢侮周者王氏曰仡仡壯也説文引詩崇墉仡仡髙貌周書曰仡仡勇夫箋云伐謂擊刺之肆犯突也毛傳曰忽滅也朱曰拂戾也春秋傳曰文王伐崇三旬不降退修教而復伐之因壘而降夫始攻之緩戰之徐非力不足也非示之弱也將以致附而全之也及其終不下而肆之則天誅不可以留而罪人不可以不得故也此所以為文王之師也茀茀者臨衝密比如草之鬱茀也毛詩序曰皇矣美周也天監代殷莫若周世周世修德莫若文王此序未為全非大扺贅語無所發明是詩言天人無二不識不知間間安安非聖人豈能作為序者固不識也又本詩惟言遏密伐崇而伐殷之意尚隱經始靈臺經之營之庶民攻之不日成之經始勿亟庶民子來王在靈囿麀鹿攸伏麀鹿濯濯白鳥翯翯王在靈沼於牣魚躍虡業維樅賁鼓維鏞於論鼓鐘於樂辟雍於論鼓鐘於樂辟雍鼉鼓逢逢矇瞍奏公囿音又麀音幽補音伏周官考工記不伏其轅必縊其牛注云故書伏作逼杜子春云逼當為伏音同而字異也賈誼鵩賦伏與域叶東方朔七諫伏與息叶揚雄長楊賦伏與息叶班固幽通賦伏與逼叶揚雄上林苑令針伏與碩叶補音伏筆力切未安集韻鼻墨切逼筆力切又伯逼反同音有逼而唐韻堛茫逼切簡謂伏宜茫逼切既與逼同韻又與諸賦針韻叶又與今音同毋特聲微轉爾服蔔蔔若筆力切則異毋翯音鶴孟子鶴鶴牣音刃文王為臺方經畫而營之而庶民咸來共攻治之不盡一日而已成之故當時有言曰有司經始勿庸急庶民如子而來矣文王為臺非如後世侈故不日而可成然民來如子成之速人異之於是謂其臺曰靈臺謂其沼曰靈沼謂其囿曰靈囿謂其速若神靈然孟子所謂民歡樂之謂臺沼曰靈麀鹿牝者獨言麀蓋所親見見所伏於囿中見其光澤如洗濯然故曰濯濯劉曰鹿易驚易逸王在靈囿徒御非少不驚不逸而攸伏者無害獸之心鹿則信之而弗疑也然則首言麀伏亦以人異故歟白鳥翯翯然張羽而髙滿沼魚多而躍此不為異而詩人言之者民歡樂所覩皆樂故云也毛傳曰牣滿也植者曰虡橫者曰栒業大板也樅崇牙也賁大鼓也鏞大鐘也孫炎曰虡栒之植所以懸鐘磬也釋器云大板謂之業孫炎曰業所以飾栒刻板􅚃業如鋸齒也孔疏云其懸鐘磬之處又以采色為大牙其狀隆然謂之崇牙崇牙之狀樅樅然有瞽曰設業設虡崇牙樹羽此樅亦文承虡業之下故知樅即崇牙之貌考工記韗人鼓長八尺鼓四尺中圍加三之一謂之鼖鼓釋樂云大鼓謂之鼖大鐘謂之鏞吕曰於歎美辭也樂記曰論倫無患樂之情也鄭箋云論之言倫也得其倫理乎毛傳曰水旋邱如璧曰辟雍以節約觀者鼉魚屬有眸子無見曰矇無眸子曰瞍孔疏曰月令季夏命漁師伐蛟取鼉書傳云鼉如蜥蜴長六尺陸璣疏云鼉形似水蜥蜴四足長丈餘生卵大如鵝卵其皮堅厚可冒鼓毛傳曰公事也爾雅釋詁云公事然爾雅及毛傳亦多差誤按燕禮樂正告歌備于公公者諸侯之通稱文王時殷世尚質故矇瞍告歌備于公而不以樂正歟所謂矇者矇矇略見故可奏公特目視不明之老稱歟視不明者聽必精故樂工用矇瞍鼓鐘於樂音最著故言樂之倫理必曰鼓鐘春秋傳曰公既視朔遂登觀臺以望而書雲物楚椒舉曰先王之為臺不過望氛祥孟子曰民之歡樂之樂其有麋鹿魚鱉毛詩序曰靈臺民始附也文王受命而民樂其有靈德以及鳥獸昆蟲焉夫民心親附文王也久矣奚始於此餘贅辭爾雅釋宫云四方而髙曰臺含神霧曰作邑於豐起靈臺左氏説靈臺在太廟之中壅之靈沼謂之辟雍王制云太學在郊天子曰辟雍諸侯曰頖宫康成謂辟雍及三靈同處在郊矣為囿為沼可知在郊大戴禮盛德篇云明堂者九室室有四户以茅蓋屋上圓下方外水曰辟雍夫文王追王詩作於後固可稱王至於辟雍乃事實文王豈有僣天子制耶殆文王創之後周有天下始定為天子制歟亦猶大王立臯門應門後定為制歟下武維周世有哲王三后在天王配于京王配于京世德作求永言配命成王之孚成王之孚下土之式永言孝思孝思維則媚茲一人應侯順德永言孝思昭哉嗣服昭茲來許繩其祖武於萬斯年受天之祜受天之祜四方來賀於萬斯年不遐有佐今俗語下來謂後來也武步武也有前步而無後步者不繼也維周有後步夏有禹有啓而無繼商有湯而無繼周有大王又有王季又有文王有武王如前步有後步相繼不絶故以下武為喻而曰下武維周謂有後步者維周爾周世有哲王大王王季文王三后雖已在天在天謂已殁也而武王配于周京配合也其道與三后無異也周家世世以德為務作求即為務之謂也維世世求德故永永配天命四海之內皆願望周有天下皆信周之必王孚信也周成王業天下咸信其必成三后之心與武王之心一也一者德也四后之心與上帝之心亦一也與四海之心亦一也是一德之中無利心也無富天下之心也無動心也禹曰安女止是心也舜曰精一執中是心也湯與伊尹咸有一德是心也是固海內之所共服其言其行固海內所法式是心寂然不動如太虛感而遂通如四海微動乎意則愆則尤何式之有湯表正萬邦武王作式惟聖人王天下故天下咸師仰之世世繼德是永永能孝曰思者助辭歟其曰孝思則所思者德心歟所思安止歟精一歟維是維則易曰乃見天則詩曰順帝之則又曰有物有則則者大公至正中庸不可變改之則也三才之所同也故天下同心歸之媚武王雖諸侯而有天下咸媚之者應侯之順德不知者以武王伐紂為非順也知者以武王為順德也使武王有毫釐不順之心則何以為武王何以配天命何以配三后之德服事也大王王季文王順事殷商武王乃伐商其事不同也而曰嗣繼其服事昭明者其德同也其無利心無富天下之心同也寂然不動同也故特曰昭哉嗣服真繼志述事也昏者以迹為事明者以德為事又曰昭茲來許許所也昭其先祖之所自來者德也安止者也精一者也不動者也是謂來許是謂祖武是則三后之步武也是則武王之所繩也繩循也循繩而往也詩人謂武王受天之祜于萬年者知周世德深入乎人心深入乎人心則深得乎天心故云也今武王有天下四方來賀是受天之祜也詩人謂豈特于今遐逺之方咸來佐助于後萬年亦無有遐逺而不來佐助乎毛詩序曰下武繼文也武王有聖德復受天命能昭先人之功焉不以武為步武而曰武王則何以曰維周也不曰昭其德而曰昭其功不明四后之心甚矣衛宏之害詩也如此文王有聲遹駿有聲遹求厥寧遹觀厥成文王蒸哉文王受命有此武功既伐于崇作邑于豐文王蒸哉築城伊淢作豐伊匹匪棘其欲遹追來孝王后蒸哉王公伊濯維豐之垣四方攸同王后維翰王后蒸哉豐水東注維禹之績四方攸同皇王維辟皇王蒸哉鎬京辟雍自西自東自南自北無思不服皇王蒸哉考卜維王宅是鎬京維龜正之武王成之武王蒸哉豐水有芑武王豈不仕詒厥孫謀以燕翼子武王蒸哉亟或作棘毛詩此篇聿並作遹禮器作聿聲聞譽也文王有聲其聲甚駿美聿發語助也文王之所以有聲維求安寧而已求安民而已初無圖王之志其後雖不得已而有伐紂之事實無利心無私心一於求寧而已而卒觀厥成詩人贊之曰蒸哉蒸盛也爾雅釋詁雖以蒸為君然爾雅多差誤不可盡信蒸衆也故因有盛義盛有大義聖人無心於成功業惟有志於安天下此文王之所以大也受命之義備見皇矣無然畔援之章所謂天命即大義之必不可得而已者是或因衆聖之啓告或因內志之聰明欲已而義不得已於是王赫斯怒爰整其旅以遏密人徂侵之師以伐崇墉此即受天命而行之有此武功也既伐于崇作邑于豐天命也作豐邑當時人情事理必利害曲折文王因其義之所當為而為之皆天也使文王微置私意於其間不由乎天則必不合乎人何以為文王何以有成再贊曰文王蒸哉所以大其功也亦以大其道也淢溝也有城必有淢取土為城因以為溝為險匹兩也昔者作程今又作豐是為兩非急有所欲為也乃追奉其所自來之孝道也周世世有道由道而行今更作豐亦由道而行雖欲以就王業亦以順民之所欲順天之所欲順義理之所當而作之也文王之心常安常止若亟其欲是人欲非天道也周世世不失此道謂之孝文王亦追此道而已王后亦謂文王也濯光潔也亦猶新臺之有泚有灑光潔如洗滌也文王既追王其大臣後亦為公侯文王與其臣潔濯豐邑之垣蓋凡百君臣同謀協議故詩人言王公也四方咸歸故曰攸同也豐邑漸臨中國四方又咸歸豐邑城域又崇壯險固國勢益強文王至是如插羽翰而飛不可得而摧遏矣此在姦雄以私意行之謂之術在文王由義理行之謂之天命使有毫許私意則得罪於天矣豐水東注于渭禹導治之功也因豐水思禹績曰王曰后曰皇曰辟皆大君之通稱尊而大之屢更其辭愛敬文王之至也鄭箋謂鎬京在豐水之東遂謂此章言武王未安觀文理猶謂文王也自鎬京辟雍以下則言武王矣康成不善屬文故有此曲説豈平分此詩四章武王故斷之歟然古詩與後之詩不同辭以逹意意止則止意未止則未止奚拘整整為兒童態哉鎬京外水如璧壅之故曰辟雍不必專言學後漢郡國志言鎬在上林苑中注云長安西南有鎬池豐鎬相去二十五里文王之時三分天下有其二餘一猶未盡服也至於武王則四方無思不服故武王有天下考成也卜宅鎬京成謀本於文王卜而得吉是龜正之文王已得吉武王成之而遷焉古者城邑宫室之制不侈費又庶民子來共攻故易於遷得非四方會同日盛於昔故豐邑又不足以容人又人情事理利於遷鎬為多故不得已而遷歟毛傳曰芑草也仕事也人士之仕皆從其事故仕事通稱歟古士事通稱詩陟降厥士保有厥士康誥百工播民和見于周皆以士為事豐水猶生芑武王豈得不有所事事猶生也言有滋生於昔以國勢益大而遷鎬猶滋生也祖父有成謀詒於孫成王以燕安羽翼之遷鎬謀於文王成於武王本於文王故以成王為孫又以武王言之故又曰子子亦謂成王也是詩言文王武王同心於安寧天下作豐作鎬皆所以奉天命慰人心也而衛宏作毛詩序曰繼伐也武王能廣文王之聲卒其伐功也宏不明文王本志於永寧奉天命武王同道而以繼伐為大旨失二聖之本心矣廣聲卒伐藻辭贅語殊為害道
