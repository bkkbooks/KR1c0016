body:
  text: 慈湖詩傳卷二十宋楊簡撰商頌猗與那與置我鞉鼓奏鼓簡簡衎我烈祖湯孫奏假綏我思成鞉鼓淵淵嘒嘒管聲既和且平依我磬聲於赫湯孫穆穆厥聲庸鼓有斁萬舞有奕我有嘉客亦不夷懌自古在昔先民有作温恭朝夕執事有恪顧予烝嘗湯孫之将那衛宏作毛詩序曰那祀成湯也自微子至於戴公其間禮樂廢壊有正考甫者得商頌十二篇於周之大師以那為首今所存五篇而衛宏惟言十二篇何也斁補音弋灼切奕澤並同上切昔補音息約切古也昔有三音一如交錯之錯類篇倉各切注引周官老牛之角沴而昔一如鳥鵲之鵲説文鵲舄昔三字同音一如侵削旁紐削轉為昔故昔削互用楚辭大招昔與作澤客叶左思魏都賦昔與魄叶又詠史詩昔與壑叶左貴嬪楊后文昔與閣叶澤徒各切客克各切魄白各切用韻皆與詩同特不知於前三音之中當為何讀詩韻多得之旁紐今定讀如削夕補音祥龠切左貴嬪楊后文思媚黄姑䖍恭朝夕允釐中饋執事有恪毛傳曰猗歎辭那多也鞉鼓樂之所成也夏后氏足鼓殷人置鼓周人縣鼓明堂位曰夏后氏之足鼓殷楹鼓周縣鼓毛詩鄭箋云置讀曰植金縢曰植璧夫璧不可植也唯可置之而已故徐音置然則植置通用歟故鄭讀此置曰植楹謂之柱貫中而樹之也鞉則楹鼓之小者加兩耳揺之耳還自擊故曰置立然則音義置植皆通歟或欲作樂先設置歟爾雅釋詁云那多也此那與專指鞉鼓非謂大鼓也而箋謂鞉與鼓為二未安下文奏鼓簡簡則大鼓矣康成不善屬文而好拘故分鞉鼓為二簡簡聲辨而不雜如簡也衎樂和也箋云烈祖湯也湯孫太甲也是頌始作則太甲時也後世亦可用之亦可稱湯孫假格也假格音相近記者不同也格至也來也湯孫奏樂以來其神歟綏安也神其安我所思而成之歟湯孫思得烈祖之神至而享之也淵淵鞉鼓之音小嘒嘒亦小貎風云嘒彼小星比管聲小矣平者不焦急按原本誤作意又不緩濁也和則衆音諧協舒暢中平也鼓管皆依磬聲於歎辭赫盛也於是告湯孫曰此樂盛矣穆穆者和靜微逺之音毛傳曰大鐘曰庸鐘鼓餘音未巳而又續是謂繹如也斁繹也奕盛也舞者多而盛也周禮謂四方之使者曰國客此雖殷禮或當同歟不然則殷不異賓客此謂諸侯歟然殷頌言諸侯曰龍旂十乗曰多辟其辭則重矣夷平也懌悦也和平而樂也箋云亦不夷懌乎言夷懌也自古在昔之先民有所作為温恭朝夕執事有恪言今與祭之人亦然詩人於是又曰顧我今烝嘗之祭仍湯孫之所将奉也将奉出於誠敬夫温恭也恪也将也皆此心也此心道心也祖考之所以來格者此也既和且平者此心所以自古先民之道皆此也所謂一言以蔽之曰思無邪者此也一也嗟嗟烈祖有秩斯祜申錫無疆及爾斯所既載清酤賚我思成亦有和羮既戒既平鬷假無言時靡有爭綏我眉夀黄耉無疆約軧錯衡八鸞鶬鶬以假以享我受命溥将自天降康豐年穰穰來假來饗降福無疆顧予烝嘗湯孫之将按此篇永樂大典缺卷天命𤣥鳥降而生商宅殷土芒芒古帝命武湯正域彼四方方命厥后奄有九有商之先后受命不殆在武丁孫子武丁孫子武王靡不勝龍旂十乗大糦是承邦畿千里維民所止肇域彼四海四海來假來假祁祁景員維河殷受命咸宜百禄是何肇音兆史記殷契母曰簡狄有娀氏之女為帝嚳次妃三人行浴見元鳥墮卵簡狄取吞之因孕生契帝舜命契為司徒封於商毛傳曰元鳥鳦也諸儒習於孔子不語怪神而不肯信姜嫄履帝武敏歆簡狄吞元鳥之卵而生商之事夫天地間怪神之事何所不有簡冊所載耳目所及若是者多矣子不語怪神乃門弟子所記孔子亦未嘗斷然曰天下無怪神之事生民元鳥之詩孔子取焉諸儒則穿鑿為説強使之無孔子未必如此諸儒為説終不若詩文之明白坦夷道無所不通故變化無所不有惟知道者信之特難於言以天下執已見執迹不化者多雖告之多疑故孔子不言爾自簡狄至湯歴年久矣故謂命元鳥降生商之上帝曰古帝是時古帝已命武湯域有四方矣湯者契後世之孫生契所以生湯也域謂包有之也四方咸命湯后奄有九有蓋湯得四方之心故四方咸戴之欲以為王九有九州也奄盡也猶言域四方也特更其辭爾人心所歸即上帝之所命民為貴君為輕故此謂方命厥后商之先后所以受天命繼繼承承不危殆者以有武丁孫子繼其後也武丁為先后之孫子兩言武丁孫子賛美不已也武丁髙宗有武功故曰武王靡不勝易曰髙宗伐鬼方説命曰惟甲胄起戎惟干戈省厥躬知髙宗有武功伐而克之曰勝建龍旂者十乗謂諸侯來助祭也大糦是承祭以黍稷為重也鄭箋謂諸侯奉承而進之未安奉黍稷主婦之職攷特牲按原本作時牡誤少牢禮則然天子祭禮不存今獨以此文承龍旂十乗而遂以為諸侯則難詩文固多承連而意别者諸侯助祭為賔於奉糦非其類韓詩云大祭也邦畿千里維民所止者髙宗能安民民安其居故云也肇始也帝小辛帝小乙之時殷道衰雖不至危殆而四海之心不悦服諸侯來朝貢者鮮矣至髙宗始能得四海歡心始能統域四海四海諸侯來假假格也格音之訛也至也謂朝貢也祁祁盛貎箋云員古文作云何或作河字訛也箋云所云維何乎言殷王受命皆宜百禄是何謂擔負天之多福箋意謂來假者所云也稱頌歸美之辭也景明也明言也云言也後篇何天之休何天之龍皆擔何之義也衛宏作毛詩序曰元鳥祀髙宗也濬哲維商長發其祥洪水芒芒禹敷下土方外大國是疆幅􅊷既長有娀方将帝立子生商𤣥王桓撥受小國是逹受大國是逹率履不越遂視既發相土烈烈海外有截帝命不違至于湯齊湯降不遲聖敬日躋昭假遲遲上帝是祗帝命式于九圍受小球大球為下國綴旒何天之休不競不絿不剛不柔敷政優優百禄是遒受小共大共為下國駿厖何天之龍敷奏其勇不震不動不戁不竦百禄是總武王載斾有䖍秉鉞如火烈烈則莫我敢曷苞有三蘖莫遂莫逹九有有截韋顧既伐昆吾夏桀昔在中葉有震且業允也天子降于卿士實維阿衡實左右商王方補音方字絶句隕音員娀音嵩撥韓詩作發相急亮反球音求何上聲下同絿音求遒在囚反共音恭厖莫邦反戁奴版反蘖五葛反阿衡補音户郎切史記商紀叙傳維契作商爰及成湯太甲居桐德盛阿衡荀卿賦篇以能合從又善連衡下覆百姓上飭帝王晉樂章陟帝位繼天正玉衡化行象神明至哉道隆虞唐按原本無荀卿賦篇晉樂章二叚今從韻補增入漢書霍光叙傳遭家不造立帝發王權定社稷中配阿衡左右並去聲濬深哲明商先王有是德性人所同有物有遷則昏昧淺近故謂聖賢濬哲商不失濬哲之德故其發祥也長詩人推本洪水芒芒禹敷治下土盡力溝洫故地形方正不特畿内而已畿外之國皆修理其疆畔不云小國獨言大國者有娀大國也将大也有娀之女簡狄契母也毛傳曰幅廣也鄭箋曰􅊷當作圓圓謂周也箋意謂内廣而長其間有娀之國方盛大其女生契堯封之於商天也故曰帝立其子而生商毛傳曰元王契也桓大撥治也簡狄取元鳥卵吞之而生契故曰元王桓者有才力之謂撥者分撥也契治五典五典分撥不亂又畿内外之地不勝其多契一一辨治故曰桓撥畿外侯國皆當施教而逹之諸國皆聽命於契契受小國之請則以是道逹之自是内外率循是教而履行之不踰越所教於是遂往審視之則既皆興發而率履焉其躬視與使其屬視則不可必也文王蹶厥生生即興發也謂善心興起也孟子曰待文王而後興其義同周官大司徒布教于邦國都鄙使各以教其所治民相土繼其職業雖海外之邦亦截截整整不越教典自契以來繼世皆不違道故天命亦不違商至于湯齊同尊湯而神之如自天降適當興王之時不遲也湯之德性則聖矣孔子曰心之精神是謂聖而因物有遷者不勝其多矣多不足以言之其不遷者則不失其本性之聖是謂聖人而庸人皆不得言聖矣聖生敬敬者不慢易不放逸之名意動即謂之放逸不動乎意則不遷不放逸是謂敬禹曰安汝止敬也舜曰惟精惟一敬也伊尹曰欽厥止敬也止者不動乎意也如此則進德無疆矣故曰日躋躋升也進也德性清明本不可以升降進退言之以衆人遷於物動乎意滯陷而不能進乎善故以不滯陷而通逹無阻者謂之躋升舜言惟精惟一以其進德亦有未精一者故也不精則雜不一則有間間則雜雜則間間雜則遷即動意也然則聖人之進德也至矣非思慮之可言非云為之可執詩曰日躋易曰進德皆因人之常言而言不可執躋進為有意也孟子曰説詩者不以文害辭不以辭害志湯進德如此固自知可以昭格于天而湯心遲遲不動乎意惟祗敬上帝而已祗敬上帝之心正心也雖祗敬而不動乎意若夫急於昭假急於事功是動乎意而遷也何以為聖敬何以能昭假至矣哉遲遲兩言足以形容聖敬日躋融融怡怡不遷不動之道心矣維其若是故帝命湯作式于九圍九圍九州也亦曰九有小球大球小國大國朝聘之玉也旒者冕之旒以絲綴之旒在目前目所正視為下國所瞻覩尊敬也小國大國如此尊敬是天之休命至也故曰荷天之休謂諸侯歸湯猶未伐桀之時也不競心無所競也不絿心無所求也無所競無所求不動乎意而遷也不動乎意故不偏於剛不偏於柔敷政優優寛裕從容不迫急也湯之心雖遲遲優優而百禄之來則遒急也王氏曰小共大共小國大國所共之貢也夫湯未伐桀未正天子之位而諸侯已如此共貢故殷為下國之駿厖駿俊也厖厚也諸侯歸仰則湯為俊咸共貢焉則殷國為厚矣下國畢共是天之寵我也大戴禮衛将軍文子篇云詩受小共大共為下國恂蒙何天之寵傅奏其勇毛詩作何天之龍箋云龍當作寵敷徧也諸侯之來致其朝貢者與凡臣民咸進伐桀之謀是謂敷奏進也衆進勇説而湯不為震動亦不以為難而有戁心亦不懼而竦嗚呼湯之道心安止不動雖若此大事亦不㣲動此其所以為聖也百禄自緫集於湯及其終也湯知下民之罹毒也深使伊尹五就桀以輔之終不可變又諸侯之咸歸天命之既至不得而已乃奮其武德車載其斾秉鉞有䖍䖍敬也雖武而非肆也如火烈烈莫有敢曷者湯至是行其義亦非動乎意也如四時錯行如日月代明也此惟得道者自知自信而未得乎道者終疑也毛傳曰苞本也朱曰蘖旁生萌蘖也言一本生三蘖也本則夏桀蘖則韋也顧也昆吾也皆桀之黨也湯既征不義桀與三蘖皆不得遂其惡九有皆截截無為亂敗道害民者惟苞有三蘖當除去故既伐韋顧遂伐昆吾夏桀箋云韋豕韋彭姓也顧昆吾皆已姓也釋文云漢書古今人表作韋鼓毛傳曰葉世也為義未明人自少至老歴年之多如業昔湯之中年始震動業業於平亂安民信乎為天所子天又降生卿士曰阿衡伊尹也阿安也衡平也伐桀之謀本於伊尹相湯伐桀伊尹有安平天下之功故號阿衡曰卷阿曰阿邱曰阿旁皆人之所安也衛宏作毛詩序曰長發大禘也劉曰功臣與祭故言伊尹撻彼殷武奮伐荆楚罙入其阻哀荆之旅有截其所湯孫之緒維女荆楚居國南鄉昔有成湯自彼氐羌莫敢不來享莫敢不來王曰商是常天命多辟設都于禹之績歳事來辟勿予禍適稼穡匪解天命降監下民有嚴不僭不濫不敢怠遑命于下國封建厥福商邑翼翼四方之極赫赫厥聲濯濯厥靈夀考且寜以保我後生陟彼景山松柏丸丸是斷是遷方斲是䖍松桷有梴旅楹有閑寝成孔安撻擊也殷之武威撻擊以伐荆楚深入險阻荆之旅衆恐懼保聚也截然不敢微動此湯孫之功緒也衛宏序曰殷武祀髙宗也毛無傳然則孫不知何王鄭箋云氐羌在西方饗獻也周語曰夫先王之制邦内甸服邦外侯服侯衛賔服蠻夷要服戎翟荒服甸服者祭侯服者祀賔服者饗要服者貢荒服者王日祭月祀時饗嵗貢終王終謂世終也箋云世見曰王昔成湯之時自彼逺夷氐羌猶莫敢不來饗莫敢不來王者曰饗于商王王者曰來朝于商王毎毎曰商是其常也女荆楚居國南鄉不為甚逺而不饗不王也明其有罪而伐天命衆多之辟建設國都于禹績之中辟君也謂諸國之君也來辟猶曰來王也嵗時來朝覲勿使予適于禍也若不來饗不來王則王朝不得已而征伐是使予適于禍也適往也往入于禍患之中也惟當務農勸率稼穡不解周公作無逸首言知稼穡酒誥曰惟土物愛厥心臧蓋稼穡之心正心也非放逸之心也古聖賢深知治亂之機在此故云夫天命降而監察下民甚嚴言有罪則有灾其有不僭越不淫濫不敢怠荒則天命下國大建厥福毛傳曰封大也孔疏引定四年左傳封豕長蛇為証商邑翼翼言宫室之盛如鳥羽然四方之所仰是為極如屋極然其所以致四方之歸仰者以有道德之聲靈感服之也赫赫厥聲濯濯厥靈蓋以言夫不可形容之状甚矣道德之神且靈也夫道德正而已矣而天下同心之所服焉商之賢王饗國久長見諸無逸故曰夀考且寜惟其夀考故德業益固以保安我子孫升彼景著之大山掄材焉松柏丸丸然圓而直乃斷而遷之方正而斵之䖍敬不敢慢易以松為椽桷而長旅衆也楹柱之衆其間空立者有閑之意廟有寝朱曰此蓋廟始祔而祭之詩也安所以安其神自封建厥福已上其所廟之王在昔訓辭之所有乎髙宗多征伐衛序曰祀髙宗或然
