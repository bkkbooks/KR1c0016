body:
  text: 慈湖詩傳卷二宋楊簡撰召南維鵲有巢維鳩居之之子于歸百兩御之維鵲有巢維鳩方之之子于歸百兩將之維鵲有巢維鳩盈之之子于歸百兩成之孔子曰歸妹天地之大義也人知夫婦之即天地則一而不二正而不邪化生而無為為序者不明乎道故不足於此詩而於詩外起説曰夫人之徳也德如鳲鳩又及於國君積行累功如此為周南召南而欲不正牆面不可得矣爾雅釋鳥云鳲鳩鴶鵴郭云布穀未安音如布榖者不居鵲巢音如鴶鵴者乃居鵲巢是為鴝鵒魯昭公三十五年鴝鵒來巢而公如乾侯終於乾侯此亦假他巢之應也故文成之世已有童謡曰鴝鵒跦跦公在乾侯矧鴝鵒亦鴶鵴之音凡鳥名多用其音埤蒼云鴶鵴方言云戴勝今審究戴勝首有竦毛鴝鵒亦有之而鴝鵒身色黒戴勝身色毼而稍長大豈埤蒼攷之未審與布榖一名穫榖其音渾然鴝鵒其音亟然穫榖色毼頸有斑者李氏亦以鳲鳩為鴝鵒按樓鑰云多識鳥獸草木之召玫之當如此詳宻鳲鳩之為鸜鵒甚明浙人呼為八哥兒川人呼為阿八所謂音如布榖者乃今班鳩俗謂之步姑其性雖拙粗能為巢戴勝首有竦毛向後鴝鵒竦毛直上又自不同鳲鳩之刺不一正所謂鴝鵒也郭景純云布榖固已失之歐公言拙鳩亟然不知此乃鴝鵒吕氏具載皆未當也毛詩傳曰百兩百乘也諸侯之子嫁於諸侯送御皆百乘疏云書序云武王戎車三百兩皆以一乘為一兩風俗通以為車有兩輪故稱兩鄭箋云御迎也毛傳云將送也方有之也盈滿也子貢方人謂此方人物也此姪娣相比故云方歟婦人謂嫁曰歸成之成其禮歟觀是詩惟言婚姻夫婦之禮鳩居鵲巢如婦來居夫室不必推言均一之徳毛傳惟言鳲鳩不自為巢居鵲之成巢不言鳲鳩均一之徳獨衞宏之序與鄭康成之箋言之鳲鳩誠有均一之徳其在此詩則或可畧言不可專言蓋此詩於均一之意不甚著而婚姻之禮甚詳衞鄭不深信婚姻即天地之大義故不足焉而諄諄外求其義此不可不辨所辨非小故蓋明三百篇思無邪之大道剖學者正面之牆補音云居姬御切周易屯見而不失其居蒙雜而著韋元成復玷詩昔我之隊畏不此居今我度兹戚戚其懼揚子雲衞尉箴茫茫上天崇髙其居設置山險晝為防禦張衡西京賦外有蘭臺金馬遞宿迭居次有天禄石渠校文之處博雅注云凥几聲今居乃箕倨字也居慮切故補音用王肅讀魚據切簡謂居有姬音者姑慈切今方言有之則去聲姑自切矣御即迓之方音聘禮以訝為梧梧御同音特髙下不同耳居姑自切庶於迓音通豈至漢世始轉而為魚據切歟于以采蘩于沼于沚于以用之公侯之事于以采蘩于澗之中于以用之公侯之宫被之僮僮夙夜在公被之祁祁薄言還歸被皮寄反僮音同祁巨私反此供祭祀之心勤敬之心即道心即聖賢之心即天地鬼神之心毛傳蘩皤蒿也于於沼池沚渚也公侯夫人執蘩菜以助祭爾雅釋草云蘩皤蒿郭云白蒿也釋水云水中可居者曰洲小洲曰渚小渚曰沚詩疏云白蒿非水菜此言沼沚者謂於其旁采之也于澗之中亦謂於曲内非水中也毛傳曰宫廟也被首飾也僮僮竦敬也夙早也祁祁舒遲也薄猶畧也言語助之辭也薄言旋歸雖可以還歸而其肅敬若有不敢之意故曰薄言故被祁祁祁祁之容雖舒遲而非肆也序曰夫人不失職也言非不善而不明夫人之敬心惟曰不失職猶求諸外也喓喓草蟲趯趯阜螽未見君子憂心忡忡亦既見止亦既覯止我心則降陟彼南山言采其蕨未見君子憂心惙惙亦既見止亦既覯止我心則説陟彼南山言采其薇未見君子我心傷悲亦既見止亦既覯止我心則夷喓於遥反趯託歴反降補音胡攻切孟子曰降水者洪水也楚辭四用降韻徐邈皆胡攻切揚子雲河東賦下降與豐隆叶馬融笛賦五降與八風叶阮籍寄懐詩降與雄叶韓愈劉統軍碑詞琳後來降公不有功惙張劣反爾雅釋蟲云蛗螽蠜草螽負蠜郭注引此詩趯趯蛗螽以釋蛗螽蠜喓喓草蟲以釋草蟲負蠜爾雅釋草蟲一名負蠜一名常羊郭注同陸璣云小大長短如蝗也奇音青色好在茅草中按原本茅誤作毛李廵曰蝗子也陸璣云今人謂蝗子為螽子兖州人謂之螣許慎云蝗螽蔡邕云螽蝗也蝗即䗘蜢詳釋見螽斯篇草蟲名負蠜則草蟲與蠜率相從歟以是為名觀是詩首章相從之狀則與爾雅負蠜之名符合草蟲鳴阜螽躍而從之以喻夫婦之道君子謂夫也夫久於外而未歸其妻念之深至於憂心忡忡惙惙至於傷悲及其歸而既見既覯我心則降下安止則説樂則夷平覯者覯遇明著夫婦之道而聖人取焉者婦隨而不倡樂而不淫正而非邪即鵲巢之道歸妹之義天地隂陽之和衞宏不明乎道故於詩外起説曰大夫妻能以禮自防也本詩初無自防之情又何以知其非士妻穿鑿害道無乃太甚乎爾雅釋草云蕨虌郭云江西謂之虌按今鄭箋夲作鼈毛詩傳曰薇菜也疏引陸璣云山菜也莖葉皆似小豆蔓生其味亦如小豆藿可作羮亦可生食今官園種之以供宗廟祭祀而爾雅云薇垂水郭云生於水邉釋不引陸璣疏云豈有兩種邪豈亦生於山作爾雅釋草者不盡知邪於采蕨采薇之時而思其夫故云于以采蘋南㵎之濵于以采藻于彼行潦于以盛之維筐及筥于以湘之維錡及釡于以奠之宗室牖下誰其尸之有齊季女按此篇永樂大典缺卷蔽芾甘棠勿翦勿伐召伯所茇蔽芾甘棠勿翦勿敗召伯所憩蔽芾甘棠勿翦勿拜召伯所說補音伐一讀扶廢切周官大司馬九伐之法考工記以象伐也劉昌宗皆讀扶廢切栁下妻誄惠曰夫子之不伐兮三黜終不弊兮豈弟君子永能屬兮徐幹西征賦西伐與舊制叶左思魏都賦伐與制叶一讀蒲撥切字本作叐開元五經文字犮音跋大走貌詩勿翦勿伐或作跋茇一讀蒲昧切周官中夏敎茇舍鄭注云茇讀如萊沛之沛敗蒲昧切荀卿賦篇功立而身廢事成而家敗棄其耆老收其後世賈誼鵩賦亦與世叶東方朔七諫滅敗與留滯叶漢書叙傳敗與制叶郤正釋譏敗與又叶范氏曰蔽芾盛也毛詩傳曰甘棠杜也憩息也説舍也鄭箋云茇草舍也召伯止舍棠下國人被其徳思其人敬其樹爾雅釋木云杜甘棠又云杜赤棠白者棠然四明山之東有杜而白地名曰杜則赤棠白棠皆可以言杜而白者非杜之常歟陸璣疏云赤棠與白棠同耳但子有赤白美惡子白色為甘棠少酢滑美赤棠子澁而酢無味俗語云澁如杜是也杕杜傳曰杜赤棠是也周禮仲夏教茇舍注曰舍草止也拜伐而倒之如拜也説本或作税此愛敬賢徳之心忠厚之心乃油然發於中曰勿翦勿伐勿敗勿拜不勉不强豈非道心為序者未明乎道乃外求其義曰召伯之敎明於南國美召伯也召伯誠可美而是詩念賢感徳不已乃國人之道心不明本詩之道心而徒求外説如此為周南召南豈不面牆厭浥行露豈不夙夜謂行多露誰謂雀無角何以穿我屋誰謂女無家何以速我獄雖速我獄室家不足誰謂鼠無牙何以穿我墉誰謂女無家何以速我訟雖速我訟亦不女從夜補音允具切原本脱此六字宋玉招魂娛酒不廢沉日夜蘭膏明滅華燈錯陸雲嵗暮賦夜與暮叶又張二侯頌夜與故叶易林被髮長夜與誤叶五日六夜與暮叶明月照夜與故叶獨宿憎夜與故叶晨夜與露叶訟太元從首從不淑禍不可訟也從徽徽後得功也摯虞愍懐太子文昔之申生含枉莫訟今爾之負抱寃於東潘岳闗中詩訟與空叶易林井之益訟與功叶此貞女不可干犯之正心即道心而序曰召伯聽訟也又失之矣召南之境有此貞女爾是訟亦必召伯所聽也召伯賢明必不置貞女於獄序又曰衰亂之俗微貞信之敎興强暴之男不能侵陵貞女也序意惟歸於敎終不省是詩明叙貞女終不從於非禮之心是謂正心即聖賢之心可以通天地感鬼神感動萬世之心孔子所取者在此為序者面牆無覩有道而莫之見故旁推外索此學者不知道之通患夙早也早行多露夜行亦多露豈不可以夙夜而行謂夫行則多露也故不行露如非禮之汙我女速我獄往往或者疑我已從女女已有家也不知我實未嘗為女所汙也故雀穿我屋疑雀有角不知雀實無角也又喻鼠穿墉疑於有牙而實無牙女雖强汙我終不從女也室家不足者終不與女為室家也毛傳曰厭浥濕意也爾雅釋宫云牆謂之墉羔羊之皮素絲五紽退食自公委蛇委蛇羔羊之革素絲五緎委蛇委蛇自公退食羔羊之縫素絲五總委蛇委蛇退食自公補音皮蒲禾切説文波坡頗跛皆以皮得聲白襃魯國記曰陳子游為魯相蕃子也國人為諱改番曰皮案國人所以諱者以番與蕃字形相類所以改番為皮者以番與皮同蒲禾切左氏華元謂役者曰牛則有皮犀兕尚多棄甲則那役者曰從其有皮丹漆若何紽徒何反羔羊之裘委蛇之容道心和融百聖所同毛傳曰小曰羔大曰羊古者素絲以英裘大夫羔裘以居疏用羔羊之皮以為裘縫殺得制素絲為英飾其紽數有五爾雅釋訓曰緎羔裘之縫也孫炎曰緎之為界域詩疏云五緎既為縫則五紽五總亦為縫也視之見其五故皆云五焉織素絲為組紃以英飾裘之縫中若為線則所以縫裘非飾也故干旄曰素絲組之疏所謂視見其五者謂兩袖各二及前襟一縫歟范氏曰退食者退而食於私家也朱氏曰自從也公朝也委蛇者行步委曲如蛇也釋文作蛇因韓詩作逶迤遂以毛詩為非而轉音之蛇音移蓋陸徳明好異之過况蛇與紽協韻若音移則不協委蛇者徐行委曲之狀相者有曰鵝行鴨步為貴人相鵝鴨行亦委曲蛇行亦委曲補音蛇唐何切易林長尾蜲蛇畫地為河揚子雲反離騷委蛇與九歌叶張衡西京賦蛇與娥叶郭璞流沙贊委蛇與餘波叶東方朔詩蛇與挼叶毛氏此義與君子偕老委蛇之義同釋文又云沈讀作委委蛇蛇序曰羔羊鵲巢之功致也召南之國化文王之政在位皆節儉正直徳如羔羊比徳羔羊容或有之而詩㫖不甚明著惟見舒遲雍容雖無義之可尋而庸常即道無邪即道故曰中庸又曰王道平平又曰詩三百一言以蔽之曰思無邪學者率舍常而求奇舍近而求逺故日用其道而不自知文王之化鵲巢之功豈曰無之惟不明是詩之道而旁求外取為害道爾毛傳亦無序意殷其靁在南山之陽何斯違斯莫敢或遑振振君子歸哉歸哉殷其靁在南山之側何斯違斯莫敢遑息振振君子歸哉歸哉殷其靁在南山之下何斯違斯莫或遑處振振君子歸哉歸哉閔其君子勤勞之心自是正心道心衞宏强起其説曰勸以義詩中無此情也毛公亦未嘗有此義雷方動雨將至君子亟行莫敢少止急趨期㑹異於平時故曰何此言違莫敢或遑也振振歎美其君子愛之故美之歸哉歸哉臨違告以訖事早歸此人之常情常言鄭康成因序曰勸以義遂曲説求合乎序曰君子為君使功未成歸哉歸哉勸以為臣之義未得歸也詩㫖人情斷斷乎無此蓋因夫衞宏不知庸常無邪之即道故穿鑿其義鄭不知漢史衞宏作序之實以為毛公之前已有序曰至毛公乃分衆義各置篇端意謂古作而不敢違故曲就其説亦鄭不知道與序同又鄭不善於文又好穿鑿故也又諸儒多以靁生義亦鑿非詩人本情振振肅敬之容螽斯云子孫振振麟之趾云振振公子皆言肅敬鄉音之輕清者為真毛傳謂振振信厚其義未安山南曰陽殷陸音隱未安隱音之輕清則為殷本詩方音則然何必改讀義則隱爾摽有梅其實七兮求我庶士迨其吉兮摽有梅其實三兮求我庶士迨其今兮摽有梅頃筐塈之求我庶士迨其謂之按此篇永樂大典缺卷嘒彼小星三五在東肅肅宵征夙夜在公寔命不同嘒彼小星維參與昴肅肅宵征抱衾與裯寔命不猶補音昴力求反毛鄭義皆作留説文以丣得聲集韻音留正引此詩漢志二十八舍亦作留言陽氣之稽留也星有大小此獨言小者妾自比其微也嘒微小貌三五與小星連文謂小星或三或五三非謂心五非謂柳也毛傳謂三心五噣四時更見其義未安在東乃宵征時所見小星三五在東因以自况在東亦衆妾在旁之象若在南正有夫人之象後章維參與昴文不連則别起意參昴皆有大星亦皆有小星此則明指參昴大小不齊大如夫人小如衆妾命寔不同是詩言肅肅宵征則不敢不敬宵征夜行也妾賤往進御於君也夙夜奉公事不敢不勤裯單衣也抱衾與裯以進御故也雖賤雖勞而心安於命知有貴賤而自安於賤者正也夫正一而已矣在妾則賤則勞在夫人則貴則佚一也一者道也惟知是道故賤安於賤而不僭貴不驕於貴而能逮下序曰小星惠及下也夫人無妒忌之行惠及賤妾進御於君知其命有貴賤能盡其心矣然不首明妾安於命之正亦微差矣猶如也不猶者已之命不如夫人之命也寔是也韓詩作實江有汜之子歸不我以不我以其後也悔江有渚之子歸不我與不我與其後也處江有沱之子歸不我過不我過其嘯也歌汜音祀補音養里切爾雅釋水決復入為汜汜已也如出有所為畢已復還而入也楚詞天問出自湯谷次于蒙汜自明及晦所行㡬里按原本脫楚詞以下二十字據韻補補入說文汜從水已聲詩江有汜又曰洍從水􅒳聲詩江有洍徐鍇曰汜洍音義同集韻皆養里切簡攷祀祥里切其義則已後人欲别其為水故讀作祀歟集韻於汜洍又並音祀象齒切亦皆以此詩為證按此叚音釋下應有詩解大典原本恐冇脱簡野有死麕白茅包之有女懐春吉士誘之林有樸􅈪野有死鹿白茅純束有女如玉舒而脱脱兮無感我帨兮無使尨也吠按此篇永樂大典缺卷何彼襛矣唐棣之華曷不肅雝王姬之車何彼襛矣華如桃李平王之孫齊侯之子其釣維何維絲伊緡齊侯之子平王之孫襛奴容反棣徒帝反華音敷下同説見桃夭補音車斤於切劉熙釋名車古者音居言行所以居人也今曰車式遮切韋昭謂從漢始有居音引易載鬼一車詩王姬之車為證不知華本音敷而車與塗孤叶用尤顯然見其為居其論疏矣簡謂居有姬音乃姑慈切則車亦有此音今方言有之而士大夫則必斤於切是詩言王姬下嫁親迎盛禮車從肅雝詩人又知王姬文王之孫迎者齊侯之子有懷徳之心有敬貴之心雖不指言徳行然而無邪也無邪即道即徳衞宏未明乎道意二南之詩必有徳義可言故穿鑿曲推肅雝為王姬之徳夫車行和緩已有肅敬之狀矧從者咸肅敬乎詩明言王姬之車而序以為王姬執婦道以成肅雝之徳鄭箋又釋之為往謂王姬往車鄭既不逹於文衞鄭皆又不知道穿鑿可笑如此言詩適以病詩如此為周南召南其亦正牆面而已矣毛傳曰襛猶戎戎也唐棣栘武王女文王孫適齊侯之子伊維緡綸也爾雅釋木云唐棣栘郭注云似白楊陸璣云薁李也一名雀李亦曰車下李其華或白或赤本作郁李許慎曰白棣也華如李而小如櫻桃又有赤棣子如郁李而小何彼襛盛乎其華如唐棣也豈不肅雝乎王姬之車也然則唐棣之華肅雝皆言王姬車從之儀也初章唐棣之華言車從儀物則次章言華如桃李亦謂車從儀物可知矣平王猶言寧王也李氏曰本朝太宗稱神宗及神宗稱神宗則太宗不復稱神宗矣其釣維何必以絲為緡而後可以喻齊侯之子所以獲迎王姬者備諸禮節而後可也韓詩襛作茙補音孫須倫切荀卿書注云漢宣帝名詢劉向編録故以荀卿為孫卿五子之歌孫與君叶揚子雲元后誄孫與新叶馬融笛賦孫與聲叶崔駰韈銘孫與臻叶漢書叙傳孫與瀕叶又與信叶師古信合韻音新案荀與孫古既皆音詢俱為嫌名劉向獨諱荀而不諱孫者漢雖不諱嫌名如以雉為野雞不諱治國之治然偏傍之同者已或諱之不能盡如三代之時矣彼茁者葭壹發五豝于嗟乎騶虞彼茁者蓬壹發五豵于嗟乎騶虞爾雅釋草云葭蘆郭云葦也毛詩傳云茁出也葭蘆也蓬草名也豕牝曰豝騶虞義獸白虎黒文不食生物有至信之德則應之陸璣云騶虞白虎黒文尾長於軀不食生物不履生草應信而至者也釋獸云豕生三豵二師一特郭云猪生子常多故别其少者之名彼葭蓬始生茁然之時於是春田有五豝聚焉而射者一發之有五豵聚焉而射者一發之是時獲騶虞瑞獸焉咸歎訝之故曰于嗟乎騶虞序曰騶虞鵲巢之應也鵲巢之化行人倫既正朝廷既治天下純被文王之化則庶類蕃殖蒐田以時仁如騶虞則王道成也毛傳未嘗言如惟曰有至信之德則應之以明獲騶虞也首言鵲巢之應也豈毛公本說若是而衞宏繼以推廣之説而始曰仁如騶虞歟豈文王德化若是其盛而不足以致騶虞乎豈以簡䇿無他證疑而不信歟本詩無如義而宏立説曰如無乃不可乎宏為序差失至多騶虞之差正與麟之趾同
