body:
  text: 慈湖詩傳卷四宋楊簡撰鄘汎彼柏舟在彼中河髧彼兩髦實維我儀之死矢靡它母也天只不諒人只汎彼柏舟在彼河側髧彼兩髦實維我特之死矢靡慝母也天只不諒人只髧徒敢反髦音毛儀補音牛何切周官注儀作義二字古皆音俄太元爭首陽氣汜施不偏不頗物與爭訟各遵其儀周易鼎耳革失其義也覆公餗信如何也古文尚書無偏無陂遵王之義陂音坡韓詩儀我也史記檥船待徐廣檥音儀一音俄爾雅㕒魚竒切字或作天鐡因切白虎通論曰天者身也天之為言鎮也禮統曰天之為言神也按原本脱此二字陳也􅈿也周易大明終始六位時成時乗六龍以御天又曰時乗六龍以御天也雲行雨施天下平也荀子成相篇參天與人人叶賦篇天與形與成叶屈原九歌沖天與愁人叶九章薄天與偽名叶漢樂章飛龍秋㳺上天髙賢愉樂民人班固西都賦當天與順人叶詩二十有三無叶他年切者下同只音紙慝他得反柏堅喻堅操不可移改内則子事父母總拂髦按原夲脫總字婦事舅姑不言拂髦則知此髧彼兩髦謂其夫也吕曰儀以夫為法也鄭箋云舟在河中猶婦人之在夫家是其常處貞女不事二夫矢誓也至死誓不他適呼其母曰此天也母不信我乎諒信也不事二夫故謂夫為特易曰婦人貞吉從一而終也慝邪也誓不為邪以再嫁為邪也只語辭也毛詩序曰柏舟共姜自誓也衛世子共伯蚤死其妻守義父母欲奪而嫁之誓而弗許故作是詩以絶之牆有茨不可埽也中冓之言不可道也所可道也言之醜也牆有茨不可襄也中冓之言不可詳也所可詳也言之長也牆有茨不可束也中冓之言不可讀也所可讀也言之辱也埽補音蘇后切道徒厚切史記龜䇿傳道與紂叶邊讓章華賦要道與素肘叶胡廣侍中箴周道與左右叶夏侯湛抵疑奮筆揚文議制論道出草苗起林藪班固幽通賦賴道與靈茂叶顔師古曰茂合韻莫口切周易八太元五皆止用此一讀下同冓古候友本又作遘惡亂正也不可道恥也隠也恥正也隠人之惡亦正也牆所以限内外今乃有可惡之蒺藜焉其惡公子頑之亂内外其意著矣爾雅云茨蒺藜惡之欲埽去之而不可得而埽也前漢梁王共傳聴中冓之言注應劭曰中冓材冓在堂之中也顔師古曰構謂舍之交積材木也應説近之吕曰中冓蓋閫内隠奥之處也中冓之言若曰閨門之言也其所可道者言之猶醜而况其不可道者乎淫行著矣毛傳曰襄除也蓋本釋言然爾雅亦多差按書懐山襄陵賛賛襄哉皆訓上詩終日七襄亦訓上此次章叶韻惟言有茨束者束而去之也朱曰讀誦言也所可詳者言之猶長使併言其不可詳者則不勝其多矣毛詩序曰牆有茨衛人刺其上也公子頑通乎君母國人疾之而不可道也宣公卒惠公㓜其庶兄頑烝於惠公之母生子五人齊子戴公文公宋桓夫人許穆夫人君子偕老副笄六珈委委佗佗如山如河象服是宜子之不淑云如之何玼兮玼兮其之翟也鬒髪如雲不屑髢也玉之瑱也象之揥也揚且之晳也胡然而天也胡然而帝也瑳兮瑳兮其之展也蒙彼縐絺是紲袢也子之清揚揚且之顔也展如之人兮邦之媛也珈音加佗待何反宜牛何切説文宜古作宐又作㝖又作皆自多而孳易林離之姤曰君臣不和上下失宜宋子笑歌儀禮士冠禮辭曰爰字孔嘉髦士攸宜翟音狄翟音轉而下亦與髢叶亦猶關雎芼樂皆音轉而下故亦叶也鬒音軫髢音悌瑱吐殿反揥敕帝反瑳音磋展音戰縐側救反袢音絆顔補音魚堅切説文以彦得聲宋玉神女賦顔與言叶司馬相如大人賦孱顔與連卷叶陸機嘆逝賦顔與然叶郭璞江賦顔與鰱叶陶潜讀山海經詩顔與年叶其能與君子偕老者必如下文所言盛服按原本盛訛魚其德足以稱之服之為宜則能與君子偕老今子不淑宜其不能與君子偕老云如之何猶俗語云更説甚莫毛傳曰副者后夫人之首飾編髪為之笄衡笄也珈笄飾之最盛者鄭箋云如今歩摇上飾古制未聞毛傳謂委委行委曲佗佗德平易山無不容河無不潤穿鑿㡬於可笑鄭無箋諸儒亦牽強委委者首飾所加重積歟佗佗積而髙歟其髙如山其状之委曲旋環者如河補音以羔羊詩委委蛇蛇委蛇沈讀委委蛇蛇引易林蜲蛇反離騷委蛇皆音佗唐何切君子偕老委佗之義同鄭箋云象服謂褕翟闕翟也人君之象服則舜所云予欲觀古人之象日月星辰之屬侯伯夫人之服自褕翟而下如王后焉毛傳既不明言象服之詳鄭亦不過言褕翟闕翟不釋象義意疑若舜所云星辰之屬而不敢明言然則服必有所象象以象其德而其詳未之聞也孔疏謂以象骨飾服未必然也爾雅釋訓云委委佗佗美也釋義不切玼玉色褕翟闕翟之首飾有玉焉玼兮玼兮其色之美也鬒黒髪也如雲言堆起之状甚美而似雲也髢髲也自矜其鬒髪之美不輕用髢孟子曰予不屑之教誨屑輕也毛傳瑱塞耳揥所以摘髪也孔疏云既夕記云瑱塞耳充耳是也淇澳云充耳琇瑩是也以象骨為搔首因以為飾名之曰揥葛屨云佩其象揥是也毛傳謂揚眉上廣其釋未安方言目黸瞳之子曰盱或謂之揚蓋以瞳子每每揚動故名歟案詩美目揚兮子之清揚其言目也昭昭蓋目之美惟揚動乃著故以揚為目之美此言目之揚欲言其美之状而莫能而遂繼曰且其面色之晳白也飾貎極其美極其嚴盛如天然如帝然以為世間所無如天上人也胡為乎若是蓋謂其德有以稱此乎否也毛傳曰禮有展衣者以丹縠為衣蒙覆也絺之靡者為縐當暑袢延之服也鄭箋云后妃六服之次展衣宜白縐絺絺之蹙蹙者展衣字之誤禮記作䄠衣夏則裏衣縐絺孔疏云展覆彼縐絺之上是當暑紲去袢延烝熱之服也袢延是熱之氣也王氏曰暑服則加紲袢焉所以自斂飾也音如絆繫之絆説文同瑳者治玉之謂治石謂之磋則治玉亦謂之瑳矣方治而未磨瑩故曰縐之状似之詩曰如切如磋如琢如磨毛傳謂顔者顔角豐滿方言云頟顔也然有女同車云顔如舜華則謂大體顔色不止於頟展誠也媛淑女也卒章總言服貎如此之美則宜為邦之淑女也而子則不淑毛詩序謂君子偕老刺衛夫人淫亂釋文瑳七我反非當音磋釋文於竹竿巧笑之瑳又七何反即磋音爰采唐矣沬之鄉矣云誰之思美孟姜矣期我乎桑中要我乎上宫送我乎淇之上矣爰采麥矣沬之北矣云誰之思美孟弋矣期我乎桑中要我乎上宫送我乎淇之上矣爰采葑矣沬之東矣云誰之思美孟庸矣期我乎桑中要我乎上宫送我乎淇之上矣沬音妹中補音諸良切釋名兄忪亦曰兄章舅忪亦曰舅章顔師古糾繆正俗既言中有章音漢書背尊章師古注亦云今關中俗呼舅為鍾鍾者章之轉也太元成首次五能處中也次六不以讓也班固泗水髙祖碑中與傷叶胡綜大牙賦中與常叶要音邀宫補音居王切屈原九歌朱宫與龍堂叶班固泗水張敖銘南宫與無疆叶黄香九宫賦宫與綱叶上補音辰羊切楚辭臨淵兮汪洋顧林兮忽荒修余兮袿衣騎霓兮南上下同簡謂尚猶上也亦有平聲毛詩序曰桑中刺奔也衛之公室淫亂男女相奔至于世族在位相竊妻妾期於幽逺政散民流而不可止毛傳曰爰於也唐蒙菜名爾雅釋草云唐蒙女蘿女蘿兎絲毛傳曰沬衛邑書曰明大命于沬邦蓋紂都朝歌以北是也姜弋庸皆著姓也将為淫奔託名於采唐采麥采葑或曰桑中溱洧幾於勸矣何以思無邪曰此非淫者之辭也刺者之辭也淫者畏人之知託以為采期於幽逺詎敢明言姜弋庸乎使果淫者之辭将叙事實以紀其情縱桑中之地濶逺相期之處或同豈一一皆要見於上宫豈一一皆送於淇水之上豈於姜必託以采唐於弋必託以采麥皆人協韻爾以是知皆刺者之辭也總言淫者之情状而非的也故序曰刺奔樂記曰鄭衛之音亂世之音也比於慢矣桑間濮上之音亡國之音也其政散其民流誣上行私而不可止也朱曰桑間即此篇鄭元注樂記云濮水之上地有桑間者昔殷紂使師延作靡靡之樂已而自沉於濮水後師涓過焉夜聞而寫之為晉平公鼓之是之謂也桑間在濮陽而朱遂謂桑間即此篇無乃近似而非乎朱殆謂鄭註為非然樂記非聖人全書其曰鄭衛比於慢者比同也亦曰孔子曰思無邪鄭衛在中不敢全言其邪而止曰比於慢此疑辭蓋作樂記者未逹乎作者之㫖所以刺亂非為亂也桑中非淫者之辭乃刺者之辭鶉之奔奔鵲之彊彊人之無良我以為兄鵲之彊彊鶉之奔奔人之無良我以為君補音兄虚王切白虎通兄者況也釋名兄荒也故青徐人謂兄為荒漢語雖有親兄安知其不為狼急就章畢稚季昭小兄栁堯舜樂禹湯晉謡曰後十四年晉亦不昌昌乃在其兄楚辭天問兄與長叶易林以福為兄與光叶喜為吾兄與觴叶駕迎吾兄與黄叶奔奔逋珉切崔駰七依奔與人叶棗據船賦奔與寜叶韓詩傳曰奔奔彊彊乗匹之貎毛詩傳曰兄謂君之兄君國小君毛詩序曰鶉之奔奔刺衛宣姜也衛人以為宣姜鶉鵲之不若也鄭箋云奔奔彊彊言其居有常匹飛則相隨之貎刺宣姜頑非匹耦觀奔奔彊彊誠有乗匹之状詩辭無不若之意蓋言鳥獸之行如鶉鵲然首章言兄則刺公子頑頑為惠公之庶兄也末章言君則刺宣姜為小君毛傳與韓傳未見其異惟衛宏之序有異耳鄭則從衛序今不從定之方中作于楚宫揆之以日作于楚室樹之榛栗椅桐梓漆爰伐琴瑟升彼虚矣以望楚矣望楚與堂景山與京降觀于桑卜云其吉終焉允臧靈雨既零命彼倌人星言夙駕説于桑田匪直也人秉心塞淵騋牝三千京補音居良切揚子雲交州牧箴京與荒叶班固東都賦漢京與永昌叶急就章門户井竈廡囷京榱邉薄盧瓦屋梁陳琳武華賦鎬京與大荒叶説文麠與䲔以畺得聲皆或從京倌音官田補音地因切顔師古急就章注云古者田陳聲相近晉與人之謡曰佞之見佞果喪其田漢童謡邪徑賊良田䜛口害善人易林噬嗑之未濟曰徑邪賊田政惡傷民節之井曰宣髮龍身為王主田太元失首田與根叶韓愈越裳操田與臣叶張衡南都賦開竇灑流浸彼稻田溝澮脉連堤塍相輑淵一均切説見燕燕詩千補音倉新切楚辭招魂千與人與侁叶班固西都賦千與門叶劉邵趙都賦按原夲趙都二字脱千與仁叶易林觀之比騋牝龍身日馭三千正用此詩一曰龍趾龍身門眉貧切騋音來毛詩序曰定之方中美衛文公也衛為狄所滅東徙渡河野處漕邑齊桓公攘夷狄而封之文公徙居楚邱始建城市而營宫室得其時制百姓悦之國家殷富焉春秋魯閔公二年十二月狄入衛左傳衛懿公及狄人戰于滎澤衛師敗績遂滅衛宋桓公逆諸河宵濟立戴公以廬于漕許穆夫人賦載馳齊桓公使公子無虧帥車三百乗甲士三千人以戍曹毛詩傳曰定營室也楚宫楚邱之宫也鄭箋曰定星昬中於是可以營制宫室故謂之營室方将也初也昬中於南方鄭箋謂四方鑿矣宫言大體室言内室揆度日出入以定東西南北乃作宫室而言揆日於作宫室之後者作詩協韻故交錯為文也爾雅釋天云營室謂之定郭璞云定正也作宫室皆以營室中為正鄭謂小雪時孔疏云小雪則在周十二月矣春秋正月城楚邱而云得時者左傳曰凡土功水昬正而栽日至而畢則冬至以前皆為土功之時以歴校之僖二年閏餘十七則閏在正月之後正月之初未冬至故為得時也毛傳曰椅梓屬陸璣草木疏曰梓實桐皮曰椅爰於也他年於此伐之以為琴瑟餘所用不盡記毛傳曰虚漕虚也楚邱有堂邑者景山大山京髙邱也孔疏云知虗漕墟者以文公自漕而徙楚邱故知升漕虚蓋地有故墟髙可登之以望猶僖二十八年左傳稱晉侯登有莘之墟也以望楚邱又望其傍堂邑及景山與京邱虚亦不必定言漕虚或登他墟亦可望爾雅釋詁云景大也今隂陽家相地亦先登髙逺望見其所善又至其所而審觀之亦善則可矣降觀于桑者桑正其所也即楚宫之址也然後卜孔疏云終然信善非特當今而已毛傳曰零落也倌人主駕者相地定國卜既吉有疎雨焉而遂霽衛人喜焉以此雨為神雨零者踈而不驟雨而即止之義也惟雨止故命倌人見星而夙駕欲厥明早行也既命駕倌人已乃説止於桑田之舍朱云非獨此人誠實淵深其所畜之騋牝亦三千矣問國君之富數馬以對庾人馬七尺曰騋魯僖公二年齊桓公城楚邱而封衛衛國忘亾文公大布之衣大帛之冠務材訓農通商惠工敬教勸學授方任能元年革車三十乗季年乃三百乗按魯僖以下大典脱今補入蝃蝀在東莫之敢指女子有行逺父母兄弟朝隮于西崇朝其雨女子有行逺兄弟父母乃如之人也懐昏姻也大無信也不知命也毛詩序曰衛文公能以道化其民淫奔之行按詩序行作恥國人不齒也蝃蝀毛傳曰虹也夫婦過禮則虹氣盛孔疏云日在東則虹見西方日在西則虹見東方無在日傍之時隮亦虹也虹非天地之常氣乃隂陽繆感不正之氣而隂為主故常逺日其人道淫泆之氣感之歟衛人猶莫敢指蝃蝀而况淫奔之行乎隮升也朝有崇義暮有卑下義虹見則雨女子有行逺父母兄弟矣此宜憂戚有所不忍豈可不由父母之命而淫奔乎乃如之人指淫奔之女懐思婚姻故也㓜承父母之誨豈曰淫奔必誨之以善也今而奔焉是大無信必欺詐以行之不知婚姻遲速莫非天命也以遲故奔歟相鼠有皮人而無儀人而無儀不死何為相鼠有齒人而無止人而無止不死何俟相鼠有體人而無禮人而無禮胡不遄死皮補音一讀蒲麋切一讀蒲何切儀一讀魚竒切一讀牛何切為一讀于媯切一讀吾禾切或寝或訛民之訛言開元五經文字皆作譌説文以為得聲史記引書居南交南為正讀為作訛楚辭哀時命按此嚴忌作非屈原楚詞也知貪餌之近死兮不如下逰乎清波寜幽隠以逺禍兮孰侵辱之可為子胥死而成義兮屈原沉於汨羅漢書王莽傳以勸南偽韋昭五戈切為與偽皆當有訛音毛詩序謂相鼠刺無禮也衛文公能正其羣臣而刺在位承先君之化無禮儀也序固多差繆此序與詩情殊不合是詩所謂無儀無禮豈特無禮儀而已哉曰不死何為曰不死何俟俟待也曰胡不遄死遄速也觀此辭情蓋深疾淫蕩之甚者也不觀全章全篇而執一言以為説亦陋甚矣毛傳亦同衛文公誠有禮羣臣肅正而承先君之化淫風未殄猶有如此詩所刺者詩人深疾之情状甚著相視鼠猶有皮人而無儀此無儀謂淫泆無恥無所藏襲曾不如鼠之有皮猶包括其體也齒猶有所限止人無止蕩然淫肆一無畔岸曾不如鼠之猶有齒卒章體禮則特更韻欲申言深疾淫縱之意故云亦未必果刺在位者孑孑干旄在浚之郊素絲紕之良馬四之彼姝者子何以畀之孑孑干旟在浚之都素絲組之良馬五之彼姝者子何以予之孑孑干旌在浚之城素絲祝之良馬六之彼姝者子何以告之朱曰孑孑特出之貎李廵曰旄牛尾注於干首鄭箋云周禮孤卿建旃大夫建物首皆注旄焉時有建此旌來至浚之郊毛傳曰浚衛邑紕所以織組也王氏曰素絲為組所以帶馬良馬所以好賢也程曰素絲束帛也以束帛乗馬行禮於賢者李曰干與竹竿字通用家語曰干旄之忠彼姝者子謂賢者賢者有美德詩人美之故云姝也畀與也謂卿大夫士之致禮於賢者如此不知賢者何以與之何以告之也司常云鳥隼為旟析羽為旌又云州里建旟斿車載旌注謂斿車王之木路而此詩云干旌者以旌旗通稱歟爾雅云注旄首曰旌據州里建旟則自州長而下至於宰咸建旟鄭箋云祝當作屬屬著也按三字原本脱凡詩字訛者多鄭説頗通程曰馬四至於五六馬之益多見其禮之益加春秋左傳楚公子棄疾見鄭子皮以馬六匹見子産以馬四匹家語云緫紕於此成文於彼然則紕之者謂織也程謂素絲所以贈送賢者亦有理但古者幣用元纁而此曰素絲豈周衰古制寖廢而用素孔子刪詩惟取其大體之善不可詳責以古制歟次曰組之豈特取其織組成文之謂乎不然則以組束幣乎鄭謂祝作屬素絲之幣相屬不一歟傳箋本於爾雅旌旗練旒九飾以組維以縷然首章惟言紕又繼曰良馬五之六之為説不通毛傳曰下邑曰都毛詩序曰干旄美好善也衛文公臣子多好善賢者樂告以善道也載馳載驅歸唁衛侯驅馬悠悠言至於漕大夫跋渉我心則憂既不我嘉不能旋反視爾不臧我思不逺既不我嘉不能旋濟視爾不臧我思不閟陟彼阿丘言采其蝱女子善懐亦各有行許人尤之衆稺且狂我行其野芃芃其麥控于大邦誰因誰極大夫君子無我有尤百爾所思不如我所之驅補音祛尤切釋文駈音同陸雲九愍駈與流叶唁音彦漕音曹補音徂侯切楚詞招隠士禽獸駭兮亾其曹王孫兮歸來山中兮不可以久留按原夲脫楚詞三句簡謂即今曹音之轉不能旋反補音反浮臠切屈原離騷經相道之不察兮延佇乎吾将反囬朕車以復路兮及行迷之未逺荀卿賦篇忽乎其極之逺也攭兮其相逐而反也卭卭兮天下之咸蹇也按原本脫荀卿賦萹三句潘岳西征賦不反與蓬轉叶太元失首反亦與轉叶蝱音盲補音謨郎切説文以亡得聲行補音户郎切芃音蓬尢思之反載馳詩言歸唁衛侯則知衛女後言許人尤之衆穉且狂則知衛懿公為狄所滅許穆夫人欲以許救衛而士大夫皆以許國至小而欲救衛如衆穉㓜力至柔弱不量力而往又如狂爾馳驅至漕非有事實皆所思也念許大夫往衛唁問跋渉我心憂之殆不如已親往唁也哀閔宗國哀閔兄弟人心之所不能自已者也許大夫既不以我為嘉善我亦不能旋反歸唁矣視爾不以我為臧善我所思安得而不逺嘉善也臧亦善也亦心知父母終於禮不可歸旋濟者自許歸衛當有濟渡也爾既不以我歸唁為臧善我所思安得而不深閟爾雅釋邱云偏髙阿邱爾雅為義未盡有卷者阿偏髙而阿曲歟蝱貝母藥也治氣結實采蝱欲以療憂鬰之疾我今所懐思亦善非為惡也大抵人各有心心各有所欲行許人尤之謂衆穉狂莫肯徃救我思出而行野行芃芃之麥中徑往控告大邦誰可因之以濟誰可究極救衛之事許大夫君子無尤我爾百致其思不如我徑往控告也之往也所思深閟哀切至是非實行野而徃控也毛詩序曰載馳許穆夫人作也閔其宗國顛覆自傷不能救也衛懿公為狄人所㓕國人分散露於漕邑許穆夫人閔衛之亡傷許之小力不能救思歸唁其兄又義不得故賦是詩也毛傳曰載辭也草行曰跋水行曰渉
