body:
  text: 慈湖詩傳卷八宋楊簡撰唐蟋蟀在堂歲聿其莫今我不樂日月其除無已大康職思其居好樂無荒良士瞿瞿蟋蟀在堂歲聿其逝今我不樂日月其邁無已大康職思其外好樂無荒良士蹶蹶蟋蟀在堂役車其休今我不樂日月其慆無已大康職思其憂好樂無荒良士休休邁力制切按原本三字脱説文以躉得聲許慎讀躉如厲孔臧格虎賦都邑百姓莫不于邁陳列路隅咸稱萬歲魏文帝述征賦邁與歳叶程曉贈傅休奕詩三光飛景玉衡代邁龍集甲子四時成歲皇甫謐釋勸邁與際與㑹叶蹶居衛反釋蟲云蟋蟀蛬按原本三字脱郭云今趨織也一名蜻􅖹楚人謂之王孫毛傳曰聿遂除去也陸德明以除居為去聲殆不必也凡詩叶韻不必平側同蟋蟀在堂矣歲其暮矣役車亦休矣今我乃慘慘不樂日月除去歲事更新愈無休暇之時何為乎不從容自樂又告之曰但無已太康樂足矣謂無過於樂足矣又思其本職之所居者足矣好樂惟不可荒豈有良士而瞿瞿然憂懼終歲乎瞿瞿驚視之狀爾雅謂瞿瞿休休儉也爾雅徒因詩説言儉不詳觀熟思其情㫖遽謂之儉殊不可者爾雅踈謬多矣此釋不可用書曰其心休休焉其如有容焉亦謂之儉乎東方未明狂夫瞿瞿亦謂之儉乎蟋蟀乃晉國之士相警切之詩而序謂之刺晉僖公誤矣平觀本詩情狀昭然先儒倡説既誤後儒因之為序千載之下牢不可㧞嗚呼孟子於武成猶不盡信而後世惟衛宏之序是從亦異乎孟子矣遂至於反以序病詩三章三言良士若諷晉君何得每以良士為辭擬人必於其倫人情之常也邁往也既思其居又思其外周思内外足矣好樂惟不可荒豈有良士而蹶蹶然急不少舒徐乎慆過也滔滔而過也思其所可憂足矣何為乎終歲不樂好樂惟無荒足矣良士休休其心常樂無憂無懼休休正言瞿瞿蹶蹶反言作詩協韻初無定式意所欲言則言其淺陋之士始拘孔叢子載孔子曰吾於蟋蟀見唐堯儉德之大矣故詩序曰刺晋也而謂之唐本其風俗憂深思遠儉而用禮乃有堯之遺風焉唐叔虞初封曰侯故曰唐而先儒以後稱晉故疑而為説因附㑹孔子之言山有樞隰有榆子有衣裳弗曳弗婁子有車馬弗馳弗驅宛其死矣他人是愉山有栲隰有杻子有廷内弗洒弗埽子有鐘鼓弗鼓弗考宛其死矣他人是保山有漆隰有栗子有酒食何不日鼓瑟且以喜樂且以永日宛其死矣他人入室陸璣草木䟽云許慎讀栲為糗今人言考失其聲也爾雅栲山樗䟽亦云許慎讀栲曰糗杻女九反洒所􅈈反考補音考去九切按原本四字脱説文以丂得聲又曰丂音糗范蠡曰上帝不考時變是守易林困之巽皇考與飲酒叶萃之井考與臼叶邉讓章華賦考與肘叶保補音補苟切漢房中歌加被寵咸相保德施大世曼壽韓愈路常侍墓銘保與咎叶甚矣夫率然輿論之暗合乎道也夫他人有入室之狀為國者宜憂宜懼而是詩乃使之曳其衣裳馳其車馬考其鐘鼓日鼓瑟者何也堯舜曰欽哉禹曰克艱臯陶曰兢兢然而堯舜垂衣而治帝庸作歌則堯舜禹之憂非憂悴無聊之憂也今晉君直憂悴無聊爾豈能治國家故有宛其死矣之漸有他人入室之證永日猶終日也且得永長一日之樂也孔䟽曰永日人而無事則長日難度若飲食作樂則可以永日是説謬甚學者惜寸陰學者百年如一日千古如一日奚永日之難度學不為已溺心文字故其陋至是毛詩序曰山有樞刺晉昭公也不能脩道以正其國有財不能用有鐘鼓不能以自樂有朝廷不能洒埽政荒民散將以危亡四鄰謀取其國家而不知國人作詩以刺之也於君言刺大悖餘得之觀是詩當得其意非謂果使晉君終日喜樂不憂思也國危如此奚可一日忘其憂但不可憂悴無聊爾如以辭而已矣豈不誤人國乎孟子曰説詩不以辭害志爾雅釋木云蓲荎郭云今之刺榆䟽引是詩為證榆之類有十種葉皆相似皮及木理異耳釋木云栲山樗郭云栲似樗色小白亦類漆樹䟽引陸璣䟽云山樗與下田樗略無異葉似差狹耳此為栲者似誤也栲葉如櫟木皮厚數寸可為車輻或謂栲櫟許慎正以栲讀為糗今人言栲失其聲耳釋木云杻檍郭云似棣細葉葉新生可飼牛材中車輞關西呼杻子一名土檀陸璣䟽云葉似杏而尖白色皮正赤為木多曲少直枝葉茂好二月中葉䟽華如棟而細或謂之牛筋或謂之檍材可為弓弩幹也毛傳婁亦曳也愉樂也鄭箋云保居也毛傳洒灑也考擊也孔䟽云走馬謂之馳䇿馬謂之驅揚之水白石鑿鑿素衣朱襮從子于沃既見君子云何不樂揚之水白石皓皓素衣朱繡從子于鵠既見君子云何其憂揚之水白石粼粼我聞有命不敢以告人鑿子落反襮字林方沃反沃補音鬱縛切其葉沃若徐邈讀六轡沃若沈重讀郭璞沃民讃爰有大野厥號曰沃鳯卵是吞靈膏是酌劉向新序夏民之歌沃與樂字蹻字叶易林震之屯曰揚水潜鑿使石潔白衣素表朱遊戱臯沃得君所願心志娛樂正用此詩白僕各切鵠補音居號切按原本脫此三字漢地理志鵠澤孟康音告呂氏春秋鵠乎其羞用志慮也高誘音浩歐陽氏曰揚之水其力弱不能流移白石昭公㣲弱不能制曲沃而桓叔之强於晉國如白石見於水中其民從而樂之則詩文自見爾雅釋器云黼領謂之襮郊特牲云繡黼丹朱中衣大夫之僣禮也大夫服之為僣知諸侯當服之也鄭箋云丹朱為純也國人欲進此服去從桓叔君子謂桓叔毛傳曰鵠曲沃邑也説文曰水生厓石間曰粼粼考工記曰五色備謂之繡白與黒謂之黼故鄭箋云繡當為綃毛傳曰襮領也諸侯繡黼丹朱中衣沃曲沃也孔䟽云繡是刺之故繡為刺名繡刺以為黼孫炎注爾雅云繡刺黼文以褗領是取毛繡黼為義曲沃欲并晉已有命令施行聞而不敢告人懼禍及已也毛詩序曰揚之水刺晉昭公也昭公分國以封沃沃盛彊昭公㣲弱國人將叛而歸沃焉君言刺大悖也分國封沃非禮也國人將叛昭公無德政也沃謀并晉大悖也是詩悼晉之昏惡沃之悖明民心之無常有國者不可以不慎也揚之水説見王鄭二揚之水椒聊之實蕃衍盈升彼其之子碩大無朋椒聊且遠條且椒聊之實蕃衍盈匊彼其之子碩大且篤椒聊且遠條且是詩憂昭公也知彼沃之盛强昭公將為所并憂而作是詩也曰彼其之子彼曲沃也其情主晉也遠條且之餘有不言之憂而毛詩序曰刺晉昭公也失本情矣大悖也序又曰君子見沃之盛彊能修其政知其蕃衍盛大子孫將有晉國焉政者正也沃悖矣何政之有毛傳曰椒聊椒也孔疏引陸璣䟽曰聊語助也崔靈恩集註謂古者為升上徑一寸下徑六分其深八分本草同吕曰古量二升曰匊匊大於升㮚氏為量鬴耳三寸其實一升夫其外三寸其中小矣毛傳曰兩手曰匊鄭氏箋云椒性芬香而少實今一捄之實蕃衍盈升鄭意謂一團云爾一團如捄捄者卷曲若圓之勢椒聚生成捄詩云有捄􅁄匕盖勢㣲卷椒實成聚有捄狀古升至小去匊太遠殆周衰古量寖隳而寖大歟無朋匹言曲沃事勢碩大無與為並也常情言多過實率類此遠條言雖遠條亦蕃盛也凡枝條之遠者多不蕃盛此言遠條亦盛喻沃之盛大若是也篤厚也言桓叔施德篤厚也而諸儒獨謂喻沃子孫之盛不盡本詩之情椒聊喻沃𫝑盛大凡百盡舉之矣非止喻子孫曰碩大曰篤義不止於子孫之蕃矣且語助也綢繆束薪三星在天今夕何夕見此良人子兮子兮如此良人何綢繆束芻三星在隅今夕何夕見此邂逅子兮子兮如此邂逅何綢繆束楚三星在户今夕何夕見此粲者子兮子兮如此粲者何芻補音側九反轉為平聲則側鳩切韓愈駑驥詩力小苦易制價㣲力易酬渴飲一斗水饑食一束芻補音側九切無據當從平聲按吴棫韻補引韓愈此詩作初尤切亦從平聲讀隅補音語口切轉為平聲則魚侯切易林候伺山隅與憂叶家在海隅與流叶揚雄反離騷或鼻祖於汾隅與侯叶補音語口切無據當從平聲按吳棫韻補隅作魚侯切引梁鴻詩隅與休叶亦從平聲讀者據此則補音與韻補亦微有異同抑必欲以芻隅協逅字耶者補音掌與切史記秦瑯邪刻石無不臣者索隱音渚楚辭九歌搴芳洲兮杜若將以遺乎遠者時不可兮驟得聊逍遥兮容與王褎九懷天門兮地户孰由乎賢者無正道兮溷側懷德兮何覩司馬相如賦鼓嚴簿縱獠者江河為阹泰山為櫓易林離之剥曰從喬彭祖西過王母道里夷易無敢難者韓愈元和聖德詩并包畜養無異細鉅億載萬年敢有違者柳宗元牛賦或穿緘縢或實豆爼由是觀之物無踰者薪楚畧同漢廣云翹翹錯薪言刈其楚楚薪之整整者説文謂刈草為芻綢繆纒束薪芻於野莫夜而歸見三星在天焉言其著明者不必指心指參也在隅謂在天之旁角在戸謂人在室中見三星當户今夕何夕見此良人此男奔女見此粲者此女奔男見此邂逅乃適相邂逅而苟合者非初有定意也妻謂夫為良人粲者美女之稱不必三女而後為粲今夕何夕驚喜之辭也子兮子兮如此良人何以無素具無以延之而以告人也亂世淫奔以為常故明以告人三章指事不同知非淫者所自作詩人叙其惡而刺之如桑中溱洧也而毛詩序言綢繆刺晉亂也國亂而昬姻不得其時焉盖毛傳謂三星為參三星在天可以嫁娶鄭箋又謂心星毛公亦多差誤穿鑿不可盡信廣漢張氏亦曰若謂婚姻則不得稱邂逅有杕之杜其葉湑湑獨行踽踽豈無他人不如我同父嗟行之人胡不比焉人無兄弟胡不佽焉有杕之杜其葉菁菁獨行睘睘豈無他人不如我同姓嗟行之人胡不比焉人無兄弟胡不佽焉睘音瓊本作㷀又作焭姓補音桑經切按原本三字脱説文以生得聲左氏傳公孫生亦作姓古鐘鼎姓作生漢童謡㳺平賣印自有平不避髙賢及大姓按原夲印訛作卬避訛作璧釋木云杜甘棠又云杜赤棠然今四明山之東凹地名曰杜其地杜花白以是得名然則曰杜曰棠通稱歟爾雅亦多差悞杕盛也其葉湑湑菁菁獨行於道者踽踽睘睘按原本二字脱無依無親不如杜枝葉相比之盛豈無他人不如同父之兄弟相親相比之為美也嗟行道之人胡不比焉意謂非親故不相比也人無兄弟胡不相佽助意謂非兄弟故不相佽助明惟親屬乃相親相助毛詩序曰杕杜刺時也君不能親其宗族骨肉離散獨居而無兄弟將為沃所并爾羔裘豹袪自我人居居豈無他人維子之故羔裘豹褎自我人究究豈無人維子之好鄭箋云羔裘豹袪在位卿大夫之服袖口曰袪鄭風羔裘豹飾又云邦之司直則知羔裘豹飾其袖卿大夫之服也自以我為我人為人居居然無相親愛之意居居有倨之意居止也居居盖嚴冷不相親之狀豈無他人可事維子之故故舊也其自乃祖乃父以來相依承之久而不忍輕去之歟究極也究究言其人我截然之極也言嚴冷無以復加也好舊好也是詩其家臣所作歟毛詩序謂晉人刺其在位不恤其民本詩辭情不然肅肅鴇羽集于苞栩王事靡盬不能蓺稷黍父母何怙悠悠蒼天曷其有所肅肅鴇翼集于苞棘王事靡盬不能蓺黍稷父母何食悠悠蒼天曷其有極肅肅鴇行集于苞桑王事靡盬不能蓺稻粱父母何嘗悠悠蒼天曷其有常毛詩序曰鴇羽刺時也昭公之後大亂五世君子下從征役不得養其父母而作此詩也是詩惟憂念父母爾初無刺時之情毛傳曰肅肅鴇羽聲也集止苞稹栩杼鴇性不樹止爾雅釋言云苞稹郭云今人呼物叢緻者為稹按原本緻字脫今補孫炎曰物叢生曰苞齊人名曰稹釋木云栩杼郭云柞樹也陸璣疏云今柞櫟也其子為皁或言皁斗其殻為汁可以染皁孔䟽云鴇鳥連蹄性不樹止樹止則為苦毛傳曰盬不攻緻也怙恃也鄭箋云蓺樹也孔䟽云盬與蠱字異義同毛傳曰行翮也䟽云以鳥翮之毛有行列也曲禮曰稷曰明粢郭璞云今江東人呼粟為粢釋草云虋赤苖苞白苖郭璞注云赤苖今之赤粢粟白苗今之白粢粟皆好榖靡盬者不蠱壞王事不蠱壞以勤勞故也故世以靡盬為勤勞無暇之稱惟勤勞無暇故不及種蓺黍稷稻粱今俗語云不能得蓺稷黍既不及蓺黍稷則父母何所恃以為食嘗猶食也箋云曷何也何時我得其所哉至于極則止矣曷其有極言無極則勞役無已常平常也易時復常也周平王常使虢公將兵伐曲沃莊伯桓王又使虢仲伐曲沃其以晉迫于王畿故王命行焉而有王事豈曰無衣七兮不如子之衣安且吉兮豈曰無衣六兮不如子之衣安且燠兮按此篇永樂大典缺卷有杕之杜生于道左彼君子兮噬肯適我中心好之曷飲食之有杕之杜生于道周彼君子兮噬肯來遊中心好之曷飲食之杕杜有華焉況生道左人所逰觀喻晉居五逹之地武公始并晉國禮士方急故四方士君子悅之噬肯適我噬决然之意噬物必决之故曰噬歟决然欲來仕於晉國武公中心好之曰何以飲食之曷何也好士之情如此故詩人美之述之而毛詩序曰刺晉武公也武公寡特兼其宗族而不求賢以自輔焉者盖以生於道左疑其特生孤立之狀故起斯義而二章辭情大體不然殊覺有美之之意毛傳亦初無寡特之意亦有美意惟衛宏妄起序説盖宏不思華生道左人必逰觀之情武公㓕晉則罪矣而得士心此以臣美君正也武公并晉二年而卒其勤勞禮士之心宜朱遽衰序差繆若此類多矣不可盡信道周周繞囬曲處也又周行亦道路之别名葛生蒙楚蘞蔓于野予美亡此誰與獨處葛生蒙棘蘞蔓于域予美亡此誰與獨息角枕粲兮錦衾爛兮予美亡此誰與獨旦夏之日冬之夜百歲之後歸于其居冬之夜夏之日百歲之後歸于其室婦人嫁而從夫所託者夫而已如葛生蒙楚必託楚而生如蘞蔓于野必託野而生無楚葛何依無野蔓何託楚薪也陸璣䟽曰蘞似栝樓葉盛而細其子正黒如燕薁不可食也幽州人謂之烏服今四明亦有之謂之老烏服藤有二種有其子白者鄭箋謂所美謂君子也予之美者今亡此矣言其夫亡也亡其所依託故以葛蘞為喻亡夫則獨處矣誰與處乎言無人以伴其幽獨也息休息也夫亡則獨息爾誰與伴休息乎夫亡則獨寢以逹旦矣誰與伴寂冷乎誰與獨息誰與獨旦皆憂思其夫之情也必曰獨者寡婦義當守獨故毎以獨為言夏之日冬之夜毛傳曰長也鄭箋云思者於晝夜之長時尤甚居墳墓也又云室猶塜壙言此者婦人專一義之至情之盡謂終當同穴祔葬也陳風防有鵲巢云誰侜予美此予美指其君也盖謂予所美愛者吾君也誰為讒言以侜誑吾君聊以彼通此則此予美謂夫也詩序曰葛生刺晉獻公也好攻戰則國人多喪矣夫本詩婦思其夫也衛宏不知夫婦之道正大故外推其説以及於君焉既失詩人之情又失先聖之㫖采苓采苓首陽之巔人之為言苟亦無信舍旃舍旃苟亦無然人之為言胡得焉采苦采苦首陽之下人之為言苟亦無與舍旃舍旃苟亦無然人之為言胡得焉采葑采葑首陽之東人之為言苟亦無從舍旃舍旃苟亦無然人之為言胡得焉巅補音典因切説文以顚得聲集韻顛典音切王襃洞簫賦巓與根叶易林比之解曰耕石山巓費種家貧隨之明夷曰日在阜巔鄉昧為昏小人成羣信補音斯人切為如字下同葑音封毛傳曰苓大苦也釋文曰即甘草葉似地黄首陽山名也釋草云蘦大苦郭璞注云今甘草也據毛傳則苓字訛歟凡詩音存字訛者多毛詩序言獻公好聽讒言夫讒言必為可采之狀無可采之狀則何以動其君讒言不一以利欲誘其君則似蘦之甘以禍患懼其君則似苦既以甘誘之又以苦恐之則君無不從其終將痛攻善良其厲虐似葑之辛葑芥也其生于山者尤辛辣今俚語言人之嚴厲曰辣首陽山在河東之蒲坂縣南詩人即所見以入詠山有人君尊高之象曰巓曰下曰東亦兼寓意乎讒言不離君之前後左右必隨依君意而入之歟詩人忠告曰讒言誠有甘苦可采之狀苟亦無據信舍之舍之旃之也然是也苟不以為是而舍之則人之為讒言者亦何所得焉無所得則止矣茯苓雖生山中而深必掘地深入乃可取此言采則非也況苦與葑皆菜則苓者蘦亦菜也故從毛傳
