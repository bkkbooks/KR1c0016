body:
  text: 慈湖詩傳卷十宋楊簡撰曹蜉蝣之羽衣裳楚楚心之憂矣於我歸處蜉蝣之翼采采衣服心之憂矣於我歸息蜉蝣掘閲麻衣如雪心之憂矣於我歸説爾雅釋蟲云蜉蝣渠畧郭云身狹而長有角黄黒色叢生糞土中朝生暮死毛詩序曰昭公好奢而任小人夫國之存亡治亂由所任之賢否今曹君任羣小小人以類而進如蜉蝣之多又君臣昏愚無所用其心惟奢潔其衣服浮游度日不知亂亡之將至如蜉蝣朝生暮死其卑汙不足比數亦如蜉蝣微蟲生於糞土而衣裳侈潔亦如蜉蝣之有羽盖曰羣小之衣服特如蜉蝣羽耳楚楚猶濟濟也采采采色之備也掘閲者蜉蝣掘糞土而出覩陽明閲有觀覩之義喻羣小識見卑汙之甚也羣小方蜉蝣自喜而事君者心憂焉憂國之亂亡也於我歸處者亦猶素冠之詩言我心傷悲兮聊與子同歸兮盖詩人與同志者偕行途中遇衣裳楚楚者因動心憂懼輟行而歸曰歸於我室而處息乎歸於我室而説此話乎惟同志故相親也而毛詩序總曰刺奢也不盡事情又曰國小而迫無法以自守皆贅説豈以國小而迫如蜉蝣之穴乎湯以七十里朝諸侯有天下何患乎小彼候人兮何戈與祋彼其之子三百赤芾維鵜在梁不濡其翼彼其之子不稱其服維鵜在梁不濡其咮彼其之子不遂其媾薈兮蔚兮南山朝隮婉兮變兮季女斯飢是詩傷賢者失所羣小得志至於淫縱而棄薄其正室也夏官序云候人上士六人下士十有二人史六人徒百有二十人其職云各掌其方之道治與其禁令以設候人及歸送之于境諸侯之禮降無上士小國殆下士為長所謂荷戈與祋之候人其徒耳考工記廬人云戈祕長六尺有六寸祋長尋有四尺説文云祋殳也玉藻云一命緼芾黝珩再命赤芾葱珩芾韠也大夫以上赤芾乘軒彼候人兮意指賢者而荷戈與祋迎送賔客於道路彼其之子意指小人乃服赤芾者三百人雖大國無是也其寵用小人蕩然無度一至於此鵜鶘喙長尺餘頷下胡大如數升囊羣飛入水食魚今也在梁不濡其翼咮長如此而亦不濡是當食魚而不得食魚喻賢者冝得禄而不得祿按樓鑰云歐陽氏曰此鵜當居泥水中以自求魚而食今乃邈然高處魚梁之上竊人之魚以食而得不濡其翼咮如彼小人竊禄于高位而不稱其服也鵜不當以喻賢者不若歐陽氏之説為長彼小人乃不稱其服小人不冝赤芾而赤芾賢者貧無以為食彼小人乃冨貴縱肆好色淫恣而棄其婦媾婚媾也按鑰又曰毛氏曰媾孕也張氏曰不遂其媾不稱其寵待也今人謂遂意亦曰稱意世俗常情窮飢則無暇於色厭飫則放逸而好色董曰薈集注作嬒蔚文也南山朝隮蝃蝀也人莫敢指者乃陰陽交感不正之氣南山喻在高位朝隮喻淫縱淫縱者按原本脫下淫縱二字今校補惟其意之所溺固有其妻雖婉孌而自不説者如衞莊姜雖美而不見荅盖不樂静正而放於情慾季女者年少之妻以其未嘗相親如不為婦也故曰季女不悦之則失所至於斯飢矣按鑰又曰張氏詩曰林木南山薈蔚時工斤樵斧競朝隮舉知趨利青冥上不念幽居季女飢陳氏曰壯者趨利于山則弱者餒窮于室小人肆志于上則君子困窮于下張陳二説雖未必盡得詩人之意然其説猶雅馴今為一媾字一嬒字又婉孌季女遂生此説然朝隮實非蝃蝀也彼蝃蝀之詩首章曰蝃蝀在東莫之敢指故次章曰朝隮于西崇朝其雨至今朝日在東則虹見于西夕日在西則虹出于東鮮有見于南者且此詩初不言虹而徑以朝隮為蝃蝀則不可既曰季女如有齊季女而曰如不為婦亦覺費辭若以南山喻高位朝隮喻滛縱亦不成詩語宜有以更之毛詩序曰候人刺近小人也共公逺君子而好近小人焉不盡詩情鳲鳩在桑其子七兮淑人君子其儀一兮其儀一兮心如結兮鳲鳩在桑其子在梅淑人君子其帶伊絲其帶伊絲其弁伊騏鳲鳩在桑其子在棘淑人君子其儀不忒其儀不忒正是四國鳲鳩在桑其子在榛淑人君子正是國人正是國人胡不萬年鳲鳩釋見鵲巢毛傳曰鳲鳩之養其子朝從上下暮從下上平均如一董曰崔靈恩集注作其義一兮一而不變如結之不解毛傳曰飛在梅也孔疏曰養之長大而飛鳲鳩常言在桑其子每章異木言母常不移也鄭箋云其帶伊絲謂大帶也言此帶弁者刺不稱其服毛傳曰騏騏文也弁皮弁也孔疏云皮弁常服也馬之青黒者謂之騏此謂弁色如騏如騏馬之文也顧命云四人綦弁鄭元云青黒曰綦王肅云赤黒孔安國云鹿子皮顧命馬本作騏弁云青黒色鄭師馬融故祖其説爾雅釋畜云馬屬獨不言騏其雜色之馬總謂之騏故無定名歟其間駵白駁黄白騜驪白鴇蒼白騅丹白騢之類則又其專名歟其總稱雜色則曰騏歟毛傳曰騏騏文也雜則成文歟孔安國曰騏文鹿子皮盖本於先儒謂皮弁用白鹿皮又因毛傳有騏文之義世俗鹿子皮必有文故合而為是說然古者不用難得之物安知不用白羊之皮乎况先王不殺胎則用鹿子皮非先王之心馬鄭青黒之說盖以爵弁色如雀頭赤色則異色而相類者其有青黒歟故王肅又意之為赤黒亦禮飾元纁之類歟皆無經據今姑從毛傳騏之文義又合爾雅騏無定名之義尚書四人綦弁皆士其以士賤故所服皮弁不得用純白惟可用雜色之皮歟綦騏通用歟士冠禮元裳黄裳雜裳可也則士用雜色皮弁於義亦通先王制禮大抵上質而下文胡不萬年者詩人思古之淑人君子胡不萬年夀考至今傷今小人用事不一不正而思古使古之淑人君子至于今尚存則小人不得而進矣毛詩序曰鳲鳩刺不一也在位無君子用心之不一也補音萬年禰因切太元務首次五無益人也次六利當年也楚辭哀時命生天地之若過兮忽爛熳而無成願一見陽春之白日兮恐不終乎永年漢書序傳封禪郊祀登秩百神協律改正饗兹永年按原本四句脱又西都賦年與麟叶又靈臺詩年與神叶春秋公子年夫老氏榖梁皆作佞佞平聲夏侯湛抵疑佞與傾為韻冽彼下泉浸彼苞稂愾我寤嘆念彼周京冽彼下泉浸彼苞蕭愾我寤嘆念彼京周冽彼下泉浸彼苞蓍愾我寤嘆念彼京師芃芃黍苗陰雨膏之四國有王郇伯勞之釋草云稂童粱陸璣云禾黍為穗而不成崱嶷然謂之童粱魯語曰馬餼不過稂莠童㓜叢生曰苞童粱不實有下民飢虐之象苞稂寒泉浸之尤見無陽和之氣冽彼下泉虐政似之今田家謂田冷者不善以陰氣太盛故也故我愾然寤嘆思念周道蕭香草賢者似之亦失所蓍可以筮通神明知吉凶知者似之亦失所士民皆失其所故憂而思明王賢伯雨者和順所成黍苗得陰雨則如膏毛傳曰郇伯郇侯也鄭箋云郇侯文王之子為州伯有治諸侯之功言上有明王又有郇伯以勞來之則士民如蒙膏雨之降異乎下泉之冽矣泉出地下曰下泉毛詩序曰下泉思治也曹人病共公侵刻下民不得其所憂而思明王賢伯也豳七月流火九月授衣一之日觱發二之日栗烈無衣無褐何以卒歳三之日于耜四之日舉趾同我婦子饁彼南畝田畯至喜七月流火九月授衣春日載陽有嗚倉庚女執懿筐遵彼微行爰求柔桑春日遲遲采蘩祁祁女心傷悲殆及公子同歸七月流火八月萑葦蠶月條桑取彼斧斨以伐逺揚猗彼女桑七月鳴鵙八月載績載𤣥載黄我朱孔陽為公子裳四月秀葽五月鳴蜩八月其穫十月隕蘀一之日于貉取彼狐狸為公子裘二之日其同載纘武功言私其豵獻豜于公五月斯螽動股六月莎雞振羽七月在野八月在宇九月在戸十月蟋蟀入我牀下穹窒熏䑕塞向墐戸嗟我婦子曰為改歳入此室處六月食鬱及薁七月亨葵及菽八月剥棗十月穫稻為此春酒以介眉夀七月食𤓰八月斷壺九月叔苴采荼薪樗食我農夫九月築場圃十月納禾稼黍稷重穋禾麻菽麥嗟我農夫我稼既同上入執宫功晝爾于茅宵爾索綯亟其乘屋其始播百榖二之日鑿冰沖沖三之日納于凌陰四之日其蚤獻羔祭韭九月肅霜十月滌場朋酒斯饗曰殺羔羊躋彼公堂稱彼兕觥萬夀無疆火虎隗反觱音必發補音方吠切説文廢以發得聲壹發五豝獻爾發功徐邈皆讀如廢劉伯莊史記音孔子世家發中權發音廢平原君傳而未發亦云十九人輕笑之未能即廢太元應首次七惡敗類也次八應其發也張衡東京賦奉車既引先輅乃發鸞旗皮軒通帛蒨旆桓麟七説按原本桓誤柏今改騎不失蹤滿不虛發彈輕翼於高冥按原本訛作真窮疾足於方外栗烈力制切古厲山氏亦作烈揚雄校獵賦元冬季月天地隆烈萬物權輿於内徂落於外張衡西京賦雨雪飄飄冰雪慘烈百卉具零剛蟲摶鷙饁炎轍反畯音俊火補音虎隗切説文火燬也物入則皆毁壊也方言㷄火也呼塊切郭璞曰楚轉語也猶齊言􅛚火也汝墳王室如燬孫炎曰方言有輕重故以火為燬也按易林同人之漸曰魁行揺尾逐雲吹火泰之旅曰從風吹火牽騏驥尾需之大有曰乘舟渡濟載氷逢火剥之坤曰從風放火荻芝俱死未濟之漸曰穿匏挹水篝鉄然火雈戸官反斨也羊反猗於冝反鵙圭覔反莎素何反子補音讀與戸叶易林師之泰隨之睽皆子與女叶夬之萃子與主叶同人之家人子與與叶同人之恒子與所叶太元去首子與主叶韓非曰慈母有敗子嚴家無格虜墐音覲夀補音殖酉切顔師古糾繆正俗或曰年夀之字北人讀為受音南人讀授音何者為是荅曰兩音皆通南山有臺遐不眉夀此則言受嵇康詩頤神養夀散髪巖岫此則音授也按張衡東京賦三夀與國叟叶荀卿蠶賦身女好而頭馬首者與屢化而不夀者與有父母而無牝牡者與王儉釋奠詩咨此含生躋彼仁夀淳移雅缺歴兹長乆梁元帝元覽賦惟天縱於副后踰啟誦而為首既論儒而肅成復斷獄於長夀𤓰按原本脱此字簡按衞風木𤓰補音攻乎切引證甚多饗補音虛良切漢房中歌嘉薦芳矣告靈饗矣告靈既饗徳音孔臧郊祀歌闢流離抑不祥賔百僚山河饗顔師古皆讀如鄉是詩大㫖已見豳釋謂邠之始國當是時所紀時用夏正七月流火建申之月也火心星也堯典曰日永星火或曰星火大火之次也心星正居大火之次故心星亦名火毛傳曰流下也九月霜始降婦功成可以授衣矣堯典火星昏中於南方以正仲夏則至六月而火星漸流至七月則西流之狀昭昭矣自堯至后稷之曽孫公劉居邠歴年未為甚乆天運未大變二千年而至秦之月令則季夏昏火星中則知日嵗行周天之度不盡積二千年而後一月矣流者星隨天輪轉而下也日益東行星益西流心經星實不動隨天西轉故曰西流夫既叙邠事用夏正矣而又曰一之日二之日三之日四之日用周正何也以今驗昔則事狀可考也然亦不明言正月二月三月四月以明其實叙豳事也觱發者寒風勁發萬籟盡鳴如吹觱篥也野俗有語籬端吹觱篥謂烈風吹籬端之虚管作聲也觱篥羌人所吹角邠亦西羌之地栗烈者丑月寒氣益烈人股戰栗也按摟鑰曰毛氏曰觱發風寒也栗烈氣寒也王氏曰風而寒尚非其至也無風而寒于是為至只如此説足矣觱栗一名悲栗一名笳管龜兹之樂也其聲悲栗羌人吹之以驚中國之馬後世之樂始有譜其音以為衆籟之首周時安得有此俗語尤不足取股戰而栗漢人始有此語毛傳謂栗烈氣寒也其以是歟鄭箋云褐毛布也夏小正曰正月農緯厥耒緯束也束其耒云爾者用是見君子之亦有耒也耒與耜而為一將以用之也毛傳曰邠地晚寒于耜始修耒耜也月令季冬命農修耒耜孟春天子躬耕帝藉毛傳曰四之日民無不舉足而耕矣夏小正於正月已初服于公田則四之日即夏之二月咸舉趾而服其私田矣我婦我子同來致餉於南畆畆獨曰南者姑舉一而言也爾雅釋言曰畯農夫也孫炎曰農夫田官也毛傳曰田大夫也小雅甫田云田畯至喜鄭箋云田畯司嗇今之嗇夫也農者多以天星為候故三言七月流火况七月正是西成之時農事於此至重兩言九月授衣衣食最其急者鄭箋云載則也陽温也毛傳曰倉庚離黄也懿筐深筐也㣲行墻下徑也五畆之宅樹之以桑懿筐者筐之美者懿美也謂竹工之精細者蠶始生桑亦始生而柔孔䟽云倉庚一名離黄即葛覃黄鳥是也毛傳蘩白蒿也所以生蠶祁祁衆多也山陰陸氏曰今洗蠶種尚用蒿釋草云蘩皤蒿郭云白蒿也婦人女子易於感傷而况於春時其羣行采蘩時見其有相語傷悲之態君猶躬耕公子冝親農事公子之歸時差早女子之歸次之故曰殆及公子同歸衆農則終日矣其政事有節叙不亂如此毛傳曰薍為雈葭為葦豫儲雈葦可以為曲也月令季春具曲植筥筐注云曲薄也養蠶器也陸璣云薍或謂之荻至秋堅成則謂之雈郭云蘆葦也鄭箋云條桑枝落之采其葉也毛傳曰斨方銎也破斧傳云隋銎曰斧方銎曰斨逺條揚起手所不及者則伐之乃采其葉猗語辭也書云斷斷猗大學作斷斷兮伐檀河水清且漣漪亦語辭也猗彼女桑柔穉之桑也先取其大次取其小事情之常也毛傳曰鶪伯勞也載績絲事畢而麻事起矣元黒而有赤也朱深纁也陽明也祭服元衣纁裳鄭箋云伯勞鳴將寒之候五月則鳴邠地晚寒鳥物之候從其氣焉不曰為君裳而曰為公子裳者按國語王后親織元紞公侯之夫人加之以紘綖卿之内子為大帶命婦成祭服此魯公父文伯之母所言周禮則然七月之詩乃序邠事邠用夏禮又邠在戎狄之間為禮益簡朴則君夫人親織其君之服故邠人之所供則為公子服歟毛傳曰葽草也不榮而實曰秀爾雅釋草云不榮而實者謂之秀而論語曰秀而不實者有矣夫鄭箋云夏小正四月王萯秀葽其是乎本草云萯生田中葉青刺人有實七月采釋蟲云蜩蜋蜩螗蜩方言云楚謂之蜩宋衞之間謂之螗蜩陳鄭謂之蜋蜩秦晉謂之蟬孔疏曰釋蟲又云蜺寒蜩郭云小而青赤與此鳴蜩不同夏小正云五月螗蜩鳴七月寒蟬鳴是其異也穫穫禾也蘀槁也隕墜也亦見鄭風蘀兮鄭箋云于貉往搏貉以自為裘也狐貍以共尊者其同者君臣及民同習兵因出田也毛傳曰纉繼也豕一嵗曰豵三嵗曰豜大獸公之小獸私之釋蟲云斯螽蚣蝑蘇曰即螽斯也釋蟲云螒天鷄郭云小蟲黒身赤頭一名莎鷄又曰樗鷄李廵曰一名酸鷄陸璣曰莎鷄如蝗而斑色毛翅數重其翅正赤爾雅疏云斯螽一名蜙蝑一名舂黍蝗類也長而青長角長股股鳴者也五月中以兩股相切作聲聞數十步者是也釋文曰屋四垂為宇鄭箋云自七月在野至十月入我牀下皆謂蟋蟀也不首言蟋蟀者人縱言有如此者意自相應人亦自曉毛傳曰穹窮窒塞也向北出牖也墐塗也庶人篳戸孔疏云篳戸以荆竹織門通風故泥之也穹窒其室之孔穴熏鼠令出其窟士虞禮云祝啟牖嚮牖一名也朱曰塞向以當北風嗟嘆也其長老嘆而語其婦子曰我婦我子今嵗將窮而改矣入此室而處乎此家人常談詩陳叙及此以見親愛至情乆勞將休之狀本草云鬱一名雀李一名車下李毛傳曰薁蘡薁也剥擊也眉夀毫夀也孔疏云晉宫閣銘云華林園中有車下李三百一十四株薁李一株車下李即鬱按原本五字脱薁李即薁二者相類李曰葵可茹公儀為魯相所㧞者是也朱曰菽豆也十月穫稻晚稻也十月為春酒三月而酒始成也漢之中山酒冬釀接夏而成則十月為春酒猶未為乆也今俗為酒及月而已盖古者未知以繒囊壓酒至唐猶然故必待乆而後清鄭箋云介助也眉生毫毛為夀考之相毛傳曰壺瓠也叔拾也苴麻子也樗惡木也瓠至八月堅成則斷截之可以為壺壺圎器也壺瓠音義同説文亦曰叔拾也鄭箋云乾荼之菜苴荼之蓄供以常食食我農夫者猶曰給我家人也今農夫猶自稱曰農家場圃同地毛傳曰春夏為圃秋冬為場後熟曰重先熟曰穋箋云納内也治於場而内之囤倉也稷粟也天官内宰詔王后帥六宫之人而生穜稑之種而獻之于王鄭司農云先種後熟謂之穜後種先熟謂之稑釋文云重作種説文云禾邊作重是重穋之字禾邊作童是穜藝之字今人亂之已乆汜勝之種植書于黍稷稻粱之外有禾云即是粟此説盖起於董仲舒云禾是粟苗夫禾者穀粟之總稱穜稑亦總言諸禾先熟後熟下文總言諸禾及胡麻蕡麻及豆麥何必於稻粱之外定指粟為禾此既言黍稷則所謂禾者謂稻秔秫諸禾歟董仲舒所謂粟苗為禾者以粟又為黍稷稻粱之通稱故云農民固以粟為禾然亦以稻為禾稻種甚多陶隠居從汜説以禾為榖之數亦陋矣或以稷為穄穄粟同類農人相謂曰我稼既皆内子囷倉則可以上入都邑執公宫之事矣同皆也范氏亦曰宫功公室之役也箋云爾女也毛傳曰宵夜也綯絞也箋云女當晝取茅歸夜作絞索以待時用亟急也急乗屋者覆盖之也所乗者在下故曰乗龍乗舟乗車今升屋而治之則屋在下矣故曰乗所以乗屋不敢緩者以播榖之事又將始矣民事之勤勞罕暇如此鑿氷之時擇沖和之日慮寒氣之傷人也按鑰又曰毛氏曰沖沖鑿氷之意孔氏曰沖沖非貌非聲故云鑿氷之意左傳曰深山窮谷涸陰沍寒于是取之豳尤寒盛冬安得有沖和之日不如只從毛説豳公愛民如此毛傳曰凌陰氷室也孔疏云豳地晚寒故可夏正月藏氷案天官凌人正嵗十有二月令斬氷三其凌程曰其蚤用之於獻羔祭韭時夏頒氷是其後用時也月令仲夏天子乃獻羔開氷先薦寢廟祭韭者以韭新出故薦之毛傳曰滌埽也兩樽曰朋豳在戎狄之間君民之分不嚴故可以朋酒羔羊躋公堂稱兕觥而為豳公之夀鴟鴞鴟鴞既取我子無毁我室恩斯勤斯鬻子之閔斯迨天之未陰雨徹彼桑土綢繆牖戸今女下民或敢侮予予手拮据予所捋荼予所蓄租予口卒瘏曰予未有室家予羽譙譙予尾翛翛予室翹翹風雨所漂摇予維音嘵嘵詩㫖已見邠釋爾雅釋鳥云鴟鴞鸋鴂郭曰鴟類爾雅繼云狂茅鴟怪鴟梟鴟釋曰此别鴟類也大雅瞻卬云為梟為鴟陸璣云鴞大如斑鳩緑色惡聲之鳥也入人家凶賈誼所賦鵩鳥是也陳風墓門云有鴞萃止此詩喻鳥之愛其子與巢者呼鴟鴞而告之鄭箋云室猶巢也朱曰鬻此子誠可憫憐今既取之其為毒甚矣况又毁我室耶程曰鴟鴞喻為惡者子喻管蔡室喻王室毛傳曰迨及也方言云東齊謂根曰杜董曰石經作桑杜朱曰牖者巢之通氣處戸其出入處也毛傳曰拮据撠挶也按挶原本誤作拘下同今改正孔疏曰説文云橶持也橶挶謂以手爪挶持也毛傳曰荼雈苕也孔疏曰薍為雈雈苕謂薍之秀穗也朱曰捋取也荼苕華可藉巢者程曰蓄積租取也王曰與租賦之租同毛傳曰瘏病也手病口病故能免乎大鳥之難按大典脱此八字今校補箋云我作之至苦如是者曰我未有室家之故毛傳曰譙譙殺也翛翛敝也翹翹危也譙譙惟悴也翛翛勞敝而毛不宻比風吹之翛翛也大亂如風雨漂揺予室予維末如之何音嘵嘵而已矣夫周公欲成王於亂未作如何其綢繆牖尸也豈惟欲其勤於政事而已耶政事雖勤君心易惑流言終不已亂終作也周公欲成王勤於學學而徳性明賢否判流言何自而作亂何自起乎故孔子曰為此詩者其知道乎我徂東山慆慆不歸我來自東零雨其濛我東曰歸我心西悲制彼裳衣勿士行枚蜎蜎者蠋烝在桑野敦彼獨宿亦在車下我徂東山慆慆不歸我來自東零雨其濛果臝之實亦施于宇伊威在室蠨蛸在戸町畽鹿場熠燿宵行不可畏也伊可懐也我徂東山慆慆不歸我來自東零雨其濛鸛鳴于垤婦嘆于室洒埽穹窒我征聿至有敦瓜苦烝在栗薪自我不見于今三年我徂東山慆慆不歸我來自東零雨其濛倉庚于飛熠燿其羽之子于歸皇駁其馬親結其縭九十其儀其新孔嘉其舊如之何栗韓詩作力菊反長茂也或曰衆也毛詩作栗毛詩序曰周公東征三年而歸勞歸士此語得之而繼曰大夫美之故作是詩也詳攷詩情不合又曰一章言其完也二章言其思也三章言其室家之望女也四章樂男女之得及時也君子之於人序其情而閔其勞所以説也說以使民民忘其死其唯東山乎詳觀四章序情閔勞足盡不畧而每章别而言之則有所不盡首章雖見其不死於征役完而歸而非専言其完也四章皆言其思奚獨二章為然民忘其死乃詩外之義是詩其歌以勞歸士乎序情閔勞周公之至情豈章别解釋之所能盡衞宏作序詎能知聖人之心聖人之心即人之心也人心即道故曰道心人惟不自知其心故不知聖人之心離心生意始失其道此諸儒所以紛紛雜雜而正牆面孰知夫作歌勞歸士序情閔勞如此曲折乃道心之變化如四時之錯行也苟微害夫人之道心周公必不可用也程氏曰東山所在之地也毛傳曰慆慆言久也濛雨貌士事也尚書康誥云見士於周注亦以士為事周頌敬之陟降厥士桓保有厥士皆謂事古士事通用其以音同歟大司馬大閲銜枚而進王朝作是詩以序歸士之情凡言我謂歸士之已也以周公大聖將衆士以東征民忘其勞矣未必有慆慆不歸之念也而王朝作詩以序其情自為是辭也此其所以盡人之情也及自東來歸又道塗遇濛然之零雨零落也其勞苦誠可念其歸士必不作勞苦之念而上之人序其情閔其勞故言及此也每章首必及此其閔勞不已之情可見我東曰歸又再起意我自東而初聞曰歸也我心感動念家之情而西悲此人之至情非有所怨苦於上也自悲耳寄音於室家曰若制彼衣裳今歸矣勿事行枚言勿為銜枚之具來也言今無用也行而進戰乃銜枚故曰行枚大司馬注云枚如箸銜之有繣結于項中毛傳曰蠋桑蟲也烝有升義有衆義井中蟲曰蜎則此蜎蜎謂蠋之狀光潔如蜎也野有桑林有蠋烝焉歸塗所覩感時物而興懐也歸士宿車下軍政士不可離伍也曰獨宿者閔其未有室家之樂故云也敦敦然宿卧之狀毛傳曰果臝栝樓也伊威委黍也蠨蛸長踦也町畽鹿迹也熠燿燐也燐螢火也施于宇蔓延于屋上也淮南子云乆血為燐許慎云謂兵死之血為鬼火孔疏引此云燐者鬼火之名非螢火也下文曰不可畏也則謂熠燿為鬼火之稱陳思王螢火論謂熠燿宵行為螢火非鬼火亦未安田野多燐不足多怪郭璞注釋蟲云伊威䑕婦之别名本草云䑕婦一名負蟠一名蛜蝛一名蜲􅡂一名䑕負言䑕背多負此蟲今作婦字似乖理一名䑕姑爾雅蟠䑕負是也多在甕器底及土坎中常著䑕背故名之也如葈耳名羊負菜也爾雅釋蟲前云蟠䑕負後别行蛜蝛委黍似二蟲然爾雅差誤不一此其誤耳長踦小蜘蛛長脚者俗呼為蟢子壯夫不在家其家荒蕪形容其狀如前末言熠燿燐鬼火故曰不可畏也乃可懐思也思復見夜行之燐火與夫果臝施宇伊威蠨蛸町畽鹿迹而未得也毛傳曰垤蟻塚也將隂則穴處先知之鸛好水長鳴而喜也孔疏曰將雨則蟻避濕而上塚按以上二十字原木脱今校補鸛鳴于垤詩意與零雨其濛同婦嘆于室聞其夫將歸感傷而嘆也鄉人樓尚書云山東蟻塚有極高大如塚墓然行人以雨為苦婦嘆念其勞也按樓鑰云毛公齊人自知之解不甚詳孔疏亦未明皆不見于垤之義惟胡徳輝蒼梧雜志言之㝡明云新繹經傳鸛鳴于垤謂垤為邱垤非蟻塚盖荆公未嘗到山東蟻冢有極高大者如塚墓然毎天將雨則鸛集蟻垤而鳴蟻知雨鸛喜雨以其類也方説得于垤字分曉正以雨將作故婦嘆于室如殷其雷之意正念其勞也若我征聿至自在下句婦嘆于室意總于上孟子所謂邱垤以是知邱是自然高處垤乃蟻塚上土共盤馬于蟻封亦謂此也按此則蟻塚之説乃樓引胡氏語非樓氏説也洒灑埽拚也穹窮窒塞其䑕穴所以然者謂我征役今歸且至矣我者歸士自謂也歎婦之夫也𤓰之苦者可以為器其狀敦然其圓烝延薪之上蓼蕭蓼莪皆言其盛蓼同士歸而顧其家苦𤓰延于薪曰自我不見此𤓰三年矣推盡歸士情狀至於此可謂閔勞之至有蠋在桑有苦𤓰在薪時未寒肅晴暄之日倉庚猶飛其羽熠燿光明女之嫁曰歸易曰歸妹爾雅之釋馬屬駵白駁黄白騜孫炎曰駵赤色也毛傳曰縭婦人之褘也母戒女施衿結帨九十其儀言多儀也釋器云婦人之褘謂之縭縭緌也孫炎曰褘帨巾也郭璞云即今之香纓也褘邪交落帶繫於體因名為褘緌繫也孔甚也其新昏者甚嘉矣其舊昏如之何序情閔勞喜其歸而遂室家之好其新其舊皆恱也嗚呼孰知夫夫婦正情天地大義哀樂相生孔子以為明目視之不見傾耳聴之不聞也是詩當次鴟鴞之前既破我斧又缺我斨周公東征四國是皇哀我人斯亦孔之將既破我斧又缺我錡周公東征四國是吪哀我人斯亦孔之嘉既破我斧又缺我銶周公東征四國是遒哀我人斯亦孔之休毛詩序曰周大夫以惡四國焉失詩㫖矣孔將孔嘉孔休是詩之㫖也四國可哀不可惡作是詩者知道矣知周公之心矣毛傳曰隋銎曰斧說文曰隋孔形狹而長也斨方銎斧也既破我斧又缺我斨喻三監淮夷破折我之多也毛以斧斨為喻禮義固穿鑿鄭指喻毁周公傷成王二者亦不盡事情叛亂之禍民人罹毒致管蔡誅伐其毁破豈小小哉總言破折之多可也毛傳曰四國管蔡商奄也書序曰武王崩三監及淮夷叛孔安國亦以管蔡商為三監案周禮太宰建其牧立其監設其參傅其伍陳其殷置其輔注云監謂公侯伯子男各監一國書王啟監厥亂為民書序曰成王東征淮夷遂踐奄成王歸自奄然則所謂淮夷者奄也齊詩作四國是匡賈公彦引以為据然毛詩作四國是皇義亦嘉皇者尊大之稱周公東征而四國咸尊大周公惟周公之心無私焉不得已而征之其惻怛愛敬之心四國之民之所共知也惟其君昏頑耳孔甚將大也作詩者其知道乎人知周公東征定亂而已安知其為大也知其為甚大者知其為道也周公行之其道益明東征之士與夫四國之人皆可哀也而周公之征為甚大也毛傳曰鑿屬曰錡木屬曰銶孔疏云皆不審其狀吪吟也四國之民歌周公之徳也遒斂也四國之叛者斂肅也東征之士與四國之民誠可哀而周公之征為甚嘉甚休也哀我人斯深得周公之心周公之心無私喜無私怒豈惟與東征之士同心與四國之民同心與天下之民同心與天地同心故曰孔將也孔嘉也孔休也道也韓詩云錡木屬銶鑿屬也解云今之獨頭斧伐柯如何匪斧不克取妻如何匪媒不得伐柯伐柯其則不逺我覯之子籩豆有踐毛詩序曰伐柯周大夫刺朝廷之不知也言刺大悖是詩周人欲成王盡誠於周公則公可安矣金縢之書謂成王執書以泣曰今天動威以彰周公之徳惟朕小子其新逆則成王於周公無問矣而周人猶有伐柯九罭狼跋之詩何也成王雖深感周公之徳其疑釋然及公歸燕饗之禮雖設獻酬交錯籩豆之荐行踐以致禮而其中心猶有毫髪未盡之疑終以前者流言之故今雖尊禮而政柄不歸故九罭云公歸無所又云公歸不復言不復其故所也周公歸不授以政猶伐柯而不以斧取妻而不以媒何以伐柯何以得妻何以得周公之心詩人於是再發其義曰執斧柯以伐木為柯二柯相去甚不逺成王執書以泣之心與周公之心相去本無間以其後隠然之疑復有以間之故未合覯見也我惟見周公籩豆有踐而已意謂成王不委之以政也詩人致意含隠不露如此而序曰刺焉可謂誣屈可謂悖厲籩豆有踐亦見小雅伐木九罭之魚鱒魴我覯之子衮衣繡裳鴻飛遵渚公歸無所於女信處鴻飛遵陸公歸不復於女信宿是以有衮衣兮無以我公歸兮無使我心悲兮是詩大㫖已見伐柯毛傳曰九罭緵罟小魚之網也鱒魴大魚也周之禮公服自衮冕而下釋器云緵罟謂之九罭孫炎曰九罭謂魚之所入有九囊也釋魚云鮅鱒魴魾郭璞云鱒似鯶子赤眼者江東人呼魴魚為鯿陸璣疏云鱒似鯶而鱗細於鯶赤眼然則鱒魴非大魚孔疏亦云則毛傳謂大魚非也此詩謂九罭之網惟可以得鱒魴爾不可以得大魚喻成王徳量之不大惟可以用中材不可以得周公之大聖之子謂周公也覯見也我惟見周公衮衣繡裳而已而王不委之以政鴻飛冝登天今也遵渚而已遵陸而已公歸冝復冡宰之位今也不復無其所以居之詩人於是託辭曰於女信處信宿乎言朝廷無位居公也再宿為信夫是以惟有衮衣而已詩人不勝其悲曰公歸而無位以處之不如無以公歸之愈也公歸而不復故位徒使我心悲耳狼䟦其胡載疐其尾公孫碩膚赤舄几几狼疐其尾載䟦其胡公孫碩膚徳音不瑕是詩本情已見伐柯毛傳曰䟦躐疐跲也老狼有胡進則躐其胡退則跲其尾鄭箋云公周公也孫當讀如公孫于齊之孫周公欲進則成王未授公以政如狼䟦其胡欲退則又深念民人社稷之重非召公畢公諸賢所能了是欲退不可如狼疐其尾按樓鑰云周公雖進退不可亦何至如狼之䟦疐故程氏有云狼獸之貪者猛於求欲故陷于機穽羅繫前䟦後疐進退困險詩人取之以言狼之所以致禍難危困如是者以其有貪欲故也若周公者雖在危疑之地安步舒泰赤舄凡几然也又云先儒以狼䟦疐不失其猛興周公不失其聖猛奚若虎豹胡獨取狼也詩人比興以類是以香草譬君子惡鳥譬小人豈有以􅉘狼興聖人乎程氏之説美矣然詩中無機穽之意猶未為盡也嘗得其説于蜀人楊少卿氏望云狼之遇人先旋繞于人之四旁甚疾人為之戰懼自失然後食之詩人盖以狼之䟦疐比四國而周公處其中不懼也此説㝡為得之孫巽順也碩大也膚敏也赤舄几几愛敬之辭也其盛徳之音終於無瑕也使雖巽順雖碩大而無膚敏之才則臨機應變不無差失功業終不盛大乆矣政卒歸于周公公何心哉公之心天之心也廣大容覆而又應變徐施如四時之運行如日月之代明時措咸宜保民人社稷數百年之安嗚呼豈涓潔小節之士所能測識哉孔疏老狼有胡謂頷下垂胡說文云胡牛頷垂也毛詩序曰狼䟦美周公也周公攝政逺則四國流言近則王不知周大夫美其不失其聖也流言在鴟鴞之前是詩在公歸之後序差補音不瑕洪孤切史記龜䇲傳日辰不全故有孤虚黄金有疵白玉有瑕事有所疾亦有所徐太元衆首軍或纍車文人摧孥内蹈之瑕禮記引詩瑕不謂矣鄭云瑕之為言胡也秦晉以前凡從叚者在平則讀如胡魏晉之間讀如何齊梁之後讀為胡加切楚辭逺逰潄正陽而含朝霞精神入而粗氣除司馬相如大人賦回車朅來兮㑹食幽都呼吸沆瀣兮餐朝霞曹植洛神賦升朝霞與出渌波叶左思蜀都賦霞與峩峩叶此以霞為何也又魏都賦遐與羅叶陸機應嘉賦遐與波叶此以遐為何也韓愈元和聖徳詩瑕與拊叶又以遐為古白居易效陶詩暇與坐叶
