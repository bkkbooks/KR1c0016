body:
  text: 慈湖詩傳巻十二宋楊簡撰小雅二祈父予王之爪牙胡轉予于恤靡所止居祈父予王之爪士胡轉予于恤靡所底止祈父亶不聰胡轉予于恤有母之尸饔補音牙訛胡切易林訟之鼎曰虎聚磨牙以待豘猪太元夷首夷其牙或飫之徒毅首豨毅其牙發以張狐急就章欵冬貝毋薑狼牙亭歴桔梗龜骨枯韓愈毛穎傳中山之占不角不牙衣褐之徒揚雄豫州牧箴陪臣執命不慮不圖王室陵遲喪其爪牙漢地理志允吾應劭音鉛牙揚雄長楊賦雅與祜叶班固東都賦雅與武叶此皆當讀如五牙本如吾雅亦本如伍也周易大畜豶豕之牙鄭氏讀牙如互漢書宗族盤互顔師古曰盤結而交互也字或作牙若犬牙相入之意自吾為互聲之轉爾師古或未知此是詩刺祈父也而毛詩序曰刺宣王也是固宣王之不知人也言刺王則大悖毛傳曰祈父司馬也鄭箋云書曰若疇圻父謂司馬恤憂也司馬掌兵甲以守封圻故曰圻父歟箋云此勇力之士責司馬之辭也我乃王之爪牙之士當為王閑守之衞女何轉移我於憂使我無所止居乎吕伯恭讀是詩見宣王變古制者二焉前兩章既刺其以宿衞之士從征役矣未章復曰祈父亶不聰胡轉予于恤有母之尸饔有親老而無他兄弟其當免役征古必有成法故責其不聰其意謂此法人皆聞之彼司馬獨不聞乎乃驅吾從戎使吾親不免薪水之勞也責司馬者不敢斥宣王也按原本前兩章既刺以下脱今據讀詩記補入毛傳曰底至也亶誠也熟食曰饔劉曰尸主也周語云宣王三十九年戰於千畝王師敗績於姜氏之戎皎皎白駒食我場苗縶之維之以永今朝所謂伊人於焉逍遥皎皎白駒食我場藿縶之維之以永今夕所謂伊人於焉嘉客皎皎白駒賁然來思爾公爾侯逸豫無期慎爾優游勉爾遁思皎皎白駒在彼空谷生芻一束其人如玉母金玉爾音而有遐心補音客克各切楚辭九章九辨客皆與薄叶漢石顯傳牢耶石耶五鹿客耶印何纍纍綬若若耶易林未濟之豐曰崔嵬北岳天神貴客師之頥曰重門擊柝備不速客太元童首大開帷幕以引方客古詩人生天地間忽如逺行客驅車䇿駑馬遊戱宛與洛左氏傳以陳備三愙徐鍇曰今俗作恪案古客皆讀如恪毛詩傳曰宣王之末不能用賢賢者有乘白駒而去者縶絆維繫也鄭箋云永久也願此去者乘其白駒而來使食我場中之苗我則絆之繫之以久今朝愛之欲留之吕曰逍遥者徘徊少留吕伯恭曰所謂伊人蓋廊廟之人也于焉逍遥于焉嘉客既幸其來以為榮復深歎其所處非其地也其言舍蓄未發其辭氣則慘然不樂至三章明言之矣賢者去朝適野時事可知爾公侯尚逸豫而不懼乎仰而慨然責公卿俯而眷然别賢者其情意可識也四章疑其遂忘世也故以毋有遐心勉之按原本脱吕伯恭曰一叚今據讀詩記補入遁云者善其冝遁而亦有訣别之意也二思皆語助也程曰未章言其逺遁而思之之意賢者逺遯空谷處困窮而享淡薄雖所享生芻一束而已然其人之美如玉也賢者既逺遯矣國之好賢者猶望其相聞而不見絶也按原本程曰以下脱今據經説補入孔疏曰母得自愛音聲貴如金玉不以遺問我朱曰歎其乘白駒入空谷生芻以秣之而其人之徳美如玉蓋邈乎其不可親矣然猶覬其相聞而無絶也吕曰言爾公爾侯不敢斥君也箋云優游使待時也毛詩序曰白駒大夫刺宣王也言刺大悖是詩雖中有諷朝廷之意而不明指王此詩大㫖惜賢者之去而已黄鳥黄鳥無集于穀無啄我粟此邦之人不我肯穀言旋言歸復我邦族黄鳥黄鳥無集于桑無啄我梁此邦之人不可與明言旋言歸復我諸兄黄鳥黄鳥無集于栩無啄我黍此邦之人不可與處言旋言歸復我諸父毛傳曰宣王之末民人室家離散妃匹相去有不以禮者復我諸兄復我諸父婦人有歸宗之義穀善也熟觀詩辭未必妃匹每曰此邦之人殆非謂其夫夫死而夫家之人不居養之又其邦族之薄大畧相似故曰此邦之人不我肯穀不肯以善道相處也又曰此邦之人不可與辯明是非婦人無再適之義夫死無子則小宗撫之不然則近屬居養之此義之不可易者如黄鳥必集于木必啄粟今夫家乃棄絶之曰無居吾家無食吾粟如禁黄鳥無集木無啄粟豈理也哉故婦人不得已而曰言旋言歸吾将以告我邦之親族此復如有復于王者之復是有歸宗之意矣言語助也旋還也此婦他邦之女也不曰父母而曰諸父蓋既寡又無父也是詩初無怨王之意而毛詩序曰刺宣王也言刺大悖若于詩外立論則宣王固其根本而釋詩者不當若是我行其野蔽芾其樗昏姻之故言就爾居爾不我畜復我邦家我行其野言采其蓫昏姻之故言就爾宿爾不我畜言歸斯復我行其野言采其葍不思舊姻求爾新特成不以富亦秖以異饑饉之歲逺依婦家而見棄焉作是以絶之而毛詩序曰刺宣王豈以此細故不足為言故必推至於王乎風俗至是誠宣王失道以致之而詩人無刺王之情序言刺王又大悖事無小大是者道非者非道是是非非孰非道者饑歲逺依婦家婦家居野所居有樗焉蔽芾釋見甘棠我以與爾婚姻之故就爾居處相依爾不畜養我我則復歸本邦之家矣鄭箋云蓫牛蘈孔疏云釋草無文陸璣疏云今人謂羊蹄初欲依婦家而居及其見棄則次章曰言就爾宿而已一宿不敢久處也復反其故居也陸璣疏云葍一名䔰幽州人謂之燕䔰其根正白可著熱灰中温噉之饑荒之歲可蒸以禦饑特夫也􅅠柏舟實維我特婦人不事二夫故夫有特名是時知婦家将改嫁其婦故曰爾不思舊姻而求新特爾棄禮犯義如此誠不足以為富亦適以為異爾異者異乎常也怨辭之婉者也祇只職音一而記者異歟冨者人之所同欲故以為言以明其無益於事而徒為不義也爾雅云婦之父母壻之父母相謂為婚姻秩秩斯于幽幽南山如竹苞矣如松茂矣兄及弟矣式相好矣無相猶矣似續妣祖築室百堵西南其户爰居爰處爰笑爰語約之閣閣椓之橐槖風雨攸除鳥鼠攸去君子攸芋如跂斯翼如矢斯棘如鳥斯革如翬斯飛君子攸躋殖殖其庭有覺其楹噲噲其正噦噦其𡨕君子攸寜下莞上簟乃安斯寝乃寝乃興乃占我夢吉夢維何維熊維羆維虺維蛇大人占之維熊維羆男子之祥維虺維蛇女子之祥乃生男子載寝之牀載衣之裳載弄之璋其泣喤喤朱芾斯皇室家君王乃生女子載寝之地載衣之裼載弄之瓦無非無儀唯酒食是議無父母貽罹按此篇永樂大典缺卷據樓鑰集載所解如跂斯翼云如鳥之跂立而張兩翼鳥首如棟亮兩翼如二霤鑰論曰如跂如人跂足直立若如今説下三句已言如矢如鳥斯翼矣不應又以跂為鳥之跂不若只用舊説如人之跂立翼言其翼然不必謂鳥之翼也誰謂爾無羊三百維羣誰謂爾無牛九十其犉爾羊來思其角濈濈爾牛來思其耳濕濕或降于阿或飲于池或寝或訛爾牧來思何蓑何笠或負其餱三十維物爾牲則具爾牧來思以薪以蒸以雌以雄爾羊來思矜矜兢兢不騫不崩麾之以肱畢來既升牧人乃夢衆維魚矣旐維旟矣大人占之衆維魚矣實維豐年旐維旟矣室家溱溱補音于池唐何切停水曰池前漢書引周官川曰呼池嘔夷後漢書無為山林陂池皆徒何切集韻通作沱説文從水它聲徐鉉曰沱沼之沱通用此字今别作池非是鉉蓋以沱為池不知池本為沱也説文引詩滮池北流正作沱漢樂章泊如四海之池徧觀是耶謂何揚雄羽獵賦相與集于靖㝠之館以臨珍池灌以岐梁益以江河東方朔七諫鸞皇孔鳯日以逺兮畜鳬駕鵝鷄鶩滿堂壇兮鼃黽遊乎華池劉邵趙都賦北連昭餘南屬呼池西盼大陵東結潦河索靖草書狀騏驥暴露偪其轡海水窊隆揚其波元熊對踞乎山嶽飛燕相追而差池雄補音于陵切左氏正義云兆如山陵有夫出征而喪其雄皆是繇辭繇辭法皆類韻又云古人讀雄與陵為韻詩正月無羊皆以雄韻陵韻蒸是其事也又云張叔皮論曰賔爵下華田鼠上騰牛哀虎變鯀化為雄久血為燐積灰生蠅或疑張叔皮讀熊為能著作郎王邵云古人讀熊與雄者皆于陵切張叔皮用舊韻孔穎逹曰案詩中無羊與正月及襄公十年衞卜御㓂之繇皆以雄韻陵邵言是也楚辭九歌終剛强兮不可凌身既死兮神以靈魂魄毅兮為鬼雄漢沙麓之占陰為陽雄水火相乘易林謙之需曰翺翔桂林為衆鳥雄蠱之无妄曰麋鹿悲鳴思其大雄兊之節曰妻子啼瘖早失其雄爾雅釋畜云黒脣犉毛詩傳曰黄牛黒脣曰犉戢聚也詩曰載戢干戈以不用故戢聚而束藏之此謂其羊之多故其角戢聚言其盛牛耳常濡濕牛羊之寢或作訛魘之音嘗以問諸野人其言則然篇内言思皆語助也劉曰牧之者日持雨具齎餱糧從牛羊之所宜適以順其性而蕃其息孔疏云毛色别異者各三十也故鄭箋云女之祭祀索則有之麄曰薪細曰蒸所以擊牛羊之杖牧牛以薪牧羊以蒸歟以雌以雄謂雌雄皆驅以來牛羊雌雄日間雜羣無害惟牛夜則隔處羊矜矜兢兢以畏牧者之擊故有此矜兢之狀羊羣行於途不以杖防擊則騫而他之或崩墜岸下牧者雖不以薪蒸或麾之以肱羊亦從而畢升升登棚也箋云牧人乃夢見人衆相與捕魚又夢見旐與旟歐陽曰衆維魚矣言魚之多也毛傳曰旐旟所以聚衆也箋云溱溱子孫衆多也周禮占夢獻吉夢於王此牧人之夢而大人占之者所獻吉夢也箋謂人衆相與捕魚者謂歲熟相供養之祥也惟粒食有餘故又取魚以為詠苟非豐年則尚懼其不飽奚暇及於漁哉毛詩序曰無羊宣王考牧也節彼南山維石巖巖赫赫師尹民具爾瞻憂心如惔不敢戲談國既卒斬何用不監節彼南山有實其猗赫赫師尹不平謂何天方薦瘥喪亂𢎞多民言無嘉憯莫懲嗟尹氏大師維周之氐秉國之均四方是維天子是毗俾民不迷不弔昊天不宜空我師弗躬弗親庶民弗信弗問弗仕勿㒺君子式夷式已無小人殆瑣瑣姻亞則無膴仕昊天不傭降此鞠訩昊天不恵降此大戾君子如届俾民心闋君子如夷惡怒是違不弔昊天亂靡有定式月斯生俾民不寜憂心如酲誰秉國成不自為政卒勞百姓駕彼四牡四牡項領我瞻四方蹙蹙靡所騁方茂爾惡相爾矛矣既夷既懌如相醻矣昊天不平我王不寜不懲其心覆怨其正家父作誦以究王訩式訛爾心以畜萬邦殆補音楚辭天問殆與止叶又九章殆與恃叶史記龜筴傳殆與起叶易林睽之益殆與祉叶小畜之大有殆與齒叶然則宜地里切補音養里切失母矣膴音武届音戒補音居氣切古作暨何晏景福殿賦鳥企山峙若翔若滯峨峨嶫嶫㒺識所届按原本識訛作試木華海賦鷸如驚鳬之失侣倐如六龍之所掣一越三千不終朝而濟所届劉邵趙都賦聲曜紛紜澤浸宇内元正三朝莫不來届王粲浮海賦吐星出日天與水際其深不測其廣無臬章亥所不及盧敖所不届闋苦穴反説文以癸得聲補音眭桂切止也補音誦疾容切宋玉九辯然中路而迷惑兮自壓按而學誦性愚陋以褊淺兮信未逹乎從容徐邈讀畜許六反補音萬邦卜工切説文以丰得聲釋名邦丰也封有功於是也韋孟詩至于有周歴世㑹同王赧聴譛按原本赧誤郝實絶在邦劉向九嘆聲哀哀而懷髙邱兮思愁愁而思舊邦願承間而自恃兮徑滛曀而道曹植責躬詩武則肅烈文則時雍受禪炎漢君臨萬邦晉石舉歌既宴既喜翕是萬邦禮儀卒度物有其容又大預舞歌羣生屬命奄有庶邦慎徽五典元教遐通孔子曰無體之禮上下和同無服之喪以畜萬邦魏覬西嶽碑詞赫赫在上以畜萬邦維嶽降神實生羣公毛詩序曰節南山家父刺幽王也言刺大悖釋文節在切反知其本截字也今京語謂截為節此云節者記其音失其本字歟石削直如斬截師尹居髙位民所具瞻似之孝經嘗引此毛傳曰赫赫盛貌師大師周之三公也尹尹氏為大師具俱瞻視惔燔也據此則異乎洪範之師尹惟日矣然觀孝經之意則殆非謂尹氏其師表尹正之通稱歟既曰不敢戲談冝未敢遽指尹氏後雖言尹氏又隱其惡赫赫師尹民具爾瞻今乃民憂心如炎燔畏爾威虐不敢戲談民心憂苦恐畏至於此極則國之形雖未滅而實已絶滅斬絶也卒盡也國以民為固民心離則國從之亡矣故曰國既卒斬矣師尹何為而不監察之乎用猶為也蘇曰山之實草木是也山之生物其氣均平如一無不猗猗其長也毛傳曰實滿猗長也鄭箋云責三公不如山之為也毛傳曰薦重瘥病宏大也箋云天今又重以疫病孔疏曰薦與荐文異義同非文異義同也今京語荐音薦音是字非亦猶截音節也呼尹氏大師而責之曰爾不均平曽不如山謂何也謂談也有何説也又天災荐臻連年瘥病人死喪國擾亂大多民憂苦怨讟無一言之善而師尹方憯虐略不懲創嗟乎奈何爾雅雖曰憯曽也而爾雅差謬良多不可盡信尹氏為大師是周根本之地氐本也職當秉國之均平綱維四方毗輔天子使民不迷今乃不然詩人於是不復云云唯呼天曰昊天不弔愍我如此然亦不宜盡空我民人之衆謂民死於饑饉瘥病憂苦餘不死者又其心咸離則雖謂之盡空其師衆可也乃叙尹氏之罪曰弗躬弗親一切荒怠自古聖賢咸詢衆庶尹又不信庶民之言其賢其能上之人當求而用之不當待其求也今弗問弗察則弗獲仕進敗喪亷恥往往有君子嘗諭以某賢某能奚不任用而尹氏曰彼未嘗致問於我故不及用之耳此衰世秉政者之常談而詩人謂之欺㒺君子尹氏欺㒺文過飾非者多矣詩人終不棄絶戒而誨之曰勿㒺君子當更平夷其心已前日之所為已止也式更也小人用心雖不平而自謂已平故詩人更使之平夷小人自謂止不為不善故今更勸之止又曰無為小人至於危殆不惟危其國亦危其身瑣小姻亞則無與厚仕釋親云婦之父母婿之父母相謂為婚姻兩婿相謂為亞相亞次也釋訓云瑣瑣小也毛傳曰膴厚也以正而論用人必以賢能不問親踈苟非賢能雖親戚不用此詩人知尹氏必不能盡遵正道姑寛為之説曰姻婭之小小者無與膴仕則仕任之不膴厚者亦或可也其非瑣瑣者亦姑勿問是寛為之説也釋言雖曰傭均也訩訟也而不可以釋昊天不傭降此鞠訩爾雅非周公孔子之書先儒不審攷竟相推崇據子夏初哉首基之問則知其為古書然古書豈一一皆聖人作謂愷悌發也憯曽也基經也設也振古也務侮也峨峨祭也每有雖也差謬若此奚可殫數釋文鞠作鞫然皆有窮義革雖柔而固足以止物匊亦所以止物物至於止則窮矣故世言以鞠為窮庸常也昊天不循平常而忽降此窮極之凶訩凶也前漢劉向引詩曰日月鞠凶天不恵順降此大災戾大抵人窮則呼天若歸怨而實非怨天也届至也闋息也禍亂皆小人致之君子如至則民心息矣安矣或未能専用君子如平夷用之不偏用小人則民之惡怒亦逺矣違逺也鄭箋謂式月斯生言日月益甚也毛傳曰病酒曰酲詩人曰誰秉國之成乎成猶政也豈不知秉成之人言雖不指怨則深歸王不自為政使尹為政卒勞百姓國事如此賢者宜去我駕四牡欲有所之服馬頸項正當衡下衡有兩軛正义兩服之頸兩驂鴈行咸驤首見項領焉於是思所之之國而四方政醜徳齊莫能相尚猶幽王尹氏也故曰我瞻四方蹙蹙靡所騁言無所可往也方爾盛其惡則視相爾矛欲相殺傷矣及既夷平悦懌則歡然如賔主相醻酢矣喜怒不常如此故賢者思遯下文曰以究王訩則此章謂王歟昊天不平常而乃降亂國危有状故我王亦不安寜然不自懲創其心反怨正人蓋小人於是歸罪於正人而王信之故王亦怨正人覆反也言不怨小人而反怨正人孔疏曰家父盡忠竭誠不憚誅罰故自載字焉寺人孟子亦此類也究言王之凶徳式敬也敬化爾心以畜養萬邦訛者化而改也本心善則可以訛矣今王有凶徳故欲訛其心使化其舊也孔疏云桓十五年天王使家父來求車上距幽王之卒七十五歲若幽王之初則八十五年矣但古人以父為字或累世同之宋大夫有孔父者其父正考父其子木金父此家氏或父子同字未必是一人也雲漢序云仍叔箋引桓五年仍叔之子來聘春秋時趙氏世稱孟智氏世稱伯仍氏或亦世字叔也自桓五年上距宣王之卒七十六歲若當初年則百二十年矣引之以證仍叔是周大夫耳未必是一人也正月繁霜我心憂傷民之訛言亦孔之将念我獨兮憂心京京哀我小心癙憂以痒父母生我胡俾我瘉不自我先不自我後好言自口莠言自口憂心愈愈是以有侮憂心惸惸念我無祿民之無辜幷其臣僕哀我人斯于何從祿瞻烏爰止于誰之屋瞻彼中林侯薪侯蒸民今方殆視天夢夢既克有定靡人弗勝有皇上帝伊誰云憎謂山蓋卑為岡為陵民之訛言寜莫之懲召彼故老訊之占夢具曰予聖誰知烏之雌雄謂天蓋髙不敢不局謂地蓋厚不敢不蹐維號斯言有倫有脊哀今之人胡為虺蜴瞻彼阪田有菀其特天之扤我如不我克彼求我則如不我得執我仇仇亦不我力心之憂矣如或結之今兹之正胡然厲矣燎之方揚寜或滅之赫赫宗周褒姒烕之終其永懷又窘陰雨其車既載乃棄爾輔載輸爾載将伯助予無棄爾輔員于爾輻屢顧爾僕不輸爾載終踰絶險曾是不意魚在于沼亦匪克樂潛雖伏矣亦孔之炤憂心慘慘念國之為虐彼有㫖酒又有嘉殽洽比其鄰昏姻孔云念我獨兮憂心慇慇佌佌彼有屋䔩䔩方有穀民今之無祿天夭是椓哿矣富人哀此惸獨補音局訖力切曲也集韻局訖力切字或作説文挶㦸持也从手局聲鴟鴞詩以挶為拮毛氏訓拮為撠開元五經文字挶亦作撠局皆當音㦸厲補音力蘖切禮記男鞶革注云鞶革即鞶裂詩云垂帶如厲釋文音列禮記祭法厲山氏左氏傳作烈山劉邵趙都賦漂厲與洎越叶左思蜀都賦大火流凉風厲白露凝微霜結又厲與節叶顔延年馬賦厲與悦叶意乙力切秦之罘刻石經緯天下永為法式宇縣之中承順帝意周易南狩之志乃大得也入于左腹獲心意也楚辭天問厥萌在初何所意焉璜臺十成誰所極焉劉向九嘆意與側叶賈誼鵩賦意與息叶顔師古讀炤中庸作昭毛詩作炤陸德明音灼椓陟角反補音都木切集韻椓都木切字從手此詩當從手哿哥我反毛詩序曰正月大夫刺幽王也言刺大悖正月正陽之月魯昭公十七年夏六月朔日有食之大史謂此正月周之六月乃夏之四月純陽用事毛傳亦曰此夏四月而有繁霜陰陽乖亂為災異也民之訛言如曰時日害喪曰天曷不降威之類非平常之言乃差訛之言孔甚将大也獨我憂心凡民嗤嗤固不能深憂危國之君臣尤不知所憂憂則不危矣故惟我獨憂京京如京之大且根固不移歟抑兢兢之訛歟我憂如䑕病伏穴中人所不知痒病也痒雖在外而使人不寜殊為擾害此憂禍非賢者所致乃彼昏君小人自致之故比于痒在外毛傳曰瘉病也王曰莠惡也蓋穀謂之善則莠惡可知也疾痛呼父母而傷已適丁是時也鄭箋云此何不出我之前居我之後父母生我豈欲使我憂病俾使也亂世君子退伏小人肆行好言自口莠言自口皆出自小人之口唯其意所欲言則言我憂心愈愈日以益甚小人不知君子之心反見笑侮以為腐儒癙憂良可發笑笑則玩侮從之矣朱曰并俱也古者以罪人為臣僕亡國所虜亦以為臣僕故箕子曰商其淪喪我㒺為臣僕言不幸遭國之将亡與此無辜之民将隨以淪陷而并為臣僕未知将復從何人而受禄如烏飛不知将止于誰之屋也王曰烏之為物唯能食已則止其屋中林林中也爾雅云維侯也蘇曰中林之木莫不摧毁而維薪蒸在焉其殘之也甚矣民力在危殆之中視天夢夢若無能為者不知此天理之未定故也方其未定何所不至及其既定人未有不為天所勝者申包胥曰人衆能勝天天定亦能勝人有皇上帝憎誰耶憎善人耶憎惡人也則惡人終於禍敗矣謂山卑耶而其為岡為陵則亦不可言卑矣民雖卑賤若不足道而其訛言或曰時日曷喪或曰天曷不降威舉國之人皆有是言則亦不可得而盡殺民亦将叛亦不可得而殺至是民亦不可謂之卑賤矣亦可畏矣寜能莫之懲耶召彼故老稍知懼矣而訊之占夢而不及政事也朝廷之間具曰予聖誰知烏之雌雄君臣皆自謂聖唯至愚者則然既昏愚如此安能知孰賢孰否孰是孰非毛傳曰局曲孔疏曰曲者曲身也毛傳曰蹐累足也脊理也蜴螈釋魚云蠑螈蜥蜴蝘蜓守宫也遭亂禍謂天雖髙不敢不曲局地雖厚不敢不重足家語曰孔子讀詩至正月六章惕焉如懼曰彼不逹之君子豈不殆哉從上依世則道廢違上離俗則身危時不興善已獨由之則曰非妖則妄也故賢者既不遇恐不終其命焉桀殺龍逢紂殺比干皆是類謂天蓋髙不敢不局謂地蓋厚不敢不蹐言上下畏罪無所自容也王氏曰人號呼而出此局蹐之言者非誕也乃有倫序有脊理朱曰哀今之人胡為肆毒以害人而使之至此乎俗言蝘蜓傷人藥所不治大坡不平曰阪阪田即今之山田夫田在隰則平矣今乃在坡陂與衆禾齊等則安矣今也有菀其特獨其無朋風雨之所揺扤如不我克必摧必死特如獨立無朋之君子其揺扤危殆似之及乎國勢危亡之状既著昏君亂臣不無微恐既召故老謀之勢急不得已而求賢既求我則如恐不得我不容避逃執我如仇敵然亦無禮矣雖急求如此而亦不我力終于緩弛者小人終慮君子之至非其同類懼非已利也毛傳曰厲惡也宣王之時庶乎正矣今則厲矣如火燎方揚熾寜或有滅之者乎幽王惑褒女以為后自此大亂詩人知其必滅周也周為天下之所宗故曰宗周釋文曰烕齊人語也猶滅之也如前章所序可謂長慮永懷矣然猶有未終之意今終其永懷又有窘焉如又窘於陰雨其車既載乃棄爾輔雨中行車已有陷濘之憂况又棄輔其隳壞爾載也必矣及隳爾載乃求諸伯長老成以助予乎無及矣輔喩賢者伯者老成長伯之賢稱王室雖亂羣小得志而其間猶有賢輔亦或賴扶持之力今又棄之矣故此章云孔疏曰今人縳杖於輻防輔車也魯隱公六年鄭人來輸平公羊傳曰輸平猶隳成昭四年左傳曰寡君将隳幣焉服䖍曰隳輸也是訓輸為隳隳壞之義箋曰輸堕也疏云子路将堕三都是也毛傳曰員益也疏曰益之于爾之輪輻箋曰僕将車者也屢顧爾僕者又以喩知人之難雖已智賢亦未可悉以聽其所為又當屢察之察其備察其所安屢察不止于一察察其果賢果勝任則不隳厥載矣終踰絶險喻終濟大難矣今乃曾不以是為意乎君子潛隱退遯如魚在池沼亦非樂于窮隱也世亂不得不潛伏也然賢徳外著自不能掩其昭亦甚焉孔甚也此非詩人自謂謂他人之賢者也此賢者憂心慘慘憂念國之為虐禍将至也箋云彼尹氏大師也彼小人也彼有㫖酒嘉殽唯與其鄰友親洽燕樂其昏姻則尤甚也云語助也念我獨憂心慇慇爾毛傳曰佌佌小也蔌蔌陋也哿可也佌者此人之謂歟此人有屋謂小人之徒歟言其徒興第建宅者不一也蔌者如蔬蔌之多歟其下焉咸有穀之可食矣言飽食者則不勝其多矣皆謂羣小徒屬也至民今則無祿食言禄則食在其中矣詩人失祿故曰無祿而亦并言凡民不止于言已衆民如草木方長夭夭而有以椓害之小人所施皆暴虐剥割富人罹此猶之可也其惸獨之人何以堪之故哀之上夭字似天故毛詩作天字微訛爾今讀如桃之夭夭十月之交朔日辛卯日有食之亦孔之醜彼月而微此日而微今此下民亦孔之哀日月告凶不用其行四國無政不用其良彼月而食則維其常此日而食于何不臧􅏎􅏎震電不寜不令百川沸騰山冡崒崩髙岸為谷深谷為陵哀今之人胡憯莫懲皇父卿士番維司徒家伯維宰仲允膳夫棸子内史蹶維趣馬楀維師氏豔妻煽方處抑此皇父豈曰不時胡為我作不即我謀徹我牆屋田卒汙萊曰予不戕禮則然矣皇父孔聖作都于向擇三有事亶侯多藏不憖遺一老俾守我王擇有車馬以居徂向黽勉從事不敢告勞無罪無辜讒口囂囂下民之孽匪降自天噂沓背憎職競由人悠悠我里亦孔之痗四方有羡我獨居憂民莫不逸我獨不敢休天命不徹我不敢傚我友自逸是詩蓋深怨皇父之遷邑傷王室無政羣小用事因日食川沸山崩之變而作也而毛詩序曰十月之交大夫刺幽王言刺悖又失詩人本情孔疏云日月之食本無常時日月交㑹之術大率以百七十三日有竒為限而日月行天各自有道雖至朔相逢而道有表裏若月先在裏依限而食者多若月先在表雖依限而食者少魯昭公十七年夏六月甲戌朔日有食之祝史請所用幣季平子曰止也唯正月朔慝未作日有食之於是有伐鼓用幣其餘則否太史曰在此月也日過分而未至三辰有災於是乎百官降物君不舉辟移時樂奏鼓祝用幣史用辭故夏書辰不集于房瞽奏鼓凡是平子太史之説皆非也孔子曰聖人有國日月不食則凡食皆災也彼平子太史之説皆起於歴家之好諛其君者隨事旋為之説以釋君憂一行至精於歴亦謂闕於君徳有算所不及孔甚也醜惡也日月食則光微月臣道日君道日有食之則君道大失天地人同此一氣氣感災見日月不行其所常行而有異又曰月食則維其常者較之日食災甚則以月食猶為常而非甚醜也日食君失其道則國失其政民失其所故云亦孔之哀唯不用賢良而用小人故四國無政四國猶言四方王者統四方小人在上政不行於四國故四國皆無政臧善也何若是之不臧也毛傳曰震雷也山頂曰冡朱曰令善也崒者崩陷之甚也鄭箋謂崒崔嵬未安文勢不然康成不善屬文故云今之人謂今用事之人哀以告曰胡為深憯而不少懲也爾雅釋憯曰曾蓋爾雅之失毛傳曰豔妻褒姒美色曰豔鄭箋云皇父家伯仲允皆字畨棸蹶楀皆氏王氏曰變異所生以用七子故七子所以見寵用事則以豔妻煽方處故曰煽言勢盛若火之煽然方處言方處未變徙也家伯雖為冡宰而次司徒之下者權居其次也亂世私意盛肆不由官常此章惟以權寵次第為序孔疏謂有不次者便文取韻也其説未為深允皇父權寵最盛番次之家伯次之仲允棸子蹶楀又次之師氏其職尊矣而居趣馬之次則以權寵叙可覩矣膳夫趣馬親近内史職掌尤要切古者天子以内史為左右手朱曰卿士六卿之外更為都官以總六官之事朱説容或有之然權初不在職抑猶又也皇父豈曰我所為不是乎時是也胡為作我以遷於向以有車馬之故或作我以役于向不先就我謀遂徹我牆屋以遷或闢民居以廣宫室致我不獲治田下者卒汙髙者卒萊乃曰予不戕敗女王建都邑有所遷役有所治闢禮則然矣王氏曰詩人因其自聖而譏之曰孔聖也孔疏曰左傳桓王與鄭十二邑向在其中杜預曰河内軹縣西有地名向上則向在東都之畿内也皇父封於畿内當二卿今立有三事是增一卿以比列國也毛傳曰亶信也侯維也皇父擇其國之三卿信維貪淫多藏之人憖與也今鄉俗亦云不憖我留一家俾守衞我王宛然鄉談無毫髪差春秋傳曰昊天不憖亦謂與也傳又曰兩軍之士皆未憖或曰傷也方言云憖傷也楚潁之間曰憖其鄉音同而意異歟説文曰憖問也謹敬也一曰説也一曰甘也廣韻云憖且也蓋老者族盛多藏富厚故取以為三事無留者又擇有車馬者徙居于向以富其邑皇父勢力足以徙之不恤人心之不樂也蘇曰無罪猶且見讒敢告勞乎此下民之災孽匪降自天皆人所為也民不敢面憎而背憎噂噂沓沓憎惡重複深切也職猶俗語之只也只由小人競致此災孽爾羣小非一人故有競致之狀凡經典語助之職同毛傳曰痗病也羡餘也王氏曰徹通也幽王之時天下病矣而我所居里則又甚病矣四方猶有寛餘我獨居憂民雖病而愚者踈者不以為意不懷深憂故亦可以言逸我獨不敢休暇今天命既閉塞不通徹我終不敢傚我友不憂國而自逸毛傳曰親屬之臣不能自已陳氏曰不然則不應不去也前漢谷永云昔褒姒用國宗周以䘮閻妻驕扇日以不臧注云魯詩小雅十月之交篇曰此日而食于何不臧又曰閻妻扇方處言厲王無道内寵熾盛政化失理故致災異然周語言幽王二年西周三川皆震史記亦云與此詩百川沸騰符合周語又云幽王時岐山崩又與此詩合史記言幽王嬖褒姒毛傳亦曰幽王惑褒姒而以為后衞宏作序亦云獨鄭箋依魯詩殊為好異今不從魯詩之所以終於不行亦以有此類歟浩浩昊天不駿其徳降䘮饑饉斬伐四國旻天疾威弗慮弗圖舎彼有罪既伏其辜若此無罪淪胥以痡周宗既滅靡所止戾正大夫離居莫知我勩三事大夫莫肯夙夜邦君諸侯莫肯朝夕庶曰式臧覆出為惡如何昊天辟言不信如彼行邁則靡所臻凡百君子各敬爾身胡不相畏不畏于天戎成不退飢成不遂曾我􅉏御憯憯日瘁凡百君子莫肯用訊聽言則答譖言則退哀哉不能言匪舌是出維躬是瘁哿矣能言巧言如流俾躬處休維曰于仕孔棘且殆云不可使得罪于天子亦云可使怨及朋友謂爾遷于王都曰予未有室家鼠思泣血無言不疾昔爾出居誰從作爾室痡音鋪韓詩作痡毛詩作鋪補音出尺遂切徐鍇説文繫傳云出又音吹去聲故詩曰匪舌是出維躬是瘁歴考諸本斯本為善而韓毛之序咸謂幽王詩未安蓋拘於刺也是詩曰周宗既滅又曰謂爾遷于王都則平王時事也先儒作序不可盡信序意異同或得或失關雎或以為刺十月之交或以為厲王奚可遽信厥後小弁巧言巷伯四月等篇宛然幽王之詩先儒拘於刺故不敢言平王鄭風清人不可以其次豈諸儒未之知蓋雷同不察忽焉昏忘乃人之常情以序病詩以末病本不可毛序又曰雨自上下者也衆多如雨而非所以為政也攷本詩何嘗有此意困首章脱簡妄鑿斯説殊為不可衰亂之世陰陽乖戾雨則淫雨晴則久旱浩浩廣大無際也昊天其以浩浩為音歟昊字日在天上光明皓白明白而皓皓歟天有日有星辰雲漢之文故曰昊天歟蒼天言其色上天言其髙而爾雅曰春為蒼天夏為昊天秋為旻天冬為上天為義未安爾雅多差謬不可盡信駿善也謂天不善其徳既降䘮亂之禍又降饑饉之禍以斬伐四國困窮怨天人之常言而心實不敢怨故曰不畏于天則不怨天之實著矣又更其辭呼旻天而怨之曰急疾其威弗思慮弗圖謀既棄彼有罪舎棄也殆謂殺幽王驪山下虜褒姒往往羣小并罹其禍是謂既伏其辜辜罪也若此無罪無辜之人乃又俱淪胥以痡胥相也痡病也淪沉没也怨天降饑饉及無辜周宗既滅蕩然無所止戾戾至也正大夫上大夫也即卿也君死國亂蕩析羣臣離居所居逺於朝故莫知我勩勞詩人忠勤之臣也平王新立大臣苟且怠惰莫肯夙夜孜孜三事宅乃事宅乃牧宅乃凖之三事此言三事大夫則兼言中下大夫矣王辱臣死今幽王死而三事大夫如故則知其不能死節宜其莫肯夙夜勤勞邦君諸侯當王國之大難宜即朝覲有朝朝夕朝之禮今乃莫肯朝夕不匡輔王室幽王既殂禍變既極庶曰今式臧矣臧善也意謂今将善矣乃反出為惡覆反也往往諸侯反乘亂侵周如鄭取温麥取成周未之類如何昊天不伸正法伸信也辟法也言助也法辟不伸言亂者肆横天不降禍以法治之如彼行邁靡所至止臻至也言蕩然無所止極詩人於是勉凡百君子各敬爾身胡為不相畏如此不畏于天乎不畏天之福善禍淫乎不肯夙夜不肯朝夕覆出為惡皆不相畏也不畏王朝也所謂凡百君子非君子也姑曰君子也果君子也胡敢不相畏胡敢不畏天莫肯夙夜是不畏新立之王也莫肯朝夕是不畏新立之王也至於反出為惡尤其無所忌畏兵戎成而不退其謂申侯西夷犬戎勢益張平王度不可支故謀東遷歟饑成不遂者降䘮饑饉無食以遂人之欲也􅉏親狎也説文云狎習也親狎侍衞之人猶慘慘日饑瘁而况于他乎䘮亂饑饉如此凡百君子又莫肯訊問詢謀聽人之言則當有以答之無拒絶其有譖言則當退之無答奈何凡百君子不肯若是也哀哉我本不能言者不欲言也今兹有言非但事口舌而已維我躬憂悴故不得已有言於是又曰能言則可矣哿可也至于小人之巧言如水流瀰瀰無窮惟欲俾躬自取于休美而已不復更恤他人維曰仕宦而國事甚急且危殆孔甚也棘急也然則豈可任非其人是時任使多非其人若有曰斯人不可使則得罪于天子朝多小人天子聽其言而使斯人若順㫖而從之亦云可使則朋友将怨我罪我之違道世久衰亂無人材可使謂稍稍可共輔王室者曰爾遷王都乎乃曰予未有室家如洛邑新邑百官居室未備思慮如鼠戀穴泣血甚小甚陋勢不可已故憂泣無有一言而不疾痛者詩人于是折之曰昔爾去朝出居於外又誰從作爾室耶亦爾自為之也詩人蓋輔平王東遷者也平王東遷雖未能復興王道而是詩大體則無邪也故孔子取焉
