body:
  text: 慈湖詩傳卷十七宋楊簡撰大雅二厥初生民時維姜嫄生民如何克禋克祀以弗無子履帝武敏歆攸介攸止載震載夙載生載育時維后稷誕彌厥月先生如達不坼不副無菑無害以赫厥靈上帝不寧不康禋祀居然生子誕寘之隘巷牛羊腓字之誕寘之平林㑹伐平林誕寘之寒冰鳥覆翼之鳥乃去矣后稷呱矣實覃實訏厥聲載路誕實匍匐克岐克嶷以就口食蓺之荏菽荏菽斾斾禾役穟穟麻麥幪幪瓜瓞唪唪誕后稷之穡有相之道茀厥豐草種之黄茂實方實苞實種實褎實發實秀實堅實好實穎實栗即有邰家室誕降嘉種維秬維秠維穈維芑恒之秬秠是穫是畝恒之穈芑是任是負以歸肇祀誕我祀如何或舂或揄或簸或蹂釋之叟叟烝之浮浮載謀載惟取蕭祭脂取羝以軷載燔載烈以興嗣歲卬盛于豆于豆于登其香始升上帝居歆胡臭亶時后稷肇祀庶無罪悔以迄于今按此篇永樂大典缺卷敦彼行葦牛羊勿踐履方苞方體維葉泥泥戚戚兄弟莫逺具爾或肆之筵或授之几肆筵設席授几有緝御或獻或酢洗爵奠斚醓醢以薦或燔或炙嘉殽脾臄或歌或咢敦亐既堅四鍭既鈞舍矢既均序賔以賢敦亐既句既挾四鍭四鍭如樹序賔以不侮曾孫維主酒醴維醹酌以大斗以祈黄耉黄耉台背以引以翼壽考維祺以介景福毛傳曰敦聚貎行道也鄭箋云苞茂也體成形也叢生曰苞泥泥有柔意歟蘆葦叢聚如兄弟㑹聚牛羊勿踐履愛之之辭泥泥和柔喻其親愛兄弟之情似之戚戚者親愛切至之心其間兄弟之逺者往往以疏屬謙辭故曰莫以為逺俱兄弟爾具俱也陳肆筵席老者則授之几毛傳曰設席重席也春官司几筵筵在下席在上鄭箋云御侍也謂敦史箋謂緝為猶續未安緝有比宻之意老者之旁有侍御者比宻焉毛傳曰斚爵也夏曰醆殷曰斚周曰爵箋曰進酒於客曰獻客荅之曰酢主人又洗爵醻客客受而奠之不舉也考之儀禮如箋所云洗爵奠斚錯舉互見毛傳曰以肉曰醓醢臄函也歌者比於琴瑟也徒擊鼓曰咢箋云薦之禮韭菹則醓醢也燔用肉炙用肝以脾函為加釋器云肉謂之醢李廵曰以肉作醬曰醢周禮天官醢人注云醢肉汁也孔疏云用肉為醢特多汁故以醓醢為名其無汁者自以所用之肉魚鴈之屬為之名也服䖍通俗文云口上曰臄口下曰函説文函舌也按燕禮雖諸侯之禮其與王禮宜多相似歌必以琴瑟故此毛傳云歌者比於琴瑟今彈琴多近咢則聲髙此謂或咢疑指琴瑟也而釋樂云徒擊鼓謂之咢郭璞注引此詩云或咢然爾雅亦多差謬亦難盡信當兩存之以待来者董曰舊書作加殽定本作嘉唐改從定本孔疏云正饌以外所加嘉殽則脾之與臄毛傳曰敦亐畫亐也天子敦亐鍭矢參亭已均中蓺鄭箋云舍之言釋也孔疏曰敦與彫古今之異集韻彫音有作弴者冬官亐人為亐唯言用漆不言彫畫蓋周公削之欲從質也周官之書周人不能盡行自洛都封建大事猶莫之行而况他乎敦亐未必果音彫苟子曰天子彫亐諸侯彤亐大夫黒亐定四年公羊傳何休注云天子彫弓諸侯彤亐大夫嬰亐士盧亐孔疏以為事不經見未必然也况徐氏敦都雷反不音彫先儒好異改字强音者亦多今闕疑以待来哲釋器云金鏃翦羽謂之鍭方言云箭自關而東謂之矢江淮之間謂之鏃關西曰箭考工記矢人為矢鍭矢三分茀矢三分一在前二在後注云參訂之而平者前有鐵重也孔疏云輕重鈞亭四矢皆然故言四鍭既鈞周禮司亐矢殺矢鍭矢用諸近射田獵恒矢痺矢用諸散射注謂散射禮射也此詩禮射而曰鍭者詩言大略鍭矢通稱周禮八矢名物詳辨不必牽合也鄭箋謂將養老先射擇士王肅以為燕射吕曰以詩之所叙考之儀禮王肅之説是也孔疏唯王肅燕射之説謂燕射於旅醻之後乃為之不當設文於曽孫維主之上豈先為燕射而後酌酒哉從鄭氏以為大射不知此篇乃成周燕宗族兄弟之詩非大射擇士時也按儀禮燕禮如鄉射之禮雖畢而飲未終舉觶無筭爵獻酌尚多言酌大斗祈黄耉於既射之後亦豈不可乎朱曰既燕而射以為樂也連中者發矢必均齊有毫髪之差必不中矣安能四鍭皆中如樹射禮釋獲者取賢獲執以告若右勝則曰右賢於左若左勝則曰左賢於右孔疏曰既句是引滿時也箋云射禮搢三挾一个言已挾四鍭則已徧釋之朱曰不侮不以中病不中者也毛傳曰曾孫成王也醹厚也大斗長三尺孔疏云大斗長三尺謂其柄也先祈祀於黃耉尊幼之序也釋詁云鮐背耉老壽也舍人曰老人氣衰皮膚消瘦背若鮐魚郭云背皮如鮐魚劉熈釋名云九十曰鮐背背有鮐文毛傳鮐背大老也箋云背有鮐文諸儒所言皆莫知鮐魚之狀毛傳疑焉惟曰大老雖釋詁亦莫釋其詳背有疾文隠藏不見亦非美談觀詩文未必謂背文老者髪黄則可見也豈以老壽者背多隆起若台耶爾雅作鮐則或以鮐魚之狀如老者之背耶台背其老壽者體狀可見於外者歟黄耉將受爵之時侍御者或引之於前或翼之於左右愛敬之至也祺猶祜歟介大也景明著也壽考維祺以介景福皆所祝黄耉之辭歟毛詩序曰行葦忠厚也周家忠厚仁及草木故能内睦九族外尊事黄耉養老乞言以成其福禄焉此序亦差黄耉言宗族兄弟之老者非外也祺福乃祈祝黄耉之辭豈成王自為也親親而仁民仁民而愛物豈由愛物故能睦族耶序差謬多矣言辭似典雅而實不可考因鄭康成不知其為衛宏作謂序在毛公之前遂尊信之致悞後學既醉以酒既飽以徳君子萬年介爾景福既醉以酒爾殽既將君子萬年介爾昭明昭明有融高朗令終令終有俶公尸嘉告其告維何籩豆靜嘉朋友攸攝攝以威儀威儀孔時君子有孝子孝子不匱永錫爾類其類維何室家之壼君子萬年永錫祚𦙍其𦙍維何天被爾禄君子萬年景命有僕其僕維何釐爾女士釐爾女士從以孫子至矣既醉之詩非聖人不能作諸儒不知道阻滯不通大失厥㫖是詩言公尸嘉告又言孝子執競祀武王之詩亦曰既醉既飽然則祭祀歟或曰既祭而燕也祭與燕不必深辯而其大㫖則同以放逸不知道者之心醉之飽之則酒也食也以不放逸道心醉之飽之則皆徳也皆昭明融一之妙也是謂靜嘉是謂三才共貫百聖共由之道是謂福禄之本人情多因醉飽放逸故是詩首言醉飽以明徳性君子萬年介爾景福君子謂王也爾亦謂王也萬年蓋嘏辭以士大夫祭禮嘏辭推之宜有之此則因嘏辭而祝頌之賛詠之介大也景明著也爾雅雖以景為大爾雅固多差誤殽者殽雜之薦折爼之類羣臣之所共饗將持也言爾我以别羣臣歟萬年所謂祝其壽考也此君子萬年推福於與祭諸臣歟人心無體自廣大自昭明自融一意動而遷始昏始雜始卑陋故此以為髙因言髙朗孔子曰心之精神是謂聖易曰君子以自昭明徳此心之神未始不一動乎意始失其一故有始無終故此言令終俶始也其終如始也復吾心之本一也發明徳性於是為詳周祀先王先公言公尸尊祖也嘉告嘏王也其告維何當是受福于天眉壽萬年之類而此惟曰籩豆靜嘉何也至矣大矣惟知道知之籩豆有列靜乎嘉哉此嘏辭之所有聖人取其要語以明道也此可以黙㑹而不可以言宣可以畧言而不可以詳説蓋有意則可以詳説無意則不可詳説孔子曰陳其薦爼序其禮樂而君子知仁焉者靜嘉之㫖賔入大門而奏肆夏卒爵而樂闋孔子屢嘆之者靜嘉之㫖也孔子曰吾無行而不與二三子而二三子猶以為隠者靜嘉之㫖可以略言而不可以詳説也非祕而不可詳説也無可説者不可得而詳也朋友諸臣也書曰臣哉鄰哉與祭諸臣威儀肅雝彼此感攝齊明融合威儀無失随時而中孔甚也至也随時中節之至也朋友之所攝者靜嘉融明之心也威儀之所時者靜嘉融明之變化也君子有孝子此君子謂前王也此孝子謂今王也融明靜嘉之謂孝孔子曰夫孝天之經地之義民之行通於神明光于四海無所不通然則此孝豈有匱竭耶宜其錫被爾類永永無窮爾雅云宫中衖謂之壼郭注云巷閤間道蓋東宫西宫南宫北宫有巷道也室家之壼言子姓異宫允嗣也福祚及其嗣有永也蓋由乎道者何所不利何所不通也僕附也其景命之集不特于其躬又于其子孫故謂之僕及已為正及子孫為附釐正也女與士皆子妵也王能釐正其女士即景命之延及于女士也又從而釐爾孫子即景命之延及于孫子也于以明其道不絶則福祿亦不絶其道絶則福祿亦絶禹啟之後太康遂失邦者道絶也大王王季文王武王成王康王不絶者以道不絶也毛詩序曰旣醉太平也醉酒飽徳人有士君子之行焉此序辭似雅正實失詩旨徒為榛蕪以蔽大道鳧鷖在涇公尸來燕來寧爾酒旣清爾殽旣馨公尸燕飲福祿來成鳧鷖在沙公尸來燕來宜爾酒旣多爾殽旣嘉公尸燕飲福禄來為鳧鷖在渚公尸來燕來處爾酒旣湑爾殽伊脯公尸燕飲福禄來下鳧鷖在潨公尸来燕來宗旣燕于宗福祿攸降公尸燕飲福禄來崇鳧鷖在亹公尸來止熏熏㫖酒欣欣燔炙芬芬公尸燕飲無有後艱按此篇永樂大典缺卷假樂君子顯顯令徳宜民宜人受禄于天保右命之自天申之干禄百福子孫千億穆穆皇皇宜君宜王不愆不忘率由舊章威儀抑抑徳音秩秩無怨無惡率由羣匹受福無疆四方之綱之綱之紀燕及朋友百辟卿士媚于天子不解于位民之攸暨假樂中庸左傳皆作嘉樂毛詩假樂者嘉音之訛也嘉善和樂蓋君子之形容徳性之光輝徒樂而非善固非徳性之樂徒善而非樂亦非徳性之善既嘉善而又和樂徳性之光自然而然初非有意于為善又為樂也徳性之光輝合嘉樂二言庶乎形容之也此惟有徳者自知惟有徳者知之非章句儒所能識也君子謂王也徳性人所同有惟不昏蔽是為君子即嘉樂之容光其令徳已顯著其言行政令令徳益顯人猶民也人又足以包諸侯諸臣由此徳此性而發無所不宜無所不通人心在是天心亦在是故受禄故天保右之命之申而延之雖曰是天實自君子之徳性干禄非干求也千字似干傳之微訛也闕疑則可箋謂干求則大不可十百為千千禄百福言其多願王子孫蕃衍至于千億穆穆靜黙之容皇皇聰明尊大之容此亦言君子之形容徳性之光輝也非有心于為靜黙為精明尊大也徳性無思而其容光自然有若是穆穆皇皇之象也君王通稱宜者善之之辭也不愆差不昏忘率由先王舊章由徳性而發自不愆不昏自率由舊章蓋自與古先聖王所施所行合也威儀抑抑謙抑之容令徳之音秩秩不已人頌其善不一而足無怨之者無惡之者莆田鄭曰匹類也率由羣類衆欲而行無已私也凡是皆徳性所發自若是也是固可以受福無疆而為四方之綱不特為四方之大綱而已又為四方之紀紀者每事咸宜雖小事無一失也如萬紀之畢張也箋云燕者燕飲毛傳曰朋友者羣臣也泰誓曰友邦冡君酒誥曰太史友内史友吕曰朋友者合百辟卿士言之也君燕其臣臣媚其君此上下交而為泰之時所憂者怠荒而已此詩所以終于不解于位民之攸塈也方嘉之又規之者蓋臯陶賡歌之意也民之勞逸在下而樞機在上上逸則下勞矣上勞則下逸矣不解于位乃民之所由休息也毛傳塈息也孔疏引釋詁呬息也某氏曰詩云民之攸塈而爾雅疏無某氏曰何耶按呬許四反然則塈者呬之音而字訛歟詩此類多篤公劉匪居匪康廼埸廼疆廼積廼倉廼裹餱糧于橐于囊思輯用光亐矢斯張干戈戚揚爰方啓行篤公劉于胥斯原既庶既繁既順廼宣而無永歎陟則在巘復降在原何以舟之維玉及瑤鞞琫容刀篤公劉逝彼百泉聸彼溥原廼陟南岡乃覯于京京師之野于時處處于時廬旅于時言言于時語語篤公劉于京斯依蹌蹌濟濟俾筵俾几既登乃依乃造其曹執豕于牢酌之用匏食之飲之君之宗之篤公劉既溥既長既景廼岡相其隂陽觀其流泉其軍三單度其隰原徹田為糧度其夕陽豳居允荒篤公劉于豳斯館渉渭為亂取厲取鍛止基廼理爰衆爰有夾其皇㵎遡其過㵎止旅廼密芮鞫之即按此篇永樂大典缺卷泂酌彼行􅕙挹彼注兹可以餴饎豈弟君子民之父母泂酌彼行􅕙挹彼注兹可以濯罍豈弟君子民之攸歸泂酌彼行􅕙挹彼注兹可以濯溉豈弟君子民之攸塈有卷者阿飄風自南豈弟君子来游来歌以矢其音伴奐爾游矣優游爾休矣豈弟君子俾爾彌爾性似先公酋矣爾土宇昄章亦孔之厚矣豈弟君子俾爾彌爾性百神爾主矣爾受命長矣茀禄爾康矣豈弟君子俾爾彌爾性純嘏爾常矣有馮有翼有孝有徳以引以翼豈弟君子四方為則顒顒卬卬如圭如璋令聞令望豈弟君子四方為綱鳯凰于飛翽翽其羽亦集爰止藹藹王多吉士維君子使媚于天子鳯凰于飛翽翽其羽亦傅于天藹藹王多吉人維君子命媚于庶人鳯凰鳴矣于彼高岡梧桐生矣于彼朝陽菶菶萋萋雝雝喈喈君子之車既庶且多君子之馬既閑且馳矢詩不多維以遂歌民亦勞止汔可小康恵此中國以綏四方無縱詭随以謹無良式遏寇虐憯不畏明柔逺能邇以定我王民亦勞止汔可小休恵此中國以為民逑無縱詭随以謹惽怓式遏宼虐無俾民憂無棄爾勞以為王休民亦勞止汔可小息恵此京師以綏四國無縱詭隨以謹罔極式遏寇虐無俾作慝敬慎威儀以近有徳民亦勞止汔可小愒恵此中國俾民憂泄無縱詭隨以謹醜厲式遏寇虐無俾正敗戎雖小子而式𢎞大民亦勞止汔可小安恵此中國國無有殘無縱詭隨以謹繾綣式遏寇虐無俾正反王欲玉女是用大諫上帝板板下民卒癉出話不然為猶不逺靡聖管管不實於亶猶之未逺是用大諫天之方難無然憲憲天之方蹶無然泄泄辭之輯矣民之洽矣辭之懌矣民之莫矣我雖異事及爾同􅒼我即爾謀聽我囂囂我言維服勿以為笑先民有言詢于芻蕘天之方虐無然謔謔老夫灌灌小子蹻蹻匪我言耄爾用憂謔多將熇熇不可救藥天之方懠無為夸毗威儀卒迷善人載尸民之方殿屎則莫我敢葵喪亂蔑資曾莫恵我師天之牖民如壎如篪如璋如圭如取如攜攜無曰益牖民孔易民之多辟無自立辟价人維藩大師維垣大邦維屏大宗維翰懐德維寧宗子維城無俾城壞無獨斯畏敬天之怒無敢戲豫敬天之渝無敢馳驅昊天曰明及爾出王昊天曰旦及爾㳺衍蕩蕩上帝下民之辟疾威上帝其命多辟天生烝民其命匪諶靡不有初鮮克有終文王曰咨咨女殷商曾是彊禦曾是掊克曾是在位曾是在服天降慆德女興是力文王曰咨咨女殷商而秉義類彊禦多懟流言以對寇攘式内侯作侯祝靡届靡究文王曰咨咨女殷商女炰烋于中國斂怨以為徳不明爾徳時無背無側爾徳不明以無陪無卿文王曰咨咨女殷商天不湎爾以酒不義從式既愆爾止靡明靡晦式號式呼俾晝作夜文王曰咨咨女殷商如蜩如螗如沸如羮小大近喪人尚乎由行内奰于中國覃及鬼方文王曰咨咨女殷商匪上帝不時殷不用舊雖無老成人尚有典刑曾是莫聽大命以傾文王曰咨咨女殷商人亦有言顛沛之揭枝葉未有害本實先撥殷鑒不逺在夏后之世抑抑威儀維徳之隅人亦有言靡哲不愚庶人之愚亦職維疾哲人之愚亦維斯戾無競維人四方其訓之有覺德行四國順之訏謨定命逺猶辰告敬愼威儀維民之則其在于今興迷亂于政顛覆厥徳荒湛于酒女雖湛樂從弗念厥紹罔敷求先王克共明刑肆皇天弗尚如彼泉流無淪胥以亡夙興夜寐洒埽庭内維民之章修爾車馬弓矢戎兵用戒戎作用逷蠻方質爾人民謹爾侯度用戒不虞慎爾出話敬爾威儀無不柔嘉白圭之玷尚可磨也斯言之玷不可為也無易由言無曰苟矣莫捫朕舌言不可逝矣無言不讎無徳不報恵于朋友庶民小子子孫繩繩萬民靡不承視爾友君子輯柔爾顔不遐有愆相在爾室尚不愧于屋漏無曰不顯莫予云覯神之格思不可度思矧可射思辟爾為徳俾臧俾嘉淑慎爾止不愆于儀不僭不賊鮮不為則投我以桃報之以李彼童而角實虹小子荏染柔木言緡之絲温温恭人維徳之基其維哲人告之話言順徳之行其維愚人覆謂我僭民各有心於乎小子未知臧否匪手攜之言示之事匪面命之言提其耳借曰未知亦既抱子民之靡盈誰夙知而莫成昊天孔昭我生靡樂視爾夢夢我心慘慘誨爾諄諄聽我藐藐匪用為教覆用為虐借曰未知亦聿既耄於乎小子告爾舊止聽用我謀庶無大悔天方艱難曰喪厥國取譬不逺昊天不忒回遹其徳俾民大棘菀彼桑柔其下侯旬捋采其劉瘼此下民不殄心憂倉兄填兮倬彼昊天寧不我矜四牡騤騤旟旐有翩亂生不夷靡國不泯民靡有黎具禍以燼於乎有哀國歩斯頻國歩蔑資天不我將靡所止疑云徂何往君子實維秉心無競誰生厲階至今為梗憂心殷殷念我土宇我生不辰逢天僤怒自西徂東靡所定處多我覯痻孔􅁄我圉為謀為毖亂況斯削告爾憂恤誨爾序爵誰能執熱逝不以濯其何能淑載胥及溺如彼遡風亦孔之僾民有肅心荓云不逮好是稼穡力民代食稼穡維寳代食維好天降喪亂滅我立王降此蟊賊稼穡卒痒哀恫中國具贅卒荒靡有旅力以念穹蒼維此恵君民人所瞻秉心宣猶考慎其相維彼不順自獨俾臧自有肺腸俾民卒狂瞻彼中林甡甡其鹿朋友以譖不胥以穀人亦有言進退維谷維此聖人瞻言百里維彼愚人覆狂以喜匪言不能胡斯畏忌維此良人弗求弗迪維彼忍心是顧是復民之貪亂寧為荼毒大風有隧有空大谷維此良人作為式穀維彼不順征以中垢大風有隧貪人敗類聽言則對誦言如醉匪用其良覆俾我悖嗟爾朋友予豈不知而作如彼飛蟲時亦弋獲既之隂女反予来赫民之罔極職涼善背為民不利如云不克民之回遹職競用力民之未戾職盜為宼涼曰不可覆背善詈雖曰匪予既作爾歌倬彼雲漢昭回于天王曰於乎何辜今之人天降喪亂饑饉薦臻靡神不舉靡愛斯牲圭璧既卒寧莫我聽旱既大甚藴隆蟲蟲不殄禋祀自郊徂宫上下奠瘞靡神不宗后稷不克上帝不臨耗斁下土寧丁我躬旱既大甚則不可推兢兢業業如霆如雷周餘黎民靡有孑遺昊天上帝則不我遺胡不相畏先祖于摧旱既大甚則不可沮赫赫炎炎云我無所大命近止靡瞻靡顧羣公先正則不我助父母先祖胡寧忍予旱既大甚滌滌山川旱魃為虐如惔如焚我心憚暑憂心如熏羣公先正則不我聞昊天上帝寧俾我遯旱既大甚黽勉畏去胡寧瘨我以旱憯不知其故祈年孔夙方社不莫昊天上帝則不我虞敬恭明神宜無悔怒旱既大甚㪚無友紀鞫哉庶正疚哉冡宰趣馬師氏膳夫左右靡人不周無不能止瞻卬昊天云如何里瞻卬昊天有嘒其星大夫君子昭假無贏大命近止無棄爾成何求為我以戾庶正瞻卬昊天曷恵其寧崧髙維嶽駿極于天維嶽降神生甫及申維申及甫維周之翰四國于蕃四方于宣亹亹申伯王纘之事于邑于謝南國是式王命召伯定申伯之宅登是南邦世執其功王命申伯式是南邦因是謝人以作爾庸王命召伯徹申伯土田王命傅御遷其私人申伯之功召伯是營有俶其城寢廟既成既成藐藐王錫申伯四牡蹻蹻鉤膺濯濯王遣申伯路車乘馬我圖爾居莫如南土錫爾介圭以作爾寶往近王舅南土是保申伯信邁王餞于郿申伯還南謝于誠歸王命召伯徹申伯土疆以峙其粻式遄其行申伯番番既入于謝徒御嘽嘽周邦咸喜戎有良翰不顯申伯王之元舅文武是憲申伯之徳柔恵且直揉此萬邦聞于四國吉甫作誦其詩孔碩其風肆好以贈申伯天生烝民有物有則民之秉彝好是懿徳天監有周昭假于下保茲天子生仲山甫仲山甫之徳柔嘉維則令儀令色小心翼翼古訓是式威儀是力天子是若明命使賦王命仲山甫式是百辟纘戎祖考王躬是保出納王命王之喉舌賦政于外四方爰發肅肅王命仲山甫將之邦國若否仲山甫明之既明且哲以保其身夙夜匪解以事一人人亦有言柔則茹之剛則吐之維仲山甫柔亦不茹剛亦不吐不侮矜寡不畏彊禦人亦有言徳輶如毛民鮮克舉之我儀圖之維仲山甫舉之愛莫助之衮職有闕維仲山甫補之仲山甫出祖四牡業業征夫捷捷每懷靡及四牡彭彭八鸞鏘鏘王命仲山甫城彼東方四牡騤騤八鸞喈喈仲山甫徂齊式遄其歸吉甫作誦穆如清風仲山甫永懷以慰其心按此篇永樂大典缺卷奕奕梁山維禹甸之有倬其道韓侯受命王親命之纘戎祖考無廢朕命夙夜匪解虔共爾位朕命不易榦不庭方以佐戎辟四牡奕奕孔脩且張韓侯入覲以其介圭入覲于王王錫韓侯淑旂綏章簟茀錯衡𤣥衮赤舄鉤膺鏤錫鞹鞃淺幭鞗革金厄韓侯出祖出宿于屠顯父餞之清酒百壺其殽維何炰鼈鮮魚其蓛維何維筍及蒲其贈維何乘馬路車籩豆有且侯氏燕胥韓侯取妻汾王之甥蹶父之子韓侯迎止于蹶之里百兩彭彭八鸞鏘鏘不顯其光諸娣從之祁祁如雲韓侯顧之爛其盈門蹶父孔武靡國不到為韓姞相攸莫如韓樂孔樂韓土川澤訏訏魴鱮甫甫麀鹿噳噳有熊有羆有貓有虎慶既令居韓姞燕譽溥彼韓城燕師所完以先祖受命因時百蠻王錫韓侯其追其貊奄受北國因以其伯實墉實壑實畝實籍獻其貔皮赤豹黄羆江漢浮浮武夫滔滔匪安匪遊淮夷来求既出我車既設我旟匪安匪舒淮夷来鋪江漢湯湯武夫洸洸經營四方告成于王四方既平王國庶定時靡有爭王心載寧江漢之滸王命召虎式辟四方徹我疆土匪疚匪棘王國来極于疆于理至于南海王命召虎来旬来宣文武受命召公維翰無曰予小子召公是似肇敏戎公用錫爾祉釐爾圭瓚秬鬯一卣告于文人錫山土田于周受命自召祖命虎拜稽首天子萬年虎拜稽首對揚王休作召公考天子萬壽明明天子令聞不已矢其文徳洽此四國赫赫明明王命卿士南仲大祖大師皇父整我六師以脩我戎既敬既戒恵此南國王謂尹氏命程伯休父左右陳行戒我師旅率彼淮浦省此徐土不留不處三事就緒赫赫業業有嚴天子王舒保作匪紹匪遊徐方繹騷震驚徐方如雷如霆徐方震驚王奮厥武如震如怒進厥虎臣闞如虓虎鋪敦淮濆仍執醜虜截彼淮浦王師之所王旅嘽嘽如飛如翰如江如漢如山之苞如川之流緜緜翼翼不測不克濯征徐國王猶允塞徐方既来徐方既同天子之功四方既平徐方来庭徐方不回王曰還歸瞻卬昊天則不我恵孔填不寧降此大厲邦靡有定士民其瘵蟊賊蟊疾靡有夷届罪罟不收靡有夷瘳人有土田女反有之人有民人女覆奪之此宜無罪女反收之彼宜有罪女覆説之哲夫成城哲婦傾城懿厥哲婦為梟為鴟婦有長舌維厲之階亂匪降自天生自婦人匪教匪誨時維婦寺鞫人忮忒譖始竟背豈曰不極伊胡為慝如賈三倍君子是識婦無公事休其蠶織天何以刺何神不富舍爾介狄維予胥忌不弔不祥威儀不類人之云亡邦國殄瘁天之降罔維其優矣人之云亡心之憂矣天之降罔維其幾矣人之云亡心之悲矣觱沸檻泉維其深矣心之憂矣寧自今矣不自我先不自我後藐藐昊天無不克鞏無忝皇祖式救爾後旻天疾威天篤降喪瘨我饑饉民卒流亡我居圉卒荒天降罪罟蟊賊内訌昬椓靡共潰潰回遹實靖夷我邦臯臯訿訿曾不知其玷兢兢業業孔填不寧我位孔貶如彼歲旱草不潰茂如彼棲苴我相此邦無不潰止維昔之富不如時維今之疚不如茲彼疏斯粺胡不自替職兄斯引池之竭矣不云自頻泉之竭矣不云自中溥斯害矣職兄斯𢎞不烖我躬昔先王受命有如召公日辟國百里今也日蹙國百里於乎哀哉維今之人不尚有舊按此篇永樂大典缺卷又按自泂酌至召旻凡十五萹大典缺卷惟烝民召旻二萹餘萹俱存無楊氏解或是大典編纂脫誤不應連萹遺漏恐是楊氏原夲有缺卷也
