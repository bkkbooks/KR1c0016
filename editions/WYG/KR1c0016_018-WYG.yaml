body:
  text: 慈湖詩傳卷十八宋楊簡撰周頌於穆清廟肅雝顯相濟濟多士秉文之德對越在天駿奔走在廟不顯不承無射於人斯於者歎美之辭穆者深逺之貌清者潔清也大扺皆贊美之辭相助祭者顯者儀物顯著肅敬雝和毛詩序曰清廟祀文王也周公既成洛邑朝諸侯率以祀文王焉鄭康成不知衛宏作序意毛公之前已有序悉尊信之故箋謂顯相為諸侯案士虞禮祝辭哀子顯相則凡助祭之人皆可以言顯相不止於諸侯也言多士秉文之德不及諸侯者諸侯被文王之化淺也成人有德小子有造非文王能强人以其所無也人皆有德性文王有以感發之秉猶秉􅂜之秉非强力外取言不失爾對猶配合也夫文王大聖而多士即能秉其德配合在天之靈者孟子曰聖人先得我心之所同然爾易曰百姓日用而不知感而化之非由外鑠駿敏也美也奔走在廟執事也肅雝濟濟駿敏不亦顯乎不亦順承乎承文王之德也射厭也文王之道士民之所共由中正平常本所固有何厭射之有維天之命於穆不已於乎不顯文王之德之純假以溢我我其收之駿惠我文王曾孫篤之天之命天之道也不知道者謂命自命道自道周公作是頌知天命之不已不已不息也穆者言其深逺不可測於者歎美辭天道變化至如今不已也天雖無聲無臭不可測知而文王之德即天德也故中庸引此詩曰純亦不已文王之德文王之心也孔子曰心之精神是謂聖心無形體清明無際純一無二天人道殊其迹則一惟純故不已中庸曰聖人之道發育萬物惟天人一故能發育孔子曰夫孝天之經地之義明三才一致也是故天命之不已即文王之不已文王之德不亦顯乎文王之顯著即天命之幽穆文王之心即衆人之心即千萬世之心孟子曰堯舜與人同耳此曰我其收之曽孫篤之者以其一故也我者周公自謂也文德假大盈溢以及我我收受之曰溢曰收當黙通其意無執其辭孟子詳言説詩者不以辭害志此之謂也曰溢曰收不可以二言不可以思為言惟心通内明者自知自信駿俊也惠順也曰駿曰惠曰顯曰純曰穆皆所以贊説斯道而非五也如玉曰白曰瑩曰潤而無二玉也如金曰黃曰剛曰利而無二金也曽孫謂成王也成王未能收也篤之斯收之矣篤即收即純知篤與收與純之一者可以觀此頌矣何則道無二道也百姓日用者無二也衛宏作序曰維天之命太平告文王也失周公之㫖維清緝熈文王之典肇禋迄用有成維周之禎文王之典則即文王之道後王之道其維清乎清者不動乎意者也禹曰安汝止之謂也舜曰惟精惟一之謂也詩曰不識不知之謂也易曰無思無為之謂也孔子母意之謂也不動乎意非木石然也中正平常正直之心非意也書曰夙夜惟寅直哉惟清此之謂也扵平常正直之心而起乎意焉不正不直焉則渾濁矣非清也人性本清明起乎意始昏不起乎意則未始不清明清明無體無我如水如鑑文王由是清明而發諸云為是謂典則武王由是清明而緝熈之念慮云為無一之墮乎意無一之不清其緝理宻矣虛明和融是謂熈矣如水鑑照物不動乎意自無一之不理矣自無一之不合乎文王矣周禮以禋祀祀昊天上帝肇始也始禋祀昊天上帝而文王配焉迄至也亦有終義武王至是功成皆緝熈文王之典所成也是為周之禎祥周之禎祥在此緝熈之中不在乎犧牲幣玉之間犧牲幣玉所以致其禮行其誠而其所以致夫禎祥者在道而不在物也烈文辟公錫兹祉福惠我無疆子孫保之無封靡于爾邦維王其崇之念兹戎功繼序其皇之無競維人四方其訓之不顯維德百辟其刑之於乎前王不忘毛傳曰烈光也文文德也辟君也辟公諸侯也烈文贊美之辭諸侯助祭先王降福于王有嘏辭焉王不專有其福祭訖而燕諸侯所以均其祉福于諸侯也曰錫云者先王錫之也載見之詩曰烈文辟公綏以多福亦猶是也毛詩序曰烈文成王即政諸侯助祭也惠有順義又有愛利之義辟公獲兹祉福其惠我於無疆乎無疆猶無窮也諸侯能修德任賢如後所云則自然順事無違忠愛於王王室受其惠又願其子孫永保祉福其有不順不德則禍亦隨之是謂不克保其福祉毛傳曰封大也戎大也無封大侈靡于爾邦爾不封靡則王其崇之矣崇謂慶賞之左傳封豕長蛇封豕大豕也念爾祖考有大功故有國繼其序者當益有以大之皇大也爾欲競强乎莫競于用人所用得其人則四方皆聽爾之教令是謂訓之自方伯而下凡有屬國皆當奉王命以教訓屬國爾欲顯著乎莫顯於修德爾有德則百辟咸儀之矣於是歎美之曰於乎爾若是則先王将不忘女益錫女以祉福矣禍福無不自己求之者先王之所以錫之祉福以爾已德之足以致之也然則烈文之詩諸侯助祭祭訖王燕諸侯之樂歌乎天作高山大王荒之彼作矣文王康之彼徂矣岐有夷之行子孫保之天作祀先王也而衛宏作毛詩序并言祀先公不可信也先公尊太王卑今也于先公之前專頌太王而下之美豈理也哉宏序差謬不可盡信何止此宏豈拘於七世之廟祀必公叔祖類以上故云乎然天下事自古及今斷不可以執一論觀此頌則特祀于太王廟之樂歌與祀有特有祫祫則羣廟之主合祀於太廟毛傳曰作生也箋云髙山謂岐山也太王去豳遷岐初治此山治荒曰荒亦猶治亂曰亂治擾曰擾與彼作矣彼謂太王初作治此山建置社稷宫室庶司至文王益廣其治康之功彼徂矣謂太王亡矣徂逝也岐山有夷平之行言岐所以言太王也夫道平夷而已矣動乎意則失之故孔子之母意禹之安汝止人心即道故書曰道心記曰中庸洪範曰王道平平王道正直易曰易簡而天下之理得矣斯道甚平夷甚易簡而自古學士大夫多求諸意舍其本性之善而外求其故外起其意故自有而自不知自不信故孟子謂之自棄而諄諄言必稱堯舜孟子深信其平夷故也予孫言王季文王而下也子孫保而守之無敢逸也動乎意則放逸放逸則失之矣夫道一而已矣夫道心而已矣孟子曰聖人先得我心之所同然爾昊天有成命二后受之成王不敢康夙夜基命宥密於緝熈單厥心肆其靖之紂大惡人心怨苦之文王武王有盛德人心歸之則天命固在二后矣文王本無伐商之志往往以衆聖贊輔紂惡滋熾憫斯民塗炭義不得而已是天命在周文王武王不得而違始有安天下之志是謂受故遏宻人伐崇侯度鮮原作豐邑成就王業不敢康寧命不本於彼蒼乃基本於二后之心凡二后之心夙夜念慮云為動静無非所以成天命也是基命之心寛宥精宻其寛宥廣大而無外其精宻無思而無為盖人心即道故曰道心此心無體而神用無窮有體則有限量故曰寛宥有體則可知無體則不可知故曰精宻人皆有此心動乎意則昬昬則蔽蔽則立我立私不宥不宻二后不動乎意即禹之安汝止動静云為如天地之變化日月之照臨無所不思而非動乎意也無所不為而非動乎意也曰宥曰宻所以發明乎是也孔子嘗引以明無聲之樂使二后之成王業一動乎意則私矣蔽矣天命将去之何以基命於是歎美之曰於是其念慮云為無一之或動乎意無一之或失其道緝理無差熈和順治意消而道心自明心明而時措自宜舜命禹曰道心惟微惟精惟一允執厥中惟精一則中矣此聖人緝熈之功也單盡也有一念慮動乎意則猶未單厥心也有一云為未中乎節則猶未單厥心也人心本廣大清明無所不照㣲有所蔽則亦微有所不盡苟有所不盡則於靖安天下之功亦有所不盡二后單厥心故其靖安之功霈然有餘裕矣肆者霈然有餘之意毛詩序曰昊天有成命郊祀天地也按孝經孔子曰郊祀后稷以配天宗祀文王於明堂以配上帝而二詩惟言二后何耶衛宏作序固多差誤未必果郊祀之詩也我將我享維羊維牛維天其右之儀式刑文王之典日靖四方伊嘏文王既右饗之我其夙夜畏天之威于時保之按此篇永樂大典缺卷時邁其邦昊天其子之實右序有周薄言震之莫不震疊懷柔百神及河喬嶽允王維后明昭有周式序在位載戢干戈載櫜弓矢我求懿德肆于時夏允王保之邁往也時邁其邦巡守諸侯也王者天之子得乎天道而後可以居天位是故王者無私惟天道而行之故天右序有周右助也序者王宅中諸侯環屏皆序順也雖人道之序順實天道之序順也道無二也二則違矣安能王薄畧也言語助也震威之也立政曰詰爾戎兵以陟禹之迹方行天下至于海表知巡守以師行也震疊舉而莫敢妄動故震疊文武不可偏廢諸侯不能皆賢其有亂德不可告教則誅君弔民義之不可已者也懐柔百神致禮於百神也毛詩序曰時邁巡守告祭柴望也謂燔柴告天以巡守而至又望秩山川也盖繼虞書之言此言百神又不止於山川矣首言昊天則柴可知矣不繼言百神河嶽而言右序震疊者欲急明巡守以師非私也奉天道而行也自西周東行巡守必經大河喬嶽也毛傳謂嶽岱宗周禮五嶽毛傳何止於岱也允信也后猶王也武王初有天下初巡守逺方諸侯於是咸信武王之王天下矣昭明有周明今王為周矣式更也義見式㣲不特明昭今王為周又昭明次序在位諸賢謂從行公卿欲四方知大臣名德諸侯咸順無所誅伐則干戈無用而戢斂之矣弓矢無用而櫜蔵之矣武王本心之所求者懿德而已干戈非所尚也時是也肆陳懿德於是夏歌之中夏歌有九歌何以名夏夏大也由道而行是謂大也允信王心之保守斯道而無失也周禮鍾師鄭注云吕叔玉肆夏時邁也執競武王無競維烈不顯成康上帝是皇自彼成康奄有四方斤斤其明鐘鼓喤喤磬筦將將降福穰穰降福簡􅂤威儀反反既醉既飽福祿來反人皆争競求已之强而得其所競者千無一萬無一至於武王則得其所競矣故曰執競盖惟無競者能競而競者不能競故古志曰柔勝剛弱勝强天下莫柔弱於水而攻堅强者莫之能先武王中虚無我豈以伐紂為已利哉天下萬世皆信武王之心無一毫為私也武王之心信于天下故武王之功烈天下無能與競武王不為私惟成康濟斯民之功其心甚顯明人皆信之不亦顯乎其為民不為已之心甚明也故上帝大之皇大也大武王之心也彼謂武王也奄有猶曰盡有之也四夷諸侯咸服之也中虚無我故清明無所不照鐘鼓磬筦祀武王以樂也喤喤之聲洪将将之聲清降福嘏主祭也穰穰如禾藁之多也簡簡如竹簡之多也爾雅曰簡大也未必然也爾雅多差誤威儀反反每每反顧至謹也有獻有酢有酬故醉飽福禄來反者明福禄由已德所致非自神也出乎爾反乎爾毛詩序曰執競祀武王孔疏云祀武王之樂歌也魯語叔孫穆子聘於晉曰夫樂先金奏肆夏繁遏渠天子所以饗元后也韋注曰肆夏一名樊韶夏一名遏納夏一名渠此三夏曲也周禮鐘師鄭注吕叔玉云肆夏時邁也繁遏執競也渠思文也思文后稷克配彼天立我烝民莫匪爾極貽我來牟帝命率育無此疆爾界陳常于時夏文者事業之可觀也即堯文思之文也即文王之文也道不可見惟發諸事業乃見之思語助也后稷德配天故周郊后稷以配天天人本一人心動而昬始異是故克配為貴克配非有他也不失其本心而已矣教民稼穡民得以立莫非后稷之道也極至也道之異名書曰皇極周禮曰設官分職以為民極道不可以復加也故極聖人知衆人必以后稷稼穡之事為淺者不知其為道故大為之言曰極此頌武王或周公所作也非聖人不能為是言道無精粗一貫無二天人本一事理無殊是道大同人自異意不起乎意本同本一孟子曰麰麥趙岐注云麰麥大麥也説文云麰周受來牟也一麥二夆象其芒刺之形廣雅云來小麥也牟大麥也説文齊謂麥曰麰鄭箋乃引偽泰誓火流為烏五至以穀俱來謂此來牟鄭未知此偽泰誓乃張霸所為故信之來牟亦見臣工篇曰於皇來牟将受厥明明昭上帝草木之變昔所無而今忽有世雖有之而此來牟忽生足以濟民此天也事物之變無非天者而况於忽生濟饑之來牟乎后稷始獲此來牟遂以貽種蓺遂廣布其種不問中國四夷率徧也是上帝命后稷徧養其民無此疆爾界之間而后稷與天合也既言配天又言極又言無此疆爾界之廣大而卒曰陳此常道于是夏歌之中者何也夫道一而已矣平常而已矣聖人慮天下後世求諸髙逺而反失之故又曰常箕子曰王道平平孔子曰中庸皆言道不離乎日用庸常也平直而非逺也聖人慮人以為淺故大之又慮人以為髙故曰常皆所以啓人心之蔽而明道也夏歌有九夏大也亦見時邁毛詩序曰思文后稷配天也嗟嗟臣工敬爾在公王釐爾成來咨來茹嗟嗟保介維莫之春亦又何求如何新畬於皇來牟將受厥明明昭上帝迄用康年命我衆人庤乃錢鏄奄觀銍艾毛詩序曰臣工諸侯助祭遣於廟也孔疏云将遣諸侯不直戒其身戒其卿大夫以警切之毛傳曰嗟嗟敕之也工官也嗟嗟歎息之辭重農事憂切也公公家也敬爾在公之事蒼頡篇釐賜也王賜爾成法有道焉其有未明則來咨詢深入其中得其法意而行之而後可大扺法簡而意深長不可盡述故須咨詢茹入不可草草詩云柔亦不茹茹入也舜飯糗茹草謂食而入也菜茹柔而易入故茹有入義鄭箋云保介車右也月令孟春天子親載耒耜措之於参保介之御間莫晚也周之季春於夏為孟春諸侯朝周之春故晚春遣之敕其車右以時事急教農也介甲也車右勇力之士被甲執兵也孔疏曰月令説天子親載耒耜措置之於参乘之人保介之與御者二人間君之車上止有御者與車右二人而已今言保介與御明保介即車右也不敕御人偏敕車右者以御人本主於御車不主輔君故専敕車右言保介之御間者以人君左載御在中央明其逺君措之故繫於車右月令季冬命民修耒耜具田器農書稱孟春耕者急發毛傳田二嵗曰新三嵗曰畬盖本爾雅釋地田一歲曰菑二歲曰新三歳曰畬郭注云今江東呼初耕地反草為菑易曰不菑畬詩曰于彼新田此臣工詩謂諸侯反國時維莫春亦何所務求猶務也新田當如何畬田當如何於歎美也皇尊大之也歎美尊敬今兹來牟之麥乃本於后稷之時上帝神化之所生至於今種蓺滋盛然實受天之明命今當耰而糞之将受上帝粒食之賜必明昭其本於上帝之命故迄用康年迄終也康樂也民足於粒食而樂亦曰樂歳即康年也意謂康年乃本於上帝使民敬天亦導民之良心也毛傳曰庤具錢銚鏄鎒銍穫也孔疏云庤具釋詁文説文錢銚古田器世本云垂作銚宋仲子注云銚刈也然則銚刈物之器也説文云鎛田器也釋名云鎛鋤類也鎛迫地去草也世本云埀作耨釋器云斪斸屬謂之定李巡曰鋤也郭璞曰鋤屬廣雅曰定謂之耨吕氏春秋耨柄尺其耨六寸所以間稼也髙誘注云耨芸苗也六寸所以入苗間此云鎛鎒當是一器釋名云銍穫禾鐵也説文云銍穫禾短鎌也管子云一農之事必有一銍一鎒一銚夫銍既為穫刈之器則銚不得為刈宋仲子注未必然而孔疏遽信之何也意錢者耜端之金與後世錢貨其體圓取此為名與王氏曰戒使衆人各庤乃錢鎛以治田奄忽之間巳觀銍艾矣其謂農事不可緩之意與是頌專於務農者孟子謂仰事俯育之足然後可以驅而之善救死不贍則奚暇治禮義哉宣王不藉千畝虢文公諫曰民之大事在農是故稷為大官其言藉禮甚詳噫嘻成王既昭假爾率時農夫播厥百穀駿發爾私終三十里亦服爾耕十千維耦按此篇永樂大典缺卷振鷺于飛于彼西雝我客戾止亦有斯容在彼無惡在此無斁庶幾夙夜以永終譽毛傳曰雝澤也客二王之後故衛宏作序曰二王之後來助祭也按周禮小行人凡四方之使者大客則擯小客則受其幣而聽其辭又掌客之職凡諸侯之卿大夫士為國客盖周禮以諸侯為賔其使者為客况頌言諸侯必曰辟公凡辟公之詩其辭隆重有客之詩其辭畧於以驗禮文之有間毛傳亦有差誤不可盡信大行人凡諸侯之卿其禮各下其君二等以下及其大夫士皆如之則國客亦有饗食之禮此其樂歌與王氏曰西雝盖辟雝也辟雝有水鷺所集也朱曰先儒多謂辟雝在西郊故曰西雝鷺振羽飛集潔雅可愛此愛敬國客故以振比客容既愛敬之又從而勉之曰在彼居國無惡之者來此王朝又無厭斁之者人無不愛敬庶幾夙夜進徳無怠不特始有譽而終亦譽又願其終譽永久不已戾止也止語助豐年多黍多稌亦有髙廩萬億及秭為酒為醴烝畀祖妣以洽百禮降福孔皆毛傳曰稌稻也廩所以蔵齍盛之穂也數萬至萬曰億數億至億曰秭孔疏器實曰齍在器曰盛禹貢百里賦約總即禾稼也二百里賦納銍即穗也而地官廩人職掌萬民之食三釜四釜皆米事明堂位云米廩有虞氏之庠則亦藏米可知王氏曰利髙燥而寒者黍利下濕而暑者稌多黍多稌無所不利也此酒非三酒澄酒在下者五齊亦通稱酒醴齊濁禮之所尚故以祀祖妣凡言祖則妣從可知此必言妣者以周特祀姜嫄大司樂特享先妣生民閟宫言姜嫄特異言百禮則不止於祀祖妣箋云烝進畀予也祭而神降之福孔皆皆降福也是頌豐年報祭之樂歌也毛詩序曰秋冬報也言秋未安以時考之周建子今之八月為周孟冬豐年之報勢在冬矣諸儒考春秋不詳者多謂周用夏時非也周雖不廢夏時而朝廷大禮則用周正補音孔皆舉里切荀勗東西廂賔之初筵藹藹濟濟既朝乃宴以洽百禮頒以位叙或廷或陛登儐召叟亦有兄弟胥于陪寮憲兹度楷觀頤養正降福孔偕楷古讀如把後漢李膺傳時為語曰天下模楷李元禮有瞽有瞽在周之庭設業設虡崇牙樹羽應田縣鼓鞉磬柷圉既備乃奏簫管備舉喤喤厥聲肅雝和鳴先祖是聽我客戾止永觀厥成曰有瞽有瞽言瞽之多也案合止柷敔出益稷孔誤作臯陶謨爾雅邢疏本鄭注及此詩孔疏皆謂敔所以止樂今太常寺樂合以柷止以柷於聲音序次為宜况益稷篇合止柷敔文理亦合爾雅多差誤籈從竹是古用竹為之所謂木長尺者謂鉏鋙之木爾孔氏云栒簨圉敔古今字耳釋樂云大磬謂之毊郭云毊形似犂錧以玉石為之釋樂云大簫謂之言小者謂之筊大管為毊其中謂之篞小者謂之篎郭云言編二十三管長尺四寸筊十六管長尺二寸簥管長尺圍寸併漆之有㡳賈氏以為篪六孔邢疏云風俗通云舜作簫其形参差以象鳯翼十管長二尺博雅曰簫大者二十三管無㡳小者十六管有㡳李巡曰大簫聲大者言言也小者筊筊小也簫一名籟小師注管如笛形小併兩管吹之聲音生於人心樂官之心肅敬則音亦肅敬心雝和則音亦雝和其心之不肅不和者其音亦不肅不和毛詩序曰有瞽始作樂而合乎祖也謂合諸樂而奏之故曰先祖是聽是時適有四方之使者至觀此大樂之成故曰我客戾止永觀厥成曰永者言繼此永用此樂亦善頌美辭也客義見振鷺猗與漆沮潛有多魚有鱣有鮪鰷鱨鰋鯉以享以祀以介景福釋魚云鯉鱣鰋鮎郭璞注云鯉今赤鯉魚鱣大魚似鱏而短鼻口在頷下體有邪行甲無鱗肉黄大者長二三丈今江東呼為黄魚鰋今鰋額白魚鮎别名鯷江東呼為鮎夷邢疏曰舍人曰鯉一名鰋孫炎曰鰋一名鮎則是舍人以鯉鰋為一魚孫炎以鰋鮎為一魚郭氏以為四魚者如陸璣之言又以今語騐之則鯉鱣鰋鮎皆異魚也故郭氏云先儒及毛詩訓傳皆謂此魚有兩名今此魚種類形状有殊無緣强合之為一物是郭氏所以異也爾雅固多差難盡信然鮎魚身圓長而首鰋匾故亦名鰋與鄭箋亦云鰋鮎鰷白鰷也釋魚云􆀊鯉鰦郭云即白鰷江東呼為􆀊邢疏云詩頌曰鰷鱨鰋鯉是盖鰷鯈音義同鱨揚也釋見小雅魚麗介大也景明著也箋云介助也毛詩序曰潜季冬薦魚春獻鮪也孔疏云潛詩者季冬薦魚春獻鮪之樂歌也月令季春薦鮪於寝廟天官漁人春獻王鮪有來雝雝至止肅肅相維辟公天子穆穆於薦廣牡相予肆祀假哉皇考綏予孝予宣哲維人文武維后燕及皇天克昌厥後綏我眉壽介以繁祉既右烈考亦右文母諸儒紛紛異同謂烈考武王者以武王宜稱烈又洛誥曰烈考武王故也然此文連文母則烈考為稱文王文王之功業亦光烈矣若謂武王則文理殊不安烈考皇考皆文王也特更辭爾毛詩序曰禘太祖也祭法周人祖文王而宗武王也鄭箋亦因之謂皇考文王然武王之時王季太王公叔祖類亞圉髙圉之廟猶在則文王未為太祖此頌惟可言武王祀文王爾未可言太祖孔疏謂於禮當諱而經曰克昌厥後乃四海歌頌之聲非廟中之事及採得之後即為經典詩書不諱故無嫌爾烝民云四方爰發亦此類然孔何以知詩文於廟中則諱乎禮曰詩書不諱臨文不諱此詩也文也禮不諱不可以後世多諱之俗意古者之亦然雝和緩也肅肅敬也相助也助祭也辟公諸侯也穆穆不言也於歎美也廣大也牡明非牝也故又曰騂牡曰元牡曰白牡曰犉牡肆盛也假大也綏安也燕亦安也文王知人所用皆宣力明哲之人後嗣賴以為輔又文王之為后有文德足以深入人之心又有武功足以服人之心道兼文武故後王依賴以安文王安民民安則皇天亦燕安天心不可見以人心見之人心即天心於是知燕及皇天文王所遺有宣哲之人又有文徳武功之遺業其道燕及皇天故能昌其後祭有嘏辭綏我眉壽介助我以繁多之福祉皆嘏辭之所有也王禮嘏辭雖無見攷而少牢饋食禮嘏辭有眉夀受禄之辭此詩其武王受嘏之樂歌與右助也不特蒙右於烈考亦蒙右於文母文母太姒也此句法與我将伊嘏文王同謂蒙嘏於文王也載見辟王曰求厥章龍旂陽陽和鈴央央鞗革有鶬休有烈光率見昭考以孝以享以介眉壽永言保之思皇多祜烈文辟公綏以多福俾緝熈于純嘏嘏公土切韓愈元和聖徳詩飲沃羶薌産祥降嘏鳯凰應奏舒翼自舞字以古得聲毛傳載始也爾雅釋詁哉始也載哉義同陽陽言有文章和在軾前鈴在旂上鞗革有鶬言有法度王曰諸侯來見則曰求法度文章以歸治其國家也鄭箋鶬金飾貌釋器云轡首謂之革李曰思皇與思皇多士同是天子之享其福也又言光大文章之諸侯綏以多福君臣皆受其福也按以上原本脱今補眉夀多祜知先王嘏今王之辭有是也皇大也祜福也昭考既嘏于嗣王復以遍及于諸侯謂獻酬及燕與故光烈文徳之辟公均綏以多福雖然福非自外至當自求多福俾緝熈使自求也使緝治也緝則㣲細無失矣今蒙福嘏未保其後不雜以福故使自此緝熈無失則福嘏純一不雜矣序曰諸侯始見乎武王廟也有客有客亦白其馬有萋有且敦琢其旅有客宿宿有客信信言授之縶以縶其馬薄言追之左右綏之既有淫威降福孔夷毛詩序曰微子來見祖廟也殊未安夫始見則于廟矣詩言宿宿信信是四宿也薄言追之是追止留燕非廟中之辭也又淫威非所宜言於微子之前是頌殆燕餞武庚之使者樂歌也衛宏作序差誤之迹良多不可盡信殷尚白馬知其殷後周禮四方之使者曰客諸侯曰賔詳釋見振鷺周不廢殷祀使得用殷禮故白馬曰亦者不特其君白馬其臣亦白馬毛傳曰萋且敬慎貌孔疏謂敦雕古今字旅衆也使者之屬衆也雕琢儀物文辭之美也爾雅釋訓曰有客宿宿言再宿也有客信信言四宿也笺曰縶絆也毛傳謂欲絆其馬而留之禮備客歸追而留之又問其左右而綏安之恐其有不安便故不肯留也禮所以著誠也此頌所以道王愛敬客不已篤厚之誠心也故禮有追餞非虚文也此追餞國客之樂歌也夷平也孔甚也夫既有淫威今則降福甚平言無彼此輕重之間所以慰安武庚之使者也淫威謂伐紂也掌客上公三饗三食三燕侯伯三饗再食再燕子男一饗一食一燕大行人凡諸侯之卿其禮各下其君二等殷後爵上公故其臣下二等於四宿而歸與於皇武王無競維烈允文文王克開厥後嗣武受之勝殷遏劉耆定爾功楚子曰武王作武其卒章曰耆定爾功其三曰敷時繹思我徂惟求定其六日綏萬邦屢豐年今武頌無此二章後乃析而為賚為桓殆秦火之後毛詩錯置之而杜預謂盖楚歌之次第亦曲矣於者歎美之辭皇尊大之稱烈者功業之光顯武王之烈人無得而競也天下莫與之爭矣允也文王之文徳天下信之文王初無取天下之心帝謂文王無然畔援誕先登于岸盖衆聖贊啓文王始赫斯怒遏徂旅而猶事殷然其計安天下則文王已開之矣嗣子武王受之既勝殷則遏止劉殺歸馬放牛示天下弗服定者安定之云爾楚子引此詩耆定爾功亦言其不尚威武之意文王武王無二心也無二道也其心皆在於安定天下之民非私於已也非私其怒也耆老也有終極之義謂終定爾功其功乃安定之功文王開于始武王成于終故曰耆若夫後世動于已私過于劉殺何功之有毛詩序曰武奏大武也然則武王作此樂至成王時周公作此頌而樂歌始備與閔予小子遭家不造嬛嬛在疚於乎皇考永世克孝念兹皇祖陟降庭止維予小子夙夜敬止於乎皇王繼序思不忘毛詩序曰閔予小子嗣王朝于廟也箋云閔悼傷之言也造猶成也嬛嬛然孤特在憂病之中武王即王位未久而崩是家業不造成於乎歎辭皇考武王也武上夀夀永世克盡孝道謂能繼志述事光有天下皇祖文王也文王詩曰文王陟降在帝左右此言陟降帝庭言文王動合天道如陟帝庭奉帝命降而行之天下當時人稱美文王斯言盛行故多見於詩訪落又曰紹庭上下陟降厥家此頌乃嗣王免喪見於武王廟故首言皇考因上及皇祖文王以文武二后道同功並世接親近也皇王兼稱文武也今予小子繼序不忘文武之道思語辭也訪予落止率時昭考於乎悠哉朕未有艾將予就之繼猶判渙維予小子未堪家多難紹庭上下陟降厥家休矣皇考以保明其身毛傳曰訪謀落始時是率循猶道判分渙散也釋詁云艾厯也郭璞云長者多更厯予謀其始率循昭考武王之道歎曰悠哉悠悠未濟之意朕未耆艾未有所經歴予将有所就而繼有三軍淮夷之判周道分散親族離渙予小子未堪家多難所願武王紹繼文王上下帝庭之道陟降我家以保右我大雅云文王陟降在帝左右頌云念兹皇祖陟降庭止此上下猶陟降也謂陟于帝庭奉帝命降而行之天下此則願武王紹繼其道降于我家休矣者願佑我以休祥保我身使安明我心使不昏明之為言亦欲啓成王之心釋其疑也是頌成王祀武王有所祈也而毛詩序曰嗣王謀于廟不曰祀何也衛宏作序多鹵莽訪云者謂成王始訪問詢謀不謂今也爾雅多差艾未必果訓厯謂朕未耆艾謂幼沖與敬之敬之天維顯思命不易哉無曰高高在上陟降厥士日監在兹維予小子不聰敬止日就月將學有緝熈于光明佛時仔肩示我顯德行朱氏思語辭也李曰鄭氏以為變易之易不如杜元凱以為難易之易左傳引命不易哉元凱注奉承其命甚難毛傳曰士事也桓頌康誥亦以士為事天昭顯可覩而命不易保無曰高高在上未必監察于下也天神降監人事復陟而升日日監察于此自敬之至是一節所以致戒于王也於是又言王致答謙辭曰維予小子不聰明惟敬而已目日進而就之至于月而寖熟将持漸固謂稍能持執不失也緝而治之漸有光明爾其弼我仔肩之任示我顯徳行予将學焉敬言進德之大要緝言細宻學患疏畧行必本于徳不可務外而不由中空言無所據必明示以顯徳行當時大臣必有進戒之言如右王亦必有致答謙辭自序及求輔之意畧如右作為樂歌以燕羣臣與其言敬若緝熈言示徳行其教者致教之辭與抑王親聖賢之教自能為此辭與夫燕而聞是歌自然感發其君臣之徳意潜釋非心毛詩序惟曰羣臣進戒嗣王猶未盡其㫖也箋云佛輔也時是也仔肩任也孟子拂士亦輔弼也拂佛通諫則拂逆之矣説文仔克也所以荷任者肩也時猶我也示其拂我之違使我克勝其肩任社稷民人之任重也予其懲而毖後患莫予荓蜂自求辛螫肇允彼桃蟲拚飛維鳥未堪家多難予又集于蓼此成王悔過之詩也毛詩序曰嗣王求助未得其情草之相比曰荓竹之相比曰笄今俚語相并比曰連荓曰成荓當日成王惑于管蔡之流言而疑周公後天大雷電以風大木斯拔邦人大恐王啓金縢之書将卜而得周公代武王之説王始感悟始不疑周公始悔昔者信管蔡之非蜂喻管蔡王與管蔡連比是荓蜂也王惑于管蔡故管蔡依王以作亂幾危社稷是王自取辛螫也蜂螫毒人罹之痛如辛故曰辛螫王曰予其懲創前事而毖慎後患懼後有若管蔡之類為患故加慎也莫如予之荓蜂自求辛螫肇始也始信彼桃蟲雖至㣲後乃拚飛維鳥武王崩予㓜沖未堪家多難而又集于蓼蓼味辛亦猶蜂螫之辛更辭叶韻故又曰蓼其意則同鄭箋云鷦之所為鳥題肩或曰鴞皆惡聲之鳥孔疏曰定本集注皆云或曰䲭皆惡鳥也月令季冬征鳥厲注云征鳥題肩齊人謂之擊征或曰鷹然則題肩是鷹之别名與鴞不類諸儒又以鷦為巧婦與題肩又不類箋以三者為一其義未詳按原本鄭箋以下闕今補入郭璞注云桑飛即鷦鷯也又名鷦􅛯亦名巧婦江東呼布母按爾雅云鸋鴂䲭鴞屬非此小雀明矣説文云鷦鷯桃蟲也毛傳謂荓蜂􅠺曵也盖本於釋訓甹夆掣曵也毛義未安成王悔過如此明白明以告人自怨自艾此其所以為賢王也載芟載柞其耕澤澤千耦其耘徂隰徂畛侯主侯伯侯亞侯旅侯彊侯以有嗿其饁思媚其婦有依其士有略其耜俶載南畝播厥百穀實函斯活驛驛其達有厭其傑厭厭其苗緜緜其麃載穫濟濟有實其積萬億及秭爲酒爲醴烝畀祖妣以洽百禮有飶其香邦家之光有椒其馨胡考之寧匪且有且匪今斯今振古如兹芟所銜反澤補音一讀直格切一讀徒各切畛之忍反補音之人切張衡東京賦殿未出乎城闕斾已反乎郊畛盛夏后之致美爰恭敬於神明毛傳曰除草曰芟除木曰柞畛場也主家長也伯長子也亞仲叔也旅子弟也彊彊力也鄭箋云載始也隰謂新發田也畛謂舊田有徑路者彊有餘力者周禮曰以彊予任民以謂閒民今時傭賃也春秋之義能東西之曰以爾雅侯維義同語助也下濕曰隰不必留水故無畛徂往也澤澤耕田有水也李曰嗿者衆人飲食之聲也毛傳曰士子弟也箋云饁饋饟也依之言愛也思語助也士夫也曰媚曰依言夫婦親愛也毛傳曰略利也問之田家曰耕罷略去耜端之積土爾非略而利之孔疏曰王肅以俶為始載為事箋云實種子也函含也活生也穀種浸而芽蘖乃播布之釋訓曰繹繹生也邢疏云舍人云穀皆生之貌載芟云驛驛其逹箋云逹出地也毛傳曰傑苗厭然特美也麃耘也箋云傑先長者厭厭其苗衆齊等也簡謂厭者飽飫充盛之貌與孫炎曰緜緜言詳宻也郭璞曰芸不息也王氏云芸者其衆緜緜然不絶也濟濟者刈穫齊整不亂有序也其積厚而其實多萬億及秭宜其積實也所積少則虚矣萬億及秭為酒為醴烝畀祖妣以洽百禮釋見豐年毛傳曰飶芬香也椒猶飶也胡夀也考成也孔疏引左傳僖二十二年雖及胡耉諡法保民耆艾曰胡胡為夀也釋詁云考成也蕩曰雖無老成人今為酒有用椒者夫年豐為酒醴烝畀祖妣以洽百禮又酒飶然其香豈不甚美豈不為邦家之光胡考之寧者神降福嘏也毛詩序曰載芟春藉田而祈社稷也差誤良多是頌首章似藉田其後非矣亦非祈社稷情状周禮右社稷左宗廟今首言烝畀祖妣則知非祀社稷也社稷尊於宗廟此乃百禮之一爾熟玩始末其蜡祭之樂歌與蜡亦農事之祭也序陳農事之勞勤又言嗿饁媚婦依士亦近於戱樂且者苟且也蜡所以戱樂疑苟且徇俗故曰苟且先聖王雖本因俗然既制而為禮後王尊行不廢非苟且也匪今始有今禮乃振古如兹爾雅釋言云振古也振其填之訛與填長久之義也詳釋見大雅桑柔此曰久古如兹爾熟玩辭情依然蜡祭之樂歌也孔子曰張而不弛文武弗能也此蜡之道也畟畟良耜俶載南畝播厥百穀實函斯活或來瞻女載筐及筥其饟伊黍其笠伊糾其鎛斯趙以薅荼蓼荼蓼朽止黍稷茂止穫之挃挃積之栗栗其崇如墉其比如櫛以開百室百室盈止婦子寧止殺時犉牡有捄其角以似以續續古之人郭曰畟畟言嚴利也箋云良善也筐筥所以盛黍也毛傳曰笠所以禦暑雨也趙利也箋云有來視汝謂婦子來饁者也其笠糾結而成者鎛鋤類釋見臣工説文云薅拔田草也毛傳曰蓼水草也釋草云蒤委葉郭璞云詩云以茠蒤蓼朱曰今人取以藥溪取魚故又曰荼毒毛傳曰挃挃穫聲也墉城也栗栗實也其積厚實也載芟云有實其積釋獸牛屬黒脣犉毛傳曰黄牛黒脣曰犉社稷之牛角尺角稍長故有捄然之勢古之人謂祖考以上也皆重農事皆報社稷今似續古人遵行其禮亦猶載芟云匪今斯今振古如兹大扺聖賢好古遵古故必及此毛詩序曰良耜秋報社稷也言秋未安秋方刈報在冬耳今八月乃周之孟冬絲衣其紑載弁俅俅自堂徂基自羊徂牛鼐鼎及鼒兕觥其觩旨酒思柔不吳不敖胡考之休按此篇永樂大典缺卷於鑠王師遵養時晦時純熈矣是用大介我龍受之蹻蹻王之造載用有嗣實維爾公允師於者歎美之辭王師周王之師王謂文王武王也師衆也自文王時三分天下有其二猶服事殷武王即位猶須暇之猶覬紂惡之或悛也是謂遵養時晦鑠言有光也人心歸周王師義勇豈不有光至於紂惡滋熾人心滋憤天下咸願武王必伐熈和也人心歸周咸和而純一故天下大介助武王不止於三分有其二而已人心之大助即天命之大助武王於是不得不順受其大介曰龍者如龍之奮飛變化也下文蹻蹻亦有龍之象奮武也於是大有所造為而往伐或曰龍􅃂也承天􅃂而受之長發亦云荷天之龍鄭箋云載則也允信也載猶則爾大扺語助也惟王有造故今成王得為之嗣故曰有嗣實惟文王武王大公足以信於師衆咸信文武志不私於已亦猶湯四海皆曰非富天下也為匹夫匹婦復讎也毛詩序曰酌告成大武也朱曰内則十三舞勺即此詩也學業其謹諸始哉諸儒自不究詩序之是非一從其説厥後卒至牽强穿鑿而不可解酌之序曰言能酌先祖之道以養天下詩中無此意桓之序曰講武類禡也詩中無講武之意又曰桓武志也益乖矣武王之公允信於師衆徂往伐紂維求安定斯民爾用武非武王之本志也賚序曰大封於廟也詩亦無此意求賚意不得不得不為曲説爾般序曰巡狩而祀四嶽河海詩近似矣而實非何謂翕河何以言允猶下文全不類巡狩詩序自關雎以來其差謬累累是四篇者其大武樂章之異名乎酌者酌時而行也時晦時純熈静動隨時酌而行之也桓則取諸桓桓賚者以敷遍當時之人皆繹思周徳思願武王之伐紂出民於水火之中武王往伐維求安定斯民是大賚於四海也般者武王率師而東陟其髙山及墮山又及喬嶽渡孟津故詩人即河取喻天下咸知文武大公而非私猶道也允信之道也如彼翕受河流人心篤信畢趍敷天之下裒衆其時之對向周王而不違去者不期而㑹伐若是其衆也是時人心樂武王之必伐樂水火之今出其樂可勝既耶故曰般般樂也左傳宣十二年楚子曰武王作武其卒章曰耆定爾功其三曰敷時繹思我徂維求定其六曰綏萬邦屢豐年然則前之武與此酌桓賚般皆武樂異章之名而毛氏錯置之綏萬邦屢豐年天命匪解桓桓武王保有厥士于以四方克定厥家於昭于天皇以閒之武王伐紂萬邦咸綏安屢年豐登其以人和故天地之氣亦和與天既命武王伐殷又錫之以屢豐年故詩人謂之天命匪解謂天命洊錫勤勤而不懈也桓桓者武徳有所植立也武王能保有其事四方征伐滅國五十克定厥家功成業定是謂植立是詩序武王伐紂已後之事詩人歎美武王之徳盖與天通其桓桓征伐無非天道皇大也大矣哉天以武王伐殷也間代也敬之亦以士為事亦見康誥餘釋見酌文王既勤止我應受之敷時繹思我徂維求定時周之命於繹思止語助也文王本無伐紂之心後以紂惡滋熾民久苦其毒羣聖賢贊文王之安三分天下其時歸文王宻人無道助紂為虐文王曰天命也始修王業既勤勞矣大勲未集武王應受此志而繼行之敷遍一時之人皆繹思周德思願周之伐紂思之不已曰繹武王不得已而往伐徂徃也維求安定斯民爾非私於已也時是也是周之天命也天命周往伐也夫周之所以致天下之繹思不已者何也是道甚美也大公無私天之道也使文王武王有一點動乎私之意則安能致天下之繹思於歎美之辭也餘釋見酌言時是多通用盖記音異爾於皇時周陟其高山嶞山喬嶽允猶翕河敷天之下裒時之對時周之命於歎美也皇大也歎美尊大周王伐紂其時東伐升陟高山嶞山喬嶽渡河而伐紂其致天下允信之道如翕河流畢赴㑹伐敷天之下裒聚其時之對向于周者畢㑹是周之天命也時是也必曰命者時非武王之私心皆天道天命也爾雅釋山云巒山嶞郭璞曰山形長狹者荆州謂之巒詩曰嶞山喬嶽餘釋見酌
