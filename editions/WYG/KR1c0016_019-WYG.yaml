body:
  text: 慈湖詩傳卷十九宋楊簡撰魯頌駉駉牡馬在坰之野薄言駉者有驈有皇有驪有黄以車彭彭思無疆思馬斯臧駉駉牡馬在坰之野薄言駉者有騅有駓有騂有騏以車伾伾思無期思馬斯才駉駉牡馬在坰之野薄言駉者有驒有駱有駵有雒以車繹繹思無斁思馬斯作駉駉牡馬在坰之野薄言駉者有駰有騢有驔有魚以車祛祛思無邪思馬斯徂才柏梁臺七言才與時叶易林履之巽曰蹇驢不才駿驥失時明夷之觀曰德積逢時宜其美才舜南風之歌曰南風之時兮可以阜吾民之財兮史記龜筴傳天地合氣以生百材隂陽有分不離四時按韻補有陸雲詩咨予頑矇蕞爾弱才沈矅元渚挹庇雲淇四語補音才前西切簡疑前移切邪補音祥余切不正也太元法首邪與辜叶羡首邪與夫叶班彪北征賦邪與圖叶班固王汲贊邪與徒叶急就章邪與胡叶毛傳不言僖公而衛宏作序曰駉頌僖公也僖公能遵伯禽之法儉以足用寛以愛民務農重榖牧于坰野魯人尊之於是乎季孫行父請命于周而史克作是頌衛宏固多妄而此序若有所據者鄭云史克魯史也孔疏云僖公既薨之後魯請為作頌既為天子所許而史官名克者作以左傳文十八年季文子使太史克對故知史克魯史然熟觀是頌殊無追頌情狀餘頌亦然安知非僖公末年公兩朝于王所後王使宰周公來聘時邪安知非作頌以陳公之美而請錫命邪晉大夫為武公請命于天子之使而作無衣亦此類爾以春秋觀魯君其失道不一以詩觀魯君其得乎道亦不一明道不在逺人心即道順則正不則邪毛傳曰駉駉良馬腹幹肥張也坰逺野也邑外曰郊郊外曰野野外曰林林外曰坰鄭箋云必牧於坰野者辟民居與良田也周禮曰以官田牛田賞田牧田任逺郊之地釋畜云驪馬白跨驈孫炎曰驪黒色也白跨股脚色也郭璞曰跨髀間也釋畜又云黄白皇孔疏云其驪與黄爾雅無文月令孟冬云駕鐵驪檀弓曰夏后氏尚黒戎事乗驪毛傳曰黄騂曰黄王氏曰彭彭張也車雖彭彭張大馬能以之以者負之而行也魯君思慮政事無有疆限言勤思廣博以至於思牧馬有驈皇驪黄之臧善斯此也釋畜云蒼白雜毛騅黄白雜毛駓毛傳曰赤黄曰騂蒼騏曰騏伾伾有力也孔疏云騂騏爾雅無文周人尚赤而牲用騂犅禮稱陽祀用騂牲是騂為純赤色言赤黄者謂赤而㣲黄其色鮮明者也上云黄騂曰黄謂黄而㣲赤此云赤黄曰騂謂赤而㣲黄此其所以異也蒼騏曰騏謂青而㣲黒今之騘馬也顧命曰四人騏弁注云青黒曰騏思無期限常常動思也才者駑之反才猶良也釋畜云青驪驎驒白馬黒鬛駱孫炎云驒色有淺深似魚鱗也郭璞云淺深斑駮隠甐今之連錢騘禮記曰夏后氏駱馬黒鬛毛傳曰赤身黒鬛曰駵黒身白鬛曰雒孔疏云駵雒爾雅無文釋畜云駵馬白腹騵駵白駮郭璞云駵赤身黒鬛繹繹行不息也魯君思政理無厭斁作動作也言其善行也釋畜云隂白雜毛駰舍人曰今之泥騘也樊光曰駰者目下白也孫炎曰隂淺黒也今嚴婺人皆以隂為因亦猶咽咽即淵淵釋畜云彤白雜毛騢郭璞云即今之赭白馬也釋畜云二目白魚郭云似魚目也毛傳曰豪骭曰驔骭户宴反孔疏云驔爾雅無文説文云骭骹也郭璞云骭脚脛然則骭者膝下之名釋畜云四駮皆白驓無毫骭白之名傳言毫骭白曰驔者蓋謂毫毛在骭而白長名為驔也驓則四駮雜白而毛短故與驔異也孔疏此説少思爾何其曲也毛傳止曰毫骭白不曰皆白自與驓不同何必曲觧祛祛猶去去也魯君所思無邪僻思馬能如此徂往也諸儒因孔子蔽三百篇以思無邪之一言而疑思無邪之髙逺甚矣道之不明也自諸儒不省中庸不出日用庸常而道始不明矣洪範曰王道平平易曰百姓日用而不知書曰彝曰常而諸儒自不悟矣有駜有駜駜彼乗黄夙夜在公在公明明振振鷺鷺于下鼓咽咽醉言舞于胥樂兮有駜有駜駜彼乗牡夙夜在公在公飲酒振振鷺鷺于飛鼓咽咽醉言歸于胥樂兮有駜有駜駜彼乘駽夙夜在公在公載燕自今以始歳其有君子有穀詒孫子于胥樂兮毛傳曰駜馬肥強貎孔疏云四馬曰乗魯君燕羣臣以車來此言于乗之馬悦其臣故亦悦其馬而見諸詩稱臣夙夜在公之勤又稱其在公明哲無所不明故曰明明鷺潔白羣飛可愛故以比羣臣來燕威儀濟濟愛其臣故取可愛之物喻之燕羣臣有樂故鼓咽咽鼓音也本淵淵方音訛而為咽隨方音皆可醉而起舞者禮樂之事士大夫所習學燕而醉亦舞舞與鼓節相應故連言之鼓而舞所以相樂也胥相也皆也黄釋見駉釋畜云青驪駽郭璞云今之鐵騘自今以始嵗其有君子有穀詒孫子相與祈祝之辭也有年豐年也詒遺也毛詩序曰有駜頌僖公也君臣之有道也此序固無害于道然舉天下古今之人皆可以言有道易曰百姓日用而不知僖公君臣亦有時乎無道見諸春秋若此頌所言無失道者亦可以言有道但恐衛宏本心未必明此以他序知之思樂泮水薄采其芹魯侯戾止言觀其旂其旂茷茷鸞聲噦噦無小無大從公于邁思樂泮水薄采其藻魯侯戾止其馬蹻蹻其馬蹻蹻其音昭昭載色載笑匪怒伊教思樂泮水薄采其茆魯侯戾止在泮飲酒既飲㫖酒永錫難老順彼長道屈此羣醜穆穆魯侯敬明其德敬慎威儀維民之則允文允武昭假烈祖靡有不孝自求伊祜明明魯侯克明其德既作泮宫淮夷攸服矯矯虎臣在泮獻馘淑問如臯陶在泮獻囚濟濟多士克廣德心桓桓于征狄彼東南烝烝皇皇不呉不揚不告于訩在泮獻功角弓其觩束矢其搜戎車孔博徒御無斁既克淮夷孔淑不逆式固爾猶淮夷卒獲翩彼飛鴞集于泮林食我桑黮懐我好音憬彼淮夷來獻其琛元龜象齒大賂南金陶補音夷周反易林遁之既濟曰鎡基逢時稷契臯陶貞良得願㣲子觧囚顔師古漢書注凡繇皆讀為由獨於臯繇作士正五刑乃云繇弋昭反蓋未盡也先儒謂秦人猶摇聲相近云猶即摇也古今字爾呉如字又音話訩音凶逆補音宜脚反荀朂正旦大㑹歌明明天子臨下有赫四表宅心惠浹蠻貊柔逺能邇孔淑不逆來格祁祁邦家是若王氏曰思發語辭也鄭箋云辟雝水外圓如璧泮半水王制天子辟雍諸侯泮宫芹水菜也方言云戾至也止其語助歟言亦語助魯人樂泮宫而從容焉薄采其芹而魯君至矣觀其旂茷茷然車馬之鸞聲噦噦然魯人無小大皆從公而往泮宫邁往也藻釋見采蘋蹻蹻馬足髙也馬髙者為美魯君語音清明故曰昭昭魯人愛其君故云釋文之繞反非蓋拘於協韻如字亦協色者顔色和美也和顔笑語無所有怒維教之毛傳曰茆鳧葵也鄭小同云江東名之蓴菜生陂澤中草木疏同或名水葵孔疏釋文同曰蓴菜永錫難老者獻酢祈祝夀考也亦猶祭禮嘏辭眉夀萬年也後世亦有以酒為夀人言道理有長有短俗曰從長魯侯從羣臣所謀之理長者順之用以屈此羣醜羣醜謂淮夷叛亂之衆也醜類也穆穆淵黙也考之春秋魯君毎毎失道而此曰敬明其德者亦非誣也人性自善其德自明自敬維動乎意始昏始失如雲翳太虚及雲斂則太虚清明如故矣是故人心善惡是非雜錯是頌亦稱其善者是者爾是則是道非則非道其敬明其慎儀誠可以為民則誠有文誠有武允信也誠也假者格音之㣲轉也即格也至也烈祖周公魯公歟魯君之德昭格之非徒祭而蒙嘏辭乃自求多福祜福也言魯君修已故致祜也既作泮宫未㡬而淮夷服上言明德謂有德故能服之鄭箋云馘所格者之左耳淑善也囚所虜獲者聴獄之寛平者即臯陶之心也故言問譽淑善如臯陶古者士君子皆從軍旅故克廣魯君之德心亦承上獻囚寛平之意不呉譁不肆揚此文武周公之德化亦魯人德性之所自有也不呉亦見絲衣桓桓武德之貎狄者夷狄之通稱淮夷在魯之東南釋詁云烝進也烝烝進進也皇大也軍旅盛大也不告于訩不以凶敗聞也獻功以有功聞也觩者角弓弛而觩曲也搜索其矢而束之淮夷服我戢兵也戎車孔博以人不在車而寛博也孔甚也無斁不厭倦也謹終如始用師之道也驕惰者敗雖克淮夷甚淑善而不暴逆苟克勝而不淑善或暴逆不順乎道則道雖始善而終敗矣今孔淑不逆則其道益固不隳敗也故淮夷卒於得其心故以鴞食我桑黮懐我好音為喻黮桑實也鴞雖惡鳥甘我桑黮而食之喻心服我以好音語寛諭之而彼心懐服也説文云憬覺悟也毛傳曰琛寳也元龜尺二寸賂遺也南荆揚也禹貢荆揚貢金三品琛或作賝箋云大猶廣也廣賂者賂君及卿大夫也毛詩序曰泮水頌僖公能修泮宫也未盡詩㫖閟宫有侐實實枚枚赫赫姜嫄其德不回上帝是依無災無害彌月不遲是生后稷降之百福黍稷重穋稙稺菽麥奄有下國俾民稼穡有稷有黍有稻有秬奄有下土纘禹之緒后稷之孫實維大王居岐之陽實始翦商至于文武纘大王之緒致天之届于牧之野無貳無虞上帝臨女敦商之旅克咸厥功王曰叔父建爾元子俾侯于魯大啟爾宇為周室輔乃命魯公俾侯于東錫之山川土田附庸周公之孫荘公之子龍旂承祀六轡耳耳春秋匪解享祀不忒皇皇后帝皇祖后稷享以騂犠是饗是宜降福既多周公皇祖亦其福女秋而載嘗夏而楅衡白牡騂剛犧尊将将毛炰胾羮籩豆大房萬舞洋洋孝孫有慶俾爾熾而昌俾爾夀而臧保彼東方魯邦是常不虧不崩不震不騰三夀作朋如岡如陵公車千乗朱英緑縢二矛重弓公徒三萬貝胄朱綅烝徒增增戎狄是膺荆舒是懲則莫我敢承俾爾昌而熾俾爾夀而富黄髪台背夀胥與試俾爾昌而大俾爾耆而艾萬有千歳眉夀無有害泰山巖巖魯邦所詹奄有龜蒙遂荒大東至于海邦淮夷來同莫不率從魯侯之功保有鳧繹遂荒徐宅至于海邦淮夷蠻貊及彼南夷莫不率從莫敢不諾魯侯是若天錫公純嘏眉夀保魯居常與許復周公之宇魯侯燕喜令妻夀母宜大夫庶士邦國是有既多受祉黄髪兒齒徂來之松新甫之柏是斷是度是尋是尺松桷有舄路寝孔碩新廟奕奕奚斯所作孔曼且碩萬民是若多補音一讀章移切廣雅祗也按原本祗誤多周公無祗悔九家本作多論語多見其不知量本亦作祗揚雄冀州牧箴仰觀前世厥用孔多初安如山後傾如崖故治不忘亂安不忘危何晏景福殿賦赩如蜿虹赫如奔螭南距滎陽北極幽厓任重道逺厥用孔多一讀當何切集韻亦有章移切巖補音魚杴切邦補音卜功切繹補音弋灼切宅補音逹各切嘏補音果五切母補音滿罪切有補音羽軌切斷音短度待洛反尺補音勅畧切十寸也後漢長安語曰城中好髙髻四方髙一尺城中好廣眉四方且半額城中好大袖四方全疋帛額逆各切帛撲各切王襃僮約讀劵文訖窮咋索仡仡叩頭兩手自摶目淚下落鼻涕長一尺審如王大夫言不如早歸黄土陌蚯蚓穿額早知當是為王大夫沽酒真不敢作惡摶通莫切陌莫各切􅋕逆各切舄補音七約切碩補音常約切下同奕補音弋灼切揚雄太常箴翼翼太常是為常伯穆穆靈祗寝廟奕奕陸機七徴敷延袤之廣廡矯凌霄之髙閣秀清輝于雲表騰􅇨䕃之奕奕按韻補有此四句今補入陸雲祖考頌逺除尋軌崇基式廓昭明有家祖廟奕奕伯逋莫切且碩補音同上孔碩讀毛傳曰孟仲子曰閟宫禖宫也侐清淨也枚枚礱宻也毛傳先謂閟閉也先妣姜嫄之廟在周常閉而無事是以大司樂饗先妣故曰先妣而曰常閉而無事何也孔疏謂大司樂云舞以大濩以饗先妣則先妣之廟有祭事矣且立廟所以祭神而云閉而無事者案祭法王立七廟五廟皆月祭之二祧饗嘗乃止彼文據周為説其言不及先妣先妣立廟非常而祭之又疏月朔四時祭所不及比于七廟是閟而無事也荘三十二年左傳稱公見孟任從之閟謂閉户拒公故閟為閉也毛傳孔疏甚當時情但閟宫之名蓋世所稱非本立是名諸儒謂魯有姜嫄廟蓋考是頌之不審是頌惟言僖公之美推其本始故及姜嫄因稱其廟曰閟宫實實枚枚申言其美使是頌專言姜嫄廟新廟奕奕謂姜嫄廟則所謂路寝孔碩者何耶下言松柏斷度尋尺蓋修治路寝并修羣廟奕奕明煥亦以為僖公之美故言之以修治非大功故言于卒章毛傳以新廟為閔公廟則未安夫閔公之廟已新作於僖公之初年常事亦不足稱頌况文承路寝之事情非閔廟蓋路寝孔碩興役特盛故首言至于廟則畧修飾而新之故言公子奚斯董其役至文公十三年大室屋壊以此畧飾而不大治故壊歟鄭箋謂上新姜嫄之廟非也鄭不善屬文于此益騐况是頌全篇蓋美僖公辭情甚明非專頌姜嫄也此尤見康成之不善屬文不省文意不相接應毛傳謂常閉而無事蓋言其大常非絶無祭事也實實壮實也不回者言正直而行不囬邪也上帝是依履帝武敏歆也彌滿也滿十月即生不遲内宰鄭司農注云先種後熟謂之穜後種先熟謂之稑毛傳曰先種曰稙後種曰穉釋草云秬黒黍李曰菽大豆后稷㓜而好種蓺種蓺輙豐茂穎栗此降福之始後為后稷之官教民稼穡百穀豐熟奄有下國則天降福多矣奄盡也下土猶下國言盡下土皆有黍稷重穋稙穉菽麥稻秬也禹治水后稷纉繼其緒而稼穡焉大王避狄而居岐陽邠人從之如歸市以大王不以其所養人者害人而去之之一言也王業自此始故此曰實始翦商届至也武王至于牧野即天致牧野此明武王之心一無已私皆天道也無疑貳無虞度而懼上帝臨䕶女敦厚也旅衆也武王遏劉止殺厚恤商之旅有道如此萬姓悦服故所至皆克濟厥功咸皆也毛傳曰王成王也元首宇居也鄭箋云叔父周公也成王告周公欲封伯禽魯公乃䇿命伯禽加賜之以山川土田及附庸王制名山大澤不以封諸侯附庸則不得專臣也法不得有故謂之賜降福既多云者按原本王制以下缺今補入亦猶少牢饋食禮之嘏于主人曰使女受禄于天宜稼于田眉夀萬年勿替引之也魯國于東使求保東方常常不絶詩人因是廣其祝頌祈願之辭不小虧不大崩不震動不騰踰此又言保其德也箋云三夀三卿也王氏曰夀考之三卿為公朋也朱曰三夀未詳或曰願公夀與岡陵等為三也公車千乘者按司馬法成方十里出革車一乗甲士三人歩卒七十二人明堂位謂魯方七百里此張大之辭非事實明堂位之誣誤多矣此不可信孟子謂周公之封於魯方百里子産亦曰諸侯一同三子所見乃事實周禮謂諸侯封疆方四百里者蓋周公懲三監淮夷之亂新封諸侯勢懼于不敵故増武成三等之制著之周禮蓋武王始則因古制不變然自唐虞萬國歴夏商及周強凌弱大并小何止于百里矣殷止三千諸侯至孟津者八百國耳餘雖有未至大概又少于殷可見大益并小新封百里之國七十里五十里之國力将不敵周公知其不可不變故增其制蓋欲益周公之所封以藩屏周室所增多者殆亦附庸并計焉是頌雖曰賜之附庸亦不及四方百里之地矣至戰國之時孟子唯曰今魯方百里者五爾侵并至是尚無方七百里而况于始封之時乎成王不能行周公之制大司徒地中建王國是即洛邑成王終不能遷而安于西都則周禮一書之不盡行者有矣今以成方十里出革車一乗計之則方百里之國唯有百乗而此曰有車千乗者以此頌不用司馬法出軍之制而言魯地實有之數古者出軍非竭作而出之凡起徒役毋過家一人而司馬法成方十里出車一乗則又寛優國方百里方里而井井九夫方里百則為方一里者萬為九萬夫大約三分去一以為山林川澤城郭宫室途巷餘六萬夫又以不易一易再易之地通之則六萬夫之地實三萬夫正應夫三為一屋之義凡三夫之地實一家也則方百里實有三萬家以家一人計之則三萬故曰公徒三萬以大司馬全賦之制計之上地可用者家三人中地家二人下地家一人今通以中地計之則三萬家為七萬五千人正應千乗每乗甲士三人歩卒七十二人共七十五人之數詩人所言亦不過制矣毛傳曰朱英矛飾也縢繩也重弓重于鬯中也按原本中誤作弓箋云備折壊也兵車之法左人持弓右人持矛中人御小戎云竹閉緄縢又云交韔二弓孔疏云二矛共束以緑繩宣十二年楚許伯御樂伯攝叔為右以致晉師樂伯曰吾聞致師者左射以菆樂伯在左而云左射是左人持弓也成十六年晉欒鍼為右按原本誤作左曰持矛哀二年衛太子為右曰備持矛焉毛傳曰貝胄貝飾也朱綅以朱綅綴之增增衆也箋云僖公與齊桓舉義兵北當戎與狄南艾荆及羣舒無敢當之詩人既鋪張公之功又致其祈願申言俾爾昌熾夀富髪将白則黄台背釋見大雅行葦老夀之状也胥相也相與試騐氣力神色以知夀考詩人又重復申言所願昌大耆艾萬有千嵗眉夀無有所害萬有千者萬而又千也有又同朱曰詹與瞻同毛傳曰龜山蒙山奄盡也龜蒙二山則盡有之餘東境甚廣大魯雖不盡有而大畧無不順而相違者荒畧也至于海邦及淮夷來同無有不率從者此魯侯之功也毛傳曰鳬山繹山禹貢徐州之地魯之所宅雖不盡有大畧包荒之矣毛傳曰南夷荆楚也按原本楚訛夷蠻貊蓋戎夷之通稱此謂淮夷之外又有餘蠻貊故云若順也言之順應曰諾大畧無相違異者魯侯是若謂莫不惟魯侯是若謂順魯侯也雖有福嘏而雜之以禍灾非純嘏也僖公在位久故是頌多言夀毛傳曰常許魯南鄙西鄙箋云許田魯朝宿之邑常或作嘗在薛之旁魯荘公三十一年築臺于薛六國時齊有孟嘗君食邑于薛曰復周公之土是嘗失之矣往者鄭以璧假許田至是復耶居云者欲其永止之意耶燕安也令善也其妻令善其母夀考其大夫士宜咸是有謂保有之釋文曰兒齒落更生細者也毛傳曰徂來山新甫山也八尺曰尋桷榱也孔疏曰桷與榱是椽之别名奚斯公子魚也有舄者圓而無琢痕如舄也毛傳曰曼長也碩大也萬民是若民咸順之無忤也公之正寝曰路寝路者無所不通如路也路寝通接外事君雖居宫中貴乎通逹而無壅蔽也衛宏作序曰閟宫頌僖公能復周之宇也不盡詩㫖
